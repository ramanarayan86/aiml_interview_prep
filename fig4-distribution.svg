<svg viewBox="0 0 860 360" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <rect x="1" y="1" width="858" height="358" rx="16" fill="#FFFFFF" stroke="#E3E6EC"/>
  <text x="32" y="40" font-size="21" font-weight="700" fill="#16202E">What it does to the attention distribution</text>
  <text x="32" y="63" font-size="13.5" fill="#5B6675">QK&#8209;norm doesn&#8217;t force flat attention &#8212; it stops <tspan font-style="italic">pathological</tspan> collapse, then a learnable scale g sets the sharpness.</text>

  <!-- panel A: collapsed -->
  <g transform="translate(40,96)">
    <rect width="244" height="210" rx="12" fill="#FCF6F5" stroke="#F0D6D3"/>
    <text x="122" y="26" text-anchor="middle" font-size="12.5" font-weight="700" fill="#9B2420">Without QK&#8209;norm</text>
    <text x="122" y="44" text-anchor="middle" font-size="11" fill="#a85b56">one&#8209;hot, entropy &#8776; 0</text>
    <g transform="translate(24,60)">
      <rect x="0"   y="118" width="22" height="6"   fill="#E7A19D"/>
      <rect x="30"  y="116" width="22" height="8"   fill="#E7A19D"/>
      <rect x="60"  y="6"   width="22" height="118" fill="#E0322E"/>
      <rect x="90"  y="119" width="22" height="5"   fill="#E7A19D"/>
      <rect x="120" y="120" width="22" height="4"   fill="#E7A19D"/>
      <rect x="150" y="117" width="22" height="7"   fill="#E7A19D"/>
      <rect x="180" y="118" width="14" height="6"   fill="#E7A19D"/>
      <line x1="-4" y1="124" x2="200" y2="124" stroke="#E0C7C4" stroke-width="1.3"/>
      <text x="100" y="140" text-anchor="middle" font-size="10.5" fill="#9B2420">keys (positions)</text>
    </g>
  </g>

  <!-- panel B: healthy -->
  <g transform="translate(308,96)">
    <rect width="244" height="210" rx="12" fill="#F4FBF8" stroke="#C9ECE0"/>
    <text x="122" y="26" text-anchor="middle" font-size="12.5" font-weight="700" fill="#0c6e58">With QK&#8209;norm</text>
    <text x="122" y="44" text-anchor="middle" font-size="11" fill="#3a8c79">selective but healthy entropy</text>
    <g transform="translate(24,60)">
      <rect x="0"   y="78"  width="22" height="46" fill="#7FCBB6"/>
      <rect x="30"  y="58"  width="22" height="66" fill="#7FCBB6"/>
      <rect x="60"  y="20"  width="22" height="104" fill="#0E8A6E"/>
      <rect x="90"  y="46"  width="22" height="78" fill="#7FCBB6"/>
      <rect x="120" y="84"  width="22" height="40" fill="#7FCBB6"/>
      <rect x="150" y="96"  width="22" height="28" fill="#7FCBB6"/>
      <rect x="180" y="104" width="14" height="20" fill="#7FCBB6"/>
      <line x1="-4" y1="124" x2="200" y2="124" stroke="#CDE9E1" stroke-width="1.3"/>
      <text x="100" y="140" text-anchor="middle" font-size="10.5" fill="#0c6e58">keys (positions)</text>
    </g>
  </g>

  <!-- panel C: role of g -->
  <g transform="translate(576,96)">
    <rect width="252" height="210" rx="12" fill="#F7F9FC" stroke="#E0E5EE"/>
    <text x="126" y="26" text-anchor="middle" font-size="12.5" font-weight="700" fill="#1f4fa3">The knob: learnable g</text>
    <text x="18" y="52" font-size="11.5" fill="#46506180">scores = g &#183; (q&#770;&#183;k&#770;)</text>
    <text x="18" y="52" font-size="11.5" fill="#465061">scores = g &#183; (q&#770;&#183;k&#770;)</text>
    <!-- small g flat -->
    <g transform="translate(20,72)">
      <text x="0" y="0" font-size="10.5" fill="#5B6675">small g &#8594; flatter</text>
      <rect x="0" y="14" width="14" height="14" fill="#9DBBEC"/>
      <rect x="22" y="10" width="14" height="18" fill="#9DBBEC"/>
      <rect x="44" y="6" width="14" height="22" fill="#6F97DF"/>
      <rect x="66" y="11" width="14" height="17" fill="#9DBBEC"/>
      <rect x="88" y="15" width="14" height="13" fill="#9DBBEC"/>
    </g>
    <g transform="translate(20,128)">
      <text x="0" y="0" font-size="10.5" fill="#5B6675">large g &#8594; sharper</text>
      <rect x="0" y="22" width="14" height="6" fill="#9DBBEC"/>
      <rect x="22" y="20" width="14" height="8" fill="#9DBBEC"/>
      <rect x="44" y="0" width="14" height="28" fill="#2D6CDF"/>
      <rect x="66" y="21" width="14" height="7" fill="#9DBBEC"/>
      <rect x="88" y="23" width="14" height="5" fill="#9DBBEC"/>
    </g>
    <text x="18" y="188" font-size="11" fill="#465061">Sharpness is now <tspan font-weight="700">learned</tspan>, not an</text>
    <text x="18" y="203" font-size="11" fill="#465061">accident of weight magnitude.</text>
  </g>
  <text x="32" y="338" font-size="11.5" fill="#9AA4B2">Entropy collapse is the failure being prevented; the cure is a controllable, bounded logit scale rather than runaway growth.</text>
</svg>
