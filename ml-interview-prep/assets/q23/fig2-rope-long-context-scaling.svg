<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 400" width="880" height="400">

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#5b6675"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="400" fill="#f8f9fa" rx="8"/>

  <!-- Title -->
  <text x="440" y="24" font-family="Arial, sans-serif" font-size="14" font-weight="bold"
        fill="#1f4fa3" text-anchor="middle">
    RoPE Long-Context Failure &amp; Scaling Strategies (Frequency-Space View)
  </text>

  <!-- ── PANEL LABELS ── -->
  <!-- Panel 1: Original RoPE, in-distribution -->
  <rect x="14" y="36" width="198" height="330" rx="6" fill="white" stroke="#dee2e6" stroke-width="1"/>
  <text x="113" y="54" font-family="Arial, sans-serif" font-size="11" font-weight="bold"
        fill="#0e8a6e" text-anchor="middle">Original RoPE</text>
  <text x="113" y="68" font-family="Arial, sans-serif" font-size="9" fill="#5b6675"
        text-anchor="middle">pos m ≤ L_train=4096 (in-dist)</text>

  <!-- Panel 2: OOD failure -->
  <rect x="226" y="36" width="198" height="330" rx="6" fill="white" stroke="#dee2e6" stroke-width="1"/>
  <text x="325" y="54" font-family="Arial, sans-serif" font-size="11" font-weight="bold"
        fill="#c0392b" text-anchor="middle">OOD Failure</text>
  <text x="325" y="68" font-family="Arial, sans-serif" font-size="9" fill="#5b6675"
        text-anchor="middle">pos m = 8192 &gt; L_train (out-of-dist)</text>

  <!-- Panel 3: NTK scaling -->
  <rect x="438" y="36" width="198" height="330" rx="6" fill="white" stroke="#dee2e6" stroke-width="1"/>
  <text x="537" y="54" font-family="Arial, sans-serif" font-size="11" font-weight="bold"
        fill="#1f4fa3" text-anchor="middle">NTK-Aware Scaling</text>
  <text x="537" y="68" font-family="Arial, sans-serif" font-size="9" fill="#5b6675"
        text-anchor="middle">base' = base×8.26; pos 8192 in-dist</text>

  <!-- Panel 4: YaRN -->
  <rect x="650" y="36" width="216" height="330" rx="6" fill="white" stroke="#dee2e6" stroke-width="1"/>
  <text x="758" y="54" font-family="Arial, sans-serif" font-size="11" font-weight="bold"
        fill="#6f42c1" text-anchor="middle">YaRN (3-Zone)</text>
  <text x="758" y="68" font-family="Arial, sans-serif" font-size="9" fill="#5b6675"
        text-anchor="middle">per-zone treatment; best quality</text>

  <!-- ── SHARED AXIS LABELS ── -->
  <text x="113" y="88" font-family="Arial, sans-serif" font-size="9" fill="#5b6675"
        text-anchor="middle">Rotation angle  mθᵢ  (rad)</text>
  <text x="325" y="88" font-family="Arial, sans-serif" font-size="9" fill="#5b6675"
        text-anchor="middle">Rotation angle  mθᵢ  (rad)</text>
  <text x="537" y="88" font-family="Arial, sans-serif" font-size="9" fill="#5b6675"
        text-anchor="middle">Rotation angle  mθᵢ  (rad)</text>
  <text x="758" y="88" font-family="Arial, sans-serif" font-size="9" fill="#5b6675"
        text-anchor="middle">Zone treatment per dimension pair</text>

  <!-- ─────────────────────────────────────────────── -->
  <!--  PANEL 1: Original RoPE — all pairs in-dist   -->
  <!-- ─────────────────────────────────────────────── -->
  <!-- Frequency axis: low i (high freq) at bottom, high i (low freq) at top -->
  <text x="22" y="110" font-family="Arial, sans-serif" font-size="9" fill="#adb5bd">i=63 (low-freq)</text>
  <text x="22" y="346" font-family="Arial, sans-serif" font-size="9" fill="#adb5bd">i=0  (high-freq)</text>

  <!-- Bars for each pair: width = angle / max_possible * panel_width -->
  <!-- For L=4096, m=4096: angle_i = 4096 * base^(-2i/128) -->
  <!-- i=0: 4096*1=4096 rad (many cycles → show as green full) -->
  <!-- i=20: 4096*0.00817=33.5 rad (many cycles) -->
  <!-- i=40: 4096*0.0000668=0.274 rad (tiny) -->
  <!-- i=63: 4096*0.0001=0.41 rad (tiny) -->
  <!-- Normalize bars: max width = 170px for "fully in dist" -->

  <!-- Pair groups: i=0..15 (high-freq, many cycles) -->
  <rect x="22" y="318" width="170" height="26" rx="3" fill="#0e8a6e" opacity="0.85"/>
  <text x="107" y="334" font-family="Arial, sans-serif" font-size="9" fill="white"
        text-anchor="middle">i=0..15: many cycles ✓</text>

  <!-- i=16..35 (mid-freq) -->
  <rect x="22" y="250" width="120" height="60" rx="3" fill="#0e8a6e" opacity="0.7"/>
  <text x="82" y="275" font-family="Arial, sans-serif" font-size="9" fill="white"
        text-anchor="middle">i=16..35</text>
  <text x="82" y="290" font-family="Arial, sans-serif" font-size="9" fill="white"
        text-anchor="middle">moderate ✓</text>

  <!-- i=36..55 (borderline) -->
  <rect x="22" y="182" width="50" height="60" rx="3" fill="#c77a12" opacity="0.8"/>
  <text x="47" y="208" font-family="Arial, sans-serif" font-size="8" fill="white"
        text-anchor="middle">i=36..55</text>
  <text x="47" y="222" font-family="Arial, sans-serif" font-size="8" fill="white"
        text-anchor="middle">&lt;1 cycle</text>

  <!-- i=56..63 (low-freq, partial cycle) -->
  <rect x="22" y="110" width="22" height="64" rx="3" fill="#0e8a6e" opacity="0.6"/>
  <text x="33" y="142" font-family="Arial, sans-serif" font-size="8" fill="white"
        text-anchor="middle" transform="rotate(-90, 33, 142)">i=56..63 ✓</text>

  <!-- Training range bar -->
  <rect x="22" y="355" width="170" height="7" rx="2" fill="#0e8a6e" opacity="0.3"/>
  <text x="107" y="365" font-family="Arial, sans-serif" font-size="9" fill="#0e8a6e"
        text-anchor="middle">All within training range</text>

  <!-- ─────────────────────────────────────────────────────────── -->
  <!--  PANEL 2: OOD failure — m=8192 > L_train                   -->
  <!-- ─────────────────────────────────────────────────────────── -->
  <!-- High-freq: still fine (wrap many times) -->
  <rect x="234" y="318" width="170" height="26" rx="3" fill="#0e8a6e" opacity="0.85"/>
  <text x="319" y="334" font-family="Arial, sans-serif" font-size="9" fill="white"
        text-anchor="middle">i=0..15: still in-dist ✓</text>

  <!-- Mid-freq: mixed -->
  <rect x="234" y="250" width="120" height="60" rx="3" fill="#c77a12" opacity="0.7"/>
  <text x="294" y="275" font-family="Arial, sans-serif" font-size="9" fill="white"
        text-anchor="middle">i=16..35</text>
  <text x="294" y="290" font-family="Arial, sans-serif" font-size="9" fill="white"
        text-anchor="middle">borderline</text>

  <!-- i=36..55: OOD (red) -->
  <rect x="234" y="182" width="50" height="60" rx="3" fill="#c0392b" opacity="0.85"/>
  <text x="259" y="205" font-family="Arial, sans-serif" font-size="8" fill="white"
        text-anchor="middle">OOD ✗</text>
  <text x="259" y="218" font-family="Arial, sans-serif" font-size="8" fill="white"
        text-anchor="middle">i=36..55</text>

  <!-- i=56..63: OOD (red) -->
  <rect x="234" y="110" width="22" height="64" rx="3" fill="#c0392b" opacity="0.9"/>
  <text x="245" y="142" font-family="Arial, sans-serif" font-size="8" fill="white"
        text-anchor="middle" transform="rotate(-90, 245, 142)">OOD ✗</text>

  <!-- Training boundary line -->
  <line x1="234" y1="182" x2="404" y2="182" stroke="#c0392b" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="320" y="178" font-family="Arial, sans-serif" font-size="9" fill="#c0392b"
        text-anchor="middle">training boundary</text>

  <!-- Warning label -->
  <rect x="234" y="355" width="170" height="7" rx="2" fill="#c0392b" opacity="0.3"/>
  <text x="319" y="365" font-family="Arial, sans-serif" font-size="9" fill="#c0392b"
        text-anchor="middle">Low-freq pairs: unseen territory!</text>

  <!-- ─────────────────────────────────────────────────────────── -->
  <!--  PANEL 3: NTK scaling — base rescaled                      -->
  <!-- ─────────────────────────────────────────────────────────── -->
  <!-- All pairs shifted inward: new base=82580 stretches wavelengths -->
  <rect x="446" y="318" width="170" height="26" rx="3" fill="#0e8a6e" opacity="0.85"/>
  <text x="531" y="334" font-family="Arial, sans-serif" font-size="9" fill="white"
        text-anchor="middle">i=0..15: unchanged (θ₀=1 always)</text>

  <rect x="446" y="250" width="120" height="60" rx="3" fill="#0e8a6e" opacity="0.75"/>
  <text x="506" y="275" font-family="Arial, sans-serif" font-size="9" fill="white"
        text-anchor="middle">i=16..35</text>
  <text x="506" y="290" font-family="Arial, sans-serif" font-size="9" fill="white"
        text-anchor="middle">rescaled ✓</text>

  <rect x="446" y="182" width="50" height="60" rx="3" fill="#0e8a6e" opacity="0.7"/>
  <text x="471" y="205" font-family="Arial, sans-serif" font-size="8" fill="white"
        text-anchor="middle">rescaled</text>
  <text x="471" y="218" font-family="Arial, sans-serif" font-size="8" fill="white"
        text-anchor="middle">✓</text>

  <rect x="446" y="110" width="22" height="64" rx="3" fill="#0e8a6e" opacity="0.65"/>
  <text x="457" y="142" font-family="Arial, sans-serif" font-size="8" fill="white"
        text-anchor="middle" transform="rotate(-90, 457, 142)">✓</text>

  <!-- Formula box -->
  <rect x="446" y="350" width="182" height="16" rx="3" fill="#dbeafe"/>
  <text x="537" y="361" font-family="Arial, sans-serif" font-size="9" fill="#1f4fa3"
        text-anchor="middle">base'=base×(L_new/L_train)^(d/(d−2))</text>

  <!-- ─────────────────────────────────────────────────────────── -->
  <!--  PANEL 4: YaRN — 3 zones                                   -->
  <!-- ─────────────────────────────────────────────────────────── -->
  <!-- Zone: high-freq (unchanged, blue) -->
  <rect x="658" y="310" width="200" height="38" rx="4" fill="#1f4fa3" opacity="0.15"
        stroke="#1f4fa3" stroke-width="1.5"/>
  <text x="758" y="326" font-family="Arial, sans-serif" font-size="10" fill="#1f4fa3"
        text-anchor="middle" font-weight="bold">HIGH-FREQ zone (i small)</text>
  <text x="758" y="341" font-family="Arial, sans-serif" font-size="9" fill="#1f4fa3"
        text-anchor="middle">λᵢ &lt; α·L_train → no scaling</text>

  <!-- Zone: mid-freq (blended, purple) -->
  <rect x="658" y="218" width="200" height="82" rx="4" fill="#6f42c1" opacity="0.12"
        stroke="#6f42c1" stroke-width="1.5"/>
  <text x="758" y="242" font-family="Arial, sans-serif" font-size="10" fill="#6f42c1"
        text-anchor="middle" font-weight="bold">MID-FREQ zone</text>
  <text x="758" y="258" font-family="Arial, sans-serif" font-size="9" fill="#6f42c1"
        text-anchor="middle">α·L ≤ λᵢ ≤ β·L</text>
  <text x="758" y="274" font-family="Arial, sans-serif" font-size="9" fill="#6f42c1"
        text-anchor="middle">γ=(λᵢ/L−α)/(β−α)</text>
  <text x="758" y="290" font-family="Arial, sans-serif" font-size="9" fill="#6f42c1"
        text-anchor="middle">eff_pos = (1−γ)m + γ·m·L_train/L_new</text>

  <!-- Zone: low-freq (interpolated, orange) -->
  <rect x="658" y="108" width="200" height="100" rx="4" fill="#c77a12" opacity="0.12"
        stroke="#c77a12" stroke-width="1.5"/>
  <text x="758" y="132" font-family="Arial, sans-serif" font-size="10" fill="#c77a12"
        text-anchor="middle" font-weight="bold">LOW-FREQ zone (i large)</text>
  <text x="758" y="150" font-family="Arial, sans-serif" font-size="9" fill="#c77a12"
        text-anchor="middle">λᵢ &gt; β·L_train → full interpolation</text>
  <text x="758" y="168" font-family="Arial, sans-serif" font-size="9" fill="#c77a12"
        text-anchor="middle">eff_pos = m · L_train / L_new</text>
  <text x="758" y="186" font-family="Arial, sans-serif" font-size="9" fill="#856404"
        text-anchor="middle">(α=1, β=32 are typical values)</text>

  <!-- Zone boundary lines -->
  <line x1="658" y1="218" x2="858" y2="218" stroke="#6f42c1" stroke-width="1"
        stroke-dasharray="4,3"/>
  <line x1="658" y1="308" x2="858" y2="308" stroke="#1f4fa3" stroke-width="1"
        stroke-dasharray="4,3"/>

  <!-- Bottom summary -->
  <rect x="658" y="354" width="200" height="12" rx="3" fill="#6f42c1" opacity="0.2"/>
  <text x="758" y="363" font-family="Arial, sans-serif" font-size="9" fill="#6f42c1"
        text-anchor="middle">Best quality at 8–128× extension</text>

  <!-- ── BOTTOM SUMMARY ROW ── -->
  <rect x="14" y="372" width="852" height="22" rx="5" fill="#e9ecef"/>
  <text x="440" y="386" font-family="Arial, sans-serif" font-size="10" fill="#333"
        text-anchor="middle">
    NTK: one formula, zero FT, 2–4× ·· YaRN: 3 zones + temperature correction, best 8–32× ·· LongRoPE: evolutionary per-dim search, 32–128×
  </text>

</svg>
