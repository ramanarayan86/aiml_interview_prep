<svg xmlns="http://www.w3.org/2000/svg" width="820" height="340" font-family="Arial, sans-serif">
  <rect width="820" height="340" fill="#f8f9fa" rx="8"/>
  <text x="410" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#1f4fa3">BPE Training: Iterative Pair Merging</text>

  <defs>
    <marker id="a3" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#5b6675"/>
    </marker>
  </defs>

  <!-- Step 0 -->
  <text x="20" y="60" font-size="12" font-weight="bold" fill="#5b6675">Step 0 — Corpus split into characters</text>
  <rect x="20" y="68" width="780" height="34" rx="5" fill="#e8edf5" stroke="#1f4fa3" stroke-width="1"/>
  <text x="30" y="90" font-size="12" fill="#333">Corpus: "low low low lowest newest newest" → tokens: l o w  l o w  l o w  l o w e s t  n e w e s t</text>

  <!-- Step 1 -->
  <text x="20" y="125" font-size="12" font-weight="bold" fill="#0e8a6e">Step 1 — Most frequent pair: (l, o) → count 4 → merge to "lo"</text>
  <rect x="20" y="133" width="780" height="34" rx="5" fill="#e6f4f1" stroke="#0e8a6e" stroke-width="1.5"/>
  <text x="30" y="155" font-size="12" fill="#333">Result: <tspan font-weight="bold" fill="#0e8a6e">lo</tspan> w  <tspan font-weight="bold" fill="#0e8a6e">lo</tspan> w  <tspan font-weight="bold" fill="#0e8a6e">lo</tspan> w  <tspan font-weight="bold" fill="#0e8a6e">lo</tspan> w e s t  n e w e s t   &nbsp;&nbsp;&nbsp; Merge rule added: (l, o) → lo</text>

  <!-- Step 2 -->
  <text x="20" y="190" font-size="12" font-weight="bold" fill="#0e8a6e">Step 2 — Next best pair: (lo, w) → count 4 → merge to "low"</text>
  <rect x="20" y="198" width="780" height="34" rx="5" fill="#e6f4f1" stroke="#0e8a6e" stroke-width="1.5"/>
  <text x="30" y="220" font-size="12" fill="#333">Result: <tspan font-weight="bold" fill="#0e8a6e">low</tspan>  <tspan font-weight="bold" fill="#0e8a6e">low</tspan>  <tspan font-weight="bold" fill="#0e8a6e">low</tspan>  <tspan font-weight="bold" fill="#0e8a6e">low</tspan> e s t  n e w e s t   &nbsp;&nbsp;&nbsp; Merge rule added: (lo, w) → low</text>

  <!-- Step 3 -->
  <text x="20" y="255" font-size="12" font-weight="bold" fill="#c77a12">Step 3 — Next: (e, s) count 2 → "es"</text>
  <rect x="20" y="263" width="780" height="34" rx="5" fill="#fef3e2" stroke="#c77a12" stroke-width="1.5"/>
  <text x="30" y="285" font-size="12" fill="#333">Result: low low low low  <tspan font-weight="bold" fill="#c77a12">es</tspan> t  n e w <tspan font-weight="bold" fill="#c77a12">es</tspan> t   &nbsp;&nbsp;&nbsp; … continues until vocab size V reached</text>

  <text x="410" y="328" text-anchor="middle" font-size="11" fill="#888">Each merge step reduces total token count by the pair frequency. Vocabulary grows by 1 per step. Stop at target V.</text>
</svg>
