<svg viewBox="0 0 860 470" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <linearGradient id="bgp" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#FBFCFE"/>
    </linearGradient>
    <marker id="arrowR" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#9AA4B2"/>
    </marker>
  </defs>

  <rect x="1" y="1" width="858" height="468" rx="16" fill="url(#bgp)" stroke="#E3E6EC"/>
  <text x="32" y="42" font-size="21" font-weight="700" fill="#16202E">Why training breaks without QK&#8209;norm</text>
  <text x="32" y="66" font-size="13.5" fill="#5B6675">The same activation growth that helps fitting quietly poisons the attention softmax.</text>

  <!-- Stage 1: Q,K norms grow -->
  <g transform="translate(32,96)">
    <rect width="240" height="156" rx="12" fill="#FCE8E7" stroke="#F2C5C2"/>
    <text x="16" y="28" font-size="13" font-weight="700" fill="#9B2420">1 &#183; Q and K magnitudes grow</text>
    <!-- mini chart: rising curve -->
    <g transform="translate(20,44)">
      <line x1="0" y1="92" x2="200" y2="92" stroke="#E7B9B6" stroke-width="1.2"/>
      <line x1="0" y1="0" x2="0" y2="92" stroke="#E7B9B6" stroke-width="1.2"/>
      <path d="M2,90 C70,88 120,70 150,40 S190,2 198,2" fill="none" stroke="#E0322E" stroke-width="2.6"/>
      <text x="60" y="86" font-size="10.5" fill="#9B2420">training steps</text>
      <text x="-8" y="-2" font-size="10.5" fill="#9B2420" transform="rotate(-90,-8,-2)" text-anchor="end">&#8741;q&#8741;, &#8741;k&#8741;</text>
    </g>
  </g>
  <line x1="278" y1="174" x2="306" y2="174" stroke="#9AA4B2" stroke-width="2" marker-end="url(#arrowR)"/>

  <!-- Stage 2: logits blow up -->
  <g transform="translate(312,96)">
    <rect width="240" height="156" rx="12" fill="#FBF3E0" stroke="#EBD6A3"/>
    <text x="16" y="28" font-size="13" font-weight="700" fill="#8A6212">2 &#183; Logits q&#183;k explode</text>
    <text x="16" y="52" font-size="12.5" fill="#6B5417">scores = qk&#7488;/&#8730;d&#7503;</text>
    <text x="16" y="74" font-size="12.5" fill="#6B5417">can reach &#177;hundreds</text>
    <!-- big bars -->
    <g transform="translate(18,86)">
      <rect x="0"  y="40" width="22" height="22" fill="#E9C66A"/>
      <rect x="34" y="20" width="22" height="42" fill="#E9C66A"/>
      <rect x="68" y="2"  width="22" height="60" fill="#D99B1C"/>
      <rect x="102" y="30" width="22" height="32" fill="#E9C66A"/>
      <rect x="136" y="48" width="22" height="14" fill="#E9C66A"/>
      <rect x="170" y="44" width="22" height="18" fill="#E9C66A"/>
      <line x1="-4" y1="62" x2="200" y2="62" stroke="#D9BE84" stroke-width="1.2"/>
    </g>
  </g>
  <line x1="558" y1="174" x2="586" y2="174" stroke="#9AA4B2" stroke-width="2" marker-end="url(#arrowR)"/>

  <!-- Stage 3: softmax collapses -->
  <g transform="translate(592,96)">
    <rect width="236" height="156" rx="12" fill="#EDE9FB" stroke="#CFC6F0"/>
    <text x="16" y="28" font-size="13" font-weight="700" fill="#4B3B9B">3 &#183; Softmax saturates</text>
    <text x="16" y="50" font-size="12" fill="#5446a0">attention &#8594; near one&#8209;hot</text>
    <!-- one-hot spike bars -->
    <g transform="translate(18,64)">
      <rect x="0"   y="78" width="20" height="6"  fill="#9A8BE0"/>
      <rect x="30"  y="76" width="20" height="8"  fill="#9A8BE0"/>
      <rect x="60"  y="6"  width="20" height="78" fill="#6C4FE0"/>
      <rect x="90"  y="79" width="20" height="5"  fill="#9A8BE0"/>
      <rect x="120" y="80" width="20" height="4"  fill="#9A8BE0"/>
      <rect x="150" y="77" width="20" height="7"  fill="#9A8BE0"/>
      <line x1="-4" y1="84" x2="190" y2="84" stroke="#C3B8EC" stroke-width="1.2"/>
      <text x="44" y="100" font-size="10.5" fill="#5446a0">entropy &#8776; 0</text>
    </g>
  </g>

  <!-- Stage 4 banner: gradients vanish -> divergence -->
  <g transform="translate(32,276)">
    <rect width="796" height="76" rx="12" fill="#16202E"/>
    <text x="22" y="29" font-size="13.5" font-weight="700" fill="#FFFFFF">4 &#183; The trap closes</text>
    <text x="22" y="50" font-size="12.5" fill="#C7D0DC">Saturated softmax &#8594; the gradient through attention &#8776; 0 for every token but the spiked one, so the layer</text>
    <text x="22" y="67" font-size="12.5" fill="#C7D0DC">stops learning useful routing while the loss spikes &#8594; <tspan fill="#FF8A84" font-weight="700">training loss diverges</tspan>.</text>
  </g>

  <!-- loss curve illustration -->
  <g transform="translate(32,372)">
    <rect width="796" height="78" rx="12" fill="#FFFFFF" stroke="#E3E6EC"/>
    <g transform="translate(20,14)">
      <line x1="0" y1="52" x2="300" y2="52" stroke="#E3E6EC"/>
      <line x1="0" y1="0" x2="0" y2="52" stroke="#E3E6EC"/>
      <!-- diverging baseline -->
      <path d="M0,40 C60,30 100,28 140,30 C175,32 190,20 205,6" fill="none" stroke="#E0322E" stroke-width="2.6"/>
      <!-- stable qknorm -->
      <path d="M0,40 C70,28 140,20 210,16 C250,14 280,13 298,12.5" fill="none" stroke="#0E8A6E" stroke-width="2.6"/>
      <text x="210" y="4" font-size="10.5" fill="#E0322E">baseline: diverges</text>
      <text x="150" y="30" font-size="10.5" fill="#0E8A6E">+ QK&#8209;norm: stable</text>
      <text x="120" y="66" font-size="10.5" fill="#5B6675">training steps</text>
    </g>
    <text x="345" y="30" font-size="12.5" fill="#5B6675">Observed in ViT&#8209;22B at &#8776;8B params:</text>
    <text x="345" y="50" font-size="12.5" fill="#16202E">divergence after a few thousand steps,</text>
    <text x="345" y="68" font-size="12.5" fill="#16202E">fixed by normalizing q and k. <tspan fill="#9AA4B2">(Dehghani et&#160;al., 2023)</tspan></text>
  </g>
</svg>
