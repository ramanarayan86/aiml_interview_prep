<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 340" width="820" height="340" font-family="Arial, sans-serif">
  <defs>
    <marker id="arr1" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#5b6675"/>
    </marker>
    <marker id="arr1-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#c0392b"/>
    </marker>
    <marker id="arr1-teal" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0e8a6e"/>
    </marker>
  </defs>
  <rect width="820" height="340" fill="#f8f9fa" rx="8"/>

  <!-- Title -->
  <text x="410" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#1f4fa3">Embedding Init Scale Effect on LayerNorm Input Magnitude</text>

  <!-- ===== LEFT PANEL: Large init sigma=1.0 ===== -->
  <rect x="30" y="44" width="360" height="278" fill="#fef3e2" rx="6" stroke="#c77a12" stroke-width="1.5"/>
  <text x="210" y="65" text-anchor="middle" font-size="13" font-weight="bold" fill="#c77a12">Large Init  (&#963; = 1.0)</text>

  <!-- Embedding table box -->
  <rect x="60" y="78" width="120" height="50" fill="#c77a12" rx="4" opacity="0.85"/>
  <text x="120" y="98" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">Embedding</text>
  <text x="120" y="114" text-anchor="middle" font-size="11" fill="#fff">E ~ N(0, 1.0&#178;)</text>

  <!-- Arrow right to values -->
  <line x1="180" y1="103" x2="215" y2="103" stroke="#5b6675" stroke-width="1.5" marker-end="url(#arr1)"/>
  <text x="197" y="96" text-anchor="middle" font-size="9" fill="#5b6675">lookup</text>

  <!-- Embedding vector values (large) -->
  <rect x="216" y="78" width="140" height="50" fill="#fff" rx="4" stroke="#c77a12" stroke-width="1"/>
  <text x="286" y="96" text-anchor="middle" font-size="11" fill="#c0392b" font-weight="bold">e = [1.3, &#8722;0.9, 1.1,</text>
  <text x="286" y="112" text-anchor="middle" font-size="11" fill="#c0392b" font-weight="bold">&#8722;1.2, 0.8, ...]</text>

  <!-- Arrow down to LayerNorm -->
  <line x1="286" y1="128" x2="286" y2="158" stroke="#c0392b" stroke-width="1.5" marker-end="url(#arr1-red)"/>
  <text x="310" y="147" font-size="10" fill="#c0392b">||e|| &#8776; large</text>

  <!-- LayerNorm box -->
  <rect x="180" y="160" width="210" height="44" fill="#fff" rx="4" stroke="#c77a12" stroke-width="1"/>
  <text x="285" y="178" text-anchor="middle" font-size="12" font-weight="bold" fill="#5b6675">LayerNorm</text>
  <text x="285" y="196" text-anchor="middle" font-size="10" fill="#5b6675">normalises over d_model dims</text>

  <!-- Arrow down to MHA -->
  <line x1="285" y1="204" x2="285" y2="232" stroke="#c0392b" stroke-width="1.5" marker-end="url(#arr1-red)"/>

  <!-- MHA box -->
  <rect x="180" y="234" width="210" height="38" fill="#fff" rx="4" stroke="#c0392b" stroke-width="1.5"/>
  <text x="285" y="252" text-anchor="middle" font-size="12" font-weight="bold" fill="#c0392b">Attention</text>
  <text x="285" y="268" text-anchor="middle" font-size="10" fill="#c0392b">QK&#7488; scaled by 1/&#8730;d &#8212; still saturated</text>

  <!-- Warning label -->
  <rect x="55" y="290" width="315" height="22" fill="#c0392b" rx="3" opacity="0.12"/>
  <text x="212" y="305" text-anchor="middle" font-size="11" fill="#c0392b" font-weight="bold">Softmax saturates &#8594; vanishing gradients at step 0</text>

  <!-- ===== RIGHT PANEL: Small init sigma=0.02 ===== -->
  <rect x="430" y="44" width="360" height="278" fill="#e6f4f1" rx="6" stroke="#0e8a6e" stroke-width="1.5"/>
  <text x="610" y="65" text-anchor="middle" font-size="13" font-weight="bold" fill="#0e8a6e">Small Init  (&#963; = 0.02)</text>

  <!-- Embedding table box -->
  <rect x="460" y="78" width="120" height="50" fill="#0e8a6e" rx="4" opacity="0.85"/>
  <text x="520" y="98" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">Embedding</text>
  <text x="520" y="114" text-anchor="middle" font-size="11" fill="#fff">E ~ N(0, 0.02&#178;)</text>

  <!-- Arrow right to values -->
  <line x1="580" y1="103" x2="615" y2="103" stroke="#5b6675" stroke-width="1.5" marker-end="url(#arr1)"/>
  <text x="597" y="96" text-anchor="middle" font-size="9" fill="#5b6675">lookup</text>

  <!-- Embedding vector values (small) -->
  <rect x="616" y="78" width="145" height="50" fill="#fff" rx="4" stroke="#0e8a6e" stroke-width="1"/>
  <text x="688" y="96" text-anchor="middle" font-size="11" fill="#0e8a6e" font-weight="bold">e = [0.01, &#8722;0.02,</text>
  <text x="688" y="112" text-anchor="middle" font-size="11" fill="#0e8a6e" font-weight="bold">0.015, &#8722;0.01, ...]</text>

  <!-- Arrow down to LayerNorm -->
  <line x1="686" y1="128" x2="686" y2="158" stroke="#0e8a6e" stroke-width="1.5" marker-end="url(#arr1-teal)"/>
  <text x="700" y="147" font-size="10" fill="#0e8a6e">||e|| &#8776; small</text>

  <!-- LayerNorm box -->
  <rect x="580" y="160" width="210" height="44" fill="#fff" rx="4" stroke="#0e8a6e" stroke-width="1"/>
  <text x="685" y="178" text-anchor="middle" font-size="12" font-weight="bold" fill="#5b6675">LayerNorm</text>
  <text x="685" y="196" text-anchor="middle" font-size="10" fill="#5b6675">normalises &#8594; unit-scale output</text>

  <!-- Arrow down to MHA -->
  <line x1="685" y1="204" x2="685" y2="232" stroke="#0e8a6e" stroke-width="1.5" marker-end="url(#arr1-teal)"/>

  <!-- MHA box -->
  <rect x="580" y="234" width="210" height="38" fill="#fff" rx="4" stroke="#0e8a6e" stroke-width="1.5"/>
  <text x="685" y="252" text-anchor="middle" font-size="12" font-weight="bold" fill="#0e8a6e">Attention</text>
  <text x="685" y="268" text-anchor="middle" font-size="10" fill="#0e8a6e">well-conditioned QK&#7488; &#8594; smooth softmax</text>

  <!-- Good label -->
  <rect x="455" y="290" width="315" height="22" fill="#0e8a6e" rx="3" opacity="0.12"/>
  <text x="612" y="305" text-anchor="middle" font-size="11" fill="#0e8a6e" font-weight="bold">Stable gradients from the first step &#8594; fast convergence</text>
</svg>
