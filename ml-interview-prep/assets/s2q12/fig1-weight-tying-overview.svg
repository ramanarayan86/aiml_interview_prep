<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 340" width="860" height="340" font-family="Arial, sans-serif">
  <rect width="860" height="340" fill="#f8f9fa" rx="8"/>
  <text x="430" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#1f4fa3">Weight Tying: Shared vs Separate Embedding Matrices</text>

  <!-- === LEFT PANEL: Untied === -->
  <text x="210" y="58" text-anchor="middle" font-size="13" font-weight="bold" fill="#c0392b">Untied (Separate Matrices)</text>

  <!-- Input embedding E_in -->
  <rect x="60" y="75" width="120" height="50" fill="#fde8d8" stroke="#c0392b" stroke-width="1.5" rx="4"/>
  <text x="120" y="96" text-anchor="middle" font-size="12" font-weight="bold" fill="#c0392b">E_in</text>
  <text x="120" y="113" text-anchor="middle" font-size="10" fill="#c0392b">V × d</text>

  <!-- arrow down -->
  <line x1="120" y1="125" x2="120" y2="155" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="132" y="144" font-size="10" fill="#555">token → vec</text>

  <!-- Model body -->
  <rect x="60" y="155" width="300" height="40" fill="#e8f0fe" stroke="#1f4fa3" stroke-width="1.5" rx="4"/>
  <text x="210" y="180" text-anchor="middle" font-size="12" fill="#1f4fa3">Transformer Layers  (shared)</text>

  <!-- arrow down -->
  <line x1="210" y1="195" x2="210" y2="225" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Output un-embedding E_out -->
  <rect x="150" y="225" width="120" height="50" fill="#fde8d8" stroke="#c0392b" stroke-width="1.5" rx="4"/>
  <text x="210" y="246" text-anchor="middle" font-size="12" font-weight="bold" fill="#c0392b">E_out</text>
  <text x="210" y="263" text-anchor="middle" font-size="10" fill="#c0392b">d × V  (separate)</text>

  <!-- Parameter count label -->
  <text x="210" y="300" text-anchor="middle" font-size="11" fill="#c0392b">Parameters: 2 × V×d</text>
  <text x="210" y="316" text-anchor="middle" font-size="10" fill="#888">(e.g., 2 × 50257×768 ≈ 77M extra)</text>

  <!-- Divider -->
  <line x1="430" y1="50" x2="430" y2="330" stroke="#ccc" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- === RIGHT PANEL: Tied === -->
  <text x="645" y="58" text-anchor="middle" font-size="13" font-weight="bold" fill="#0e8a6e">Tied (Single Matrix)</text>

  <!-- Single shared E -->
  <rect x="545" y="75" width="200" height="50" fill="#d5f5e3" stroke="#0e8a6e" stroke-width="2" rx="4"/>
  <text x="645" y="96" text-anchor="middle" font-size="12" font-weight="bold" fill="#0e8a6e">E  (shared)</text>
  <text x="645" y="113" text-anchor="middle" font-size="10" fill="#0e8a6e">V × d</text>

  <!-- arrow to model -->
  <line x1="645" y1="125" x2="645" y2="155" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="660" y="144" font-size="10" fill="#555">token → vec</text>

  <!-- Model body -->
  <rect x="490" y="155" width="310" height="40" fill="#e8f0fe" stroke="#1f4fa3" stroke-width="1.5" rx="4"/>
  <text x="645" y="180" text-anchor="middle" font-size="12" fill="#1f4fa3">Transformer Layers  (shared)</text>

  <!-- arrow down -->
  <line x1="645" y1="195" x2="645" y2="225" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- E^T re-used as un-embedding -->
  <rect x="545" y="225" width="200" height="50" fill="#d5f5e3" stroke="#0e8a6e" stroke-width="2" rx="4"/>
  <text x="645" y="246" text-anchor="middle" font-size="12" font-weight="bold" fill="#0e8a6e">E^T  (same weights)</text>
  <text x="645" y="263" text-anchor="middle" font-size="10" fill="#0e8a6e">d × V  (transposed)</text>

  <!-- curved arrow showing same matrix -->
  <path d="M 755 100 Q 800 170 755 255" fill="none" stroke="#0e8a6e" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="780" y="180" text-anchor="middle" font-size="10" fill="#0e8a6e">same</text>
  <text x="780" y="194" text-anchor="middle" font-size="10" fill="#0e8a6e">weights</text>

  <!-- Parameter count label -->
  <text x="645" y="300" text-anchor="middle" font-size="11" fill="#0e8a6e">Parameters: 1 × V×d</text>
  <text x="645" y="316" text-anchor="middle" font-size="10" fill="#888">(saves ~38.5M params at d=768, V=50257)</text>

  <!-- Arrow marker def -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#555"/>
    </marker>
  </defs>
</svg>
