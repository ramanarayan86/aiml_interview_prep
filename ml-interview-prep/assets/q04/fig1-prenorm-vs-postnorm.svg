<svg xmlns="http://www.w3.org/2000/svg" width="820" height="340" font-family="Arial, sans-serif">
  <rect width="820" height="340" fill="#f8f9fa" rx="8"/>
  <text x="410" y="26" text-anchor="middle" font-size="15" font-weight="bold" fill="#1f4fa3">Pre-Norm vs Post-Norm Transformer Block Architecture</text>

  <defs>
    <marker id="a4" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#5b6675"/>
    </marker>
    <marker id="a4-org" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#c77a12"/>
    </marker>
  </defs>

  <!-- ========== LEFT: Post-Norm ========== -->
  <text x="210" y="50" text-anchor="middle" font-size="14" font-weight="bold" fill="#e05252">Post-Norm (original Transformer)</text>

  <!-- Chain: Input → Attn → +Residual → LN → FFN → +Residual → LN → Output -->
  <!-- Vertical layout, x=210, top y=70 -->

  <!-- Input -->
  <rect x="160" y="65" width="100" height="32" rx="6" fill="#1f4fa3"/>
  <text x="210" y="86" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Input x</text>

  <!-- Arrow down -->
  <line x1="210" y1="97" x2="210" y2="112" stroke="#5b6675" stroke-width="1.8" marker-end="url(#a4)"/>

  <!-- Attn -->
  <rect x="160" y="113" width="100" height="32" rx="6" fill="#1f4fa3"/>
  <text x="210" y="134" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Attention</text>

  <!-- Arrow down -->
  <line x1="210" y1="145" x2="210" y2="160" stroke="#5b6675" stroke-width="1.8" marker-end="url(#a4)"/>

  <!-- Add1 -->
  <circle cx="210" cy="175" r="15" fill="white" stroke="#c77a12" stroke-width="2.5"/>
  <text x="210" y="181" text-anchor="middle" font-size="16" font-weight="bold" fill="#c77a12">+</text>

  <!-- Residual skip 1: from Input x to Add1 -->
  <path d="M 160 81 L 120 81 L 120 175 L 195 175" stroke="#c77a12" stroke-width="2" fill="none" stroke-dasharray="5,3" marker-end="url(#a4-org)"/>

  <!-- Arrow down -->
  <line x1="210" y1="190" x2="210" y2="205" stroke="#5b6675" stroke-width="1.8" marker-end="url(#a4)"/>

  <!-- LN1 (POST: after first residual) -->
  <rect x="160" y="206" width="100" height="32" rx="6" fill="#0e8a6e" stroke="#0e8a6e"/>
  <text x="210" y="227" text-anchor="middle" font-size="12" font-weight="bold" fill="white">LayerNorm</text>

  <!-- Arrow down -->
  <line x1="210" y1="238" x2="210" y2="253" stroke="#5b6675" stroke-width="1.8" marker-end="url(#a4)"/>

  <!-- FFN -->
  <rect x="160" y="254" width="100" height="32" rx="6" fill="#1f4fa3"/>
  <text x="210" y="275" text-anchor="middle" font-size="12" font-weight="bold" fill="white">FFN</text>

  <!-- Arrow down -->
  <line x1="210" y1="286" x2="210" y2="301" stroke="#5b6675" stroke-width="1.8" marker-end="url(#a4)"/>

  <!-- Add2 -->
  <circle cx="210" cy="313" r="15" fill="white" stroke="#c77a12" stroke-width="2.5"/>
  <text x="210" y="319" text-anchor="middle" font-size="16" font-weight="bold" fill="#c77a12">+</text>

  <!-- Residual skip 2: from after LN1 to Add2 -->
  <path d="M 160 222 L 120 222 L 120 313 L 195 313" stroke="#c77a12" stroke-width="2" fill="none" stroke-dasharray="5,3" marker-end="url(#a4-org)"/>

  <!-- (Post-norm has LN after add, so we show LN after final add too) -->
  <!-- Arrow to final LN -->
  <!-- Note: actual post-norm: after each residual add, apply LN. So there's LN after add2 too -->
  <!-- For clarity let's show label below -->
  <text x="210" y="335" text-anchor="middle" font-size="10" fill="#0e8a6e">→ LN → Output</text>

  <!-- Post-norm label note -->
  <text x="270" y="222" font-size="10" fill="#0e8a6e" font-weight="bold">← LN after Add</text>

  <!-- ========== RIGHT: Pre-Norm ========== -->
  <text x="610" y="50" text-anchor="middle" font-size="14" font-weight="bold" fill="#0e8a6e">Pre-Norm (modern: GPT-2, GPT-3)</text>

  <!-- Chain: Input → LN → Attn → +Residual → LN → FFN → +Residual → Output -->

  <!-- Input -->
  <rect x="560" y="65" width="100" height="32" rx="6" fill="#1f4fa3"/>
  <text x="610" y="86" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Input x</text>

  <!-- Arrow down -->
  <line x1="610" y1="97" x2="610" y2="112" stroke="#5b6675" stroke-width="1.8" marker-end="url(#a4)"/>

  <!-- LN1 (PRE: before attention) -->
  <rect x="560" y="113" width="100" height="32" rx="6" fill="#0e8a6e"/>
  <text x="610" y="134" text-anchor="middle" font-size="12" font-weight="bold" fill="white">LayerNorm</text>

  <!-- Arrow down -->
  <line x1="610" y1="145" x2="610" y2="160" stroke="#5b6675" stroke-width="1.8" marker-end="url(#a4)"/>

  <!-- Attn -->
  <rect x="560" y="161" width="100" height="32" rx="6" fill="#1f4fa3"/>
  <text x="610" y="182" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Attention</text>

  <!-- Arrow down -->
  <line x1="610" y1="193" x2="610" y2="208" stroke="#5b6675" stroke-width="1.8" marker-end="url(#a4)"/>

  <!-- Add1 -->
  <circle cx="610" cy="222" r="15" fill="white" stroke="#c77a12" stroke-width="2.5"/>
  <text x="610" y="228" text-anchor="middle" font-size="16" font-weight="bold" fill="#c77a12">+</text>

  <!-- Residual skip 1: from Input x to Add1 -->
  <path d="M 660 81 L 700 81 L 700 222 L 625 222" stroke="#c77a12" stroke-width="2" fill="none" stroke-dasharray="5,3" marker-end="url(#a4-org)"/>

  <!-- Arrow down -->
  <line x1="610" y1="237" x2="610" y2="252" stroke="#5b6675" stroke-width="1.8" marker-end="url(#a4)"/>

  <!-- LN2 (PRE: before FFN) -->
  <rect x="560" y="253" width="100" height="32" rx="6" fill="#0e8a6e"/>
  <text x="610" y="274" text-anchor="middle" font-size="12" font-weight="bold" fill="white">LayerNorm</text>

  <!-- Arrow down -->
  <line x1="610" y1="285" x2="610" y2="300" stroke="#5b6675" stroke-width="1.8" marker-end="url(#a4)"/>

  <!-- FFN -->
  <rect x="560" y="301" width="100" height="32" rx="6" fill="#1f4fa3"/>
  <text x="610" y="322" text-anchor="middle" font-size="12" font-weight="bold" fill="white">FFN</text>

  <!-- Pre-norm: residual skip 2 from after add1 to output (bypasses LN2+FFN) -->
  <!-- Arrow from Add1 out-left and wraps to final sum -->
  <!-- For simplicity, show final output arrow -->
  <text x="610" y="343" text-anchor="middle" font-size="10" fill="#c77a12">→ + (residual) → Output</text>

  <!-- Pre-norm label note -->
  <text x="510" y="130" font-size="10" fill="#0e8a6e" font-weight="bold" text-anchor="end">LN before →</text>
  <text x="510" y="270" font-size="10" fill="#0e8a6e" font-weight="bold" text-anchor="end">LN before →</text>

  <!-- Divider -->
  <line x1="410" y1="45" x2="410" y2="330" stroke="#ddd" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- Comparison notes -->
  <text x="210" y="52" text-anchor="middle" font-size="10" fill="#e05252">⚠ Vanishing gradients in deep networks</text>
  <text x="610" y="52" text-anchor="middle" font-size="10" fill="#0e8a6e" dy="-2"/>
</svg>
