<svg xmlns="http://www.w3.org/2000/svg" width="820" height="320" font-family="Arial, sans-serif">
  <rect width="820" height="320" fill="#f8f9fa" rx="8"/>
  <text x="410" y="26" text-anchor="middle" font-size="15" font-weight="bold" fill="#1f4fa3">Gradient Magnitude: Pre-Norm (stable) vs Post-Norm (vanishing)</text>

  <!-- Chart area: x=80..790, y=50..260 -->
  <rect x="80" y="50" width="710" height="210" fill="white" stroke="#ccc" rx="4"/>

  <!-- Shaded "unstable" region for post-norm: approximately x for layer 16-24 -->
  <!-- Layer positions: 80 + (layer-1)/23 * 710, layer 1..24 -->
  <!-- Layer 16: 80 + 15/23*710 = 80+463=543 -->
  <!-- Layer 24: 790 -->
  <rect x="543" y="50" width="247" height="210" fill="#fde8e8" opacity="0.6" rx="0"/>
  <text x="666" y="68" text-anchor="middle" font-size="11" fill="#e05252" font-style="italic">Training unstable region</text>
  <text x="666" y="82" text-anchor="middle" font-size="10" fill="#e05252" font-style="italic">(Post-Norm)</text>

  <!-- Y axis: 0 to 1.2, height=210, y_bottom=260, y_top=50 -->
  <!-- y(v) = 260 - v/1.2*210 -->
  <!-- y(0)=260, y(0.3)=207.5, y(0.6)=155, y(0.9)=102.5, y(1.2)=50 -->

  <!-- Gridlines -->
  <line x1="80" y1="260" x2="790" y2="260" stroke="#ddd" stroke-width="1"/>
  <line x1="80" y1="207" x2="790" y2="207" stroke="#ddd" stroke-width="1"/>
  <line x1="80" y1="155" x2="790" y2="155" stroke="#ddd" stroke-width="1"/>
  <line x1="80" y1="102" x2="790" y2="102" stroke="#ddd" stroke-width="1"/>
  <line x1="80" y1="50" x2="790" y2="50" stroke="#ddd" stroke-width="1"/>

  <!-- Y axis ticks and labels -->
  <text x="75" y="264" text-anchor="end" font-size="10" fill="#5b6675">0</text>
  <text x="75" y="211" text-anchor="end" font-size="10" fill="#5b6675">0.3</text>
  <text x="75" y="159" text-anchor="end" font-size="10" fill="#5b6675">0.6</text>
  <text x="75" y="106" text-anchor="end" font-size="10" fill="#5b6675">0.9</text>
  <text x="75" y="54" text-anchor="end" font-size="10" fill="#5b6675">1.2</text>

  <!-- Y axis label -->
  <text x="20" y="160" text-anchor="middle" font-size="12" fill="#5b6675" transform="rotate(-90,20,160)">Gradient magnitude</text>

  <!-- X axis ticks: layers 1, 4, 8, 12, 16, 20, 24 -->
  <!-- x(L) = 80 + (L-1)/23*710 -->
  <!-- L=1: 80, L=4: 80+3/23*710=173, L=8: 80+7/23*710=296, L=12: 80+11/23*710=419, L=16: 543, L=20: 666, L=24: 790 -->
  <text x="80" y="278" text-anchor="middle" font-size="10" fill="#5b6675">1</text>
  <text x="173" y="278" text-anchor="middle" font-size="10" fill="#5b6675">4</text>
  <text x="296" y="278" text-anchor="middle" font-size="10" fill="#5b6675">8</text>
  <text x="419" y="278" text-anchor="middle" font-size="10" fill="#5b6675">12</text>
  <text x="543" y="278" text-anchor="middle" font-size="10" fill="#5b6675">16</text>
  <text x="666" y="278" text-anchor="middle" font-size="10" fill="#5b6675">20</text>
  <text x="790" y="278" text-anchor="middle" font-size="10" fill="#5b6675">24</text>
  <text x="435" y="296" text-anchor="middle" font-size="12" fill="#5b6675">Layer depth</text>

  <!-- Post-Norm line: starts 1.0, decreases exponentially to ~0.05 by layer 16 -->
  <!-- y(1.0)=260-1.0/1.2*210=85; y(0.05)=260-0.05/1.2*210=251.25 -->
  <!-- Exponential decay: gradient(L) = exp(-0.2*(L-1)) -->
  <!-- L=1: 1.0, L=4: 0.549, L=8: 0.247, L=12: 0.111, L=16: 0.050, L=20: 0.022, L=24: 0.010 -->
  <!-- y coords: 85, 164, 207, 241, 251, 256, 258 -->
  <polyline
    points="80,85 173,164 296,207 419,241 543,251 666,256 790,258"
    stroke="#e05252" stroke-width="2.5" fill="none" stroke-linejoin="round"/>
  <!-- Dots -->
  <circle cx="80" cy="85" r="4" fill="#e05252"/>
  <circle cx="173" cy="164" r="4" fill="#e05252"/>
  <circle cx="296" cy="207" r="4" fill="#e05252"/>
  <circle cx="419" cy="241" r="4" fill="#e05252"/>
  <circle cx="543" cy="251" r="4" fill="#e05252"/>
  <circle cx="666" cy="256" r="4" fill="#e05252"/>
  <circle cx="790" cy="258" r="4" fill="#e05252"/>

  <!-- Pre-Norm line: fluctuates between 0.85-1.15 throughout -->
  <!-- y(0.85)=260-0.85/1.2*210=111; y(1.0)=85; y(1.15)=260-1.15/1.2*210=60 -->
  <!-- Approximate fluctuating line for 24 layers -->
  <polyline
    points="80,85 111,95 142,78 173,102 204,88 235,95 266,82 296,98 327,88 358,102 389,82 419,95 450,78 481,102 512,88 543,95 574,82 604,98 635,88 666,102 697,82 728,98 759,88 790,95"
    stroke="#0e8a6e" stroke-width="2.5" fill="none" stroke-linejoin="round"/>
  <!-- Dots at key positions -->
  <circle cx="80" cy="85" r="4" fill="#0e8a6e"/>
  <circle cx="296" cy="98" r="4" fill="#0e8a6e"/>
  <circle cx="543" cy="95" r="4" fill="#0e8a6e"/>
  <circle cx="790" cy="95" r="4" fill="#0e8a6e"/>

  <!-- Legend -->
  <line x1="100" y1="305" x2="130" y2="305" stroke="#e05252" stroke-width="2.5"/>
  <circle cx="115" cy="305" r="4" fill="#e05252"/>
  <text x="136" y="309" font-size="12" fill="#333">Post-Norm: gradients vanish (exponential decay)</text>
  <line x1="440" y1="305" x2="470" y2="305" stroke="#0e8a6e" stroke-width="2.5"/>
  <circle cx="455" cy="305" r="4" fill="#0e8a6e"/>
  <text x="476" y="309" font-size="12" fill="#333">Pre-Norm: gradients stable (0.85–1.15)</text>
</svg>
