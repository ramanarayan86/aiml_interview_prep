<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 280" width="820" height="280" font-family="Arial, sans-serif">
  <defs>
    <marker id="arrscale" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#5b6675"/>
    </marker>
  </defs>

  <rect width="820" height="280" fill="#f8f9fa" rx="8"/>

  <!-- Title -->
  <text x="410" y="24" text-anchor="middle" font-size="15" font-weight="bold" fill="#1f4fa3">Effect of Deduplication on Scaling: Deduped vs. Raw Corpus</text>

  <!-- Plot area: x=80..750, y=42..220 -->
  <rect x="80" y="42" width="670" height="178" fill="#ffffff" stroke="#d0d5dd" stroke-width="1" rx="4"/>

  <!-- Axis labels -->
  <text x="415" y="252" text-anchor="middle" font-size="12" fill="#5b6675" font-weight="bold">Training Tokens</text>
  <text x="22" y="136" text-anchor="middle" font-size="12" fill="#5b6675" font-weight="bold" transform="rotate(-90 22 136)">Validation Perplexity</text>

  <!-- X axis tick marks and labels -->
  <text x="80" y="234" text-anchor="middle" font-size="10" fill="#5b6675">100B</text>
  <text x="214" y="234" text-anchor="middle" font-size="10" fill="#5b6675">400B</text>
  <text x="348" y="234" text-anchor="middle" font-size="10" fill="#5b6675">700B</text>
  <text x="482" y="234" text-anchor="middle" font-size="10" fill="#5b6675">1T</text>
  <text x="616" y="234" text-anchor="middle" font-size="10" fill="#5b6675">1.5T</text>
  <text x="750" y="234" text-anchor="middle" font-size="10" fill="#5b6675">2T</text>

  <!-- Y axis ticks -->
  <text x="70" y="46" text-anchor="end" font-size="10" fill="#5b6675">8.0</text>
  <text x="70" y="82" text-anchor="end" font-size="10" fill="#5b6675">9.0</text>
  <text x="70" y="118" text-anchor="end" font-size="10" fill="#5b6675">10.0</text>
  <text x="70" y="154" text-anchor="end" font-size="10" fill="#5b6675">11.0</text>
  <text x="70" y="190" text-anchor="end" font-size="10" fill="#5b6675">12.0</text>
  <text x="70" y="220" text-anchor="end" font-size="10" fill="#5b6675">12.8</text>

  <!-- Grid lines horizontal -->
  <line x1="80" y1="82" x2="750" y2="82" stroke="#e8ecf0" stroke-width="1"/>
  <line x1="80" y1="118" x2="750" y2="118" stroke="#e8ecf0" stroke-width="1"/>
  <line x1="80" y1="154" x2="750" y2="154" stroke="#e8ecf0" stroke-width="1"/>
  <line x1="80" y1="190" x2="750" y2="190" stroke="#e8ecf0" stroke-width="1"/>

  <!-- Grid lines vertical -->
  <line x1="214" y1="42" x2="214" y2="220" stroke="#e8ecf0" stroke-width="1"/>
  <line x1="348" y1="42" x2="348" y2="220" stroke="#e8ecf0" stroke-width="1"/>
  <line x1="482" y1="42" x2="482" y2="220" stroke="#e8ecf0" stroke-width="1"/>
  <line x1="616" y1="42" x2="616" y2="220" stroke="#e8ecf0" stroke-width="1"/>

  <!-- Undeduped line (red): starts high, drops fast, then plateaus (memorisation saturation) -->
  <!-- x=80 -> perplexity 12.5 (y=210), x=200 -> 11.5 (y=177), x=350 -> 10.8 (y=152),
       x=450 -> 10.4 (y=140), x=550 -> 10.2 (y=134), x=650 -> 10.1 (y=131), x=750 -> 10.05 (y=130) -->
  <path d="M 80 210 C 130 192, 180 176, 214 165 C 290 148, 350 138, 420 130 C 490 124, 560 121, 616 119 C 680 118, 720 118, 750 118" stroke="#c0392b" stroke-width="2.5" fill="none"/>

  <!-- Deduped line (teal/green): starts similarly, but continues to fall -->
  <!-- x=80 -> 12.3 (y=204), x=200->11.1(y=168), x=350->9.8(y=128), x=450->9.1(y=104),
       x=550->8.5(y=83), x=650->8.1(y=69), x=750->7.9(y=63) -->
  <path d="M 80 204 C 130 188, 180 172, 214 162 C 270 148, 320 132, 390 112 C 460 93, 520 78, 580 66 C 630 57, 690 52, 750 50" stroke="#0e8a6e" stroke-width="2.5" fill="none"/>

  <!-- Crossover annotation -->
  <!-- Crossover around x=220, y=163 -->
  <circle cx="222" cy="163" r="5" fill="#6c4fe0"/>
  <line x1="222" y1="158" x2="260" y2="130" stroke="#6c4fe0" stroke-width="1" stroke-dasharray="3 2"/>
  <rect x="258" y="110" width="150" height="28" fill="#f0edfb" stroke="#6c4fe0" stroke-width="1" rx="3"/>
  <text x="333" y="122" text-anchor="middle" font-size="9" fill="#6c4fe0" font-weight="bold">Crossover ~400B tokens</text>
  <text x="333" y="133" text-anchor="middle" font-size="9" fill="#6c4fe0">deduped becomes better</text>

  <!-- Plateau annotation for undeduped -->
  <line x1="560" y1="121" x2="560" y2="97" stroke="#c0392b" stroke-width="1" stroke-dasharray="3 2"/>
  <rect x="500" y="80" width="152" height="22" fill="#fef3e2" stroke="#c0392b" stroke-width="1" rx="3"/>
  <text x="576" y="95" text-anchor="middle" font-size="9" fill="#c0392b" font-weight="bold">Plateaus: memorisation saturation</text>

  <!-- Legend -->
  <rect x="88" y="50" width="228" height="50" fill="#f8f9fa" stroke="#d0d5dd" stroke-width="1" rx="4"/>
  <line x1="96" y1="65" x2="130" y2="65" stroke="#c0392b" stroke-width="2.5"/>
  <text x="136" y="69" font-size="10" fill="#333">Raw corpus (with near-duplicates)</text>
  <line x1="96" y1="85" x2="130" y2="85" stroke="#0e8a6e" stroke-width="2.5"/>
  <text x="136" y="89" font-size="10" fill="#333">Deduped corpus (unique content)</text>

  <!-- Bottom notes -->
  <text x="410" y="245" text-anchor="middle" font-size="10" fill="#5b6675">Lee et al. (2022): 1.5x fewer unique tokens after dedup still outperforms the full undeduped corpus at equivalent training steps</text>
  <text x="410" y="258" text-anchor="middle" font-size="10" fill="#5b6675">Common Crawl: 30-60% near-duplicates removed; token count drops 20-40% post-dedup</text>
  <text x="410" y="271" text-anchor="middle" font-size="10" fill="#5b6675">Duplicate tokens = wasted compute: model has already learned from them; marginal loss reduction approaches zero</text>
</svg>
