<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 300" width="820" height="300">
  <!-- Background -->
  <rect width="820" height="300" fill="#f8f9fa" rx="8"/>

  <!-- Title -->
  <text x="410" y="26" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#1f4fa3">Floating Point Format Comparison: FP32 / FP16 / BF16 / TF32</text>

  <!-- ===== ROW LABELS ===== -->
  <text x="52" y="75" text-anchor="end" font-family="monospace" font-size="13" font-weight="bold" fill="#1f4fa3">FP32</text>
  <text x="52" y="130" text-anchor="end" font-family="monospace" font-size="13" font-weight="bold" fill="#c0392b">FP16</text>
  <text x="52" y="185" text-anchor="end" font-family="monospace" font-size="13" font-weight="bold" fill="#0e8a6e">BF16</text>
  <text x="52" y="240" text-anchor="end" font-family="monospace" font-size="13" font-weight="bold" fill="#6c4fe0">TF32</text>

  <!-- ===== FP32: 1+8+23 = 32 bits ===== -->
  <!-- Total width 700px, each bit ~21.875px; sign=1bit, exp=8bits, mantissa=23bits -->
  <!-- sign: x=60, w=21 | exp: x=81, w=175 | mantissa: x=256, w=503 -->
  <!-- Sign bit -->
  <rect x="60" y="58" width="22" height="28" fill="#c0392b" rx="3"/>
  <text x="71" y="76" text-anchor="middle" font-family="monospace" font-size="10" fill="white" font-weight="bold">S</text>
  <!-- Exponent 8 bits -->
  <rect x="83" y="58" width="176" height="28" fill="#1f4fa3" rx="3"/>
  <text x="171" y="76" text-anchor="middle" font-family="monospace" font-size="11" fill="white" font-weight="bold">Exponent (8 bits)</text>
  <!-- Mantissa 23 bits -->
  <rect x="260" y="58" width="503" height="28" fill="#0e8a6e" rx="3"/>
  <text x="511" y="76" text-anchor="middle" font-family="monospace" font-size="11" fill="white" font-weight="bold">Mantissa (23 bits)</text>
  <!-- Annotations -->
  <text x="60" y="100" font-family="sans-serif" font-size="10" fill="#5b6675">32 bits total   max: ~3.4e38   min normal: ~1.2e-38   full precision</text>

  <!-- ===== FP16: 1+5+10 = 16 bits, scaled to same visual width ===== -->
  <!-- sign=1, exp=5, mantissa=10; scale each bit to 701/16 = 43.8px -->
  <!-- sign: 60, w=44 | exp: 104, w=219 | mantissa: 323, w=438 -->
  <rect x="60" y="113" width="44" height="28" fill="#c0392b" rx="3"/>
  <text x="82" y="131" text-anchor="middle" font-family="monospace" font-size="10" fill="white" font-weight="bold">S</text>
  <rect x="105" y="113" width="219" height="28" fill="#1f4fa3" rx="3"/>
  <text x="214" y="131" text-anchor="middle" font-family="monospace" font-size="11" fill="white" font-weight="bold">Exponent (5 bits)</text>
  <rect x="325" y="113" width="438" height="28" fill="#0e8a6e" rx="3"/>
  <text x="544" y="131" text-anchor="middle" font-family="monospace" font-size="11" fill="white" font-weight="bold">Mantissa (10 bits)</text>
  <!-- Annotations -->
  <text x="60" y="155" font-family="sans-serif" font-size="10" fill="#c0392b" font-weight="bold">16 bits   max: ~65504   min normal: ~6.1e-5   OVERFLOW risk — requires loss scaling</text>

  <!-- ===== BF16: 1+8+7 = 16 bits ===== -->
  <!-- sign=1, exp=8, mantissa=7; scale 701/16 = 43.8px per bit -->
  <!-- sign: 60, w=44 | exp: 104, w=350 | mantissa: 454, w=306 -->
  <rect x="60" y="168" width="44" height="28" fill="#c0392b" rx="3"/>
  <text x="82" y="186" text-anchor="middle" font-family="monospace" font-size="10" fill="white" font-weight="bold">S</text>
  <rect x="105" y="168" width="350" height="28" fill="#1f4fa3" rx="3"/>
  <text x="280" y="186" text-anchor="middle" font-family="monospace" font-size="11" fill="white" font-weight="bold">Exponent (8 bits) -- same range as FP32</text>
  <rect x="456" y="168" width="306" height="28" fill="#0e8a6e" rx="3"/>
  <text x="609" y="186" text-anchor="middle" font-family="monospace" font-size="11" fill="white" font-weight="bold">Mantissa (7 bits)</text>
  <!-- Annotations -->
  <text x="60" y="210" font-family="sans-serif" font-size="10" fill="#0e8a6e" font-weight="bold">16 bits   max: ~3.4e38   min normal: ~1.2e-38   same exponent range as FP32, lower mantissa precision</text>

  <!-- ===== TF32: 1+8+10 = 19 bits, padded to 32 in tensor core ===== -->
  <!-- Visually show 19 bits; scale 701/19 = 36.9px per bit -->
  <!-- sign=1->37 | exp=8->295 | mantissa=10->369 -->
  <rect x="60" y="223" width="37" height="28" fill="#c0392b" rx="3"/>
  <text x="78" y="241" text-anchor="middle" font-family="monospace" font-size="10" fill="white" font-weight="bold">S</text>
  <rect x="98" y="223" width="295" height="28" fill="#1f4fa3" rx="3"/>
  <text x="245" y="241" text-anchor="middle" font-family="monospace" font-size="11" fill="white" font-weight="bold">Exponent (8 bits) -- same as FP32</text>
  <rect x="394" y="223" width="369" height="28" fill="#6c4fe0" rx="3"/>
  <text x="578" y="241" text-anchor="middle" font-family="monospace" font-size="11" fill="white" font-weight="bold">Mantissa (10 bits)</text>
  <!-- Annotations -->
  <text x="60" y="264" font-family="sans-serif" font-size="10" fill="#6c4fe0" font-weight="bold">19 useful bits (32 stored)   A100+ only   drop-in tensor core acceleration, no code change needed</text>

  <!-- Legend -->
  <rect x="60" y="278" width="10" height="10" fill="#c0392b"/>
  <text x="74" y="288" font-family="sans-serif" font-size="10" fill="#5b6675">Sign (1 bit)</text>
  <rect x="150" y="278" width="10" height="10" fill="#1f4fa3"/>
  <text x="164" y="288" font-family="sans-serif" font-size="10" fill="#5b6675">Exponent</text>
  <rect x="235" y="278" width="10" height="10" fill="#0e8a6e"/>
  <text x="249" y="288" font-family="sans-serif" font-size="10" fill="#5b6675">Mantissa</text>
  <rect x="315" y="278" width="10" height="10" fill="#6c4fe0"/>
  <text x="329" y="288" font-family="sans-serif" font-size="10" fill="#5b6675">Mantissa (TF32)</text>
  <text x="550" y="288" font-family="sans-serif" font-size="10" fill="#1f4fa3" font-weight="bold">BF16 = FP32 exponent range + reduced mantissa -- ideal for LLM training</text>
</svg>
