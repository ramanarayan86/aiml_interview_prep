<svg xmlns="http://www.w3.org/2000/svg" width="820" height="320" font-family="Arial, sans-serif">
  <rect width="820" height="320" fill="#f8f9fa" rx="8"/>
  <text x="410" y="26" text-anchor="middle" font-size="15" font-weight="bold" fill="#1f4fa3">How -∞ Masking Creates the Causal Effect</text>
  <text x="410" y="44" text-anchor="middle" font-size="12" fill="#5b6675">Query at position t=3, attending to all 6 key positions</text>

  <defs>
    <marker id="a8" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#5b6675"/>
    </marker>
  </defs>

  <!-- ===== LEFT: Before softmax ===== -->
  <rect x="20" y="56" width="370" height="220" rx="6" fill="white" stroke="#ccc"/>
  <text x="205" y="74" text-anchor="middle" font-size="13" font-weight="bold" fill="#1f4fa3">Step 1: Raw logits (before softmax)</text>
  <text x="205" y="88" text-anchor="middle" font-size="11" fill="#5b6675">q₃ · kⱼ (dot products)</text>

  <!-- Bar chart: 6 keys, x area 40..370, bar width=40, gap=15 -->
  <!-- Values: t1=1.2, t2=0.8, t3=2.1, t4=-inf, t5=-inf, t6=-inf -->
  <!-- Chart height: y=100..250, range 3 (for -inf we show blocked bars) -->
  <!-- y(v): max logit ~2.5, min ~0, chart height 130, bar from bottom=250 -->
  <!-- bar_h = v/2.5 * 130 -->
  <!-- t1: 1.2/2.5*130=62.4, t2: 0.8/2.5*130=41.6, t3: 2.1/2.5*130=109.2 -->

  <!-- Baseline -->
  <line x1="40" y1="250" x2="370" y2="250" stroke="#999" stroke-width="1"/>

  <!-- t1: 1.2 -->
  <rect x="45" y="188" width="40" height="62" fill="#1f4fa3" opacity="0.85"/>
  <text x="65" y="184" text-anchor="middle" font-size="11" fill="#1f4fa3">1.2</text>
  <text x="65" y="265" text-anchor="middle" font-size="11" fill="#5b6675">t1</text>

  <!-- t2: 0.8 -->
  <rect x="100" y="208" width="40" height="42" fill="#1f4fa3" opacity="0.65"/>
  <text x="120" y="204" text-anchor="middle" font-size="11" fill="#1f4fa3">0.8</text>
  <text x="120" y="265" text-anchor="middle" font-size="11" fill="#5b6675">t2</text>

  <!-- t3: 2.1 (highest, this is the current position) -->
  <rect x="155" y="141" width="40" height="109" fill="#1f4fa3" opacity="1.0"/>
  <text x="175" y="137" text-anchor="middle" font-size="11" fill="#1f4fa3" font-weight="bold">2.1</text>
  <text x="175" y="265" text-anchor="middle" font-size="11" fill="#1f4fa3" font-weight="bold">t3*</text>
  <text x="175" y="278" text-anchor="middle" font-size="9" fill="#1f4fa3">(self)</text>

  <!-- t4, t5, t6: -inf (blocked) -->
  <!-- Show as blocked bars with red X -->
  <rect x="210" y="200" width="40" height="50" fill="#e05252" opacity="0.2" stroke="#e05252" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="230" y="228" text-anchor="middle" font-size="11" fill="#e05252" font-weight="bold">-∞</text>
  <text x="230" y="265" text-anchor="middle" font-size="11" fill="#e05252">t4</text>

  <rect x="265" y="200" width="40" height="50" fill="#e05252" opacity="0.2" stroke="#e05252" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="285" y="228" text-anchor="middle" font-size="11" fill="#e05252" font-weight="bold">-∞</text>
  <text x="285" y="265" text-anchor="middle" font-size="11" fill="#e05252">t5</text>

  <rect x="320" y="200" width="40" height="50" fill="#e05252" opacity="0.2" stroke="#e05252" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="340" y="228" text-anchor="middle" font-size="11" fill="#e05252" font-weight="bold">-∞</text>
  <text x="340" y="265" text-anchor="middle" font-size="11" fill="#e05252">t6</text>

  <!-- BLOCKED label -->
  <rect x="207" y="145" width="157" height="20" rx="3" fill="#e05252" opacity="0.1" stroke="#e05252"/>
  <text x="285" y="159" text-anchor="middle" font-size="10" fill="#e05252" font-weight="bold">BLOCKED (future tokens)</text>

  <!-- ===== ARROW between panels ===== -->
  <text x="410" y="145" text-anchor="middle" font-size="14" fill="#5b6675" font-weight="bold">softmax()</text>
  <line x1="390" y1="155" x2="430" y2="155" stroke="#5b6675" stroke-width="2" marker-end="url(#a8)"/>
  <text x="410" y="175" text-anchor="middle" font-size="11" fill="#5b6675">e^(-∞) = 0</text>
  <text x="410" y="190" text-anchor="middle" font-size="10" fill="#5b6675">zeros sum to 0</text>
  <text x="410" y="205" text-anchor="middle" font-size="10" fill="#5b6675">renormalize</text>

  <!-- ===== RIGHT: After softmax ===== -->
  <rect x="430" y="56" width="370" height="220" rx="6" fill="white" stroke="#ccc"/>
  <text x="615" y="74" text-anchor="middle" font-size="13" font-weight="bold" fill="#0e8a6e">Step 2: After softmax (attention weights)</text>
  <text x="615" y="88" text-anchor="middle" font-size="11" fill="#5b6675">sum = 1.0 over non-masked positions</text>

  <!-- Baseline -->
  <line x1="450" y1="250" x2="780" y2="250" stroke="#999" stroke-width="1"/>

  <!-- After softmax values: exp(1.2)+exp(0.8)+exp(2.1) = 3.32+2.23+8.17=13.72 -->
  <!-- p(t1)=3.32/13.72=0.242, p(t2)=2.23/13.72=0.162, p(t3)=8.17/13.72=0.595 -->
  <!-- bar_h = prob * 180 -->

  <!-- t1: 0.24 → h=43 -->
  <rect x="455" y="207" width="40" height="43" fill="#0e8a6e" opacity="0.85"/>
  <text x="475" y="203" text-anchor="middle" font-size="11" fill="#0e8a6e">0.19</text>
  <text x="475" y="265" text-anchor="middle" font-size="11" fill="#5b6675">t1</text>

  <!-- t2: 0.16 → h=29 -->
  <rect x="510" y="221" width="40" height="29" fill="#0e8a6e" opacity="0.65"/>
  <text x="530" y="217" text-anchor="middle" font-size="11" fill="#0e8a6e">0.13</text>
  <text x="530" y="265" text-anchor="middle" font-size="11" fill="#5b6675">t2</text>

  <!-- t3: 0.60 → h=108 -->
  <rect x="565" y="142" width="40" height="108" fill="#0e8a6e" opacity="1.0"/>
  <text x="585" y="138" text-anchor="middle" font-size="11" fill="#0e8a6e" font-weight="bold">0.68</text>
  <text x="585" y="265" text-anchor="middle" font-size="11" fill="#0e8a6e" font-weight="bold">t3*</text>

  <!-- t4: 0 -->
  <rect x="620" y="249" width="40" height="1" fill="#e05252" opacity="0.5"/>
  <text x="640" y="245" text-anchor="middle" font-size="11" fill="#e05252">0</text>
  <text x="640" y="265" text-anchor="middle" font-size="11" fill="#e05252">t4</text>
  <text x="640" y="278" text-anchor="middle" font-size="9" fill="#e05252">BLOCKED</text>

  <!-- t5: 0 -->
  <rect x="675" y="249" width="40" height="1" fill="#e05252" opacity="0.5"/>
  <text x="695" y="245" text-anchor="middle" font-size="11" fill="#e05252">0</text>
  <text x="695" y="265" text-anchor="middle" font-size="11" fill="#e05252">t5</text>
  <text x="695" y="278" text-anchor="middle" font-size="9" fill="#e05252">BLOCKED</text>

  <!-- t6: 0 -->
  <rect x="730" y="249" width="40" height="1" fill="#e05252" opacity="0.5"/>
  <text x="750" y="245" text-anchor="middle" font-size="11" fill="#e05252">0</text>
  <text x="750" y="265" text-anchor="middle" font-size="11" fill="#e05252">t6</text>
  <text x="750" y="278" text-anchor="middle" font-size="9" fill="#e05252">BLOCKED</text>

  <!-- Sum = 1.0 label -->
  <text x="615" y="104" text-anchor="middle" font-size="11" fill="#0e8a6e">0.19 + 0.13 + 0.68 = 1.00 ✓</text>

  <!-- Footer -->
  <text x="410" y="295" text-anchor="middle" font-size="11" fill="#5b6675">Token t3 can only attend to t1, t2, t3. Future tokens t4, t5, t6 receive exactly 0 attention weight.</text>
  <text x="410" y="310" text-anchor="middle" font-size="11" fill="#1f4fa3" font-weight="bold">Key: adding -∞ before softmax is numerically stable and produces exactly 0 (not just very small)</text>
</svg>
