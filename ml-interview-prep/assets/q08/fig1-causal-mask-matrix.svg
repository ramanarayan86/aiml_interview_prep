<svg xmlns="http://www.w3.org/2000/svg" width="820" height="340" font-family="Arial, sans-serif">
  <rect width="820" height="340" fill="#f8f9fa" rx="8"/>
  <text x="410" y="26" text-anchor="middle" font-size="15" font-weight="bold" fill="#1f4fa3">Causal Attention Mask: Lower-Triangular Pattern</text>

  <!-- 6×6 matrix, cell size=60, start at x=200, y=50 -->
  <!-- Colors: lower triangle = blue gradient (attention weight), upper = dark gray (-inf) -->

  <!-- Column headers (Key positions) -->
  <text x="410" y="48" text-anchor="middle" font-size="12" fill="#5b6675" font-weight="bold">Key position →</text>
  <text x="230" y="68" text-anchor="middle" font-size="12" fill="#5b6675">t1</text>
  <text x="290" y="68" text-anchor="middle" font-size="12" fill="#5b6675">t2</text>
  <text x="350" y="68" text-anchor="middle" font-size="12" fill="#5b6675">t3</text>
  <text x="410" y="68" text-anchor="middle" font-size="12" fill="#5b6675">t4</text>
  <text x="470" y="68" text-anchor="middle" font-size="12" fill="#5b6675">t5</text>
  <text x="530" y="68" text-anchor="middle" font-size="12" fill="#5b6675">t6</text>

  <!-- Row headers (Query positions) -->
  <text x="165" y="108" text-anchor="end" font-size="12" fill="#5b6675">t1</text>
  <text x="165" y="168" text-anchor="end" font-size="12" fill="#5b6675">t2</text>
  <text x="165" y="228" text-anchor="end" font-size="12" fill="#5b6675">t3</text>
  <text x="165" y="288" text-anchor="end" font-size="12" fill="#5b6675">t4</text>
  <!-- Additional rows extend down but let's fit in 6 rows -->

  <!-- Query position label (rotated) -->
  <text x="140" y="200" text-anchor="middle" font-size="12" fill="#5b6675" font-weight="bold" transform="rotate(-90,140,200)">Query position ↓</text>

  <!-- ===== ROW 1 (t1): only t1 visible ===== -->
  <!-- t1→t1: high attention (diagonal) -->
  <rect x="200" y="75" width="60" height="60" rx="2" fill="#1f4fa3" opacity="0.9"/>
  <text x="230" y="110" text-anchor="middle" font-size="11" fill="white" font-weight="bold">0.95</text>
  <!-- t1→t2: -inf -->
  <rect x="260" y="75" width="60" height="60" rx="2" fill="#2d3748"/>
  <text x="290" y="110" text-anchor="middle" font-size="10" fill="#888">-∞</text>
  <rect x="320" y="75" width="60" height="60" rx="2" fill="#2d3748"/>
  <text x="350" y="110" text-anchor="middle" font-size="10" fill="#888">-∞</text>
  <rect x="380" y="75" width="60" height="60" rx="2" fill="#2d3748"/>
  <text x="410" y="110" text-anchor="middle" font-size="10" fill="#888">-∞</text>
  <rect x="440" y="75" width="60" height="60" rx="2" fill="#2d3748"/>
  <text x="470" y="110" text-anchor="middle" font-size="10" fill="#888">-∞</text>
  <rect x="500" y="75" width="60" height="60" rx="2" fill="#2d3748"/>
  <text x="530" y="110" text-anchor="middle" font-size="10" fill="#888">-∞</text>

  <!-- ===== ROW 2 (t2): t1, t2 visible ===== -->
  <rect x="200" y="135" width="60" height="60" rx="2" fill="#1f4fa3" opacity="0.45"/>
  <text x="230" y="170" text-anchor="middle" font-size="11" fill="white" font-weight="bold">0.28</text>
  <rect x="260" y="135" width="60" height="60" rx="2" fill="#1f4fa3" opacity="0.85"/>
  <text x="290" y="170" text-anchor="middle" font-size="11" fill="white" font-weight="bold">0.72</text>
  <rect x="320" y="135" width="60" height="60" rx="2" fill="#2d3748"/>
  <text x="350" y="170" text-anchor="middle" font-size="10" fill="#888">-∞</text>
  <rect x="380" y="135" width="60" height="60" rx="2" fill="#2d3748"/>
  <text x="410" y="170" text-anchor="middle" font-size="10" fill="#888">-∞</text>
  <rect x="440" y="135" width="60" height="60" rx="2" fill="#2d3748"/>
  <text x="470" y="170" text-anchor="middle" font-size="10" fill="#888">-∞</text>
  <rect x="500" y="135" width="60" height="60" rx="2" fill="#2d3748"/>
  <text x="530" y="170" text-anchor="middle" font-size="10" fill="#888">-∞</text>

  <!-- ===== ROW 3 (t3): t1, t2, t3 visible ===== -->
  <rect x="200" y="195" width="60" height="60" rx="2" fill="#1f4fa3" opacity="0.25"/>
  <text x="230" y="230" text-anchor="middle" font-size="11" fill="white">0.12</text>
  <rect x="260" y="195" width="60" height="60" rx="2" fill="#1f4fa3" opacity="0.55"/>
  <text x="290" y="230" text-anchor="middle" font-size="11" fill="white">0.35</text>
  <rect x="320" y="195" width="60" height="60" rx="2" fill="#1f4fa3" opacity="0.82"/>
  <text x="350" y="230" text-anchor="middle" font-size="11" fill="white" font-weight="bold">0.53</text>
  <rect x="380" y="195" width="60" height="60" rx="2" fill="#2d3748"/>
  <text x="410" y="230" text-anchor="middle" font-size="10" fill="#888">-∞</text>
  <rect x="440" y="195" width="60" height="60" rx="2" fill="#2d3748"/>
  <text x="470" y="230" text-anchor="middle" font-size="10" fill="#888">-∞</text>
  <rect x="500" y="195" width="60" height="60" rx="2" fill="#2d3748"/>
  <text x="530" y="230" text-anchor="middle" font-size="10" fill="#888">-∞</text>

  <!-- ===== ROW 4 (t4): t1..t4 visible ===== -->
  <rect x="200" y="255" width="60" height="60" rx="2" fill="#1f4fa3" opacity="0.18"/>
  <text x="230" y="290" text-anchor="middle" font-size="11" fill="white">0.08</text>
  <rect x="260" y="255" width="60" height="60" rx="2" fill="#1f4fa3" opacity="0.38"/>
  <text x="290" y="290" text-anchor="middle" font-size="11" fill="white">0.22</text>
  <rect x="320" y="255" width="60" height="60" rx="2" fill="#1f4fa3" opacity="0.55"/>
  <text x="350" y="290" text-anchor="middle" font-size="11" fill="white">0.31</text>
  <rect x="380" y="255" width="60" height="60" rx="2" fill="#1f4fa3" opacity="0.70"/>
  <text x="410" y="290" text-anchor="middle" font-size="11" fill="white" font-weight="bold">0.39</text>
  <rect x="440" y="255" width="60" height="60" rx="2" fill="#2d3748"/>
  <text x="470" y="290" text-anchor="middle" font-size="10" fill="#888">-∞</text>
  <rect x="500" y="255" width="60" height="60" rx="2" fill="#2d3748"/>
  <text x="530" y="290" text-anchor="middle" font-size="10" fill="#888">-∞</text>

  <!-- Matrix border -->
  <rect x="200" y="75" width="360" height="240" fill="none" stroke="#999" stroke-width="1.5" rx="2"/>

  <!-- Row/col dividers -->
  <line x1="200" y1="135" x2="560" y2="135" stroke="#ccc" stroke-width="0.8"/>
  <line x1="200" y1="195" x2="560" y2="195" stroke="#ccc" stroke-width="0.8"/>
  <line x1="200" y1="255" x2="560" y2="255" stroke="#ccc" stroke-width="0.8"/>
  <line x1="260" y1="75" x2="260" y2="315" stroke="#ccc" stroke-width="0.8"/>
  <line x1="320" y1="75" x2="320" y2="315" stroke="#ccc" stroke-width="0.8"/>
  <line x1="380" y1="75" x2="380" y2="315" stroke="#ccc" stroke-width="0.8"/>
  <line x1="440" y1="75" x2="440" y2="315" stroke="#ccc" stroke-width="0.8"/>
  <line x1="500" y1="75" x2="500" y2="315" stroke="#ccc" stroke-width="0.8"/>

  <!-- Diagonal indicator (causal boundary) -->
  <line x1="200" y1="75" x2="560" y2="315" stroke="#c77a12" stroke-width="2" stroke-dasharray="4,3" opacity="0.6"/>

  <!-- Row 5 and 6 indication (truncated) -->
  <text x="165" y="348" text-anchor="end" font-size="10" fill="#5b6675">... rows t5, t6 continue pattern ...</text>

  <!-- Annotations -->
  <text x="620" y="110" font-size="12" fill="#1f4fa3" font-weight="bold">Allowed</text>
  <text x="620" y="125" font-size="11" fill="#1f4fa3">(past tokens)</text>
  <text x="620" y="140" font-size="10" fill="#5b6675">Blue = attn weight</text>
  <text x="620" y="155" font-size="10" fill="#5b6675">after softmax</text>

  <text x="620" y="200" font-size="12" fill="#e05252" font-weight="bold">Blocked</text>
  <text x="620" y="215" font-size="11" fill="#e05252">(future tokens)</text>
  <text x="620" y="230" font-size="10" fill="#5b6675">-∞ → e^(-∞) = 0</text>
  <text x="620" y="245" font-size="10" fill="#5b6675">after softmax</text>

  <text x="620" y="290" font-size="11" fill="#c77a12">← causal diagonal</text>

  <!-- Legend -->
  <rect x="200" y="325" width="18" height="12" rx="2" fill="#1f4fa3" opacity="0.8"/>
  <text x="224" y="335" font-size="11" fill="#333">Attended (allowed)</text>
  <rect x="370" y="325" width="18" height="12" rx="2" fill="#2d3748"/>
  <text x="394" y="335" font-size="11" fill="#333">Masked (-inf → 0 after softmax)</text>
</svg>
