<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 360" width="700" height="360">
  <!-- Background -->
  <rect width="700" height="360" fill="#f8f9fb"/>

  <!-- Title -->
  <text x="350" y="28" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#1f4fa3">AlpacaEval 2.0 Win Rate vs Training Progress</text>
  <text x="350" y="46" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#5b6675">(Offline DPO | Iterative DPO | Online RLHF — schematic based on Guo et al., 2024)</text>

  <!-- Plot area: x=80..650, y=60..300 -->
  <!-- Axes -->
  <line x1="80" y1="300" x2="650" y2="300" stroke="#5b6675" stroke-width="2"/>
  <line x1="80" y1="60" x2="80" y2="300" stroke="#5b6675" stroke-width="2"/>

  <!-- Grid lines (horizontal) -->
  <line x1="80" y1="252" x2="650" y2="252" stroke="#e0e0e0" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="80" y1="204" x2="650" y2="204" stroke="#e0e0e0" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="80" y1="156" x2="650" y2="156" stroke="#e0e0e0" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="80" y1="108" x2="650" y2="108" stroke="#e0e0e0" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Y axis labels: win rate 5% to 30% (map: 5%->300, 30%->60, step 5% -> 48px) -->
  <text x="72" y="304" text-anchor="end" font-family="Arial,sans-serif" font-size="10" fill="#5b6675">5%</text>
  <text x="72" y="256" text-anchor="end" font-family="Arial,sans-serif" font-size="10" fill="#5b6675">10%</text>
  <text x="72" y="208" text-anchor="end" font-family="Arial,sans-serif" font-size="10" fill="#5b6675">15%</text>
  <text x="72" y="160" text-anchor="end" font-family="Arial,sans-serif" font-size="10" fill="#5b6675">20%</text>
  <text x="72" y="112" text-anchor="end" font-family="Arial,sans-serif" font-size="10" fill="#5b6675">25%</text>
  <text x="72" y="64" text-anchor="end" font-family="Arial,sans-serif" font-size="10" fill="#5b6675">30%</text>

  <!-- Y axis title -->
  <text x="18" y="180" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#333" transform="rotate(-90,18,180)">Win Rate (AlpacaEval 2.0)</text>

  <!-- X axis labels: epochs 0-5 -->
  <!-- x range: 80..650 = 570px for 5 units, so 114px per epoch -->
  <text x="80" y="318" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#5b6675">0</text>
  <text x="194" y="318" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#5b6675">1</text>
  <text x="308" y="318" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#5b6675">2</text>
  <text x="422" y="318" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#5b6675">3</text>
  <text x="536" y="318" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#5b6675">4</text>
  <text x="650" y="318" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#5b6675">5</text>
  <text x="365" y="336" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#333">Training Epochs / Iterations</text>

  <!-- Helper: y coord = 300 - (winrate - 5) * 48 -->
  <!-- winrate=5 -> y=300, winrate=10->252, 15->204, 20->156, 25->108, 30->60 -->

  <!-- Offline DPO curve (navy #1f4fa3): starts ~7%, rises quickly then plateaus at ~13% -->
  <!-- Points: (0,7%->204-5*48/5=300-2*48/5... let me recalc carefully -->
  <!-- y = 300 - (wr - 5)/5 * 48 ... wait: each 5% = 48px, so each 1% = 9.6px -->
  <!-- wr=7 -> y=300-(7-5)*9.6=300-19.2=281 -->
  <!-- wr=10 -> y=300-(10-5)*9.6=252 -->
  <!-- wr=11 -> y=300-57.6=242 -->
  <!-- wr=12 -> y=300-67.2=233 -->
  <!-- wr=12.5 -> y=300-72=228 -->
  <!-- wr=13 -> y=300-76.8=223 -->
  <!-- Offline: (0,281), (1,252), (2,242), (3,235), (4,228), (5,225) -->
  <polyline points="80,281 194,252 308,242 422,235 536,228 650,225"
    fill="none" stroke="#1f4fa3" stroke-width="2.5" stroke-dasharray="6,3"/>

  <!-- Iterative DPO curve (teal #0e8a6e): starts ~7%, keeps improving to ~19% -->
  <!-- wr=7->281, wr=11->242, wr=14->214, wr=17->185, wr=19->166 -->
  <polyline points="80,281 194,242 308,214 422,185 536,175 650,166"
    fill="none" stroke="#0e8a6e" stroke-width="2.5"/>

  <!-- Online RLHF curve (purple #6c4fe0): starts ~7%, rises to ~23% -->
  <!-- wr=7->281, wr=12->233, wr=16->195, wr=20->156, wr=22->137, wr=23.5->125 -->
  <polyline points="80,281 194,233 308,195 422,156 536,137 650,125"
    fill="none" stroke="#6c4fe0" stroke-width="2.5"/>

  <!-- Dots on curves at final points -->
  <circle cx="650" cy="225" r="5" fill="#1f4fa3"/>
  <circle cx="650" cy="166" r="5" fill="#0e8a6e"/>
  <circle cx="650" cy="125" r="5" fill="#6c4fe0"/>

  <!-- Gap annotation bracket on right side -->
  <!-- Between offline (225) and online (125): gap = 100px ~ 10.4% -->
  <line x1="660" y1="225" x2="670" y2="225" stroke="#c0392b" stroke-width="1.5"/>
  <line x1="660" y1="125" x2="670" y2="125" stroke="#c0392b" stroke-width="1.5"/>
  <line x1="665" y1="125" x2="665" y2="225" stroke="#c0392b" stroke-width="1.5"/>
  <text x="688" y="180" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#c0392b" transform="rotate(90,688,180)">~10% gap</text>

  <!-- Smaller gap annotation: iterative vs offline -->
  <line x1="655" y1="225" x2="660" y2="225" stroke="#5b6675" stroke-width="1"/>
  <line x1="655" y1="166" x2="660" y2="166" stroke="#5b6675" stroke-width="1"/>
  <line x1="657" y1="166" x2="657" y2="225" stroke="#5b6675" stroke-width="1" stroke-dasharray="2,2"/>

  <!-- Legend box -->
  <rect x="90" y="68" width="210" height="78" rx="5" fill="white" stroke="#ccc" stroke-width="1"/>
  <line x1="100" y1="85" x2="130" y2="85" stroke="#1f4fa3" stroke-width="2.5" stroke-dasharray="6,3"/>
  <circle cx="145" cy="85" r="4" fill="#1f4fa3"/>
  <text x="155" y="89" font-family="Arial,sans-serif" font-size="11" fill="#1f4fa3">Offline DPO (static D)</text>

  <line x1="100" y1="107" x2="130" y2="107" stroke="#0e8a6e" stroke-width="2.5"/>
  <circle cx="145" cy="107" r="4" fill="#0e8a6e"/>
  <text x="155" y="111" font-family="Arial,sans-serif" font-size="11" fill="#0e8a6e">Iterative DPO (T rounds)</text>

  <line x1="100" y1="129" x2="130" y2="129" stroke="#6c4fe0" stroke-width="2.5"/>
  <circle cx="145" cy="129" r="4" fill="#6c4fe0"/>
  <text x="155" y="133" font-family="Arial,sans-serif" font-size="11" fill="#6c4fe0">Online RLHF / PPO</text>

  <!-- Plateau annotation for offline -->
  <text x="440" y="220" font-family="Arial,sans-serif" font-size="10" fill="#1f4fa3">plateaus early</text>
  <line x1="480" y1="222" x2="510" y2="228" stroke="#1f4fa3" stroke-width="1" stroke-dasharray="2,2"/>

</svg>
