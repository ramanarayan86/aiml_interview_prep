<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 360" width="860" height="360" font-family="Arial, sans-serif">
  <rect width="860" height="360" fill="#f8f9fa" rx="8"/>
  <text x="430" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#1f4fa3">SentencePiece vs HuggingFace Tokenizers: Architecture Comparison</text>

  <!-- SentencePiece column -->
  <rect x="40" y="50" width="360" height="290" fill="#eaf3fb" rx="8" stroke="#1f4fa3" stroke-width="2"/>
  <text x="220" y="78" text-anchor="middle" font-size="14" font-weight="bold" fill="#1f4fa3">SentencePiece</text>

  <!-- SP Pipeline boxes -->
  <rect x="70" y="95" width="300" height="38" fill="#1f4fa3" rx="5"/>
  <text x="220" y="119" text-anchor="middle" font-size="12" fill="#fff">Raw Unicode text (no pre-tokenization)</text>

  <line x1="220" y1="133" x2="220" y2="150" stroke="#1f4fa3" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="70" y="150" width="300" height="38" fill="#2980b9" rx="5"/>
  <text x="220" y="174" text-anchor="middle" font-size="12" fill="#fff">NFKC Unicode normalization</text>

  <line x1="220" y1="188" x2="220" y2="205" stroke="#1f4fa3" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="70" y="205" width="300" height="38" fill="#2980b9" rx="5"/>
  <text x="220" y="229" text-anchor="middle" font-size="12" fill="#fff">BPE or Unigram LM (self-contained)</text>

  <line x1="220" y1="243" x2="220" y2="260" stroke="#1f4fa3" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="70" y="260" width="300" height="38" fill="#1f4fa3" rx="5"/>
  <text x="220" y="284" text-anchor="middle" font-size="12" fill="#fff">Subword tokens (▁ marks word start)</text>

  <text x="220" y="324" text-anchor="middle" font-size="11" fill="#555">Whitespace = just another character</text>
  <text x="220" y="340" text-anchor="middle" font-size="11" fill="#555">No language-specific rules needed</text>

  <!-- HuggingFace column -->
  <rect x="460" y="50" width="360" height="290" fill="#fef9ec" rx="8" stroke="#c77a12" stroke-width="2"/>
  <text x="640" y="78" text-anchor="middle" font-size="14" font-weight="bold" fill="#c77a12">HuggingFace Tokenizers</text>

  <!-- HF Pipeline boxes -->
  <rect x="490" y="95" width="300" height="38" fill="#c77a12" rx="5"/>
  <text x="640" y="119" text-anchor="middle" font-size="12" fill="#fff">Raw text input</text>

  <line x1="640" y1="133" x2="640" y2="150" stroke="#c77a12" stroke-width="2" marker-end="url(#arrow2)"/>

  <rect x="490" y="150" width="300" height="38" fill="#e67e22" rx="5"/>
  <text x="640" y="169" text-anchor="middle" font-size="11" fill="#fff">Normalizer (NFC/NFKC/lowercase/strip)</text>
  <text x="640" y="183" text-anchor="middle" font-size="10" fill="#fff">(model-specific, pluggable)</text>

  <line x1="640" y1="188" x2="640" y2="205" stroke="#c77a12" stroke-width="2" marker-end="url(#arrow2)"/>

  <rect x="490" y="205" width="300" height="38" fill="#e67e22" rx="5"/>
  <text x="640" y="224" text-anchor="middle" font-size="11" fill="#fff">Pre-tokenizer (whitespace/regex/ByteLevel)</text>
  <text x="640" y="238" text-anchor="middle" font-size="10" fill="#fff">(splits into initial chunks first)</text>

  <line x1="640" y1="243" x2="640" y2="260" stroke="#c77a12" stroke-width="2" marker-end="url(#arrow2)"/>

  <rect x="490" y="260" width="300" height="38" fill="#c77a12" rx="5"/>
  <text x="640" y="284" text-anchor="middle" font-size="12" fill="#fff">Model (BPE/WordPiece/Unigram/Word)</text>

  <text x="640" y="324" text-anchor="middle" font-size="11" fill="#555">Rust core; wraps many algorithms</text>
  <text x="640" y="340" text-anchor="middle" font-size="11" fill="#555">Whitespace boundaries enforced early</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L0,8 L8,4 z" fill="#1f4fa3"/>
    </marker>
    <marker id="arrow2" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L0,8 L8,4 z" fill="#c77a12"/>
    </marker>
  </defs>
</svg>
