<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 340" width="820" height="340" font-family="Arial, sans-serif">
  <rect width="820" height="340" fill="#f8f9fa" rx="8"/>

  <!-- Title -->
  <text x="410" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#1f4fa3">Number Tokenization: Arbitrary BPE Splits (GPT-2 style)</text>

  <!-- Column headers -->
  <text x="30"  y="58" font-size="12" font-weight="bold" fill="#5b6675">Input number</text>
  <text x="230" y="58" font-size="12" font-weight="bold" fill="#5b6675">BPE tokens</text>
  <text x="490" y="58" font-size="12" font-weight="bold" fill="#5b6675">Token IDs</text>
  <text x="660" y="58" font-size="12" font-weight="bold" fill="#5b6675">Note</text>

  <!-- Horizontal rule under header -->
  <line x1="20" y1="64" x2="800" y2="64" stroke="#d0d7de" stroke-width="1"/>

  <!-- ── Row 1: "42" → 1 token ── -->
  <text x="30" y="94" font-size="13" fill="#1f4fa3" font-weight="bold">"42"</text>

  <rect x="230" y="76" width="44" height="26" fill="#0e8a6e" rx="4"/>
  <text x="252" y="94" text-anchor="middle" font-size="13" font-weight="bold" fill="white">42</text>

  <text x="490" y="94" font-size="11" fill="#0e8a6e">3740</text>
  <text x="660" y="94" font-size="11" fill="#0e8a6e">1 token  (common pair)</text>

  <line x1="20" y1="108" x2="800" y2="108" stroke="#d0d7de" stroke-width="1"/>

  <!-- ── Row 2: "43" → 2 tokens ── -->
  <text x="30" y="138" font-size="13" fill="#1f4fa3" font-weight="bold">"43"</text>

  <rect x="230" y="120" width="28" height="26" fill="#c0392b" rx="4"/>
  <text x="244" y="138" text-anchor="middle" font-size="13" font-weight="bold" fill="white">4</text>

  <rect x="264" y="120" width="28" height="26" fill="#c0392b" rx="4"/>
  <text x="278" y="138" text-anchor="middle" font-size="13" font-weight="bold" fill="white">3</text>

  <text x="490" y="138" font-size="11" fill="#c0392b">19, 18</text>
  <text x="660" y="138" font-size="11" fill="#c0392b">2 tokens  (pair never merged)</text>

  <line x1="20" y1="152" x2="800" y2="152" stroke="#d0d7de" stroke-width="1"/>

  <!-- ── Row 3: "1234" → arbitrary split ── -->
  <text x="30" y="182" font-size="13" fill="#1f4fa3" font-weight="bold">"1234"</text>

  <rect x="230" y="164" width="42" height="26" fill="#c77a12" rx="4"/>
  <text x="251" y="182" text-anchor="middle" font-size="13" font-weight="bold" fill="white">12</text>

  <rect x="278" y="164" width="42" height="26" fill="#c77a12" rx="4"/>
  <text x="299" y="182" text-anchor="middle" font-size="13" font-weight="bold" fill="white">34</text>

  <text x="490" y="182" font-size="11" fill="#c77a12">1065, 4914</text>
  <text x="660" y="182" font-size="11" fill="#c77a12">split mid-number</text>

  <line x1="20" y1="196" x2="800" y2="196" stroke="#d0d7de" stroke-width="1"/>

  <!-- ── Row 4: "12345" → 3-token split ── -->
  <text x="30" y="226" font-size="13" fill="#1f4fa3" font-weight="bold">"12345"</text>

  <rect x="230" y="208" width="42" height="26" fill="#c77a12" rx="4"/>
  <text x="251" y="226" text-anchor="middle" font-size="13" font-weight="bold" fill="white">123</text>

  <rect x="278" y="208" width="36" height="26" fill="#c77a12" rx="4"/>
  <text x="296" y="226" text-anchor="middle" font-size="13" font-weight="bold" fill="white">45</text>

  <text x="490" y="226" font-size="11" fill="#c77a12">10444, 2231</text>
  <text x="660" y="226" font-size="11" fill="#c77a12">boundary at digit 3 / 4</text>

  <line x1="20" y1="240" x2="800" y2="240" stroke="#d0d7de" stroke-width="1"/>

  <!-- ── Row 5: Llama-3 / digit-split ── -->
  <text x="30" y="270" font-size="13" fill="#1f4fa3" font-weight="bold">"12345"</text>
  <text x="30" y="284" font-size="10" fill="#5b6675">(digit-split)</text>

  <rect x="230" y="252" width="26" height="26" fill="#6c4fe0" rx="4"/>
  <text x="243" y="270" text-anchor="middle" font-size="13" font-weight="bold" fill="white">1</text>

  <rect x="260" y="252" width="26" height="26" fill="#6c4fe0" rx="4"/>
  <text x="273" y="270" text-anchor="middle" font-size="13" font-weight="bold" fill="white">2</text>

  <rect x="290" y="252" width="26" height="26" fill="#6c4fe0" rx="4"/>
  <text x="303" y="270" text-anchor="middle" font-size="13" font-weight="bold" fill="white">3</text>

  <rect x="320" y="252" width="26" height="26" fill="#6c4fe0" rx="4"/>
  <text x="333" y="270" text-anchor="middle" font-size="13" font-weight="bold" fill="white">4</text>

  <rect x="350" y="252" width="26" height="26" fill="#6c4fe0" rx="4"/>
  <text x="363" y="270" text-anchor="middle" font-size="13" font-weight="bold" fill="white">5</text>

  <text x="490" y="270" font-size="11" fill="#6c4fe0">49, 50, 51, 52, 53</text>
  <text x="660" y="270" font-size="11" fill="#0e8a6e">1 digit per token (better)</text>

  <!-- Key insight callout -->
  <rect x="20" y="298" width="780" height="32" fill="#fef3e2" rx="5" stroke="#c77a12" stroke-width="1"/>
  <text x="410" y="313" text-anchor="middle" font-size="11" fill="#c77a12" font-weight="bold">Key insight: </text>
  <text x="410" y="313" text-anchor="middle" font-size="11" fill="#5b6675">
    <tspan dx="46">BPE merges are driven by corpus frequency, not numeric structure — splits are unpredictable and not aligned to place value.</tspan>
  </text>

  <!-- Arrow marker (not used in fig1, but declared for completeness) -->
  <defs>
    <marker id="arr1" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#5b6675"/>
    </marker>
  </defs>
</svg>
