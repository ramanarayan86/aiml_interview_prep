<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 360" width="820" height="360" font-family="Arial, sans-serif">
  <rect width="820" height="360" fill="#f8f9fa" rx="8"/>
  <text x="410" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#1f4fa3">BPE Training: Two Implementation Strategies</text>

  <!-- Left panel: Naive approach -->
  <rect x="20" y="45" width="375" height="285" fill="#fff" stroke="#c0392b" stroke-width="1.5" rx="6"/>
  <text x="207" y="67" text-anchor="middle" font-size="13" font-weight="bold" fill="#c0392b">Naive: O(V * |C|)</text>

  <!-- Boxes for each merge step -->
  <rect x="40" y="80" width="335" height="44" fill="#fde8e8" stroke="#c0392b" stroke-width="1" rx="4"/>
  <text x="207" y="97" text-anchor="middle" font-size="11" font-weight="bold" fill="#c0392b">Merge step 1 of V</text>
  <text x="207" y="116" text-anchor="middle" font-size="10" fill="#444">Scan entire corpus |C| to count all pairs</text>

  <text x="207" y="143" text-anchor="middle" font-size="16" fill="#c0392b">&#8595;</text>

  <rect x="40" y="152" width="335" height="44" fill="#fde8e8" stroke="#c0392b" stroke-width="1" rx="4"/>
  <text x="207" y="169" text-anchor="middle" font-size="11" font-weight="bold" fill="#c0392b">Merge step 2 of V</text>
  <text x="207" y="188" text-anchor="middle" font-size="10" fill="#444">Scan entire corpus |C| again — O(|C|) per step</text>

  <text x="207" y="215" text-anchor="middle" font-size="16" fill="#c0392b">&#8595;</text>

  <rect x="40" y="220" width="335" height="30" fill="#fde8e8" stroke="#c0392b" stroke-width="1" rx="4"/>
  <text x="207" y="240" text-anchor="middle" font-size="10" fill="#c0392b">... V steps total ...</text>

  <text x="207" y="270" text-anchor="middle" font-size="16" fill="#c0392b">&#8595;</text>

  <rect x="40" y="275" width="335" height="44" fill="#c0392b" rx="4"/>
  <text x="207" y="294" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">Total: V full corpus scans</text>
  <text x="207" y="311" text-anchor="middle" font-size="11" fill="#fde8e8">Cost = O(V * |C|)  — slow for large V, |C|</text>

  <!-- Right panel: Priority queue approach -->
  <rect x="425" y="45" width="375" height="285" fill="#fff" stroke="#0e8a6e" stroke-width="1.5" rx="6"/>
  <text x="612" y="67" text-anchor="middle" font-size="13" font-weight="bold" fill="#0e8a6e">Priority Queue: O(|C| log |C|)</text>

  <rect x="445" y="80" width="335" height="44" fill="#e8f8f4" stroke="#0e8a6e" stroke-width="1" rx="4"/>
  <text x="612" y="97" text-anchor="middle" font-size="11" font-weight="bold" fill="#0e8a6e">Initialize once</text>
  <text x="612" y="116" text-anchor="middle" font-size="10" fill="#444">Scan corpus once; insert all pairs into max-heap</text>

  <text x="612" y="143" text-anchor="middle" font-size="16" fill="#0e8a6e">&#8595;</text>

  <rect x="445" y="152" width="335" height="44" fill="#e8f8f4" stroke="#0e8a6e" stroke-width="1" rx="4"/>
  <text x="612" y="169" text-anchor="middle" font-size="11" font-weight="bold" fill="#0e8a6e">Each merge step</text>
  <text x="612" y="188" text-anchor="middle" font-size="10" fill="#444">Pop max; update only affected neighbors in heap</text>

  <text x="612" y="215" text-anchor="middle" font-size="16" fill="#0e8a6e">&#8595;</text>

  <rect x="445" y="220" width="335" height="30" fill="#e8f8f4" stroke="#0e8a6e" stroke-width="1" rx="4"/>
  <text x="612" y="240" text-anchor="middle" font-size="10" fill="#0e8a6e">O(log |C|) per step — only touch changed entries</text>

  <text x="612" y="270" text-anchor="middle" font-size="16" fill="#0e8a6e">&#8595;</text>

  <rect x="445" y="275" width="335" height="44" fill="#0e8a6e" rx="4"/>
  <text x="612" y="294" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">Total: one pass + V heap ops</text>
  <text x="612" y="311" text-anchor="middle" font-size="11" fill="#d5f5ec">Cost = O(|C| log |C|)  amortized</text>

  <!-- Bottom note -->
  <text x="410" y="348" text-anchor="middle" font-size="11" fill="#888">|C| = corpus size in tokens; V = number of merges (vocab size - base alphabet size)</text>
</svg>
