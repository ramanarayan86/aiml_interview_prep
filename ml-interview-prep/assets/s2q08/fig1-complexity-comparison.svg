<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 300" width="820" height="300" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="820" height="300" fill="#f8f9fa" rx="8"/>

  <!-- Title -->
  <text x="410" y="26" text-anchor="middle" font-size="14" font-weight="bold" fill="#1f4fa3">BPE Training Complexity: Naïve O(V·|C|) vs Priority-Queue O(|C| log |C|)</text>
  <text x="410" y="44" text-anchor="middle" font-size="11" fill="#5b6675">V = 50,000 merges. Relative time units (log scale on bar length). PQ-BPE is ~500× faster at 10 GB.</text>

  <!-- Legend -->
  <rect x="210" y="56" width="14" height="12" fill="#1f4fa3" rx="2"/>
  <text x="228" y="67" font-size="11" fill="#333">Naïve O(V·|C|)</text>
  <rect x="360" y="56" width="14" height="12" fill="#0e8a6e" rx="2"/>
  <text x="378" y="67" font-size="11" fill="#333">Priority-Queue O(|C| log |C|)</text>

  <!-- Y axis label -->
  <text x="14" y="185" text-anchor="middle" font-size="11" fill="#5b6675" transform="rotate(-90,14,185)">Corpus Size</text>

  <!-- X axis label -->
  <text x="500" y="293" text-anchor="middle" font-size="11" fill="#5b6675">Relative Training Time (log scale; shorter = faster)</text>

  <!-- Grid lines -->
  <line x1="170" y1="80" x2="770" y2="80" stroke="#dde" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="170" y1="95" x2="770" y2="95" stroke="#dde" stroke-width="1"/>

  <!-- ===== Row 1: 1 GB ===== -->
  <!-- Label -->
  <text x="160" y="116" text-anchor="end" font-size="12" font-weight="bold" fill="#333">1 GB</text>
  <!-- Naive bar: 1GB ~1 unit, scale to 60px -->
  <rect x="170" y="100" width="60" height="16" fill="#1f4fa3" rx="3"/>
  <text x="235" y="113" font-size="10" fill="#1f4fa3">1×</text>
  <!-- PQ bar: log factor ~ln(250M)~19.3, so PQ = 250M*19.3 / (50K*250M) = 19.3/50K ~ 0.000386 relative -->
  <!-- Relative PQ/Naive = log(|C|)/V = 19.3/50000 ~= 1/2591. Display PQ bar as ~0.1px min for visibility -->
  <!-- Scale: naive 1GB = 60px. PQ 1GB = 60/2591 = 0.023px. Floor to 2px + label -->
  <rect x="170" y="120" width="2" height="16" fill="#0e8a6e" rx="1"/>
  <text x="175" y="133" font-size="10" fill="#0e8a6e">&#8776;0.0004×</text>

  <!-- ===== Row 2: 10 GB ===== -->
  <text x="160" y="166" text-anchor="end" font-size="12" font-weight="bold" fill="#333">10 GB</text>
  <!-- Naive bar: 10x bigger than 1GB = 600px, cap at 580 -->
  <rect x="170" y="150" width="580" height="16" fill="#1f4fa3" rx="3"/>
  <text x="754" y="163" font-size="10" fill="#1f4fa3">10×</text>
  <!-- PQ bar: 10GB PQ = 10x * log(10) more = slight increase. Still ~0.2px; show 3px -->
  <rect x="170" y="170" width="3" height="16" fill="#0e8a6e" rx="1"/>
  <text x="176" y="183" font-size="10" fill="#0e8a6e">&#8776;0.004×</text>

  <!-- ===== Row 3: 100 GB ===== -->
  <text x="160" y="216" text-anchor="end" font-size="12" font-weight="bold" fill="#333">100 GB</text>
  <!-- Naive bar: 100x bigger; truncated at 580px, show overflow arrow -->
  <rect x="170" y="200" width="574" height="16" fill="#1f4fa3" rx="3"/>
  <!-- Overflow chevron -->
  <polygon points="744,200 760,208 744,216" fill="#c0392b"/>
  <text x="765" y="213" font-size="10" fill="#c0392b">100×+</text>
  <!-- PQ bar: 100GB -->
  <rect x="170" y="220" width="4" height="16" fill="#0e8a6e" rx="1"/>
  <text x="177" y="233" font-size="10" fill="#0e8a6e">&#8776;0.04×</text>

  <!-- ===== Row 4: 1 TB ===== -->
  <text x="160" y="266" text-anchor="end" font-size="12" font-weight="bold" fill="#333">1 TB</text>
  <!-- Naive bar: 1000x bigger; truncated -->
  <rect x="170" y="250" width="574" height="16" fill="#c0392b" rx="3" opacity="0.8"/>
  <polygon points="744,250 760,258 744,266" fill="#c0392b"/>
  <text x="765" y="263" font-size="10" fill="#c0392b">1000×+</text>
  <!-- PQ bar: 1TB -->
  <rect x="170" y="270" width="5" height="16" fill="#0e8a6e" rx="1"/>
  <text x="178" y="283" font-size="10" fill="#0e8a6e">&#8776;0.4×</text>

  <!-- Y-axis baseline -->
  <line x1="170" y1="96" x2="170" y2="286" stroke="#888" stroke-width="1.5"/>

  <!-- Speedup annotations -->
  <text x="410" y="143" text-anchor="middle" font-size="10" fill="#5b6675" font-style="italic">&#8592; ~2,500× speedup at 1 GB</text>
  <text x="410" y="193" text-anchor="middle" font-size="10" fill="#5b6675" font-style="italic">&#8592; ~2,600× speedup at 10 GB</text>
  <text x="410" y="243" text-anchor="middle" font-size="10" fill="#5b6675" font-style="italic">&#8592; ~2,700× speedup at 100 GB</text>
</svg>
