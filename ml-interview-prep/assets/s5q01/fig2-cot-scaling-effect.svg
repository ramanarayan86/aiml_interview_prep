<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 360">
  <!-- Background -->
  <rect width="700" height="360" fill="#f8f9fc"/>

  <!-- Title -->
  <text x="350" y="28" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#1f4fa3" text-anchor="middle">CoT Emerges Only at Scale (~100B Parameters)</text>
  <text x="350" y="46" font-family="Arial,sans-serif" font-size="11" fill="#5b6675" text-anchor="middle">GSM8K accuracy vs. model size — Wei et al. (2022)</text>

  <!-- Chart area: x 80..630, y 65..290 -->
  <!-- Axes -->
  <line x1="80" y1="290" x2="630" y2="290" stroke="#5b6675" stroke-width="1.5"/>
  <line x1="80" y1="65" x2="80" y2="290" stroke="#5b6675" stroke-width="1.5"/>

  <!-- Y-axis label -->
  <text transform="translate(22,195) rotate(-90)" font-family="Arial,sans-serif" font-size="12" fill="#5b6675" text-anchor="middle">Accuracy on GSM8K (%)</text>

  <!-- X-axis label -->
  <text x="355" y="325" font-family="Arial,sans-serif" font-size="12" fill="#5b6675" text-anchor="middle">Model Size (parameters, log scale)</text>

  <!-- Y-axis ticks: 0, 10, 20, 30, 40, 50, 60 -->
  <!-- range: 0-60, height 225px, so 1% = 3.75px, y = 290 - val*3.75 -->
  <line x1="75" y1="290" x2="80" y2="290" stroke="#5b6675" stroke-width="1"/>
  <text x="70" y="294" font-family="Arial,sans-serif" font-size="10" fill="#5b6675" text-anchor="end">0</text>
  <line x1="75" y1="252" x2="80" y2="252" stroke="#5b6675" stroke-width="1"/>
  <text x="70" y="256" font-family="Arial,sans-serif" font-size="10" fill="#5b6675" text-anchor="end">10</text>
  <line x1="75" y1="215" x2="80" y2="215" stroke="#5b6675" stroke-width="1"/>
  <text x="70" y="219" font-family="Arial,sans-serif" font-size="10" fill="#5b6675" text-anchor="end">20</text>
  <line x1="75" y1="178" x2="80" y2="178" stroke="#5b6675" stroke-width="1"/>
  <text x="70" y="182" font-family="Arial,sans-serif" font-size="10" fill="#5b6675" text-anchor="end">30</text>
  <line x1="75" y1="140" x2="80" y2="140" stroke="#5b6675" stroke-width="1"/>
  <text x="70" y="144" font-family="Arial,sans-serif" font-size="10" fill="#5b6675" text-anchor="end">40</text>
  <line x1="75" y1="103" x2="80" y2="103" stroke="#5b6675" stroke-width="1"/>
  <text x="70" y="107" font-family="Arial,sans-serif" font-size="10" fill="#5b6675" text-anchor="end">50</text>
  <line x1="75" y1="65" x2="80" y2="65" stroke="#5b6675" stroke-width="1"/>
  <text x="70" y="69" font-family="Arial,sans-serif" font-size="10" fill="#5b6675" text-anchor="end">60</text>

  <!-- Horizontal grid lines -->
  <line x1="80" y1="252" x2="630" y2="252" stroke="#e0e0e0" stroke-width="0.8" stroke-dasharray="4,4"/>
  <line x1="80" y1="215" x2="630" y2="215" stroke="#e0e0e0" stroke-width="0.8" stroke-dasharray="4,4"/>
  <line x1="80" y1="178" x2="630" y2="178" stroke="#e0e0e0" stroke-width="0.8" stroke-dasharray="4,4"/>
  <line x1="80" y1="140" x2="630" y2="140" stroke="#e0e0e0" stroke-width="0.8" stroke-dasharray="4,4"/>
  <line x1="80" y1="103" x2="630" y2="103" stroke="#e0e0e0" stroke-width="0.8" stroke-dasharray="4,4"/>

  <!-- X-axis ticks (log scale): 1B=80, 8B=218, 60B=390, 100B=455, 540B=630 -->
  <!-- Using 5 points across log scale: log10(1B)=9, log10(540B)~11.73 -->
  <!-- Map: x = 80 + (log10(size)-9)/(11.73-9)*550 -->
  <!-- 1B: x=80, 8B: x=80+0.903/2.73*550=182+80=262 approx, let me just place them manually -->
  <!-- positions: 1B->80, 10B->282, 100B->484, 540B->630 approx -->

  <!-- 1B -->
  <line x1="80" y1="290" x2="80" y2="295" stroke="#5b6675" stroke-width="1"/>
  <text x="80" y="308" font-family="Arial,sans-serif" font-size="10" fill="#5b6675" text-anchor="middle">1B</text>

  <!-- 10B -->
  <line x1="264" y1="290" x2="264" y2="295" stroke="#5b6675" stroke-width="1"/>
  <text x="264" y="308" font-family="Arial,sans-serif" font-size="10" fill="#5b6675" text-anchor="middle">10B</text>

  <!-- 100B -->
  <line x1="447" y1="290" x2="447" y2="295" stroke="#5b6675" stroke-width="1"/>
  <text x="447" y="308" font-family="Arial,sans-serif" font-size="10" fill="#5b6675" text-anchor="middle">100B</text>

  <!-- 540B -->
  <line x1="630" y1="290" x2="630" y2="295" stroke="#5b6675" stroke-width="1"/>
  <text x="630" y="308" font-family="Arial,sans-serif" font-size="10" fill="#5b6675" text-anchor="middle">540B</text>

  <!-- ===== STANDARD PROMPTING CURVE (flat/low) ===== -->
  <!-- Points: (80,284), (264,281), (447,223), (630,223) -->
  <!-- Standard stays flat ~2% then rises slightly to ~18% at 540B -->
  <!-- y for 2% = 290 - 2*3.75 = 282.5; 18% = 290-67.5=222.5 -->
  <polyline points="80,284 264,281 447,278 630,223" fill="none" stroke="#c0392b" stroke-width="2.5" stroke-dasharray="6,4"/>

  <!-- Data points: standard -->
  <circle cx="80" cy="284" r="4" fill="#c0392b"/>
  <circle cx="264" cy="281" r="4" fill="#c0392b"/>
  <circle cx="447" cy="278" r="4" fill="#c0392b"/>
  <circle cx="630" cy="223" r="4" fill="#c0392b"/>

  <!-- ===== COT PROMPTING CURVE (emerges at ~100B) ===== -->
  <!-- Points: (80,284), (264,281), (447,271), (630,76) -->
  <!-- CoT ~2% at 1B, ~2.5% at 10B, ~6% at 100B, ~57% at 540B -->
  <!-- 2%=284, 2.5%=280.6, 6%=267.5, 57%=76.25 -->
  <polyline points="80,284 264,281 447,268 630,76" fill="none" stroke="#0e8a6e" stroke-width="2.5"/>

  <!-- Data points: CoT -->
  <circle cx="80" cy="284" r="4" fill="#0e8a6e"/>
  <circle cx="264" cy="281" r="4" fill="#0e8a6e"/>
  <circle cx="447" cy="268" r="4" fill="#0e8a6e"/>
  <circle cx="630" cy="76" r="4" fill="#0e8a6e"/>

  <!-- Emergence threshold line at 100B -->
  <line x1="447" y1="65" x2="447" y2="295" stroke="#6c4fe0" stroke-width="1.5" stroke-dasharray="5,4"/>
  <rect x="398" y="67" width="98" height="22" rx="4" fill="#6c4fe0" fill-opacity="0.12" stroke="#6c4fe0" stroke-width="1"/>
  <text x="447" y="83" font-family="Arial,sans-serif" font-size="10" fill="#6c4fe0" text-anchor="middle" font-weight="bold">Emergence ~100B</text>

  <!-- Annotation: 56.9% -->
  <line x1="630" y1="76" x2="660" y2="76" stroke="#0e8a6e" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="663" y="80" font-family="Arial,sans-serif" font-size="10" fill="#0e8a6e" font-weight="bold">56.9%</text>

  <!-- Annotation: 17.9% -->
  <line x1="630" y1="223" x2="660" y2="223" stroke="#c0392b" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="663" y="227" font-family="Arial,sans-serif" font-size="10" fill="#c0392b" font-weight="bold">17.9%</text>

  <!-- Legend -->
  <rect x="90" y="68" width="155" height="46" rx="5" fill="#ffffff" stroke="#e0e0e0" stroke-width="1"/>
  <line x1="100" y1="82" x2="122" y2="82" stroke="#0e8a6e" stroke-width="2.5"/>
  <circle cx="111" cy="82" r="3.5" fill="#0e8a6e"/>
  <text x="126" y="86" font-family="Arial,sans-serif" font-size="10" fill="#5b6675">CoT prompting</text>
  <line x1="100" y1="100" x2="122" y2="100" stroke="#c0392b" stroke-width="2.5" stroke-dasharray="5,3"/>
  <circle cx="111" cy="100" r="3.5" fill="#c0392b"/>
  <text x="126" y="104" font-family="Arial,sans-serif" font-size="10" fill="#5b6675">Standard prompting</text>

  <!-- Source note -->
  <text x="350" y="348" font-family="Arial,sans-serif" font-size="9" fill="#5b6675" text-anchor="middle">Source: Wei et al. (2022) NeurIPS — LaMDA, GPT-3, PaLM model families on GSM8K</text>
</svg>
