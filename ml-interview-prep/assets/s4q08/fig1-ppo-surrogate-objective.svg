<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 380">
  <!-- Background -->
  <rect width="700" height="380" fill="#f8f9fb"/>

  <!-- Title -->
  <text x="350" y="28" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#1f4fa3">PPO Clipped Surrogate Objective L^CLIP as a Function of r_t</text>

  <!-- Axes area: origin at (80, 290), x spans to 620, y spans up to 60 -->
  <!-- x-axis -->
  <line x1="80" y1="290" x2="640" y2="290" stroke="#5b6675" stroke-width="1.5"/>
  <!-- y-axis -->
  <line x1="80" y1="50" x2="80" y2="310" stroke="#5b6675" stroke-width="1.5"/>

  <!-- Arrow tips -->
  <polygon points="640,285 650,290 640,295" fill="#5b6675"/>
  <polygon points="75,50 80,40 85,50" fill="#5b6675"/>

  <!-- Axis labels -->
  <text x="650" y="294" font-family="sans-serif" font-size="13" fill="#5b6675">r_t</text>
  <text x="58" y="38" font-family="sans-serif" font-size="13" fill="#5b6675">L</text>

  <!-- x-axis tick positions: r=0 at x=80, r=2 at x=620 => scale = 270/1 per unit, so 1 unit = 270 px
       Actually let's map r=0 -> x=80, r=2 -> x=620: scale = (620-80)/2 = 270 px/unit
       r=0.8 -> x=80+0.8*270=296, r=1.0 -> x=80+1.0*270=350, r=1.2 -> x=80+1.2*270=404, r=1.4->x=458, r=1.6->x=512
  -->

  <!-- Clip bounds vertical dashed lines -->
  <!-- 1-eps = 0.8: x=80+0.8*270=296 -->
  <line x1="296" y1="55" x2="296" y2="300" stroke="#c0392b" stroke-width="1.2" stroke-dasharray="5,4"/>
  <!-- 1+eps = 1.2: x=80+1.2*270=404 -->
  <line x1="404" y1="55" x2="404" y2="300" stroke="#c0392b" stroke-width="1.2" stroke-dasharray="5,4"/>
  <!-- r=1.0: x=350 -->
  <line x1="350" y1="55" x2="350" y2="300" stroke="#5b6675" stroke-width="1" stroke-dasharray="3,4" opacity="0.5"/>

  <!-- Shaded clip regions: outside [0.8,1.2] -->
  <rect x="80" y="55" width="216" height="235" fill="#c0392b" fill-opacity="0.07"/>
  <rect x="404" y="55" width="216" height="235" fill="#c0392b" fill-opacity="0.07"/>

  <!-- =========================================================
       Curve for A_hat > 0 (navy blue): L = r_t * A_hat (A_hat=1 for illustration, scaled)
       We plot L/A_hat so shape is:
         r < 0.8:  flat at 0.8  (y = 0.8 * scale)
         0.8<=r<=1.2: linear r  (y = r * scale)
         r > 1.2:  flat at 1.2  (y = 1.2 * scale)
       Map L values: L=0 -> y=290, L=1.5 -> y=90  (scale = (290-90)/1.5 = 133 px/unit)
       L=0.8 -> y=290-0.8*133=183.6, L=1.2 -> y=290-1.2*133=130.4
  ============================================================ -->
  <!-- A_hat > 0 curve (navy) -->
  <!-- flat left: x=80 to 296, y=183.6 -->
  <line x1="80" y1="184" x2="296" y2="184" stroke="#1f4fa3" stroke-width="2.5"/>
  <!-- linear middle: (296,184) to (404,130) -->
  <line x1="296" y1="184" x2="404" y2="130" stroke="#1f4fa3" stroke-width="2.5"/>
  <!-- flat right: x=404 to 620, y=130 -->
  <line x1="404" y1="130" x2="620" y2="130" stroke="#1f4fa3" stroke-width="2.5"/>

  <!-- Label for A_hat > 0 -->
  <text x="490" y="122" font-family="sans-serif" font-size="13" fill="#1f4fa3" font-weight="bold">A&#770; &gt; 0</text>
  <text x="490" y="138" font-family="sans-serif" font-size="11" fill="#1f4fa3">(positive advantage)</text>

  <!-- =========================================================
       Curve for A_hat < 0 (teal): L = r_t * A_hat (A_hat=-1, so L = -r_t)
         r < 0.8:  flat at -0.8  (y = 290+0.8*133=396 -> but axis goes to ~55, so clip display)
         Actually let's place A_hat=-1 so L ranges from -1.2 to -0.8
         L=-0.8 -> y=290+0.8*133=396.4, L=-1.2 -> y=290+1.2*133=449.6
         These are below the x-axis. Let's re-scale so we can show both.
         Better: use A_hat=+0.5 scale so full range fits.
         Redo: scale = (290-80)/1.5 = 140 px/unit
         A>0 curve: L in [0.8,1.2], y=290-L*140: L=0.8->y=178, L=1.2->y=122
         A<0 curve: L in [-1.2,-0.8], y=290-L*140: L=-0.8->y=402 (below axis), L=-1.2->y=458
         Problem: negative L goes below x-axis. Let's shift origin to y=210 (middle of plot).
         Map L: y=210 - L*90 (so L=1.5 -> y=210-135=75, L=-1.5 -> y=210+135=345)
         L=0.8->y=210-72=138, L=1.2->y=210-108=102, L=-0.8->y=210+72=282, L=-1.2->y=210+108=318
  ============================================================ -->
  <!-- Zero line (dashed horizontal) -->
  <line x1="80" y1="210" x2="620" y2="210" stroke="#5b6675" stroke-width="1" stroke-dasharray="3,4" opacity="0.5"/>
  <text x="65" y="214" font-family="sans-serif" font-size="11" fill="#5b6675" text-anchor="end">0</text>

  <!-- Redo A>0 curve with new scale: y=210-L*90 -->
  <!-- flat left: L=0.8, y=138: x=80 to 296 -->
  <!-- Already drew these, need to erase. Let me just redraw cleanly in correct positions. -->
  <!-- I'll remove the old lines conceptually - this is SVG so later elements paint over. -->
  <!-- Actually SVG renders in order. Let me just set the correct values directly. -->

  <!-- Cover old lines with background color... Better to just place everything correctly from scratch. -->
  <!-- Let me use a group approach — this SVG is drawn once, I just need to use correct coordinates. -->
  <!-- Erasing by covering: -->
  <rect x="79" y="55" width="542" height="240" fill="#f8f9fb"/>

  <!-- Redraw axes and dashed lines on top -->
  <line x1="80" y1="210" x2="620" y2="210" stroke="#5b6675" stroke-width="1" stroke-dasharray="3,4" opacity="0.5"/>
  <text x="65" y="214" font-family="sans-serif" font-size="11" fill="#5b6675" text-anchor="end">0</text>

  <!-- Clip region shading -->
  <rect x="80" y="55" width="216" height="240" fill="#c0392b" fill-opacity="0.07"/>
  <rect x="404" y="55" width="216" height="240" fill="#c0392b" fill-opacity="0.07"/>

  <!-- Clip bound vertical lines -->
  <line x1="296" y1="58" x2="296" y2="295" stroke="#c0392b" stroke-width="1.5" stroke-dasharray="5,4"/>
  <line x1="404" y1="58" x2="404" y2="295" stroke="#c0392b" stroke-width="1.5" stroke-dasharray="5,4"/>
  <line x1="350" y1="58" x2="350" y2="295" stroke="#5b6675" stroke-width="1" stroke-dasharray="3,4" opacity="0.4"/>

  <!-- A_hat > 0 curve (navy): L=min(r,1.2)*A, A=1 normalized
       Flat left at L=0.8: x=80..296, y=210-0.8*90=138
       Linear: (296,138) to (404,102)
       Flat right at L=1.2: x=404..620, y=102 -->
  <polyline points="80,138 296,138 404,102 620,102" fill="none" stroke="#1f4fa3" stroke-width="2.8" stroke-linejoin="round"/>

  <!-- A_hat < 0 curve (teal): L=max(r,0.8)*A, A=-1 normalized
       Flat left at L=-1.2: x=80..296, y=210-(-1.2)*90=318
       Linear middle: (296,318) to (404,282)
       Flat right at L=-0.8: x=404..620, y=282 -->
  <polyline points="80,318 296,318 404,282 620,282" fill="none" stroke="#0e8a6e" stroke-width="2.8" stroke-linejoin="round"/>

  <!-- Legend -->
  <line x1="450" y1="160" x2="490" y2="160" stroke="#1f4fa3" stroke-width="2.5"/>
  <text x="495" y="165" font-family="sans-serif" font-size="12" fill="#1f4fa3">A&#770;_t &gt; 0</text>
  <line x1="450" y1="182" x2="490" y2="182" stroke="#0e8a6e" stroke-width="2.5"/>
  <text x="495" y="187" font-family="sans-serif" font-size="12" fill="#0e8a6e">A&#770;_t &lt; 0</text>

  <!-- x-axis ticks and labels -->
  <!-- r=0: x=80 -->
  <line x1="80" y1="293" x2="80" y2="300" stroke="#5b6675" stroke-width="1.5"/>
  <text x="80" y="314" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5b6675">0</text>
  <!-- r=0.4: x=80+0.4*270=188 -->
  <line x1="188" y1="293" x2="188" y2="300" stroke="#5b6675" stroke-width="1.5"/>
  <text x="188" y="314" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5b6675">0.4</text>
  <!-- r=0.8: x=296 -->
  <line x1="296" y1="293" x2="296" y2="300" stroke="#c0392b" stroke-width="1.5"/>
  <text x="296" y="314" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#c0392b" font-weight="bold">1-&#949;</text>
  <!-- r=1.0: x=350 -->
  <line x1="350" y1="293" x2="350" y2="300" stroke="#5b6675" stroke-width="1.5"/>
  <text x="350" y="314" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5b6675">1.0</text>
  <!-- r=1.2: x=404 -->
  <line x1="404" y1="293" x2="404" y2="300" stroke="#c0392b" stroke-width="1.5"/>
  <text x="404" y="314" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#c0392b" font-weight="bold">1+&#949;</text>
  <!-- r=1.6: x=512 -->
  <line x1="512" y1="293" x2="512" y2="300" stroke="#5b6675" stroke-width="1.5"/>
  <text x="512" y="314" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5b6675">1.6</text>
  <!-- r=2.0: x=620 -->
  <line x1="620" y1="293" x2="620" y2="300" stroke="#5b6675" stroke-width="1.5"/>
  <text x="620" y="314" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5b6675">2.0</text>

  <!-- y-axis ticks -->
  <!-- L=1.2: y=102 -->
  <line x1="74" y1="102" x2="80" y2="102" stroke="#5b6675" stroke-width="1.5"/>
  <text x="70" y="106" text-anchor="end" font-family="sans-serif" font-size="10" fill="#5b6675">1.2</text>
  <!-- L=0.8: y=138 -->
  <line x1="74" y1="138" x2="80" y2="138" stroke="#5b6675" stroke-width="1.5"/>
  <text x="70" y="142" text-anchor="end" font-family="sans-serif" font-size="10" fill="#5b6675">0.8</text>
  <!-- L=-0.8: y=282 -->
  <line x1="74" y1="282" x2="80" y2="282" stroke="#5b6675" stroke-width="1.5"/>
  <text x="70" y="286" text-anchor="end" font-family="sans-serif" font-size="10" fill="#5b6675">-0.8</text>
  <!-- L=-1.2: y=318 -->
  <line x1="74" y1="318" x2="80" y2="318" stroke="#5b6675" stroke-width="1.5"/>
  <text x="70" y="322" text-anchor="end" font-family="sans-serif" font-size="10" fill="#5b6675">-1.2</text>

  <!-- Annotation: "gradient active" in trust region -->
  <text x="330" y="75" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#1f4fa3" font-style="italic">gradient active</text>
  <line x1="296" y1="80" x2="404" y2="80" stroke="#1f4fa3" stroke-width="1" marker-end="url(#arr)"/>

  <!-- "no gradient" left and right -->
  <text x="188" y="75" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#c0392b" font-style="italic">no gradient</text>
  <text x="512" y="75" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#c0392b" font-style="italic">no gradient</text>

  <!-- Axis label: L^CLIP / A_hat -->
  <text x="52" y="170" font-family="sans-serif" font-size="11" fill="#5b6675" transform="rotate(-90,52,170)">L^CLIP / |A&#770;_t|</text>

  <!-- x-axis re-draw on top of erase rect -->
  <line x1="80" y1="293" x2="640" y2="293" stroke="#5b6675" stroke-width="1.5"/>
  <polygon points="640,288 650,293 640,298" fill="#5b6675"/>
  <line x1="80" y1="55" x2="80" y2="310" stroke="#5b6675" stroke-width="1.5"/>
  <polygon points="75,58 80,48 85,58" fill="#5b6675"/>

  <!-- Caption -->
  <text x="350" y="360" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5b6675">Figure 1. L^CLIP(&#952;) clips at r=1&#177;&#949; (&#949;=0.2). When |r-1|&gt;&#949; the objective is flat: no gradient signal to push further outside the trust region.</text>
</svg>
