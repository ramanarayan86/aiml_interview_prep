<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 380">
  <!-- Background -->
  <rect width="720" height="380" fill="#f8f9fb" rx="8"/>

  <!-- Title -->
  <text x="360" y="30" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#1f4fa3">Role of the Reference Model in RLHF and DPO</text>

  <!-- ═══ LEFT PANEL: RLHF ═══ -->
  <rect x="20" y="50" width="330" height="310" fill="#ffffff" stroke="#1f4fa3" stroke-width="1.5" rx="6"/>
  <text x="185" y="75" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1f4fa3">RLHF (PPO)</text>

  <!-- Reference model box (frozen) -->
  <rect x="50" y="95" width="120" height="55" fill="#e8eef8" stroke="#1f4fa3" stroke-width="2" rx="5"/>
  <text x="110" y="118" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#1f4fa3">&#960;_ref</text>
  <text x="110" y="133" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5b6675">(SFT, frozen)</text>
  <!-- Snowflake icon -->
  <text x="160" y="118" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#1f4fa3">&#10052;</text>

  <!-- Policy model box (trainable) -->
  <rect x="195" y="95" width="120" height="55" fill="#e6f4f1" stroke="#0e8a6e" stroke-width="2" rx="5"/>
  <text x="255" y="118" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#0e8a6e">&#960;_&#952;</text>
  <text x="255" y="133" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5b6675">(policy, trainable)</text>

  <!-- KL spring between them -->
  <!-- Spring path using zigzag -->
  <polyline points="170,122 178,115 186,129 194,115 202,122" fill="none" stroke="#c77a12" stroke-width="2.5" stroke-linejoin="round"/>
  <text x="186" y="108" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#c77a12" font-weight="bold">KL leash</text>
  <text x="186" y="145" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#c77a12">&#946; &#183; KL(&#960;&#952; &#8741; &#960;ref)</text>

  <!-- Reward signal -->
  <rect x="195" y="175" width="120" height="40" fill="#fef6e8" stroke="#c77a12" stroke-width="1.5" rx="5"/>
  <text x="255" y="192" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#c77a12" font-weight="bold">Reward r&#966;(x, y)</text>
  <text x="255" y="207" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#5b6675">(from reward model)</text>
  <line x1="255" y1="150" x2="255" y2="175" stroke="#c77a12" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="255,175 251,167 259,167" fill="#c77a12"/>

  <!-- Objective equation -->
  <rect x="35" y="230" width="295" height="55" fill="#f0f4fc" stroke="#1f4fa3" stroke-width="1" rx="4"/>
  <text x="182" y="249" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#1f4fa3">PPO Objective:</text>
  <text x="182" y="265" text-anchor="middle" font-family="monospace" font-size="9" fill="#1f4fa3">J(&#952;) = E[r&#966;(x,y)]</text>
  <text x="182" y="278" text-anchor="middle" font-family="monospace" font-size="9" fill="#1f4fa3">- &#946; &#183; KL[ &#960;&#952;(&#183;|x) &#8741; &#960;ref(&#183;|x) ]</text>

  <!-- Reference arrow from ref to KL term -->
  <line x1="110" y1="150" x2="110" y2="237" stroke="#1f4fa3" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="110,237 106,229 114,229" fill="#1f4fa3"/>

  <!-- &#946; effect note -->
  <text x="35" y="308" font-family="sans-serif" font-size="9" fill="#5b6675">&#946; = 0.01&#8211;0.2 : larger &#946; &#8594; stays closer to &#960;ref</text>
  <text x="35" y="322" font-family="sans-serif" font-size="9" fill="#5b6675">KL &#8811; 1/&#946; &#8594; gradients fight, training unstable</text>
  <text x="35" y="336" font-family="sans-serif" font-size="9" fill="#c0392b" font-weight="bold">KL &gt; 50&#8211;100 nats &#8594; distribution shift risk</text>
  <text x="35" y="350" font-family="sans-serif" font-size="9" fill="#c0392b" font-weight="bold">KL &gt; 200 nats &#8594; coherence degrades</text>

  <!-- ═══ RIGHT PANEL: DPO ═══ -->
  <rect x="370" y="50" width="330" height="310" fill="#ffffff" stroke="#6c4fe0" stroke-width="1.5" rx="6"/>
  <text x="535" y="75" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#6c4fe0">DPO (Direct Preference Opt.)</text>

  <!-- Reference model box (frozen) -->
  <rect x="400" y="95" width="120" height="55" fill="#f0edfb" stroke="#6c4fe0" stroke-width="2" rx="5"/>
  <text x="460" y="118" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#6c4fe0">&#960;_ref</text>
  <text x="460" y="133" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5b6675">(SFT, frozen)</text>
  <text x="510" y="118" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#6c4fe0">&#10052;</text>

  <!-- Policy model box -->
  <rect x="545" y="95" width="120" height="55" fill="#e6f4f1" stroke="#0e8a6e" stroke-width="2" rx="5"/>
  <text x="605" y="118" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#0e8a6e">&#960;_&#952;</text>
  <text x="605" y="133" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5b6675">(policy, trainable)</text>

  <!-- Log ratio connector -->
  <line x1="520" y1="122" x2="545" y2="122" stroke="#6c4fe0" stroke-width="2"/>
  <text x="532" y="114" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#6c4fe0">log</text>
  <text x="532" y="124" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#6c4fe0">ratio</text>
  <text x="532" y="134" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#6c4fe0">implicit</text>

  <!-- Preference pair data -->
  <rect x="400" y="175" width="260" height="45" fill="#f8f4ff" stroke="#6c4fe0" stroke-width="1.5" rx="5"/>
  <text x="530" y="192" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#6c4fe0">Preference Data (offline)</text>
  <text x="530" y="207" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#5b6675">(y_w, y_l) assumed drawn from &#960;ref</text>

  <!-- Arrow from models to data -->
  <line x1="460" y1="150" x2="460" y2="175" stroke="#6c4fe0" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="605" y1="150" x2="605" y2="175" stroke="#0e8a6e" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="460,175 456,167 464,167" fill="#6c4fe0"/>
  <polygon points="605,175 601,167 609,167" fill="#0e8a6e"/>

  <!-- DPO Loss equation -->
  <rect x="385" y="232" width="300" height="60" fill="#f0edfb" stroke="#6c4fe0" stroke-width="1" rx="4"/>
  <text x="535" y="250" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#6c4fe0">DPO Loss:</text>
  <text x="535" y="265" text-anchor="middle" font-family="monospace" font-size="8.5" fill="#1f4fa3">L = -E[ log &#963;( &#946;&#183;log(&#960;&#952;(yw)/&#960;ref(yw))</text>
  <text x="535" y="279" text-anchor="middle" font-family="monospace" font-size="8.5" fill="#1f4fa3">- &#946;&#183;log(&#960;&#952;(yl)/&#960;ref(yl)) ) ]</text>

  <!-- Warning: drift breaks assumption -->
  <rect x="385" y="305" width="300" height="45" fill="#fff3f3" stroke="#c0392b" stroke-width="1.5" rx="4"/>
  <text x="535" y="322" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="bold" fill="#c0392b">If &#960;&#952; drifts far from &#960;ref:</text>
  <text x="535" y="336" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#c0392b">Bradley-Terry assumption violated</text>
  <text x="535" y="348" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#c0392b">&#8594; data is off-distribution &#8594; loss misleading</text>

  <!-- Divider line -->
  <line x1="355" y1="50" x2="355" y2="360" stroke="#d0d4db" stroke-width="1" stroke-dasharray="5,4"/>
</svg>
