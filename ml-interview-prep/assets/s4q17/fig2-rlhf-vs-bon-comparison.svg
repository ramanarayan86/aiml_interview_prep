<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 380" width="720" height="380">
  <!-- Background -->
  <rect width="720" height="380" fill="#f8f9fa" rx="8"/>

  <!-- Title -->
  <text x="360" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1f4fa3">RLHF vs. Best-of-N: Gold Reward vs. KL from SFT</text>
  <text x="360" y="46" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#5b6675">At matched KL budget, RLHF dominates in the moderate regime; BoN is safer at large KL</text>

  <!-- Chart area: left=75, right=670, top=65, bottom=310 -->
  <!-- KL axis: 0 to 60 nats, x_px = 75 + kl/60 * 595 -->
  <!-- Reward axis: 0.45 to 0.85 win-rate, y_px = 310 - (r-0.45)/0.40 * 245 -->

  <!-- Shaded RLHF-advantage zone (KL ~5 to ~40) -->
  <!-- x: kl=5 -> 75+5/60*595=124.6, kl=40 -> 75+40/60*595=471.7 -->
  <rect x="125" y="65" width="347" height="245" fill="#1f4fa3" fill-opacity="0.07" rx="2"/>
  <text x="298" y="82" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-style="italic" fill="#1f4fa3">RLHF advantage zone</text>

  <!-- Grid lines (horizontal) -->
  <line x1="75" y1="310" x2="670" y2="310" stroke="#ccc" stroke-width="1"/>
  <line x1="75" y1="249" x2="670" y2="249" stroke="#dde" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="75" y1="187" x2="670" y2="187" stroke="#dde" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="75" y1="126" x2="670" y2="126" stroke="#dde" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="75" y1="65" x2="670" y2="65" stroke="#dde" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Y-axis labels: 0.45 at y=310, 0.85 at y=65 -->
  <!-- y_px = 310 - (r-0.45)/0.40*245, step 0.10 -> dy=61.25 -->
  <text x="67" y="314" text-anchor="end" font-family="Arial, sans-serif" font-size="11" fill="#5b6675">0.45</text>
  <text x="67" y="253" text-anchor="end" font-family="Arial, sans-serif" font-size="11" fill="#5b6675">0.55</text>
  <text x="67" y="191" text-anchor="end" font-family="Arial, sans-serif" font-size="11" fill="#5b6675">0.65</text>
  <text x="67" y="130" text-anchor="end" font-family="Arial, sans-serif" font-size="11" fill="#5b6675">0.75</text>
  <text x="67" y="69" text-anchor="end" font-family="Arial, sans-serif" font-size="11" fill="#5b6675">0.85</text>

  <!-- Y-axis label -->
  <text x="18" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1f4fa3" transform="rotate(-90 18 190)">Gold Reward (win rate)</text>

  <!-- X-axis grid + labels at kl=0,10,20,30,40,50,60 -->
  <!-- x_px = 75 + kl/60*595 -->
  <line x1="75" y1="65" x2="75" y2="310" stroke="#ccc" stroke-width="1"/>
  <line x1="174" y1="65" x2="174" y2="310" stroke="#dde" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="273" y1="65" x2="273" y2="310" stroke="#dde" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="372" y1="65" x2="372" y2="310" stroke="#dde" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="471" y1="65" x2="471" y2="310" stroke="#dde" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="570" y1="65" x2="570" y2="310" stroke="#dde" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="670" y1="65" x2="670" y2="310" stroke="#ccc" stroke-width="1"/>

  <text x="75" y="328" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5b6675">0</text>
  <text x="174" y="328" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5b6675">10</text>
  <text x="273" y="328" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5b6675">20</text>
  <text x="372" y="328" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5b6675">30</text>
  <text x="471" y="328" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5b6675">40</text>
  <text x="570" y="328" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5b6675">50</text>
  <text x="670" y="328" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5b6675">60</text>

  <!-- X-axis label -->
  <text x="372" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1f4fa3">KL distance from SFT (nats)</text>

  <!-- Axes -->
  <line x1="75" y1="65" x2="75" y2="315" stroke="#333" stroke-width="2"/>
  <line x1="70" y1="310" x2="675" y2="310" stroke="#333" stroke-width="2"/>

  <!-- BoN curve: rises monotonically, slower than RLHF
       Points: kl=0->r=0.50, kl=5->r=0.545, kl=10->r=0.578, kl=20->r=0.620, kl=30->r=0.645,
               kl=40->r=0.662, kl=50->r=0.673, kl=60->r=0.681
       y_px = 310 - (r-0.45)/0.40 * 245
       kl=0:  x=75,  y=310-(0.50-0.45)/0.40*245=279.3
       kl=5:  x=124.6, y=310-(0.545-0.45)/0.40*245=252.0
       kl=10: x=174,  y=310-(0.578-0.45)/0.40*245=231.8
       kl=20: x=273,  y=310-(0.620-0.45)/0.40*245=206.3
       kl=30: x=372,  y=310-(0.645-0.45)/0.40*245=191.0
       kl=40: x=471,  y=310-(0.662-0.45)/0.40*245=180.6
       kl=50: x=570,  y=310-(0.673-0.45)/0.40*245=173.8
       kl=60: x=670,  y=310-(0.681-0.45)/0.40*245=168.5
  -->
  <polyline
    points="75,279.3 124.6,252.0 174,231.8 273,206.3 372,191.0 471,180.6 570,173.8 670,168.5"
    fill="none" stroke="#0e8a6e" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round" stroke-dasharray="8,4"/>

  <!-- RLHF curve: rises faster then falls (overoptimization) peak ~kl=25-30
       Points: kl=0->r=0.50, kl=3->r=0.545, kl=8->r=0.600, kl=15->r=0.660,
               kl=20->r=0.700, kl=25->r=0.725, kl=30->r=0.730, kl=35->r=0.718,
               kl=40->r=0.695, kl=50->r=0.645, kl=60->r=0.580
       y_px = 310 - (r-0.45)/0.40 * 245
       kl=0:  x=75,   y=279.3
       kl=3:  x=104.8, y=252.0
       kl=8:  x=154.3, y=217.5
       kl=15: x=223.6, y=185.4
       kl=20: x=273,   y=165.6
       kl=25: x=322.4, y=153.4 (peak region)
       kl=30: x=372,   y=151.0 (peak)
       kl=35: x=421.4, y=158.1
       kl=40: x=471,   y=172.3
       kl=50: x=570,   y=200.8
       kl=60: x=670,   y=236.5
  -->
  <polyline
    points="75,279.3 104.8,252.0 154.3,217.5 223.6,185.4 273,165.6 322.4,153.4 372,151.0 421.4,158.1 471,172.3 570,200.8 670,236.5"
    fill="none" stroke="#1f4fa3" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Crossover point: ~kl=40, both at ~0.695/0.662 -> approximately where RLHF descends to BoN level -->
  <!-- Mark RLHF peak at kl=30 (x=372, y=151) -->
  <circle cx="372" cy="151" r="6" fill="none" stroke="#c77a12" stroke-width="2"/>
  <line x1="372" y1="151" x2="405" y2="118" stroke="#c77a12" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="348" y="100" width="115" height="20" rx="3" fill="#fef6e6" stroke="#c77a12" stroke-width="1"/>
  <text x="405" y="114" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#c77a12">Peak (KL&#8776;30 nats)</text>

  <!-- Crossover marker: ~kl=43, RLHF crosses back below BoN -->
  <!-- RLHF at kl=43: interpolate ~0.688, BoN at kl=43: ~0.664 -->
  <!-- Approximate crossover ~kl=47: x=75+47/60*595=541.8, y~0.667 -->
  <!-- y_px=310-(0.667-0.45)/0.40*245=177.2 -->
  <circle cx="542" cy="177" r="6" fill="#c0392b" stroke="white" stroke-width="1.5"/>
  <line x1="542" y1="177" x2="580" y2="155" stroke="#c0392b" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="534" y="137" width="126" height="20" rx="3" fill="#fdecea" stroke="#c0392b" stroke-width="1"/>
  <text x="597" y="151" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#c0392b">Crossover: BoN safer</text>

  <!-- Overoptimization annotation -->
  <text x="618" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="10.5" font-style="italic" fill="#c0392b">Reward</text>
  <text x="618" y="243" text-anchor="middle" font-family="Arial, sans-serif" font-size="10.5" font-style="italic" fill="#c0392b">hacking</text>
  <path d="M 630 248 L 650 252 L 645 263" fill="none" stroke="#c0392b" stroke-width="1.5"/>

  <!-- Legend -->
  <rect x="80" y="68" width="170" height="52" rx="4" fill="white" stroke="#ddd" stroke-width="1" fill-opacity="0.9"/>
  <line x1="92" y1="87" x2="120" y2="87" stroke="#1f4fa3" stroke-width="2.5"/>
  <circle cx="106" cy="87" r="3.5" fill="#1f4fa3"/>
  <text x="127" y="91" font-family="Arial, sans-serif" font-size="11" fill="#1f4fa3">RLHF (PPO)</text>
  <line x1="92" y1="107" x2="120" y2="107" stroke="#0e8a6e" stroke-width="2.5" stroke-dasharray="8,4"/>
  <circle cx="106" cy="107" r="3.5" fill="#0e8a6e"/>
  <text x="127" y="111" font-family="Arial, sans-serif" font-size="11" fill="#0e8a6e">Best-of-N</text>

  <!-- BoN KL approximation note -->
  <rect x="76" y="260" width="205" height="42" rx="4" fill="white" stroke="#0e8a6e" stroke-width="1" fill-opacity="0.9"/>
  <text x="178" y="275" text-anchor="middle" font-family="Arial, sans-serif" font-size="10.5" fill="#0e8a6e">KL(BoN-N || SFT) &#8776; log N &#8722; (N&#8722;1)/N</text>
  <text x="178" y="291" text-anchor="middle" font-family="Arial, sans-serif" font-size="10.5" fill="#5b6675">N=16 &#8594; KL &#8776; 1.84 nats</text>
</svg>
