<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 300" width="820" height="300">
  <!-- Background -->
  <rect width="820" height="300" fill="#f8f9fa" rx="8"/>

  <!-- Title -->
  <text x="410" y="28" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#1f4fa3">Gradient Noise Scale: Critical Batch Size Tradeoff</text>

  <!-- ===== LEFT PANEL: Steps to convergence vs B ===== -->
  <rect x="30" y="44" width="370" height="226" fill="#ffffff" rx="6" stroke="#d0d7e3" stroke-width="1"/>
  <text x="215" y="65" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#1f4fa3">Training Steps to Convergence vs Batch Size</text>

  <!-- Axes -->
  <line x1="80" y1="240" x2="370" y2="240" stroke="#5b6675" stroke-width="1.5"/>
  <line x1="80" y1="240" x2="80" y2="80" stroke="#5b6675" stroke-width="1.5"/>

  <!-- Axis labels -->
  <text x="225" y="262" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5b6675">Batch Size B (log scale)</text>
  <text x="30" y="165" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5b6675" transform="rotate(-90 30 165)">Steps to Convergence (log)</text>

  <!-- Tick labels x -->
  <text x="120" y="254" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5b6675">B/4</text>
  <text x="175" y="254" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5b6675">B/2</text>
  <text x="230" y="254" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#c77a12" font-weight="bold">B_crit</text>
  <text x="285" y="254" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5b6675">2B</text>
  <text x="340" y="254" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5b6675">4B</text>

  <!-- Tick labels y -->
  <text x="74" y="100" text-anchor="end" font-family="sans-serif" font-size="10" fill="#5b6675">4S</text>
  <text x="74" y="133" text-anchor="end" font-family="sans-serif" font-size="10" fill="#5b6675">2S</text>
  <text x="74" y="166" text-anchor="end" font-family="sans-serif" font-size="10" fill="#5b6675">S</text>
  <text x="74" y="200" text-anchor="end" font-family="sans-serif" font-size="10" fill="#5b6675">S/2</text>

  <!-- Reference grid lines -->
  <line x1="80" y1="166" x2="370" y2="166" stroke="#e0e4ea" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="230" y1="80" x2="230" y2="240" stroke="#c77a12" stroke-width="1.5" stroke-dasharray="5,4"/>

  <!-- Curve: linear slope -1 below B_crit, flattening above -->
  <!-- Below B_crit: from (120,200) to (230,133) — slope -1 on log-log -->
  <!-- Above B_crit: from (230,133) to (340,113) — shallow slope -->
  <path d="M 88,215 L 120,200 L 175,166 L 230,133 Q 280,122 340,112" fill="none" stroke="#1f4fa3" stroke-width="2.5"/>

  <!-- Slope annotation below B_crit -->
  <text x="148" y="186" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#0e8a6e">slope = -1</text>
  <text x="148" y="197" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#0e8a6e">(linear speedup)</text>

  <!-- Annotation above B_crit -->
  <text x="300" y="122" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#c0392b">diminishing</text>
  <text x="300" y="133" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#c0392b">returns</text>

  <!-- B_crit label -->
  <text x="230" y="78" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#c77a12">B_crit</text>

  <!-- ===== RIGHT PANEL: Samples processed to convergence ===== -->
  <rect x="420" y="44" width="370" height="226" fill="#ffffff" rx="6" stroke="#d0d7e3" stroke-width="1"/>
  <text x="605" y="65" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#1f4fa3">Samples Processed to Convergence vs Batch Size</text>

  <!-- Axes -->
  <line x1="470" y1="240" x2="760" y2="240" stroke="#5b6675" stroke-width="1.5"/>
  <line x1="470" y1="240" x2="470" y2="80" stroke="#5b6675" stroke-width="1.5"/>

  <!-- Axis labels -->
  <text x="615" y="262" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5b6675">Batch Size B (log scale)</text>
  <text x="428" y="165" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5b6675" transform="rotate(-90 428 165)">Total Samples (log)</text>

  <!-- Tick labels x -->
  <text x="510" y="254" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5b6675">B/4</text>
  <text x="565" y="254" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5b6675">B/2</text>
  <text x="620" y="254" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#c77a12" font-weight="bold">B_crit</text>
  <text x="675" y="254" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5b6675">2B</text>
  <text x="730" y="254" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5b6675">4B</text>

  <!-- Reference grid line at flat region -->
  <line x1="470" y1="166" x2="760" y2="166" stroke="#e0e4ea" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="620" y1="80" x2="620" y2="240" stroke="#c77a12" stroke-width="1.5" stroke-dasharray="5,4"/>

  <!-- Curve: flat below B_crit, rising above (wasted compute) -->
  <!-- Below: flat at ~166; Above: rising -->
  <path d="M 478,166 L 510,166 L 565,166 L 620,166 Q 660,170 675,178 Q 710,195 730,212" fill="none" stroke="#6c4fe0" stroke-width="2.5"/>

  <!-- Annotation flat region -->
  <text x="545" y="155" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#0e8a6e">no wasted</text>
  <text x="545" y="166" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#0e8a6e">compute</text>

  <!-- Annotation rising region -->
  <text x="710" y="185" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#c0392b">wasted</text>
  <text x="710" y="196" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#c0392b">compute</text>

  <!-- B_crit label -->
  <text x="620" y="78" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#c77a12">B_crit</text>

  <!-- Footer note -->
  <text x="410" y="293" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5b6675">Left: doubling B halves steps (slope -1) below B_crit; flattens above. Right: compute is optimal at/below B_crit; wasteful above. (McCandlish et al. 2018)</text>
</svg>
