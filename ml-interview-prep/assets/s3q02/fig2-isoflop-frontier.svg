<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="640" height="420" viewBox="0 0 640 420">
  <!-- Background -->
  <rect width="640" height="420" fill="white"/>

  <!-- Title -->
  <text x="320" y="28" font-family="Arial, sans-serif" font-size="14" font-weight="bold"
        text-anchor="middle" fill="#111827">IsoFLOP Curves &#8212; Optimal N Grows with Compute</text>

  <!-- Chart area: left=70, top=50, right=580, bottom=360
       X axis: log10(N) in [8..10] -> pixel [70..580], scale = (580-70)/2 = 255 per decade
       Y axis: L in [2.0..5.0]     -> pixel [360..50],  scale = (360-50)/3 = 103.33 per unit -->

  <!-- Vertical grid lines at each decade tick -->
  <!-- log10=8  -> px=70 -->
  <!-- log10=9  -> px=325 -->
  <!-- log10=10 -> px=580 -->
  <line x1="70"  y1="50" x2="70"  y2="360" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="325" y1="50" x2="325" y2="360" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="580" y1="50" x2="580" y2="360" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Horizontal grid lines at L = 5.0, 4.0, 3.0, 2.0 -->
  <!-- L=5.0 -> py=50 -->
  <!-- L=4.0 -> py=50+(5.0-4.0)*103.33=50+103.3=153 -->
  <!-- L=3.0 -> py=50+(5.0-3.0)*103.33=50+206.7=257 -->
  <!-- L=2.0 -> py=50+(5.0-2.0)*103.33=50+310=360 -->
  <line x1="70" y1="50"  x2="580" y2="50"  stroke="#e5e7eb" stroke-width="1"/>
  <line x1="70" y1="153" x2="580" y2="153" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="70" y1="257" x2="580" y2="257" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="70" y1="360" x2="580" y2="360" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Axes -->
  <line x1="70" y1="360" x2="580" y2="360" stroke="#374151" stroke-width="2"/>
  <line x1="70" y1="50"  x2="70"  y2="360" stroke="#374151" stroke-width="2"/>

  <!-- X-axis ticks and labels -->
  <line x1="70"  y1="360" x2="70"  y2="368" stroke="#374151" stroke-width="1.5"/>
  <text x="70"  y="382" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#374151">10&#x2078;</text>

  <line x1="325" y1="360" x2="325" y2="368" stroke="#374151" stroke-width="1.5"/>
  <text x="325" y="382" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#374151">10&#x2079;</text>

  <line x1="580" y1="360" x2="580" y2="368" stroke="#374151" stroke-width="1.5"/>
  <text x="580" y="382" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#374151">10&#x00B9;&#x2070;</text>

  <!-- Y-axis ticks and labels -->
  <line x1="70" y1="50"  x2="62" y2="50"  stroke="#374151" stroke-width="1.5"/>
  <text x="57" y="54"  font-family="Arial, sans-serif" font-size="11" text-anchor="end" fill="#374151">5.0</text>

  <line x1="70" y1="153" x2="62" y2="153" stroke="#374151" stroke-width="1.5"/>
  <text x="57" y="157" font-family="Arial, sans-serif" font-size="11" text-anchor="end" fill="#374151">4.0</text>

  <line x1="70" y1="257" x2="62" y2="257" stroke="#374151" stroke-width="1.5"/>
  <text x="57" y="261" font-family="Arial, sans-serif" font-size="11" text-anchor="end" fill="#374151">3.0</text>

  <line x1="70" y1="360" x2="62" y2="360" stroke="#374151" stroke-width="1.5"/>
  <text x="57" y="364" font-family="Arial, sans-serif" font-size="11" text-anchor="end" fill="#374151">2.0</text>

  <!-- Axis labels -->
  <text x="325" y="405" font-family="Arial, sans-serif" font-size="13" font-weight="bold"
        text-anchor="middle" fill="#374151">Model Size N (parameters, log scale)</text>
  <text x="18" y="205" font-family="Arial, sans-serif" font-size="13" font-weight="bold"
        text-anchor="middle" fill="#374151" transform="rotate(-90,18,205)">Test Loss L</text>

  <!--
    IsoFLOP U-shaped curves.
    Each curve has a minimum at a different (N*, L*) and rises on both sides.

    Pixel mapping:
      px = 70 + (log10(N) - 8) * 255     [log10(N) in [8..10]]
      py = 50 + (5.0 - L) * 103.33       [L in [2.0..5.0]]

    Curve 1: C = 10^19 FLOPs (blue)
      Minimum at log10(N)=8.35, L=3.2
      min_px = 70 + 0.35*255 = 70+89 = 159
      min_py = 50 + (5.0-3.2)*103.33 = 50+186 = 236
      Left tail rises steeply, right tail rises gently.
      Points (log10N, L):
        8.0  -> L=4.8  px=70,  py=50+(0.2)*103.33=70
        8.15 -> L=3.7  px=70+0.15*255=108, py=50+1.3*103.33=184
        8.35 -> L=3.2  px=159, py=236   (minimum)
        8.55 -> L=3.35 px=70+0.55*255=210, py=50+1.65*103.33=221
        8.80 -> L=3.65 px=70+0.8*255=274,  py=50+1.35*103.33=190
        9.10 -> L=4.1  px=70+1.1*255=350,  py=50+0.9*103.33=143
        9.40 -> L=4.6  px=70+1.4*255=427,  py=50+0.4*103.33=91

    Curve 2: C = 10^21 FLOPs (green)
      Minimum at log10(N)=9.0, L=2.6
      min_px = 70 + 1.0*255 = 325
      min_py = 50 + (5.0-2.6)*103.33 = 50+248 = 298
      Points (log10N, L):
        8.2  -> L=4.5  px=70+0.2*255=121,  py=50+0.5*103.33=102
        8.5  -> L=3.4  px=70+0.5*255=198,  py=50+1.6*103.33=215
        8.75 -> L=2.9  px=70+0.75*255=261, py=50+2.1*103.33=267
        9.0  -> L=2.6  px=325, py=298   (minimum)
        9.25 -> L=2.75 px=70+1.25*255=389, py=50+2.25*103.33=283
        9.55 -> L=3.1  px=70+1.55*255=465, py=50+1.9*103.33=246
        9.80 -> L=3.6  px=70+1.8*255=529,  py=50+1.4*103.33=195
        10.05-> L=4.2  px=70+2.05*255=587, py=50+0.8*103.33=133

    Curve 3: C = 10^23 FLOPs (orange)
      Minimum at log10(N)=9.65, L=2.15
      min_px = 70 + 1.65*255 = 70+421 = 491
      min_py = 50 + (5.0-2.15)*103.33 = 50+294.5 = 345
      Points (log10N, L):
        8.7  -> L=4.7  px=70+0.7*255=249,  py=50+0.3*103.33=81
        9.0  -> L=3.5  px=325, py=50+1.5*103.33=205
        9.3  -> L=2.8  px=70+1.3*255=402,  py=50+2.2*103.33=277
        9.65 -> L=2.15 px=491, py=345   (minimum)
        9.85 -> L=2.3  px=70+1.85*255=541, py=50+2.7*103.33=329
        10.0 -> L=2.55 px=580, py=50+2.45*103.33=303
  -->

  <!-- Curve 1: C = 10^19 FLOPs (blue) -->
  <polyline
    points="70,70 108,184 159,236 210,221 274,190 350,143 427,91"
    fill="none" stroke="#2563eb" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- Curve 2: C = 10^21 FLOPs (green) -->
  <polyline
    points="121,102 198,215 261,267 325,298 389,283 465,246 529,195 587,133"
    fill="none" stroke="#16a34a" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- Curve 3: C = 10^23 FLOPs (orange) -->
  <polyline
    points="249,81 325,205 402,277 491,345 541,329 580,303"
    fill="none" stroke="#ea580c" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- Minimum markers (filled circles) -->
  <!-- C=10^19 min at (159, 236) -->
  <circle cx="159" cy="236" r="5" fill="#2563eb" stroke="white" stroke-width="1.5"/>
  <!-- C=10^21 min at (325, 298) -->
  <circle cx="325" cy="298" r="5" fill="#16a34a" stroke="white" stroke-width="1.5"/>
  <!-- C=10^23 min at (491, 345) -->
  <circle cx="491" cy="345" r="5" fill="#ea580c" stroke="white" stroke-width="1.5"/>

  <!-- Dashed frontier line connecting minima -->
  <polyline
    points="159,236 325,298 491,345"
    fill="none" stroke="#111827" stroke-width="2"
    stroke-dasharray="6,4" stroke-linejoin="round"/>

  <!-- Frontier label -->
  <text x="310" y="330" font-family="Arial, sans-serif" font-size="11" font-style="italic"
        fill="#111827" transform="rotate(10,310,330)">Optimal N*(C)</text>

  <!-- Legend box (upper right) -->
  <rect x="390" y="54" width="182" height="96" rx="4" ry="4"
        fill="white" stroke="#d1d5db" stroke-width="1"/>

  <!-- Legend: C=10^19 -->
  <line x1="400" y1="72" x2="425" y2="72" stroke="#2563eb" stroke-width="2.5"/>
  <text x="431" y="76" font-family="Arial, sans-serif" font-size="11" fill="#111827">C = 10&#x00B9;&#x2079; FLOPs</text>

  <!-- Legend: C=10^21 -->
  <line x1="400" y1="94" x2="425" y2="94" stroke="#16a34a" stroke-width="2.5"/>
  <text x="431" y="98" font-family="Arial, sans-serif" font-size="11" fill="#111827">C = 10&#x00B2;&#x00B9; FLOPs</text>

  <!-- Legend: C=10^23 -->
  <line x1="400" y1="116" x2="425" y2="116" stroke="#ea580c" stroke-width="2.5"/>
  <text x="431" y="120" font-family="Arial, sans-serif" font-size="11" fill="#111827">C = 10&#x00B2;&#x00B3; FLOPs</text>

  <!-- Legend: frontier -->
  <line x1="400" y1="136" x2="425" y2="136" stroke="#111827" stroke-width="2"
        stroke-dasharray="5,3"/>
  <text x="431" y="140" font-family="Arial, sans-serif" font-size="11" fill="#111827">Optimal N*(C)</text>

</svg>
