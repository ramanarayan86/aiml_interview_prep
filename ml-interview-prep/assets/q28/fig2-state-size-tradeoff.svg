<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380" width="900" height="380">

  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#5b6675"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="380" fill="#f8f9fa" rx="8"/>

  <!-- Title -->
  <text x="450" y="26" font-family="Arial, sans-serif" font-size="15" font-weight="bold"
        fill="#1f4fa3" text-anchor="middle">State Size Bottleneck in SSMs</text>

  <!-- ═══════════════════════════════════════════════
       LEFT PANEL: Line chart  x=60..460, y=48..310
       X: M = 1..32  (cols 1,4,8,12,16,20,24,28,32)
       Y: d_state = 0..36
       Plot origin: px=90, py=310
       Plot width: 360, height: 262
       x-scale: 360/31 ≈ 11.61 per unit
       y-scale: 262/36 ≈ 7.28 per unit
  ═══════════════════════════════════════════════ -->

  <!-- Panel background -->
  <rect x="60" y="42" width="410" height="300" rx="6" fill="white" stroke="#d0d7de" stroke-width="1.2"/>
  <text x="265" y="60" font-family="Arial, sans-serif" font-size="11" font-weight="bold"
        fill="#5b6675" text-anchor="middle">State size requirement vs. key-value pairs M</text>

  <!-- Plot area clipping reference: px=90, py=310, W=360, H=262 -->

  <!-- Fail zone: region where SSM state < M  (triangle below the line y=M) -->
  <!-- The "fail" zone is under the lower-bound line = triangle from (M=1,d=1) upward
       Visually shade the strip between d=0 and d=M for M in 1..32
       We draw this as a filled polygon following the lower-bound line then bottom of chart -->
  <!-- Lower bound line points (M,d_state=M):
       M=1  → x=90+0*11.61=90,    y=310-1*7.28=302.72
       M=32 → x=90+31*11.61=450,  y=310-32*7.28=79.04
       Polygon: (90,310),(450,310),(450,79),(90,303)   -->
  <polygon points="90,310 450,310 450,79 90,303"
           fill="#ffe0df" opacity="0.55"/>

  <!-- Fail zone label -->
  <text x="340" y="248" font-family="Arial, sans-serif" font-size="10" font-weight="bold"
        fill="#c0392b" text-anchor="middle" transform="rotate(-35,340,248)">Fails associative recall</text>

  <!-- Axes -->
  <line x1="90" y1="42" x2="90" y2="315" stroke="#5b6675" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="85" y1="310" x2="455" y2="310" stroke="#5b6675" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- X-axis ticks and labels: M = 1,4,8,12,16,20,24,28,32 -->
  <!-- x(M) = 90 + (M-1)*360/31 -->
  <!-- M=1  → 90 -->
  <line x1="90"  y1="310" x2="90"  y2="315" stroke="#5b6675" stroke-width="1.2"/>
  <text x="90"  y="326" font-family="Arial, sans-serif" font-size="9" fill="#5b6675" text-anchor="middle">1</text>
  <!-- M=4  → 90+3*11.61=124.8 -->
  <line x1="125" y1="310" x2="125" y2="315" stroke="#5b6675" stroke-width="1.2"/>
  <text x="125" y="326" font-family="Arial, sans-serif" font-size="9" fill="#5b6675" text-anchor="middle">4</text>
  <!-- M=8  → 90+7*11.61=171.3 -->
  <line x1="171" y1="310" x2="171" y2="315" stroke="#5b6675" stroke-width="1.2"/>
  <text x="171" y="326" font-family="Arial, sans-serif" font-size="9" fill="#5b6675" text-anchor="middle">8</text>
  <!-- M=12 → 90+11*11.61=217.7 -->
  <line x1="218" y1="310" x2="218" y2="315" stroke="#5b6675" stroke-width="1.2"/>
  <text x="218" y="326" font-family="Arial, sans-serif" font-size="9" fill="#5b6675" text-anchor="middle">12</text>
  <!-- M=16 → 90+15*11.61=264.2 -->
  <line x1="264" y1="310" x2="264" y2="315" stroke="#5b6675" stroke-width="1.2"/>
  <text x="264" y="326" font-family="Arial, sans-serif" font-size="9" fill="#5b6675" text-anchor="middle">16</text>
  <!-- M=20 → 90+19*11.61=310.6 -->
  <line x1="311" y1="310" x2="311" y2="315" stroke="#5b6675" stroke-width="1.2"/>
  <text x="311" y="326" font-family="Arial, sans-serif" font-size="9" fill="#5b6675" text-anchor="middle">20</text>
  <!-- M=24 → 90+23*11.61=357.0 -->
  <line x1="357" y1="310" x2="357" y2="315" stroke="#5b6675" stroke-width="1.2"/>
  <text x="357" y="326" font-family="Arial, sans-serif" font-size="9" fill="#5b6675" text-anchor="middle">24</text>
  <!-- M=28 → 90+27*11.61=403.5 -->
  <line x1="404" y1="310" x2="404" y2="315" stroke="#5b6675" stroke-width="1.2"/>
  <text x="404" y="326" font-family="Arial, sans-serif" font-size="9" fill="#5b6675" text-anchor="middle">28</text>
  <!-- M=32 → 90+31*11.61=450.0 -->
  <line x1="450" y1="310" x2="450" y2="315" stroke="#5b6675" stroke-width="1.2"/>
  <text x="450" y="326" font-family="Arial, sans-serif" font-size="9" fill="#5b6675" text-anchor="middle">32</text>

  <!-- Y-axis ticks and labels: 0,8,16,24,32 -->
  <!-- y(d) = 310 - d*7.28 -->
  <!-- d=0  → 310 -->
  <line x1="85"  y1="310" x2="90"  y2="310" stroke="#5b6675" stroke-width="1.2"/>
  <text x="80"  y="313" font-family="Arial, sans-serif" font-size="9" fill="#5b6675" text-anchor="end">0</text>
  <!-- d=8  → 310-58.2=251.8 -->
  <line x1="85"  y1="252" x2="90"  y2="252" stroke="#5b6675" stroke-width="1.2"/>
  <text x="80"  y="255" font-family="Arial, sans-serif" font-size="9" fill="#5b6675" text-anchor="end">8</text>
  <!-- d=16 → 310-116.4=193.6 -->
  <line x1="85"  y1="194" x2="90"  y2="194" stroke="#5b6675" stroke-width="1.2"/>
  <text x="80"  y="197" font-family="Arial, sans-serif" font-size="9" fill="#5b6675" text-anchor="end">16</text>
  <!-- d=24 → 310-174.7=135.3 -->
  <line x1="85"  y1="135" x2="90"  y2="135" stroke="#5b6675" stroke-width="1.2"/>
  <text x="80"  y="138" font-family="Arial, sans-serif" font-size="9" fill="#5b6675" text-anchor="end">24</text>
  <!-- d=32 → 310-232.9=77.1 -->
  <line x1="85"  y1="77"  x2="90"  y2="77"  stroke="#5b6675" stroke-width="1.2"/>
  <text x="80"  y="80"  font-family="Arial, sans-serif" font-size="9" fill="#5b6675" text-anchor="end">32</text>

  <!-- Axis labels -->
  <text x="270" y="345" font-family="Arial, sans-serif" font-size="11" font-weight="bold"
        fill="#5b6675" text-anchor="middle">Number of distinct key-value pairs M</text>
  <text x="54" y="181" font-family="Arial, sans-serif" font-size="11" font-weight="bold"
        fill="#5b6675" text-anchor="middle" transform="rotate(-90, 54, 181)">Required d_state</text>

  <!-- Gridlines (light) -->
  <line x1="90" y1="252" x2="450" y2="252" stroke="#e0e4e8" stroke-width="1"/>
  <line x1="90" y1="194" x2="450" y2="194" stroke="#e0e4e8" stroke-width="1"/>
  <line x1="90" y1="135" x2="450" y2="135" stroke="#e0e4e8" stroke-width="1"/>
  <line x1="90" y1="77"  x2="450" y2="77"  stroke="#e0e4e8" stroke-width="1"/>

  <!-- LINE 1: Lower bound d_state >= M  (red, diagonal)
       Points: (M=1,d=1) and (M=32,d=32)
       x(1)=90, y(1)=310-7.28=302.7
       x(32)=450, y(32)=310-232.96=77.04  -->
  <line x1="90" y1="303" x2="450" y2="77"
        stroke="#c0392b" stroke-width="2.2"/>
  <!-- Label for red line -->
  <text x="395" y="97" font-family="Arial, sans-serif" font-size="10" font-weight="bold"
        fill="#c0392b" transform="rotate(-33,395,97)">Lower bound: d_state ≥ M</text>

  <!-- LINE 2: Transformer — horizontal conceptual line at d_state=0
       Draw as a thick dashed blue line at y=310 (d=0 conceptually, i.e., no recurrent state) -->
  <line x1="90" y1="310" x2="450" y2="310"
        stroke="#1f4fa3" stroke-width="2.5" stroke-dasharray="8,4"/>
  <!-- Label slightly above the bottom axis -->
  <text x="270" y="295" font-family="Arial, sans-serif" font-size="9.5" font-weight="bold"
        fill="#1f4fa3" text-anchor="middle">Transformer — O(1) state, O(N²) attention memory</text>

  <!-- M=16 vertical annotation -->
  <!-- x(16) = 90+15*11.61 = 264.15 -->
  <line x1="264" y1="194" x2="264" y2="310" stroke="#c0392b" stroke-width="1.2" stroke-dasharray="4,3" opacity="0.8"/>
  <!-- dot at lower-bound crossing: y(d=16) = 194 -->
  <circle cx="264" cy="194" r="4" fill="#c0392b"/>
  <!-- annotation box -->
  <rect x="118" y="156" width="230" height="34" rx="5" fill="#fff3f3" stroke="#c0392b" stroke-width="1.2"/>
  <text x="233" y="171" font-family="Arial, sans-serif" font-size="9.5" font-weight="bold"
        fill="#c0392b" text-anchor="middle">Typical d_state = 16 in Mamba</text>
  <text x="233" y="184" font-family="Arial, sans-serif" font-size="9" fill="#8a0000"
        text-anchor="middle">→ recall fails for M &gt; 16 pairs</text>
  <!-- callout line from box to dot -->
  <line x1="264" y1="191" x2="264" y2="190" stroke="#c0392b" stroke-width="1.2"/>

  <!-- ═══════════════════════════════════════════════
       RIGHT PANEL: Bar chart  x=490..870, y=48..310
       Tasks (4): LM perplexity, Needle-in-haystack, Associative recall, Time series
       Pairs of bars: Transformer (blue) Mamba (orange)
       Y: 0..100 (relative score, higher=better)
  ═══════════════════════════════════════════════ -->

  <rect x="480" y="42" width="400" height="300" rx="6" fill="white" stroke="#d0d7de" stroke-width="1.2"/>
  <text x="680" y="60" font-family="Arial, sans-serif" font-size="11" font-weight="bold"
        fill="#5b6675" text-anchor="middle">Relative task performance (higher = better)</text>

  <!-- Plot origin: px2=510, py2=310, H=230, W=340 -->
  <!-- Y-scale: 230/100 = 2.3 per unit -->

  <!-- Axis lines -->
  <line x1="510" y1="65" x2="510" y2="315" stroke="#5b6675" stroke-width="1.5"/>
  <line x1="505" y1="310" x2="855" y2="310" stroke="#5b6675" stroke-width="1.5"/>

  <!-- Y-ticks: 0,25,50,75,100 → y=310,253,197,142,87 (step=57.5=230/4) -->
  <line x1="505" y1="310" x2="510" y2="310" stroke="#5b6675" stroke-width="1.2"/>
  <text x="500" y="313" font-family="Arial, sans-serif" font-size="9" fill="#5b6675" text-anchor="end">0</text>
  <line x1="505" y1="252" x2="510" y2="252" stroke="#5b6675" stroke-width="1.2"/>
  <text x="500" y="255" font-family="Arial, sans-serif" font-size="9" fill="#5b6675" text-anchor="end">25</text>
  <line x1="505" y1="195" x2="510" y2="195" stroke="#5b6675" stroke-width="1.2"/>
  <text x="500" y="198" font-family="Arial, sans-serif" font-size="9" fill="#5b6675" text-anchor="end">50</text>
  <line x1="505" y1="137" x2="510" y2="137" stroke="#5b6675" stroke-width="1.2"/>
  <text x="500" y="140" font-family="Arial, sans-serif" font-size="9" fill="#5b6675" text-anchor="end">75</text>
  <line x1="505" y1="80" x2="510" y2="80" stroke="#5b6675" stroke-width="1.2"/>
  <text x="500" y="83"  font-family="Arial, sans-serif" font-size="9" fill="#5b6675" text-anchor="end">100</text>

  <!-- Gridlines -->
  <line x1="510" y1="252" x2="850" y2="252" stroke="#e0e4e8" stroke-width="1"/>
  <line x1="510" y1="195" x2="850" y2="195" stroke="#e0e4e8" stroke-width="1"/>
  <line x1="510" y1="137" x2="850" y2="137" stroke="#e0e4e8" stroke-width="1"/>
  <line x1="510" y1="80"  x2="850" y2="80"  stroke="#e0e4e8" stroke-width="1"/>

  <!-- Bar groups. Group width ≈ 84px, bar width=26, gap=6, between groups=8
       Groups centered at x=548, 632, 716, 800 (step=84)
       Bar heights (value*2.3):
         LM perplexity:      Transformer=80 → h=184, y=126;  Mamba=88 → h=202, y=108
         Needle-haystack:    Transformer=92 → h=212, y=98;   Mamba=28 → h=64,  y=246
         Associative recall: Transformer=90 → h=207, y=103;  Mamba=22 → h=51,  y=259
         Time series:        Transformer=68 → h=156, y=154;  Mamba=85 → h=196, y=114
  -->

  <!-- Group 1: LM Perplexity -->
  <!-- Transformer bar: x=522, w=26, h=184, y=126 -->
  <rect x="522" y="126" width="26" height="184" rx="3" fill="#1f4fa3"/>
  <!-- Mamba bar: x=554, w=26, h=202, y=108 -->
  <rect x="554" y="108" width="26" height="202" rx="3" fill="#e87c2a"/>
  <!-- value labels -->
  <text x="535" y="121" font-family="Arial, sans-serif" font-size="9" fill="#1f4fa3" text-anchor="middle">80</text>
  <text x="567" y="103" font-family="Arial, sans-serif" font-size="9" fill="#e87c2a" text-anchor="middle">88</text>
  <!-- group label -->
  <text x="548" y="335" font-family="Arial, sans-serif" font-size="8.5" fill="#5b6675"
        text-anchor="middle">Language</text>
  <text x="548" y="346" font-family="Arial, sans-serif" font-size="8.5" fill="#5b6675"
        text-anchor="middle">modeling</text>
  <!-- winner badge -->
  <rect x="527" y="97" width="40" height="12" rx="3" fill="#e87c2a" opacity="0.15"/>
  <text x="547" y="107" font-family="Arial, sans-serif" font-size="8" fill="#e87c2a"
        text-anchor="middle" font-weight="bold">Mamba +</text>

  <!-- Group 2: Needle-in-haystack -->
  <!-- Transformer bar: x=606, w=26, h=212, y=98 -->
  <rect x="606" y="98" width="26" height="212" rx="3" fill="#1f4fa3"/>
  <!-- Mamba bar: x=638, w=26, h=64, y=246 -->
  <rect x="638" y="246" width="26" height="64" rx="3" fill="#e87c2a"/>
  <!-- value labels -->
  <text x="619" y="93"  font-family="Arial, sans-serif" font-size="9" fill="#1f4fa3" text-anchor="middle">92</text>
  <text x="651" y="241" font-family="Arial, sans-serif" font-size="9" fill="#e87c2a" text-anchor="middle">28</text>
  <!-- group label -->
  <text x="632" y="335" font-family="Arial, sans-serif" font-size="8.5" fill="#5b6675"
        text-anchor="middle">Needle-in-</text>
  <text x="632" y="346" font-family="Arial, sans-serif" font-size="8.5" fill="#5b6675"
        text-anchor="middle">haystack</text>
  <!-- winner badge -->
  <rect x="611" y="84" width="44" height="12" rx="3" fill="#1f4fa3" opacity="0.15"/>
  <text x="633" y="94" font-family="Arial, sans-serif" font-size="8" fill="#1f4fa3"
        text-anchor="middle" font-weight="bold">Transformer +</text>

  <!-- Group 3: Associative recall -->
  <!-- Transformer bar: x=690, w=26, h=207, y=103 -->
  <rect x="690" y="103" width="26" height="207" rx="3" fill="#1f4fa3"/>
  <!-- Mamba bar: x=722, w=26, h=51, y=259 -->
  <rect x="722" y="259" width="26" height="51" rx="3" fill="#e87c2a"/>
  <!-- value labels -->
  <text x="703" y="98"  font-family="Arial, sans-serif" font-size="9" fill="#1f4fa3" text-anchor="middle">90</text>
  <text x="735" y="254" font-family="Arial, sans-serif" font-size="9" fill="#e87c2a" text-anchor="middle">22</text>
  <!-- group label -->
  <text x="716" y="335" font-family="Arial, sans-serif" font-size="8.5" fill="#5b6675"
        text-anchor="middle">Associative</text>
  <text x="716" y="346" font-family="Arial, sans-serif" font-size="8.5" fill="#5b6675"
        text-anchor="middle">recall</text>
  <!-- winner badge -->
  <rect x="695" y="89" width="44" height="12" rx="3" fill="#1f4fa3" opacity="0.15"/>
  <text x="717" y="99" font-family="Arial, sans-serif" font-size="8" fill="#1f4fa3"
        text-anchor="middle" font-weight="bold">Transformer +</text>

  <!-- Group 4: Time series -->
  <!-- Transformer bar: x=774, w=26, h=156, y=154 -->
  <rect x="774" y="154" width="26" height="156" rx="3" fill="#1f4fa3"/>
  <!-- Mamba bar: x=806, w=26, h=196, y=114 -->
  <rect x="806" y="114" width="26" height="196" rx="3" fill="#e87c2a"/>
  <!-- value labels -->
  <text x="787" y="149" font-family="Arial, sans-serif" font-size="9" fill="#1f4fa3" text-anchor="middle">68</text>
  <text x="819" y="109" font-family="Arial, sans-serif" font-size="9" fill="#e87c2a" text-anchor="middle">85</text>
  <!-- group label -->
  <text x="800" y="335" font-family="Arial, sans-serif" font-size="8.5" fill="#5b6675"
        text-anchor="middle">Time series</text>
  <text x="800" y="346" font-family="Arial, sans-serif" font-size="8.5" fill="#5b6675"
        text-anchor="middle">forecasting</text>
  <!-- winner badge -->
  <rect x="779" y="100" width="40" height="12" rx="3" fill="#e87c2a" opacity="0.15"/>
  <text x="799" y="110" font-family="Arial, sans-serif" font-size="8" fill="#e87c2a"
        text-anchor="middle" font-weight="bold">Mamba +</text>

  <!-- Y-axis label -->
  <text x="493" y="195" font-family="Arial, sans-serif" font-size="10" font-weight="bold"
        fill="#5b6675" text-anchor="middle" transform="rotate(-90, 493, 195)">Score (higher = better)</text>

  <!-- Legend -->
  <rect x="620" y="66" width="14" height="10" rx="2" fill="#1f4fa3"/>
  <text x="638" y="75" font-family="Arial, sans-serif" font-size="9.5" fill="#1f4fa3">Transformer</text>
  <rect x="710" y="66" width="14" height="10" rx="2" fill="#e87c2a"/>
  <text x="728" y="75" font-family="Arial, sans-serif" font-size="9.5" fill="#e87c2a">Mamba</text>

  <!-- ── Bottom note bar ── -->
  <rect x="60" y="360" width="820" height="16" rx="3" fill="#1f4fa3" opacity="0.12"/>
  <text x="450" y="372" font-family="Arial, sans-serif" font-size="9.5" fill="#1f4fa3"
        text-anchor="middle">Mamba (d_state=16) matches or beats Transformers on smooth/generative tasks but collapses on sparse associative retrieval requiring exact key lookup</text>

</svg>
