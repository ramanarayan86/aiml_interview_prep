<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" width="900" height="480" font-family="Arial, sans-serif">
  <defs>
    <marker id="arr-gray" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#5b6675"/>
    </marker>
    <marker id="arr-navy" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1f4fa3"/>
    </marker>
    <marker id="arr-teal" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0e8a6e"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="480" fill="#f8f9fa" rx="10"/>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#1f4fa3">Instruction Tuning vs. Chat Tuning — Data Formats</text>

  <!-- Divider -->
  <line x1="450" y1="48" x2="450" y2="440" stroke="#d0d7e3" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- ===== LEFT PANEL: Instruction Tuning ===== -->
  <!-- Panel header -->
  <rect x="20" y="48" width="410" height="36" fill="#1f4fa3" rx="6"/>
  <text x="225" y="71" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">Instruction Tuning</text>

  <!-- Single-turn label -->
  <text x="225" y="105" text-anchor="middle" font-size="11" fill="#5b6675">Single-turn format — (instruction, response) pairs</text>

  <!-- FLAN template box -->
  <rect x="30" y="115" width="390" height="60" fill="#d6e4fa" stroke="#1f4fa3" stroke-width="1.5" rx="5"/>
  <text x="42" y="133" font-size="10" fill="#1f4fa3" font-weight="bold">FLAN template</text>
  <text x="42" y="151" font-size="10" fill="#2c3e50" font-family="monospace">Translate the following to French:</text>
  <text x="42" y="165" font-size="10" fill="#2c3e50" font-family="monospace">"{text}"&#10;</text>

  <!-- Arrow down -->
  <line x1="225" y1="178" x2="225" y2="196" stroke="#5b6675" stroke-width="1.5" marker-end="url(#arr-gray)"/>

  <!-- Alpaca template box -->
  <rect x="30" y="198" width="390" height="72" fill="#d6e4fa" stroke="#1f4fa3" stroke-width="1.5" rx="5"/>
  <text x="42" y="216" font-size="10" fill="#1f4fa3" font-weight="bold">Alpaca format</text>
  <text x="42" y="233" font-size="10" fill="#2c3e50" font-family="monospace">### Instruction:</text>
  <text x="42" y="247" font-size="10" fill="#2c3e50" font-family="monospace">Summarize this article in 3 bullet points.</text>
  <text x="42" y="261" font-size="10" fill="#2c3e50" font-family="monospace">### Response:</text>

  <!-- Arrow down -->
  <line x1="225" y1="273" x2="225" y2="291" stroke="#5b6675" stroke-width="1.5" marker-end="url(#arr-gray)"/>

  <!-- Key annotations -->
  <rect x="30" y="293" width="390" height="56" fill="#eaf7f3" stroke="#0e8a6e" stroke-width="1.5" rx="5"/>
  <text x="225" y="313" text-anchor="middle" font-size="11" font-weight="bold" fill="#0e8a6e">Loss mask: response tokens only</text>
  <text x="42" y="331" font-size="10" fill="#5b6675">&#8226; No system prompt needed</text>
  <text x="42" y="345" font-size="10" fill="#5b6675">&#8226; Each example is self-contained</text>

  <!-- Goal box -->
  <rect x="30" y="360" width="390" height="60" fill="#fff8e6" stroke="#c77a12" stroke-width="1.5" rx="5"/>
  <text x="225" y="380" text-anchor="middle" font-size="11" font-weight="bold" fill="#c77a12">Goal: Task generalization</text>
  <text x="42" y="397" font-size="10" fill="#5b6675">Train on diverse tasks &#8594; generalize to unseen tasks</text>
  <text x="42" y="411" font-size="10" fill="#5b6675">Examples: FLAN, T0, Super-Natural Instructions</text>

  <!-- ===== RIGHT PANEL: Chat Tuning ===== -->
  <!-- Panel header -->
  <rect x="470" y="48" width="410" height="36" fill="#6c4fe0" rx="6"/>
  <text x="675" y="71" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">Chat Tuning</text>

  <!-- Multi-turn label -->
  <text x="675" y="105" text-anchor="middle" font-size="11" fill="#5b6675">Multi-turn format — conversation history</text>

  <!-- ChatML format box -->
  <rect x="480" y="115" width="390" height="150" fill="#ede8fc" stroke="#6c4fe0" stroke-width="1.5" rx="5"/>
  <text x="492" y="133" font-size="10" fill="#6c4fe0" font-weight="bold">ChatML / Llama-3 format</text>
  <text x="492" y="151" font-size="10" fill="#2c3e50" font-family="monospace">&lt;|im_start|&gt;system</text>
  <text x="492" y="165" font-size="10" fill="#0e8a6e" font-family="monospace">  You are a helpful assistant.&lt;|im_end|&gt;</text>
  <text x="492" y="182" font-size="10" fill="#2c3e50" font-family="monospace">&lt;|im_start|&gt;user</text>
  <text x="492" y="196" font-size="10" fill="#1f4fa3" font-family="monospace">  Hello! What is the capital of France?&lt;|im_end|&gt;</text>
  <text x="492" y="213" font-size="10" fill="#2c3e50" font-family="monospace">&lt;|im_start|&gt;assistant</text>
  <text x="492" y="227" font-size="10" fill="#c0392b" font-family="monospace">  The capital of France is Paris.&lt;|im_end|&gt;</text>
  <text x="492" y="244" font-size="10" fill="#2c3e50" font-family="monospace">&lt;|im_start|&gt;user</text>
  <text x="492" y="258" font-size="10" fill="#1f4fa3" font-family="monospace">  Can you name three more capitals?&lt;|im_end|&gt;</text>

  <!-- Loss mask annotation with colored roles -->
  <rect x="480" y="273" width="390" height="72" fill="#eaf7f3" stroke="#0e8a6e" stroke-width="1.5" rx="5"/>
  <text x="675" y="293" text-anchor="middle" font-size="11" font-weight="bold" fill="#0e8a6e">Loss mask: assistant turns only</text>
  <rect x="492" y="303" width="12" height="10" fill="#0e8a6e" rx="2"/>
  <text x="510" y="313" font-size="10" fill="#5b6675">system = no loss</text>
  <rect x="492" y="319" width="12" height="10" fill="#1f4fa3" rx="2"/>
  <text x="510" y="329" font-size="10" fill="#5b6675">user = no loss</text>
  <rect x="640" y="303" width="12" height="10" fill="#c0392b" rx="2"/>
  <text x="658" y="313" font-size="10" fill="#5b6675">assistant = loss computed</text>
  <text x="492" y="340" font-size="10" fill="#5b6675">History in context; model tracks conversation state</text>

  <!-- Goal box -->
  <rect x="480" y="360" width="390" height="60" fill="#fff8e6" stroke="#c77a12" stroke-width="1.5" rx="5"/>
  <text x="675" y="380" text-anchor="middle" font-size="11" font-weight="bold" fill="#c77a12">Goal: Conversational AI assistant</text>
  <text x="492" y="397" font-size="10" fill="#5b6675">Handle multi-turn context + persona constraints</text>
  <text x="492" y="411" font-size="10" fill="#5b6675">Examples: ShareGPT, OpenAssistant, WizardLM</text>

  <!-- Bottom caption -->
  <text x="450" y="460" text-anchor="middle" font-size="10" fill="#5b6675">Chat tuning extends instruction tuning by adding system prompts, conversation history, and multi-turn coherence requirements.</text>
</svg>
