<svg xmlns="http://www.w3.org/2000/svg" width="820" height="320" font-family="Arial, sans-serif">
  <rect width="820" height="320" fill="#f8f9fa" rx="8"/>
  <text x="410" y="26" text-anchor="middle" font-size="15" font-weight="bold" fill="#1f4fa3">LayerNorm vs RMSNorm: Scale and Shift Invariance</text>
  <text x="410" y="44" text-anchor="middle" font-size="12" fill="#5b6675">Input vector x = [1, 3, −1, 5]</text>

  <!-- Column headers -->
  <text x="100" y="68" text-anchor="middle" font-size="12" font-weight="bold" fill="#5b6675">Operation</text>
  <text x="280" y="68" text-anchor="middle" font-size="12" font-weight="bold" fill="#5b6675">Input</text>
  <text x="460" y="68" text-anchor="middle" font-size="12" font-weight="bold" fill="#5b6675">Transformed</text>
  <text x="620" y="68" text-anchor="middle" font-size="12" font-weight="bold" fill="#1f4fa3">LayerNorm output</text>
  <text x="760" y="68" text-anchor="middle" font-size="12" font-weight="bold" fill="#0e8a6e">RMSNorm output</text>

  <!-- Divider line -->
  <line x1="20" y1="74" x2="800" y2="74" stroke="#ccc" stroke-width="1.5"/>

  <!-- ====== ROW 1: Shift invariance x → x+2 ====== -->
  <rect x="20" y="82" width="800" height="90" rx="4" fill="white" stroke="#eee"/>

  <text x="100" y="104" text-anchor="middle" font-size="12" fill="#333" font-weight="bold">Shift: x + 2</text>
  <text x="100" y="120" text-anchor="middle" font-size="11" fill="#5b6675">add constant 2</text>
  <text x="100" y="136" text-anchor="middle" font-size="11" fill="#5b6675">to all elements</text>
  <text x="100" y="155" text-anchor="middle" font-size="10" fill="#5b6675">μ changes, σ same</text>

  <!-- Input vector -->
  <rect x="190" y="90" width="180" height="32" rx="4" fill="#e8eaf6" stroke="#5b6675"/>
  <text x="280" y="112" text-anchor="middle" font-size="12" fill="#333">[1, 3, −1, 5]</text>
  <text x="280" y="137" text-anchor="middle" font-size="10" fill="#5b6675">μ=2, σ=2.24</text>
  <text x="380" y="107" font-size="16" fill="#5b6675" font-weight="bold">→</text>
  <text x="390" y="124" text-anchor="start" font-size="11" fill="#5b6675">x+2</text>

  <!-- Transformed vector -->
  <rect x="370" y="90" width="180" height="32" rx="4" fill="#e8eaf6" stroke="#5b6675"/>
  <text x="460" y="112" text-anchor="middle" font-size="12" fill="#333">[3, 5, 1, 7]</text>
  <text x="460" y="137" text-anchor="middle" font-size="10" fill="#5b6675">μ=4, σ=2.24</text>

  <!-- LayerNorm: SAME (shift invariant) -->
  <rect x="555" y="86" width="140" height="44" rx="6" fill="#d6f5ec" stroke="#0e8a6e" stroke-width="2"/>
  <text x="625" y="108" text-anchor="middle" font-size="13" fill="#0e8a6e" font-weight="bold">SAME ✓</text>
  <text x="625" y="124" text-anchor="middle" font-size="10" fill="#0e8a6e">shift invariant</text>
  <text x="625" y="153" text-anchor="middle" font-size="10" fill="#5b6675">LN subtracts μ → shift cancels</text>
  <text x="625" y="164" text-anchor="middle" font-size="10" fill="#5b6675">LN(x) = LN(x+c) for any c</text>

  <!-- RMSNorm: DIFFERENT (not shift invariant) -->
  <rect x="700" y="86" width="120" height="44" rx="6" fill="#fde8e8" stroke="#e05252" stroke-width="2"/>
  <text x="760" y="108" text-anchor="middle" font-size="13" fill="#e05252" font-weight="bold">DIFFERENT ✗</text>
  <text x="760" y="124" text-anchor="middle" font-size="10" fill="#e05252">not shift invariant</text>
  <text x="760" y="153" text-anchor="middle" font-size="10" fill="#5b6675">RMS ignores mean →</text>
  <text x="760" y="164" text-anchor="middle" font-size="10" fill="#5b6675">shift changes output</text>

  <!-- ====== ROW 2: Scale invariance x → 3x ====== -->
  <rect x="20" y="180" width="800" height="90" rx="4" fill="white" stroke="#eee"/>

  <text x="100" y="202" text-anchor="middle" font-size="12" fill="#333" font-weight="bold">Scale: x × 3</text>
  <text x="100" y="218" text-anchor="middle" font-size="11" fill="#5b6675">multiply all</text>
  <text x="100" y="234" text-anchor="middle" font-size="11" fill="#5b6675">elements by 3</text>
  <text x="100" y="253" text-anchor="middle" font-size="10" fill="#5b6675">μ×3, σ×3 (both scale)</text>

  <!-- Input vector -->
  <rect x="190" y="188" width="180" height="32" rx="4" fill="#e8eaf6" stroke="#5b6675"/>
  <text x="280" y="210" text-anchor="middle" font-size="12" fill="#333">[1, 3, −1, 5]</text>
  <text x="280" y="235" text-anchor="middle" font-size="10" fill="#5b6675">μ=2, σ=2.24</text>
  <text x="380" y="205" font-size="16" fill="#5b6675" font-weight="bold">→</text>
  <text x="390" y="222" text-anchor="start" font-size="11" fill="#5b6675">×3</text>

  <!-- Transformed vector -->
  <rect x="370" y="188" width="180" height="32" rx="4" fill="#e8eaf6" stroke="#5b6675"/>
  <text x="460" y="210" text-anchor="middle" font-size="12" fill="#333">[3, 9, −3, 15]</text>
  <text x="460" y="235" text-anchor="middle" font-size="10" fill="#5b6675">μ=6, σ=6.71</text>

  <!-- LayerNorm: SAME (scale invariant) -->
  <rect x="555" y="184" width="140" height="44" rx="6" fill="#d6f5ec" stroke="#0e8a6e" stroke-width="2"/>
  <text x="625" y="206" text-anchor="middle" font-size="13" fill="#0e8a6e" font-weight="bold">SAME ✓</text>
  <text x="625" y="222" text-anchor="middle" font-size="10" fill="#0e8a6e">scale invariant</text>
  <text x="625" y="251" text-anchor="middle" font-size="10" fill="#5b6675">LN normalizes by σ → scale cancels</text>
  <text x="625" y="262" text-anchor="middle" font-size="10" fill="#5b6675">LN(cx) = LN(x) for any c > 0</text>

  <!-- RMSNorm: SAME (scale invariant too) -->
  <rect x="700" y="184" width="120" height="44" rx="6" fill="#d6f5ec" stroke="#0e8a6e" stroke-width="2"/>
  <text x="760" y="206" text-anchor="middle" font-size="13" fill="#0e8a6e" font-weight="bold">SAME ✓</text>
  <text x="760" y="222" text-anchor="middle" font-size="10" fill="#0e8a6e">scale invariant</text>
  <text x="760" y="251" text-anchor="middle" font-size="10" fill="#5b6675">RMS(cx) = c·RMS(x) →</text>
  <text x="760" y="262" text-anchor="middle" font-size="10" fill="#5b6675">scale cancels ✓</text>

  <!-- ====== Bottom summary ====== -->
  <rect x="20" y="278" width="780" height="32" rx="4" fill="#f0f4ff" stroke="#1f4fa3"/>
  <text x="410" y="292" text-anchor="middle" font-size="11" fill="#1f4fa3" font-weight="bold">LayerNorm:</text>
  <text x="530" y="292" text-anchor="start" font-size="11" fill="#333">shift + scale invariant   |</text>
  <text x="410" y="306" text-anchor="middle" font-size="11" fill="#0e8a6e" font-weight="bold">RMSNorm:</text>
  <text x="530" y="306" text-anchor="start" font-size="11" fill="#333">scale invariant only (no mean subtraction → 10-15% faster)</text>

  <!-- column dividers -->
  <line x1="185" y1="74" x2="185" y2="270" stroke="#eee" stroke-width="1"/>
  <line x1="365" y1="74" x2="365" y2="270" stroke="#eee" stroke-width="1"/>
  <line x1="550" y1="74" x2="550" y2="270" stroke="#eee" stroke-width="1"/>
  <line x1="695" y1="74" x2="695" y2="270" stroke="#eee" stroke-width="1"/>
</svg>
