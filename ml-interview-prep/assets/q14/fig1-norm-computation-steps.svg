<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 300" width="820" height="300" font-family="Arial, sans-serif">
  <rect width="820" height="300" fill="#f8f9fa" rx="8"/>
  <text x="410" y="26" text-anchor="middle" font-size="14" font-weight="bold" fill="#1f4fa3">LayerNorm vs RMSNorm: Step-by-Step Computation</text>

  <!-- LayerNorm (left column) -->
  <text x="205" y="52" text-anchor="middle" font-size="13" font-weight="bold" fill="#1f4fa3">LayerNorm</text>

  <!-- Step boxes for LN -->
  <rect x="80" y="65" width="250" height="30" rx="4" fill="#e8edf7" stroke="#1f4fa3" stroke-width="1"/>
  <text x="205" y="85" text-anchor="middle" font-size="11" fill="#333">① Compute mean  μ = (1/d) Σ xᵢ</text>
  <line x1="205" y1="95" x2="205" y2="110" stroke="#1f4fa3" stroke-width="1.5" marker-end="url(#aln)"/>

  <rect x="80" y="110" width="250" height="30" rx="4" fill="#e8edf7" stroke="#1f4fa3" stroke-width="1"/>
  <text x="205" y="130" text-anchor="middle" font-size="11" fill="#333">② Subtract mean  x̂ = x − μ</text>
  <line x1="205" y1="140" x2="205" y2="155" stroke="#1f4fa3" stroke-width="1.5" marker-end="url(#aln)"/>

  <rect x="80" y="155" width="250" height="30" rx="4" fill="#e8edf7" stroke="#1f4fa3" stroke-width="1"/>
  <text x="205" y="175" text-anchor="middle" font-size="11" fill="#333">③ Compute var  σ² = (1/d) Σ x̂ᵢ²</text>
  <line x1="205" y1="185" x2="205" y2="200" stroke="#1f4fa3" stroke-width="1.5" marker-end="url(#aln)"/>

  <rect x="80" y="200" width="250" height="30" rx="4" fill="#e8edf7" stroke="#1f4fa3" stroke-width="1"/>
  <text x="205" y="220" text-anchor="middle" font-size="11" fill="#333">④ Divide  x̃ = x̂ / √(σ² + ε)</text>
  <line x1="205" y1="230" x2="205" y2="245" stroke="#1f4fa3" stroke-width="1.5" marker-end="url(#aln)"/>

  <rect x="80" y="245" width="250" height="30" rx="4" fill="#1f4fa3"/>
  <text x="205" y="265" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">⑤ Scale + shift  y = γ · x̃ + β</text>

  <!-- Count -->
  <text x="205" y="292" text-anchor="middle" font-size="10" fill="#555">2 learnable params per feature (γ, β) · 5 operations</text>

  <!-- RMSNorm (right column) -->
  <text x="615" y="52" text-anchor="middle" font-size="13" font-weight="bold" fill="#0e8a6e">RMSNorm</text>

  <!-- Step boxes for RMS — note steps 1,2,3 crossed out or absent -->
  <rect x="490" y="65" width="250" height="30" rx="4" fill="#f0f0f0" stroke="#bbb" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="615" y="85" text-anchor="middle" font-size="11" fill="#aaa">① Compute mean  (SKIPPED ✗)</text>
  <!-- strikethrough line -->
  <line x1="490" y1="80" x2="740" y2="80" stroke="#e05252" stroke-width="1.5" opacity="0.5"/>

  <rect x="490" y="110" width="250" height="30" rx="4" fill="#f0f0f0" stroke="#bbb" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="615" y="130" text-anchor="middle" font-size="11" fill="#aaa">② Subtract mean  (SKIPPED ✗)</text>
  <line x1="490" y1="125" x2="740" y2="125" stroke="#e05252" stroke-width="1.5" opacity="0.5"/>

  <rect x="490" y="155" width="250" height="30" rx="4" fill="#e8f5e9" stroke="#0e8a6e" stroke-width="1"/>
  <text x="615" y="175" text-anchor="middle" font-size="11" fill="#333">① Compute RMS = √((1/d) Σ xᵢ²)</text>
  <line x1="615" y1="185" x2="615" y2="200" stroke="#0e8a6e" stroke-width="1.5" marker-end="url(#arms)"/>

  <rect x="490" y="200" width="250" height="30" rx="4" fill="#e8f5e9" stroke="#0e8a6e" stroke-width="1"/>
  <text x="615" y="220" text-anchor="middle" font-size="11" fill="#333">② Divide  x̃ = x / RMS(x)</text>
  <line x1="615" y1="230" x2="615" y2="245" stroke="#0e8a6e" stroke-width="1.5" marker-end="url(#arms)"/>

  <rect x="490" y="245" width="250" height="30" rx="4" fill="#0e8a6e"/>
  <text x="615" y="265" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">③ Scale only  y = γ · x̃  (no β)</text>

  <text x="615" y="292" text-anchor="middle" font-size="10" fill="#555">1 learnable param per feature (γ only) · 3 operations</text>

  <defs>
    <marker id="aln" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#1f4fa3"/>
    </marker>
    <marker id="arms" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#0e8a6e"/>
    </marker>
  </defs>
</svg>
