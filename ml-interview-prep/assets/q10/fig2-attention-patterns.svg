  <g>
    <!-- Row 1 -->
    <rect x="340" y="70" width="36" height="36" fill="#c77a12" opacity="0.9" rx="1"/>
    <rect x="378" y="70" width="36" height="36" fill="#2d3748" rx="1"/>
    <rect x="416" y="70" width="36" height="36" fill="#2d3748" rx="1"/>
    <rect x="454" y="70" width="36" height="36" fill="#2d3748" rx="1"/>
    <rect x="492" y="70" width="36" height="36" fill="#2d3748" rx="1"/>
    <!-- Row 2 -->
    <rect x="340" y="108" width="36" height="36" fill="#c77a12" opacity="0.45" rx="1"/>
