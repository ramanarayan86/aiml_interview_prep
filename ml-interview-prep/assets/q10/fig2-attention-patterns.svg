  <g>
    <rect x="80" y="70" width="36" height="36" fill="#1f4fa3" opacity="0.9" rx="1"/><rect x="118" y="70" width="36" height="36" fill="#1f4fa3" opacity="0.6" rx="1"/><rect x="156" y="70" width="36" height="36" fill="#1f4fa3" opacity="0.45" rx="1"/><rect x="194" y="70" width="36" height="36" fill="#1f4fa3" opacity="0.7" rx="1"/><rect x="232" y="70" width="36" height="36" fill="#1f4fa3" opacity="0.3" rx="1"/>
