  <text x="68" y="165" text-anchor="end" font-size="10" fill="#5b6675" transform="rotate(-90,68,165)">Query ↓</text>
  <!-- Token labels -->
  <text x="98" y="66" text-anchor="middle" font-size="9" fill="#5b6675">t1</text>
  <text x="136" y="66" text-anchor="middle" font-size="9" fill="#5b6675">t2</text>
  <text x="174" y="66" text-anchor="middle" font-size="9" fill="#5b6675">t3</text>
  <text x="212" y="66" text-anchor="middle" font-size="9" fill="#5b6675">t4</text>
  <text x="250" y="66" text-anchor="middle" font-size="9" fill="#5b6675">t5</text>
  <text x="76" y="92" text-anchor="end" font-size="9" fill="#5b6675">t1</text>
