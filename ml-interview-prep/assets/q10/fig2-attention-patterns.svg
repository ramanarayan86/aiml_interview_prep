  <text x="434" y="66" text-anchor="middle" font-size="9" fill="#5b6675">t3</text>
  <text x="472" y="66" text-anchor="middle" font-size="9" fill="#5b6675">t4</text>
  <text x="510" y="66" text-anchor="middle" font-size="9" fill="#5b6675">t5</text>
  <text x="336" y="92" text-anchor="end" font-size="9" fill="#5b6675">t1</text>
  <text x="336" y="130" text-anchor="end" font-size="9" fill="#5b6675">t2</text>
  <text x="336" y="168" text-anchor="end" font-size="9" fill="#5b6675">t3</text>
  <text x="336" y="206" text-anchor="end" font-size="9" fill="#5b6675">t4</text>
  <text x="336" y="244" text-anchor="end" font-size="9" fill="#5b6675">t5</text>
  <text x="430" y="268" text-anchor="middle" font-size="10" fill="#5b6675">Key →</text>
  <text x="430" y="284" text-anchor="middle" font-size="11" fill="#c77a12">Lower triangle only (causal)</text>

  <!-- ===== RIGHT: Cross-attention 5×3 (decoder queries → encoder keys) ===== -->
  <text x="680" y="48" text-anchor="middle" font-size="13" font-weight="bold" fill="#0e8a6e">Cross-Attention (T5)</text>
  <text x="680" y="62" text-anchor="middle" font-size="11" fill="#5b6675">Decoder (5) attends to Encoder (3)</text>

