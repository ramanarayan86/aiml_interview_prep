  <text x="672" y="66" text-anchor="middle" font-size="9" fill="#5b6675">e2</text>
  <text x="714" y="66" text-anchor="middle" font-size="9" fill="#5b6675">e3</text>
  <text x="606" y="92" text-anchor="end" font-size="9" fill="#5b6675">d1</text>
  <text x="606" y="130" text-anchor="end" font-size="9" fill="#5b6675">d2</text>
  <text x="606" y="168" text-anchor="end" font-size="9" fill="#5b6675">d3</text>
  <text x="606" y="206" text-anchor="end" font-size="9" fill="#5b6675">d4</text>
  <text x="606" y="244" text-anchor="end" font-size="9" fill="#5b6675">d5</text>
