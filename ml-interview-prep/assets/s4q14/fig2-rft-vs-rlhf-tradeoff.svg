<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 360">
  <!-- Background -->
  <rect width="700" height="360" fill="#f8f9fb" rx="8"/>

  <!-- Main title -->
  <text x="350" y="26" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1f4fa3">Best-of-K Expected Reward  vs  Training Convergence</text>

  <!-- ===== LEFT CHART: E[max of K U[0,1]] ===== -->
  <rect x="20" y="38" width="310" height="298" rx="6" fill="#eef2fb" stroke="#1f4fa3" stroke-width="1"/>
  <text x="175" y="58" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#1f4fa3">Expected Best-of-K Reward  E[max_K] = K/(K+1)</text>
  <text x="175" y="72" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#5b6675">(rewards iid Uniform[0,1])</text>

  <!-- Axes -->
  <!-- Y axis -->
  <line x1="60" y1="85" x2="60" y2="295" stroke="#5b6675" stroke-width="1.5"/>
  <!-- X axis -->
  <line x1="60" y1="295" x2="300" y2="295" stroke="#5b6675" stroke-width="1.5"/>

  <!-- Y axis label -->
  <text x="22" y="200" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5b6675" transform="rotate(-90,22,200)">E[max reward]</text>

  <!-- X axis label -->
  <text x="180" y="318" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5b6675">K  (samples per prompt)</text>

  <!-- Y gridlines and labels: 0.5, 0.6, 0.7, 0.8, 0.9, 1.0 -->
  <!-- y=0.5 → pixel 295 - (0.5/1.0)*210 = 295-105=190 -->
  <!-- y=1.0 → pixel 295 - 210 = 85 -->
  <!-- scale: 210 pixels for range [0,1] -->
  <line x1="58" y1="190" x2="300" y2="190" stroke="#d0d8e8" stroke-width="0.8" stroke-dasharray="3,3"/>
  <text x="54" y="194" text-anchor="end" font-family="sans-serif" font-size="9" fill="#5b6675">0.5</text>
  <line x1="58" y1="169" x2="300" y2="169" stroke="#d0d8e8" stroke-width="0.8" stroke-dasharray="3,3"/>
  <text x="54" y="173" text-anchor="end" font-family="sans-serif" font-size="9" fill="#5b6675">0.6</text>
  <line x1="58" y1="148" x2="300" y2="148" stroke="#d0d8e8" stroke-width="0.8" stroke-dasharray="3,3"/>
  <text x="54" y="152" text-anchor="end" font-family="sans-serif" font-size="9" fill="#5b6675">0.7</text>
  <line x1="58" y1="127" x2="300" y2="127" stroke="#d0d8e8" stroke-width="0.8" stroke-dasharray="3,3"/>
  <text x="54" y="131" text-anchor="end" font-family="sans-serif" font-size="9" fill="#5b6675">0.8</text>
  <line x1="58" y1="106" x2="300" y2="106" stroke="#d0d8e8" stroke-width="0.8" stroke-dasharray="3,3"/>
  <text x="54" y="110" text-anchor="end" font-family="sans-serif" font-size="9" fill="#5b6675">0.9</text>
  <line x1="58" y1="85" x2="300" y2="85" stroke="#d0d8e8" stroke-width="0.8" stroke-dasharray="3,3"/>
  <text x="54" y="89" text-anchor="end" font-family="sans-serif" font-size="9" fill="#5b6675">1.0</text>

  <!-- X axis ticks: K=1,2,4,8,16,32,64 -->
  <!-- x range [1,64] mapped to pixels [60,300] = 240px, log scale -->
  <!-- log2(1)=0, log2(64)=6; pixel = 60 + (log2(K)/6)*240 -->
  <!-- K=1: 60, K=2: 100, K=4: 140, K=8: 180, K=16: 220, K=32: 260, K=64: 300 -->
  <line x1="60" y1="295" x2="60" y2="300" stroke="#5b6675" stroke-width="1.2"/>
  <text x="60" y="310" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#5b6675">1</text>
  <line x1="100" y1="295" x2="100" y2="300" stroke="#5b6675" stroke-width="1.2"/>
  <text x="100" y="310" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#5b6675">2</text>
  <line x1="140" y1="295" x2="140" y2="300" stroke="#5b6675" stroke-width="1.2"/>
  <text x="140" y="310" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#5b6675">4</text>
  <line x1="180" y1="295" x2="180" y2="300" stroke="#5b6675" stroke-width="1.2"/>
  <text x="180" y="310" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#5b6675">8</text>
  <line x1="220" y1="295" x2="220" y2="300" stroke="#5b6675" stroke-width="1.2"/>
  <text x="220" y="310" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#5b6675">16</text>
  <line x1="260" y1="295" x2="260" y2="300" stroke="#5b6675" stroke-width="1.2"/>
  <text x="260" y="310" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#5b6675">32</text>
  <line x1="300" y1="295" x2="300" y2="300" stroke="#5b6675" stroke-width="1.2"/>
  <text x="300" y="310" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#5b6675">64</text>

  <!-- Curve: E[max]=K/(K+1), points at K=1,2,4,8,16,32,64 -->
  <!-- K=1: E=0.500, px=(295-0.500*210)=190 -->
  <!-- K=2: E=0.667, px=295-140=155 -->
  <!-- K=4: E=0.800, px=295-168=127 -->
  <!-- K=8: E=0.889, px=295-186.7=108.3 -->
  <!-- K=16: E=0.941, px=295-197.6=97.4 -->
  <!-- K=32: E=0.969, px=295-203.4=91.6 -->
  <!-- K=64: E=0.985, px=295-206.8=88.2 -->
  <polyline points="60,190 100,155 140,127 180,108 220,97 260,92 300,88"
            fill="none" stroke="#1f4fa3" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- Dots -->
  <circle cx="60"  cy="190" r="4" fill="#1f4fa3"/>
  <circle cx="100" cy="155" r="4" fill="#1f4fa3"/>
  <circle cx="140" cy="127" r="4" fill="#1f4fa3"/>
  <circle cx="180" cy="108" r="4" fill="#1f4fa3"/>
  <circle cx="220" cy="97"  r="4" fill="#1f4fa3"/>
  <circle cx="260" cy="92"  r="4" fill="#1f4fa3"/>
  <circle cx="300" cy="88"  r="4" fill="#1f4fa3"/>

  <!-- Annotations at key points -->
  <text x="66"  y="186" font-family="sans-serif" font-size="8" fill="#1f4fa3">0.50</text>
  <text x="106" y="151" font-family="sans-serif" font-size="8" fill="#1f4fa3">0.67</text>
  <text x="146" y="123" font-family="sans-serif" font-size="8" fill="#1f4fa3">0.80</text>
  <text x="186" y="104" font-family="sans-serif" font-size="8" fill="#1f4fa3">0.89</text>
  <text x="226" y="93"  font-family="sans-serif" font-size="8" fill="#1f4fa3">0.94</text>
  <text x="262" y="88"  font-family="sans-serif" font-size="8" fill="#1f4fa3">0.97</text>

  <!-- Diminishing returns annotation -->
  <path d="M 230 130 Q 250 130 270 110" fill="none" stroke="#c0392b" stroke-width="1" marker-end="url(#arrow-red)"/>
  <text x="205" y="145" font-family="sans-serif" font-size="8.5" fill="#c0392b">Diminishing</text>
  <text x="205" y="156" font-family="sans-serif" font-size="8.5" fill="#c0392b">returns</text>

  <!-- ===== RIGHT CHART: Training convergence ===== -->
  <rect x="368" y="38" width="310" height="298" rx="6" fill="#fef6ee" stroke="#c77a12" stroke-width="1"/>
  <text x="523" y="58" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#c77a12">Reward vs Training Steps</text>
  <text x="523" y="72" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#5b6675">(schematic; RFT vs PPO convergence)</text>

  <!-- Axes -->
  <line x1="408" y1="85" x2="408" y2="295" stroke="#5b6675" stroke-width="1.5"/>
  <line x1="408" y1="295" x2="648" y2="295" stroke="#5b6675" stroke-width="1.5"/>

  <!-- Y label -->
  <text x="370" y="200" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5b6675" transform="rotate(-90,370,200)">Avg reward</text>

  <!-- X label -->
  <text x="528" y="318" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5b6675">Training steps (iterations)</text>

  <!-- Y gridlines -->
  <line x1="406" y1="190" x2="648" y2="190" stroke="#d0d8e8" stroke-width="0.8" stroke-dasharray="3,3"/>
  <text x="402" y="194" text-anchor="end" font-family="sans-serif" font-size="9" fill="#5b6675">med</text>
  <line x1="406" y1="148" x2="648" y2="148" stroke="#d0d8e8" stroke-width="0.8" stroke-dasharray="3,3"/>
  <text x="402" y="152" text-anchor="end" font-family="sans-serif" font-size="9" fill="#5b6675">high</text>
  <line x1="406" y1="106" x2="648" y2="106" stroke="#d0d8e8" stroke-width="0.8" stroke-dasharray="3,3"/>
  <text x="402" y="110" text-anchor="end" font-family="sans-serif" font-size="9" fill="#5b6675">peak</text>

  <!-- X ticks -->
  <line x1="408" y1="295" x2="408" y2="300" stroke="#5b6675" stroke-width="1.2"/>
  <text x="408" y="310" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#5b6675">0</text>
  <line x1="468" y1="295" x2="468" y2="300" stroke="#5b6675" stroke-width="1.2"/>
  <text x="468" y="310" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#5b6675">1k</text>
  <line x1="528" y1="295" x2="528" y2="300" stroke="#5b6675" stroke-width="1.2"/>
  <text x="528" y="310" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#5b6675">2k</text>
  <line x1="588" y1="295" x2="588" y2="300" stroke="#5b6675" stroke-width="1.2"/>
  <text x="588" y="310" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#5b6675">3k</text>
  <line x1="648" y1="295" x2="648" y2="300" stroke="#5b6675" stroke-width="1.2"/>
  <text x="648" y="310" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#5b6675">4k</text>

  <!-- RFT curve: fast early rise, plateaus earlier (no on-policy update) -->
  <!-- starts at (408,270), rises quickly, plateau around (540,130) -->
  <polyline points="408,270 428,240 458,190 488,158 518,135 548,125 578,120 608,118 638,117 648,117"
            fill="none" stroke="#1f4fa3" stroke-width="2.5" stroke-linejoin="round"/>
  <text x="650" y="115" font-family="sans-serif" font-size="9" font-weight="bold" fill="#1f4fa3">RFT</text>

  <!-- PPO curve: slower start (more overhead), eventually surpasses RFT plateau -->
  <!-- starts at (408,270), slower, eventually reaches higher peak with variance wobble -->
  <path d="M 408,270 C 430,265 450,250 480,215 S 530,165 560,135 S 610,108 648,100"
        fill="none" stroke="#c77a12" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Variance noise bumps on PPO -->
  <path d="M 540,155 Q 550,145 560,135 Q 568,125 575,130 Q 582,137 590,118 Q 600,108 610,110 Q 625,112 635,103 Q 640,100 648,100"
        fill="none" stroke="#c77a12" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="650" y="98" font-family="sans-serif" font-size="9" font-weight="bold" fill="#c77a12">PPO</text>

  <!-- Annotations -->
  <!-- RFT plateau arrow -->
  <line x1="570" y1="120" x2="570" y2="108" stroke="#1f4fa3" stroke-width="1" marker-end="url(#arrow-blue2)"/>
  <text x="498" y="107" font-family="sans-serif" font-size="8" fill="#1f4fa3">RFT plateau</text>
  <text x="498" y="117" font-family="sans-serif" font-size="8" fill="#1f4fa3">(no dist. correction)</text>

  <!-- PPO instability annotation -->
  <text x="555" y="170" font-family="sans-serif" font-size="8" fill="#c77a12">PPO variance</text>

  <!-- Early steps: RFT advantage -->
  <rect x="410" y="235" width="80" height="18" rx="3" fill="#cef5ee"/>
  <text x="450" y="248" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#0e8a6e">RFT faster early</text>

  <!-- Legend at bottom -->
  <line x1="420" y1="332" x2="450" y2="332" stroke="#1f4fa3" stroke-width="2.5"/>
  <text x="456" y="336" font-family="sans-serif" font-size="9" fill="#1f4fa3">RFT/RAFT (simpler)</text>
  <line x1="543" y1="332" x2="573" y2="332" stroke="#c77a12" stroke-width="2.5"/>
  <text x="579" y="336" font-family="sans-serif" font-size="9" fill="#c77a12">PPO (RL, more compute)</text>

  <!-- Defs for arrows -->
  <defs>
    <marker id="arrow-red" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#c0392b"/>
    </marker>
    <marker id="arrow-blue2" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#1f4fa3"/>
    </marker>
  </defs>
</svg>
