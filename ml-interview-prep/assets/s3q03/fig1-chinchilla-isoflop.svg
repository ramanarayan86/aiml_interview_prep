<svg viewBox="0 0 780 480" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="13">
  <!-- Background -->
  <rect width="780" height="480" fill="#0d1117" rx="10"/>

  <!-- Title -->
  <text x="390" y="34" text-anchor="middle" fill="#e6edf3" font-size="16" font-weight="bold">IsoFLOP Curves: Loss vs Model Size at Fixed Compute Budgets</text>
  <text x="390" y="54" text-anchor="middle" fill="#8b949e" font-size="12">(Each curve = fixed C; minimum = compute-optimal N for that budget)</text>

  <!-- Axes -->
  <!-- Y axis -->
  <line x1="100" y1="80" x2="100" y2="400" stroke="#30363d" stroke-width="1.5"/>
  <!-- X axis -->
  <line x1="100" y1="400" x2="720" y2="400" stroke="#30363d" stroke-width="1.5"/>

  <!-- Grid lines horizontal -->
  <line x1="100" y1="140" x2="720" y2="140" stroke="#21262d" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="100" y1="200" x2="720" y2="200" stroke="#21262d" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="100" y1="260" x2="720" y2="260" stroke="#21262d" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="100" y1="320" x2="720" y2="320" stroke="#21262d" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Grid lines vertical -->
  <line x1="205" y1="80" x2="205" y2="400" stroke="#21262d" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="310" y1="80" x2="310" y2="400" stroke="#21262d" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="415" y1="80" x2="415" y2="400" stroke="#21262d" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="520" y1="80" x2="520" y2="400" stroke="#21262d" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="625" y1="80" x2="625" y2="400" stroke="#21262d" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Y axis labels -->
  <text x="90" y="84" text-anchor="end" fill="#8b949e" font-size="11">3.2</text>
  <text x="90" y="144" text-anchor="end" fill="#8b949e" font-size="11">2.9</text>
  <text x="90" y="204" text-anchor="end" fill="#8b949e" font-size="11">2.6</text>
  <text x="90" y="264" text-anchor="end" fill="#8b949e" font-size="11">2.3</text>
  <text x="90" y="324" text-anchor="end" fill="#8b949e" font-size="11">2.0</text>
  <text x="90" y="404" text-anchor="end" fill="#8b949e" font-size="11">1.7</text>

  <!-- Y axis title -->
  <text x="22" y="240" text-anchor="middle" fill="#8b949e" font-size="12" transform="rotate(-90,22,240)">Validation Loss (nats)</text>

  <!-- X axis labels -->
  <text x="100" y="420" text-anchor="middle" fill="#8b949e" font-size="11">1B</text>
  <text x="205" y="420" text-anchor="middle" fill="#8b949e" font-size="11">3B</text>
  <text x="310" y="420" text-anchor="middle" fill="#8b949e" font-size="11">7B</text>
  <text x="415" y="420" text-anchor="middle" fill="#8b949e" font-size="11">20B</text>
  <text x="520" y="420" text-anchor="middle" fill="#8b949e" font-size="11">67B</text>
  <text x="625" y="420" text-anchor="middle" fill="#8b949e" font-size="11">200B</text>
  <text x="720" y="420" text-anchor="middle" fill="#8b949e" font-size="11">500B</text>

  <!-- X axis title -->
  <text x="410" y="448" text-anchor="middle" fill="#8b949e" font-size="12">Model Size N (parameters, log scale)</text>

  <!-- IsoFLOP curve 1: C = 6e20 FLOPs (small budget) — minimum near 1B -->
  <path d="M 100,158 C 130,148 155,145 175,147 C 210,152 250,175 310,230 C 380,290 440,340 520,370 C 580,388 625,395 720,398"
        fill="none" stroke="#3fb950" stroke-width="2.5" stroke-dasharray="6,3"/>
  <!-- Min marker for curve 1 -->
  <circle cx="165" cy="144" r="5" fill="#3fb950"/>
  <!-- Label -->
  <text x="172" y="135" fill="#3fb950" font-size="11">C = 6×10²⁰</text>
  <text x="172" y="147" fill="#3fb950" font-size="11">N* ≈ 1B, D* ≈ 100B</text>

  <!-- IsoFLOP curve 2: C = 6e21 FLOPs — minimum near 3B -->
  <path d="M 100,200 C 150,175 185,168 218,169 C 265,172 320,198 390,245 C 460,292 520,330 620,368 C 665,382 700,391 720,394"
        fill="none" stroke="#58a6ff" stroke-width="2.5" stroke-dasharray="6,3"/>
  <circle cx="210" cy="167" r="5" fill="#58a6ff"/>
  <text x="217" y="160" fill="#58a6ff" font-size="11">C = 6×10²¹</text>
  <text x="217" y="172" fill="#58a6ff" font-size="11">N* ≈ 3B, D* ≈ 300B</text>

  <!-- IsoFLOP curve 3: C = 6e22 FLOPs — minimum near 10B -->
  <path d="M 100,258 C 160,225 210,210 270,208 C 320,207 380,222 440,255 C 500,288 560,320 640,350 C 672,362 700,372 720,378"
        fill="none" stroke="#d29922" stroke-width="2.5" stroke-dasharray="6,3"/>
  <circle cx="265" cy="207" r="5" fill="#d29922"/>
  <text x="272" y="199" fill="#d29922" font-size="11">C = 6×10²²</text>
  <text x="272" y="211" fill="#d29922" font-size="11">N* ≈ 10B, D* ≈ 1T</text>

  <!-- IsoFLOP curve 4: C = 6e23 FLOPs (Chinchilla budget) — minimum near 70B -->
  <path d="M 100,332 C 150,295 210,265 290,248 C 360,236 415,233 480,238 C 540,245 590,263 640,285 C 672,298 700,312 720,322"
        fill="none" stroke="#f78166" stroke-width="3.5"/>
  <circle cx="470" cy="232" r="6" fill="#f78166"/>
  <text x="477" y="223" fill="#f78166" font-size="11" font-weight="bold">C = 6×10²³</text>
  <text x="477" y="236" fill="#f78166" font-size="11" font-weight="bold">N* ≈ 70B, D* ≈ 1.4T</text>
  <!-- Arrow to Chinchilla -->
  <line x1="468" y1="230" x2="468" y2="255" stroke="#f78166" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="468" y="268" text-anchor="middle" fill="#f78166" font-size="10">← Chinchilla (70B)</text>

  <!-- Gopher comparison: 280B on 300B tokens — UNDERTRAINED dot -->
  <circle cx="614" cy="277" r="6" fill="#bc8cff"/>
  <text x="622" y="272" fill="#bc8cff" font-size="10">Gopher</text>
  <text x="622" y="283" fill="#bc8cff" font-size="10">280B/300BT</text>
  <text x="622" y="294" fill="#bc8cff" font-size="10">(undertrained)</text>

  <!-- The compute-optimal frontier line (dashed diagonal) -->
  <path d="M 165,144 L 210,167 L 265,207 L 470,232" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-dasharray="8,4" opacity="0.5"/>
  <text x="270" y="170" fill="#ffffff" font-size="11" opacity="0.7" font-style="italic">compute-optimal frontier</text>

  <!-- Legend box -->
  <rect x="102" y="83" width="115" height="50" fill="#161b22" rx="4" stroke="#30363d" stroke-width="1"/>
  <text x="112" y="100" fill="#e6edf3" font-size="10" font-weight="bold">IsoFLOP curves</text>
  <line x1="112" y1="112" x2="140" y2="112" stroke="#f78166" stroke-width="3"/>
  <text x="146" y="116" fill="#8b949e" font-size="10">solid = key budget</text>
  <line x1="112" y1="125" x2="140" y2="125" stroke="#3fb950" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="146" y="128" fill="#8b949e" font-size="10">dashed = other budgets</text>
</svg>
