<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 300" width="820" height="300">
  <!-- Background -->
  <rect width="820" height="300" fill="#f8f9fb" rx="8"/>

  <!-- Title -->
  <text x="410" y="22" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#1f4fa3" text-anchor="middle">Gopher Heuristic Quality Filters: Rules and Thresholds</text>

  <!-- Table header row -->
  <rect x="20" y="30" width="780" height="26" rx="3" fill="#1f4fa3"/>
  <text x="110" y="47" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="white" text-anchor="middle">Filter Name</text>
  <text x="285" y="47" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="white" text-anchor="middle">What It Catches</text>
  <text x="470" y="47" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="white" text-anchor="middle">Threshold</text>
  <text x="620" y="47" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="white" text-anchor="middle">PASS example</text>
  <text x="750" y="47" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="white" text-anchor="middle">FAIL example</text>

  <!-- Column dividers in header -->
  <line x1="200" y1="30" x2="200" y2="56" stroke="white" stroke-width="0.5" opacity="0.5"/>
  <line x1="390" y1="30" x2="390" y2="56" stroke="white" stroke-width="0.5" opacity="0.5"/>
  <line x1="550" y1="30" x2="550" y2="56" stroke="white" stroke-width="0.5" opacity="0.5"/>
  <line x1="690" y1="30" x2="690" y2="56" stroke="white" stroke-width="0.5" opacity="0.5"/>

  <!-- Row helper: alternating background -->
  <!-- Row heights: 6 rows * 40px = 240px, starting y=56 -->

  <!-- Row 1: Mean word length -->
  <rect x="20" y="56" width="780" height="40" fill="#eef2fb"/>
  <text x="110" y="71" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#1f4fa3" text-anchor="middle">Mean Word Length</text>
  <text x="285" y="68" font-family="Arial,sans-serif" font-size="9" fill="#5b6675" text-anchor="middle">Removes spam/random char</text>
  <text x="285" y="81" font-family="Arial,sans-serif" font-size="9" fill="#5b6675" text-anchor="middle">sequences and lorem ipsum</text>
  <rect x="415" y="60" width="110" height="22" rx="3" fill="#1f4fa3" opacity="0.15"/>
  <text x="470" y="75" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#1f4fa3" text-anchor="middle">3 - 10 characters</text>
  <text x="620" y="71" font-family="Arial,sans-serif" font-size="9" fill="#0e8a6e" text-anchor="middle">"The cat sat" (avg 3.3)</text>
  <text x="750" y="71" font-family="Arial,sans-serif" font-size="9" fill="#c0392b" text-anchor="middle">"xkwqp aaaa bbb" (1.5)</text>

  <!-- Row 2: Symbol-to-word ratio -->
  <rect x="20" y="96" width="780" height="40" fill="white"/>
  <text x="110" y="111" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#1f4fa3" text-anchor="middle">Symbol-to-Word Ratio</text>
  <text x="285" y="108" font-family="Arial,sans-serif" font-size="9" fill="#5b6675" text-anchor="middle">Removes code-heavy or noisy</text>
  <text x="285" y="121" font-family="Arial,sans-serif" font-size="9" fill="#5b6675" text-anchor="middle">pages (menus, markup)</text>
  <rect x="415" y="100" width="110" height="22" rx="3" fill="#1f4fa3" opacity="0.15"/>
  <text x="470" y="115" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#1f4fa3" text-anchor="middle">symbol ratio &lt; 10%</text>
  <text x="620" y="111" font-family="Arial,sans-serif" font-size="9" fill="#0e8a6e" text-anchor="middle">"Hello, world! (2021)" (5%)</text>
  <text x="750" y="111" font-family="Arial,sans-serif" font-size="9" fill="#c0392b" text-anchor="middle">"{ } = &gt; &lt; | ^ &amp; %" (45%)</text>

  <!-- Row 3: Line-ending punctuation -->
  <rect x="20" y="136" width="780" height="40" fill="#eef2fb"/>
  <text x="110" y="151" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#1f4fa3" text-anchor="middle">Line-End Punctuation</text>
  <text x="285" y="148" font-family="Arial,sans-serif" font-size="9" fill="#5b6675" text-anchor="middle">Removes navigation menus,</text>
  <text x="285" y="161" font-family="Arial,sans-serif" font-size="9" fill="#5b6675" text-anchor="middle">raw lists, site-map pages</text>
  <rect x="415" y="140" width="110" height="22" rx="3" fill="#1f4fa3" opacity="0.15"/>
  <text x="470" y="155" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#1f4fa3" text-anchor="middle">fraction &gt; 70%</text>
  <text x="620" y="148" font-family="Arial,sans-serif" font-size="9" fill="#0e8a6e" text-anchor="middle">"She ran. He stopped." (100%)</text>
  <text x="750" y="148" font-family="Arial,sans-serif" font-size="9" fill="#c0392b" text-anchor="middle">"Home / About / Contact"</text>
  <text x="750" y="161" font-family="Arial,sans-serif" font-size="9" fill="#c0392b" text-anchor="middle">(0% end punctuation)</text>

  <!-- Row 4: Duplicate lines -->
  <rect x="20" y="176" width="780" height="40" fill="white"/>
  <text x="110" y="191" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#1f4fa3" text-anchor="middle">Duplicate Line Fraction</text>
  <text x="285" y="188" font-family="Arial,sans-serif" font-size="9" fill="#5b6675" text-anchor="middle">Removes boilerplate-heavy</text>
  <text x="285" y="201" font-family="Arial,sans-serif" font-size="9" fill="#5b6675" text-anchor="middle">pages, cookie banners, templates</text>
  <rect x="415" y="180" width="110" height="22" rx="3" fill="#1f4fa3" opacity="0.15"/>
  <text x="470" y="195" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#1f4fa3" text-anchor="middle">dup lines &lt; 30%</text>
  <text x="620" y="191" font-family="Arial,sans-serif" font-size="9" fill="#0e8a6e" text-anchor="middle">Normal article (5% dups)</text>
  <text x="750" y="191" font-family="Arial,sans-serif" font-size="9" fill="#c0392b" text-anchor="middle">"Accept cookies. Accept cookies.</text>
  <text x="750" y="204" font-family="Arial,sans-serif" font-size="9" fill="#c0392b" text-anchor="middle">Accept cookies." (67%)</text>

  <!-- Row 5: Document length -->
  <rect x="20" y="216" width="780" height="40" fill="#eef2fb"/>
  <text x="110" y="231" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#1f4fa3" text-anchor="middle">Document Length</text>
  <text x="285" y="228" font-family="Arial,sans-serif" font-size="9" fill="#5b6675" text-anchor="middle">Removes stubs (&lt;50 words) and</text>
  <text x="285" y="241" font-family="Arial,sans-serif" font-size="9" fill="#5b6675" text-anchor="middle">corrupted giant docs (&gt;100K)</text>
  <rect x="415" y="220" width="110" height="22" rx="3" fill="#1f4fa3" opacity="0.15"/>
  <text x="470" y="235" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#1f4fa3" text-anchor="middle">50 - 100K words</text>
  <text x="620" y="231" font-family="Arial,sans-serif" font-size="9" fill="#0e8a6e" text-anchor="middle">Blog post: 800 words</text>
  <text x="750" y="231" font-family="Arial,sans-serif" font-size="9" fill="#c0392b" text-anchor="middle">"Buy now!" (3 words)</text>

  <!-- Row 6: Dirty word filter -->
  <rect x="20" y="256" width="780" height="40" fill="white"/>
  <text x="110" y="271" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#1f4fa3" text-anchor="middle">Dirty Word Filter</text>
  <text x="285" y="268" font-family="Arial,sans-serif" font-size="9" fill="#5b6675" text-anchor="middle">Removes NSFW content using</text>
  <text x="285" y="281" font-family="Arial,sans-serif" font-size="9" fill="#5b6675" text-anchor="middle">curated keyword blocklist</text>
  <rect x="415" y="260" width="110" height="22" rx="3" fill="#1f4fa3" opacity="0.15"/>
  <text x="470" y="275" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#1f4fa3" text-anchor="middle">0 blocklist hits</text>
  <text x="620" y="271" font-family="Arial,sans-serif" font-size="9" fill="#0e8a6e" text-anchor="middle">Science article (0 hits)</text>
  <text x="750" y="271" font-family="Arial,sans-serif" font-size="9" fill="#c0392b" text-anchor="middle">Page with NSFW keywords</text>

  <!-- Column dividers -->
  <line x1="200" y1="56" x2="200" y2="296" stroke="#d0d5de" stroke-width="0.5"/>
  <line x1="390" y1="56" x2="390" y2="296" stroke="#d0d5de" stroke-width="0.5"/>
  <line x1="550" y1="56" x2="550" y2="296" stroke="#d0d5de" stroke-width="0.5"/>
  <line x1="690" y1="56" x2="690" y2="296" stroke="#d0d5de" stroke-width="0.5"/>

  <!-- Border -->
  <rect x="20" y="30" width="780" height="266" fill="none" stroke="#d0d5de" stroke-width="1" rx="3"/>
</svg>
