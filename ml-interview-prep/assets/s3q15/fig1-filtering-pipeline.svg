<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 340" width="820" height="340">
  <!-- Background -->
  <rect width="820" height="340" fill="#f8f9fb" rx="8"/>

  <!-- Title -->
  <text x="410" y="24" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#1f4fa3" text-anchor="middle">Common Crawl Quality Filtering Pipeline: 500TB to 15TB</text>

  <!--
    Funnel stages, each a trapezoid getting narrower.
    Stages:
    0: Raw CC dump 500TB  — full width ~700px, center x=410
    1: URL filter 400TB   — 620px
    2: Language ID 200TB  — 520px
    3: Heuristic filters 80TB — 400px
    4: Perplexity filter 40TB — 300px
    5: Deduplication 25TB — 220px
    6: Classifier 15TB    — 160px

    Y positions: start y=45, each stage height=34px, gap=2px
    Total: 7 stages * 36 = 252, start 45, end ~297, then output box

    Stage colors: alternating shades of navy/teal
  -->

  <!-- Helper: each stage is a rectangle (simplified bar chart style for clarity) -->
  <!-- Stage 0: Raw dump (x center=410, full width) -->
  <!-- Bar: left = 410 - width/2, right = 410 + width/2 -->

  <!-- Stage labels on left, size on right, filter name in bar -->
  <!-- Bar starts at x=130, bar center at 410, right label ends at 690 -->

  <!-- Stage 0: 500TB, width=560 (x=130 to 690) -->
  <rect x="130" y="44" width="560" height="32" rx="3" fill="#1f4fa3" opacity="0.85"/>
  <text x="410" y="65" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="white" text-anchor="middle">Raw Common Crawl Dump: 500TB (~2.7B pages)</text>

  <!-- Arrow -->
  <polygon points="405,80 415,80 415,87 420,87 410,96 400,87 405,87" fill="#5b6675"/>

  <!-- Stage 1: URL filter, 400TB, width=560*(400/500)=448 -->
  <rect x="166" y="98" width="488" height="30" rx="3" fill="#1f4fa3" opacity="0.70"/>
  <text x="280" y="117" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="white" text-anchor="middle">URL Filtering</text>
  <text x="410" y="117" font-family="Arial,sans-serif" font-size="10" fill="white" text-anchor="middle">(blocklists: adult/spam/malware)</text>
  <text x="590" y="117" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="white" text-anchor="middle">400TB (80%)</text>

  <!-- Arrow -->
  <polygon points="405,132 415,132 415,139 420,139 410,148 400,139 405,139" fill="#5b6675"/>

  <!-- Stage 2: Language ID, 200TB, width=390 -->
  <rect x="215" y="150" width="390" height="30" rx="3" fill="#0e8a6e" opacity="0.85"/>
  <text x="320" y="169" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="white" text-anchor="middle">Language ID</text>
  <text x="410" y="169" font-family="Arial,sans-serif" font-size="10" fill="white" text-anchor="middle">(fastText, p(lang) > 0.65)</text>
  <text x="560" y="169" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="white" text-anchor="middle">200TB (50%)</text>

  <!-- Arrow -->
  <polygon points="405,184 415,184 415,191 420,191 410,200 400,191 405,191" fill="#5b6675"/>

  <!-- Stage 3: Heuristic filters, 80TB, width=300 -->
  <rect x="260" y="202" width="300" height="30" rx="3" fill="#1f4fa3" opacity="0.65"/>
  <text x="350" y="221" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="white" text-anchor="middle">Heuristic Filters</text>
  <text x="430" y="221" font-family="Arial,sans-serif" font-size="10" fill="white" text-anchor="middle">(Gopher rules)</text>
  <text x="530" y="221" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="white" text-anchor="middle">80TB (40%)</text>

  <!-- Arrow -->
  <polygon points="405,236 415,236 415,243 420,243 410,252 400,243 405,243" fill="#5b6675"/>

  <!-- Stage 4: Perplexity filter, 40TB, width=230 -->
  <rect x="295" y="254" width="230" height="30" rx="3" fill="#0e8a6e" opacity="0.70"/>
  <text x="360" y="273" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="white" text-anchor="middle">Perplexity Filter</text>
  <text x="430" y="273" font-family="Arial,sans-serif" font-size="10" fill="white" text-anchor="middle">(KenLM 5-gram)</text>
  <text x="495" y="273" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="white" text-anchor="middle">40TB (50%)</text>

  <!-- Arrow -->
  <polygon points="405,288 415,288 415,295 420,295 410,304 400,295 405,295" fill="#5b6675"/>

  <!-- Stage 5: Deduplication, 25TB, width=175 -->
  <rect x="323" y="306" width="174" height="28" rx="3" fill="#1f4fa3" opacity="0.80"/>
  <text x="360" y="323" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="white" text-anchor="middle">Deduplication</text>
  <text x="453" y="323" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="white" text-anchor="middle">25TB (63%)</text>

  <!-- Right-side retention rate annotation panel -->
  <rect x="700" y="44" width="110" height="32" rx="3" fill="#e8f0fb" stroke="#1f4fa3" stroke-width="0.5"/>
  <text x="755" y="62" font-family="Arial,sans-serif" font-size="10" fill="#1f4fa3" text-anchor="middle" font-weight="bold">Starting: 500TB</text>
  <rect x="700" y="98" width="110" height="30" rx="3" fill="#e8f0fb" stroke="#1f4fa3" stroke-width="0.5"/>
  <text x="755" y="117" font-family="Arial,sans-serif" font-size="10" fill="#1f4fa3" text-anchor="middle">Retained: 80%</text>
  <rect x="700" y="150" width="110" height="30" rx="3" fill="#e8f4f0" stroke="#0e8a6e" stroke-width="0.5"/>
  <text x="755" y="169" font-family="Arial,sans-serif" font-size="10" fill="#0e8a6e" text-anchor="middle">Retained: 40%</text>
  <rect x="700" y="202" width="110" height="30" rx="3" fill="#e8f0fb" stroke="#1f4fa3" stroke-width="0.5"/>
  <text x="755" y="221" font-family="Arial,sans-serif" font-size="10" fill="#1f4fa3" text-anchor="middle">Retained: 16%</text>
  <rect x="700" y="254" width="110" height="30" rx="3" fill="#e8f4f0" stroke="#0e8a6e" stroke-width="0.5"/>
  <text x="755" y="273" font-family="Arial,sans-serif" font-size="10" fill="#0e8a6e" text-anchor="middle">Retained: 8%</text>
  <rect x="700" y="306" width="110" height="28" rx="3" fill="#e8f0fb" stroke="#1f4fa3" stroke-width="0.5"/>
  <text x="755" y="323" font-family="Arial,sans-serif" font-size="10" fill="#1f4fa3" text-anchor="middle">Retained: 5%</text>

  <!-- Final output label -->
  <text x="410" y="295" font-family="Arial,sans-serif" font-size="9" fill="#0e8a6e" text-anchor="middle" font-style="italic">(+ classifier filter: 15TB ~ 12T tokens)</text>
</svg>
