<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 340" width="860" height="340" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="860" height="340" fill="#f8f9fa" rx="8"/>
  <text x="430" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#1f4fa3">FFN as Key-Value Memory</text>

  <!-- Input token -->
  <rect x="20" y="120" width="110" height="90" rx="6" fill="#e8edf7" stroke="#1f4fa3" stroke-width="1.5"/>
  <text x="75" y="155" text-anchor="middle" font-size="12" font-weight="bold" fill="#1f4fa3">Token repr</text>
  <text x="75" y="172" text-anchor="middle" font-size="11" fill="#333">x ∈ ℝ⁷⁶⁸</text>
  <text x="75" y="188" text-anchor="middle" font-size="10" fill="#555">(e.g. "bank"</text>
  <text x="75" y="200" text-anchor="middle" font-size="10" fill="#555">financial ctx)</text>

  <!-- Arrow 1 -->
  <line x1="130" y1="165" x2="178" y2="165" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="154" y="156" text-anchor="middle" font-size="9" fill="#555">score</text>
  <text x="154" y="168" text-anchor="middle" font-size="9" fill="#555">each key</text>

  <!-- W1 key matrix -->
  <rect x="178" y="60" width="130" height="210" rx="6" fill="#fff3e0" stroke="#c77a12" stroke-width="1.5"/>
  <text x="243" y="84" text-anchor="middle" font-size="12" font-weight="bold" fill="#c77a12">W₁ — Keys</text>
  <text x="243" y="99" text-anchor="middle" font-size="10" fill="#888">3072 row vectors</text>
  <!-- key rows -->
  <rect x="190" y="110" width="106" height="18" rx="3" fill="#ffe0a0"/>
  <text x="243" y="123" text-anchor="middle" font-size="9" fill="#333">k₁: "financial inst."  ▶▶▶</text>
  <rect x="190" y="132" width="106" height="18" rx="3" fill="#f0f0f0"/>
  <text x="243" y="145" text-anchor="middle" font-size="9" fill="#999">k₂: "river bank"  ▶</text>
  <rect x="190" y="154" width="106" height="18" rx="3" fill="#ffe0a0"/>
  <text x="243" y="167" text-anchor="middle" font-size="9" fill="#333">k₃: "vault/safe"  ▶▶</text>
  <rect x="190" y="176" width="106" height="18" rx="3" fill="#f0f0f0"/>
  <text x="243" y="189" text-anchor="middle" font-size="9" fill="#999">k₄: "data struct."  ·</text>
  <rect x="190" y="198" width="106" height="18" rx="3" fill="#ffe0a0"/>
  <text x="243" y="211" text-anchor="middle" font-size="9" fill="#333">k₅: "bank account"  ▶▶▶</text>
  <text x="243" y="240" text-anchor="middle" font-size="9" fill="#888">… 3067 more keys</text>

  <!-- Arrow 2 -->
  <line x1="308" y1="165" x2="360" y2="165" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="334" y="156" text-anchor="middle" font-size="9" fill="#555">GELU</text>
  <text x="334" y="168" text-anchor="middle" font-size="9" fill="#555">gate</text>

  <!-- Activation gate -->
  <rect x="360" y="100" width="110" height="130" rx="6" fill="#e8f5e9" stroke="#0e8a6e" stroke-width="1.5"/>
  <text x="415" y="120" text-anchor="middle" font-size="12" font-weight="bold" fill="#0e8a6e">GELU Gate</text>
  <text x="415" y="136" text-anchor="middle" font-size="9" fill="#555">active neurons →</text>
  <!-- bars showing activation -->
  <rect x="372" y="148" width="76" height="10" rx="2" fill="#0e8a6e"/>
  <text x="458" y="157" font-size="8" fill="#333">k₁ ██████ HIGH</text>
  <rect x="372" y="163" width="12" height="10" rx="2" fill="#ccc"/>
  <text x="458" y="172" font-size="8" fill="#aaa">k₂ █ low</text>
  <rect x="372" y="178" width="46" height="10" rx="2" fill="#6ec47e"/>
  <text x="458" y="187" font-size="8" fill="#333">k₃ ████ MED</text>
  <rect x="372" y="193" width="4" height="10" rx="2" fill="#eee"/>
  <text x="458" y="202" font-size="8" fill="#ccc">k₄ · dead</text>
  <rect x="372" y="208" width="76" height="10" rx="2" fill="#0e8a6e"/>
  <text x="458" y="217" font-size="8" fill="#333">k₅ ██████ HIGH</text>

  <!-- Arrow 3 -->
  <line x1="470" y1="165" x2="522" y2="165" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="496" y="155" text-anchor="middle" font-size="9" fill="#555">weight</text>
  <text x="496" y="167" text-anchor="middle" font-size="9" fill="#555">active vals</text>

  <!-- W2 value matrix -->
  <rect x="522" y="60" width="130" height="210" rx="6" fill="#fce4ec" stroke="#e05252" stroke-width="1.5"/>
  <text x="587" y="84" text-anchor="middle" font-size="12" font-weight="bold" fill="#e05252">W₂ — Values</text>
  <text x="587" y="99" text-anchor="middle" font-size="10" fill="#888">3072 col vectors</text>
  <!-- value rows -->
  <rect x="534" y="110" width="106" height="18" rx="3" fill="#ffcdd2"/>
  <text x="587" y="123" text-anchor="middle" font-size="9" fill="#c00">v₁: → "finance" feats ✓</text>
  <rect x="534" y="132" width="106" height="18" rx="3" fill="#f5f5f5"/>
  <text x="587" y="145" text-anchor="middle" font-size="9" fill="#bbb">v₂: (suppressed)  ✗</text>
  <rect x="534" y="154" width="106" height="18" rx="3" fill="#ffcdd2"/>
  <text x="587" y="167" text-anchor="middle" font-size="9" fill="#c00">v₃: → "vault" feats ✓</text>
  <rect x="534" y="176" width="106" height="18" rx="3" fill="#f5f5f5"/>
  <text x="587" y="189" text-anchor="middle" font-size="9" fill="#bbb">v₄: (dead)  ✗</text>
  <rect x="534" y="198" width="106" height="18" rx="3" fill="#ffcdd2"/>
  <text x="587" y="211" text-anchor="middle" font-size="9" fill="#c00">v₅: → "account" feats ✓</text>
  <text x="587" y="240" text-anchor="middle" font-size="9" fill="#888">… 3067 more values</text>

  <!-- Arrow 4 -->
  <line x1="652" y1="165" x2="700" y2="165" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="676" y="156" text-anchor="middle" font-size="9" fill="#555">sparse</text>
  <text x="676" y="168" text-anchor="middle" font-size="9" fill="#555">sum Δh</text>

  <!-- Output -->
  <rect x="700" y="120" width="130" height="90" rx="6" fill="#e8f5e9" stroke="#0e8a6e" stroke-width="1.5"/>
  <text x="765" y="152" text-anchor="middle" font-size="12" font-weight="bold" fill="#0e8a6e">Residual</text>
  <text x="765" y="167" text-anchor="middle" font-size="12" font-weight="bold" fill="#0e8a6e">update Δh</text>
  <text x="765" y="183" text-anchor="middle" font-size="10" fill="#555">"bank" → finance</text>
  <text x="765" y="196" text-anchor="middle" font-size="10" fill="#555">features written</text>

  <!-- Bottom label -->
  <text x="430" y="308" text-anchor="middle" font-size="10" fill="#555">Active neurons (those with large GELU output) contribute their</text>
  <text x="430" y="322" text-anchor="middle" font-size="10" fill="#555">W₂ value columns to the residual stream — suppressed neurons contribute nothing.</text>

  <!-- Arrowhead marker -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#555"/>
    </marker>
  </defs>
</svg>
