<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 380" width="860" height="380" font-family="Arial, sans-serif">
  <rect width="860" height="380" fill="#f8f9fa" rx="8"/>
  <text x="430" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#1f4fa3">Special Token Layout: BERT vs. GPT-2 vs. Llama-2</text>

  <!-- ===== BERT Row ===== -->
  <text x="30" y="75" font-size="13" font-weight="bold" fill="#1f4fa3">BERT (bidirectional encoder)</text>

  <!-- Token boxes -->
  <rect x="30" y="85" width="80" height="40" fill="#1f4fa3" rx="4"/>
  <text x="70" y="110" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">[CLS]</text>
  <text x="70" y="140" text-anchor="middle" font-size="11" fill="#1f4fa3">ID: 101</text>

  <rect x="120" y="85" width="80" height="40" fill="#2a7dc4" rx="4"/>
  <text x="160" y="110" text-anchor="middle" font-size="13" fill="#fff">Hello</text>
  <text x="160" y="140" text-anchor="middle" font-size="11" fill="#2a7dc4">real token</text>

  <rect x="210" y="85" width="80" height="40" fill="#2a7dc4" rx="4"/>
  <text x="250" y="110" text-anchor="middle" font-size="13" fill="#fff">world</text>
  <text x="250" y="140" text-anchor="middle" font-size="11" fill="#2a7dc4">real token</text>

  <rect x="300" y="85" width="80" height="40" fill="#0e8a6e" rx="4"/>
  <text x="340" y="110" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">[SEP]</text>
  <text x="340" y="140" text-anchor="middle" font-size="11" fill="#0e8a6e">ID: 102</text>

  <rect x="390" y="85" width="80" height="40" fill="#2a7dc4" rx="4"/>
  <text x="430" y="110" text-anchor="middle" font-size="13" fill="#fff">How are</text>
  <text x="430" y="140" text-anchor="middle" font-size="11" fill="#2a7dc4">real token</text>

  <rect x="480" y="85" width="80" height="40" fill="#2a7dc4" rx="4"/>
  <text x="520" y="110" text-anchor="middle" font-size="13" fill="#fff">you</text>
  <text x="520" y="140" text-anchor="middle" font-size="11" fill="#2a7dc4">real token</text>

  <rect x="570" y="85" width="80" height="40" fill="#0e8a6e" rx="4"/>
  <text x="610" y="110" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">[SEP]</text>
  <text x="610" y="140" text-anchor="middle" font-size="11" fill="#0e8a6e">ID: 102</text>

  <rect x="660" y="85" width="80" height="40" fill="#888" rx="4"/>
  <text x="700" y="110" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">[PAD]</text>
  <text x="700" y="140" text-anchor="middle" font-size="11" fill="#888">ID: 0</text>

  <!-- Attention mask label for BERT -->
  <text x="30" y="165" font-size="11" fill="#5b6675">attention_mask:</text>
  <text x="70" y="165" text-anchor="middle" font-size="13" font-weight="bold" fill="#1f4fa3" dx="40">1</text>
  <text x="160" y="165" text-anchor="middle" font-size="13" font-weight="bold" fill="#1f4fa3">1</text>
  <text x="250" y="165" text-anchor="middle" font-size="13" font-weight="bold" fill="#1f4fa3">1</text>
  <text x="340" y="165" text-anchor="middle" font-size="13" font-weight="bold" fill="#1f4fa3">1</text>
  <text x="430" y="165" text-anchor="middle" font-size="13" font-weight="bold" fill="#1f4fa3">1</text>
  <text x="520" y="165" text-anchor="middle" font-size="13" font-weight="bold" fill="#1f4fa3">1</text>
  <text x="610" y="165" text-anchor="middle" font-size="13" font-weight="bold" fill="#1f4fa3">1</text>
  <text x="700" y="165" text-anchor="middle" font-size="13" font-weight="bold" fill="#c0392b">0</text>

  <line x1="30" y1="178" x2="820" y2="178" stroke="#ccc" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- ===== GPT-2 Row ===== -->
  <text x="30" y="205" font-size="13" font-weight="bold" fill="#c77a12">GPT-2 / causal decoder — right-padding (less common; left-padding preferred)</text>

  <rect x="30" y="215" width="80" height="40" fill="#2a7dc4" rx="4"/>
  <text x="70" y="240" text-anchor="middle" font-size="13" fill="#fff">Hello</text>
  <text x="70" y="268" text-anchor="middle" font-size="11" fill="#2a7dc4">real token</text>

  <rect x="120" y="215" width="80" height="40" fill="#2a7dc4" rx="4"/>
  <text x="160" y="240" text-anchor="middle" font-size="13" fill="#fff">world</text>
  <text x="160" y="268" text-anchor="middle" font-size="11" fill="#2a7dc4">real token</text>

  <rect x="210" y="215" width="80" height="40" fill="#c77a12" rx="4"/>
  <text x="250" y="240" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">&lt;|eos|&gt;</text>
  <text x="250" y="268" text-anchor="middle" font-size="11" fill="#c77a12">ID: 50256</text>

  <rect x="300" y="215" width="80" height="40" fill="#888" rx="4"/>
  <text x="340" y="240" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">[PAD]</text>
  <text x="340" y="268" text-anchor="middle" font-size="11" fill="#888">ID: 50256</text>

  <rect x="390" y="215" width="80" height="40" fill="#888" rx="4"/>
  <text x="430" y="240" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">[PAD]</text>
  <text x="430" y="268" text-anchor="middle" font-size="11" fill="#888">ID: 50256</text>

  <!-- Attention mask label for GPT-2 -->
  <text x="30" y="293" font-size="11" fill="#5b6675">attention_mask:</text>
  <text x="70" y="293" text-anchor="middle" font-size="13" font-weight="bold" fill="#1f4fa3" dx="40">1</text>
  <text x="160" y="293" text-anchor="middle" font-size="13" font-weight="bold" fill="#1f4fa3">1</text>
  <text x="250" y="293" text-anchor="middle" font-size="13" font-weight="bold" fill="#1f4fa3">1</text>
  <text x="340" y="293" text-anchor="middle" font-size="13" font-weight="bold" fill="#c0392b">0</text>
  <text x="430" y="293" text-anchor="middle" font-size="13" font-weight="bold" fill="#c0392b">0</text>

  <line x1="30" y1="305" x2="820" y2="305" stroke="#ccc" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- ===== Llama-2 Row ===== -->
  <text x="30" y="327" font-size="13" font-weight="bold" fill="#6c4fe0">Llama-2 (causal decoder)</text>

  <rect x="30" y="337" width="80" height="30" fill="#6c4fe0" rx="4"/>
  <text x="70" y="357" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">&lt;s&gt; BOS</text>

  <rect x="120" y="337" width="80" height="30" fill="#2a7dc4" rx="4"/>
  <text x="160" y="357" text-anchor="middle" font-size="12" fill="#fff">Hello</text>

  <rect x="210" y="337" width="80" height="30" fill="#2a7dc4" rx="4"/>
  <text x="250" y="357" text-anchor="middle" font-size="12" fill="#fff">world</text>

  <rect x="300" y="337" width="80" height="30" fill="#9c4fe0" rx="4"/>
  <text x="340" y="357" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">&lt;/s&gt; EOS</text>

  <!-- Legend -->
  <rect x="640" y="215" width="16" height="16" rx="3" fill="#1f4fa3"/>
  <text x="662" y="228" font-size="11" fill="#333">CLS / BOS</text>
  <rect x="640" y="238" width="16" height="16" rx="3" fill="#0e8a6e"/>
  <text x="662" y="251" font-size="11" fill="#333">SEP / EOS</text>
  <rect x="640" y="261" width="16" height="16" rx="3" fill="#2a7dc4"/>
  <text x="662" y="274" font-size="11" fill="#333">Real token (mask=1)</text>
  <rect x="640" y="284" width="16" height="16" rx="3" fill="#888"/>
  <text x="662" y="297" font-size="11" fill="#333">PAD (mask=0)</text>
</svg>
