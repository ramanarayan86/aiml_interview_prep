<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" width="720" height="400">
  <!-- Background -->
  <rect width="720" height="400" fill="#f8f9fb" rx="8"/>

  <!-- Main title -->
  <text x="360" y="28" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#1f1f2e">Constitutional AI: Two-Phase Training Pipeline</text>

  <!-- ===== PHASE 1 LABEL ===== -->
  <rect x="20" y="42" width="320" height="22" rx="5" fill="#1f4fa3"/>
  <text x="180" y="57" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="white">Phase 1: SL-CAI (Supervised Learning CAI)</text>

  <!-- Step 1: Red-teaming prompt -->
  <rect x="20" y="74" width="140" height="46" rx="6" fill="#fce4e4" stroke="#c0392b" stroke-width="1.5"/>
  <text x="90" y="92" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#c0392b">Red-Teaming</text>
  <text x="90" y="106" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#c0392b">Harmful prompt</text>
  <text x="90" y="118" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#c0392b">&#x2192; harmful output y&#x2070;</text>

  <!-- Arrow -->
  <line x1="160" y1="97" x2="188" y2="97" stroke="#5b6675" stroke-width="1.5" marker-end="url(#arr2)"/>

  <!-- Step 2: Critique -->
  <rect x="190" y="74" width="148" height="46" rx="6" fill="#fff3cd" stroke="#c77a12" stroke-width="1.5"/>
  <text x="264" y="92" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#c77a12">Critique</text>
  <text x="264" y="106" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#c77a12">Model critiques y&#x2070;</text>
  <text x="264" y="118" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#c77a12">via constitution</text>

  <!-- Arrow -->
  <line x1="338" y1="97" x2="366" y2="97" stroke="#5b6675" stroke-width="1.5" marker-end="url(#arr2)"/>

  <!-- Step 3: Revision -->
  <rect x="368" y="74" width="138" height="46" rx="6" fill="#e8f4f0" stroke="#0e8a6e" stroke-width="1.5"/>
  <text x="437" y="92" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#0e8a6e">Revision</text>
  <text x="437" y="106" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#0e8a6e">Model rewrites y&#x2070;</text>
  <text x="437" y="118" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#0e8a6e">&#x2192; harmless y&#x2071;</text>

  <!-- Arrow -->
  <line x1="506" y1="97" x2="534" y2="97" stroke="#5b6675" stroke-width="1.5" marker-end="url(#arr2)"/>

  <!-- Step 4: SFT data -->
  <rect x="536" y="74" width="148" height="46" rx="6" fill="#dce8fb" stroke="#1f4fa3" stroke-width="1.5"/>
  <text x="610" y="92" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#1f4fa3">SFT Fine-tune</text>
  <text x="610" y="106" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#1f4fa3">Train on (prompt, y&#x2071;)</text>
  <text x="610" y="118" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#1f4fa3">&#x2192; SL-CAI model</text>

  <!-- Constitution callout box -->
  <rect x="190" y="133" width="316" height="36" rx="5" fill="#fffae8" stroke="#c77a12" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="348" y="147" text-anchor="middle" font-family="sans-serif" font-size="10" font-style="italic" fill="#c77a12">Constitution principle: "Choose the response least likely</text>
  <text x="348" y="160" text-anchor="middle" font-family="sans-serif" font-size="10" font-style="italic" fill="#c77a12">to contain harmful or unethical content."</text>

  <!-- Connecting lines from Critique box to constitution -->
  <line x1="264" y1="120" x2="264" y2="133" stroke="#c77a12" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Multi-round arrow for critique-revise loop -->
  <path d="M 437 120 Q 437 160 264 160 Q 200 160 200 140" fill="none" stroke="#c77a12" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arr2)"/>
  <text x="350" y="178" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#c77a12">Can repeat N critique-revise rounds</text>

  <!-- Divider between phases -->
  <line x1="20" y1="198" x2="700" y2="198" stroke="#cccccc" stroke-width="1.5"/>

  <!-- ===== PHASE 2 LABEL ===== -->
  <rect x="20" y="208" width="320" height="22" rx="5" fill="#0e8a6e"/>
  <text x="180" y="223" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="white">Phase 2: RL-CAI (RLAIF on Constitution)</text>

  <!-- Step 1 P2: SL-CAI model -->
  <rect x="20" y="240" width="140" height="46" rx="6" fill="#dce8fb" stroke="#1f4fa3" stroke-width="1.5"/>
  <text x="90" y="258" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#1f4fa3">SL-CAI Model</text>
  <text x="90" y="272" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#1f4fa3">Generates pairs</text>
  <text x="90" y="285" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#1f4fa3">(y&#x2098;, y&#x2098;&#x207A;&#xB9;) per prompt</text>

  <!-- Arrow -->
  <line x1="160" y1="263" x2="188" y2="263" stroke="#5b6675" stroke-width="1.5" marker-end="url(#arr2)"/>

  <!-- Step 2 P2: AI preference labels -->
  <rect x="190" y="240" width="148" height="46" rx="6" fill="#d0f0e8" stroke="#0e8a6e" stroke-width="2"/>
  <text x="264" y="258" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#0e8a6e">AI Judge</text>
  <text x="264" y="272" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#0e8a6e">Labels preferences</text>
  <text x="264" y="285" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#0e8a6e">via constitution (RLAIF)</text>

  <!-- Arrow -->
  <line x1="338" y1="263" x2="366" y2="263" stroke="#5b6675" stroke-width="1.5" marker-end="url(#arr2)"/>

  <!-- Step 3 P2: Preference model -->
  <rect x="368" y="240" width="138" height="46" rx="6" fill="#e8e4f8" stroke="#6c4fe0" stroke-width="1.5"/>
  <text x="437" y="258" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#6c4fe0">Preference Model</text>
  <text x="437" y="272" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#6c4fe0">PM trained on</text>
  <text x="437" y="285" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#6c4fe0">AI-labeled pairs</text>

  <!-- Arrow -->
  <line x1="506" y1="263" x2="534" y2="263" stroke="#5b6675" stroke-width="1.5" marker-end="url(#arr2)"/>

  <!-- Step 4 P2: PPO -->
  <rect x="536" y="240" width="148" height="46" rx="6" fill="#1f4fa3" stroke="#1f4fa3" stroke-width="1.5"/>
  <text x="610" y="258" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="white">PPO Fine-tune</text>
  <text x="610" y="272" text-anchor="middle" font-family="sans-serif" font-size="10" fill="white">Policy optimised</text>
  <text x="610" y="285" text-anchor="middle" font-family="sans-serif" font-size="10" fill="white">&#x2192; Claude (RL-CAI)</text>

  <!-- Note: no human feedback on harmlessness -->
  <rect x="190" y="298" width="494" height="26" rx="5" fill="#fce4e4" stroke="#c0392b" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="437" y="310" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#c0392b">No human feedback on harmlessness in Phase 2 — only human labels on helpfulness (separate RM)</text>
  <text x="437" y="322" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#c0392b">Harmlessness is entirely governed by the constitution via AI feedback</text>

  <!-- ===== KEY DIFFERENCES summary row ===== -->
  <rect x="20" y="340" width="320" height="48" rx="6" fill="#fff8ee" stroke="#c77a12" stroke-width="1"/>
  <text x="30" y="355" font-family="sans-serif" font-size="10" font-weight="bold" fill="#c77a12">SL-CAI advantages:</text>
  <text x="30" y="370" font-family="sans-serif" font-size="10" fill="#5b6675">&#x2022; Transparent: principles are explicit text</text>
  <text x="30" y="383" font-family="sans-serif" font-size="10" fill="#5b6675">&#x2022; No human labeling for harmlessness</text>

  <rect x="360" y="340" width="340" height="48" rx="6" fill="#e8f4f0" stroke="#0e8a6e" stroke-width="1"/>
  <text x="370" y="355" font-family="sans-serif" font-size="10" font-weight="bold" fill="#0e8a6e">RL-CAI advantages:</text>
  <text x="370" y="370" font-family="sans-serif" font-size="10" fill="#5b6675">&#x2022; Scalable: millions of AI preference labels</text>
  <text x="370" y="383" font-family="sans-serif" font-size="10" fill="#5b6675">&#x2022; Constitution enables targeted improvements</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arr2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#5b6675"/>
    </marker>
  </defs>
</svg>
