<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 300" width="820" height="300">
  <!-- Background -->
  <rect width="820" height="300" fill="#f8f9fb" rx="8"/>

  <!-- Title -->
  <text x="410" y="28" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#1f4fa3" text-anchor="middle">Loss Spike Anatomy: Recoverable vs Unrecoverable</text>

  <!-- Axes area: x from 70 to 770, y from 50 to 260 -->
  <!-- Y axis -->
  <line x1="70" y1="50" x2="70" y2="260" stroke="#5b6675" stroke-width="1.5"/>
  <!-- X axis -->
  <line x1="70" y1="260" x2="770" y2="260" stroke="#5b6675" stroke-width="1.5"/>

  <!-- Y axis label -->
  <text x="18" y="160" font-family="Arial,sans-serif" font-size="12" fill="#5b6675" text-anchor="middle" transform="rotate(-90,18,160)">Training Loss (nats)</text>

  <!-- X axis label -->
  <text x="420" y="287" font-family="Arial,sans-serif" font-size="12" fill="#5b6675" text-anchor="middle">Training Step (thousands)</text>

  <!-- Y axis ticks and labels: 1.0 to 4.0 -->
  <!-- y=260 → loss 1.0, y=50 → loss 4.5; scale: (260-50)/(4.5-1.0) = 210/3.5 = 60 px/unit -->
  <!-- loss L maps to y = 260 - (L - 1.0)*60 -->
  <!-- 1.0 → 260, 1.5 → 230, 2.0 → 200, 2.5 → 170, 3.0 → 140, 3.5 → 110, 4.0 → 80 -->
  <line x1="65" y1="260" x2="70" y2="260" stroke="#5b6675" stroke-width="1.5"/>
  <text x="60" y="264" font-family="Arial,sans-serif" font-size="10" fill="#5b6675" text-anchor="end">1.0</text>
  <line x1="65" y1="230" x2="70" y2="230" stroke="#5b6675" stroke-width="1.5"/>
  <text x="60" y="234" font-family="Arial,sans-serif" font-size="10" fill="#5b6675" text-anchor="end">1.5</text>
  <line x1="65" y1="200" x2="70" y2="200" stroke="#5b6675" stroke-width="1.5"/>
  <text x="60" y="204" font-family="Arial,sans-serif" font-size="10" fill="#5b6675" text-anchor="end">2.0</text>
  <line x1="65" y1="170" x2="70" y2="170" stroke="#5b6675" stroke-width="1.5"/>
  <text x="60" y="174" font-family="Arial,sans-serif" font-size="10" fill="#5b6675" text-anchor="end">2.5</text>
  <line x1="65" y1="140" x2="70" y2="140" stroke="#5b6675" stroke-width="1.5"/>
  <text x="60" y="144" font-family="Arial,sans-serif" font-size="10" fill="#5b6675" text-anchor="end">3.0</text>
  <line x1="65" y1="110" x2="70" y2="110" stroke="#5b6675" stroke-width="1.5"/>
  <text x="60" y="114" font-family="Arial,sans-serif" font-size="10" fill="#5b6675" text-anchor="end">3.5</text>
  <line x1="65" y1="80" x2="70" y2="80" stroke="#5b6675" stroke-width="1.5"/>
  <text x="60" y="84" font-family="Arial,sans-serif" font-size="10" fill="#5b6675" text-anchor="end">4.0</text>

  <!-- X axis ticks: 0 to 100K in steps of 10K -->
  <!-- x range 70 to 770 = 700px for 100K steps, so 7px per 1K step -->
  <!-- 0K→70, 10K→140, 20K→210, 30K→280, 40K→350, 45K→385, 50K→420, 60K→490, 70K→560, 71K→567, 72K→574, 80K→630, 90K→700, 100K→770 -->
  <line x1="70" y1="260" x2="70" y2="265" stroke="#5b6675" stroke-width="1.5"/>
  <text x="70" y="277" font-family="Arial,sans-serif" font-size="10" fill="#5b6675" text-anchor="middle">0</text>
  <line x1="140" y1="260" x2="140" y2="265" stroke="#5b6675" stroke-width="1.5"/>
  <text x="140" y="277" font-family="Arial,sans-serif" font-size="10" fill="#5b6675" text-anchor="middle">10K</text>
  <line x1="210" y1="260" x2="210" y2="265" stroke="#5b6675" stroke-width="1.5"/>
  <text x="210" y="277" font-family="Arial,sans-serif" font-size="10" fill="#5b6675" text-anchor="middle">20K</text>
  <line x1="280" y1="260" x2="280" y2="265" stroke="#5b6675" stroke-width="1.5"/>
  <text x="280" y="277" font-family="Arial,sans-serif" font-size="10" fill="#5b6675" text-anchor="middle">30K</text>
  <line x1="350" y1="260" x2="350" y2="265" stroke="#5b6675" stroke-width="1.5"/>
  <text x="350" y="277" font-family="Arial,sans-serif" font-size="10" fill="#5b6675" text-anchor="middle">40K</text>
  <line x1="420" y1="260" x2="420" y2="265" stroke="#5b6675" stroke-width="1.5"/>
  <text x="420" y="277" font-family="Arial,sans-serif" font-size="10" fill="#5b6675" text-anchor="middle">50K</text>
  <line x1="490" y1="260" x2="490" y2="265" stroke="#5b6675" stroke-width="1.5"/>
  <text x="490" y="277" font-family="Arial,sans-serif" font-size="10" fill="#5b6675" text-anchor="middle">60K</text>
  <line x1="560" y1="260" x2="560" y2="265" stroke="#5b6675" stroke-width="1.5"/>
  <text x="560" y="277" font-family="Arial,sans-serif" font-size="10" fill="#5b6675" text-anchor="middle">70K</text>
  <line x1="630" y1="260" x2="630" y2="265" stroke="#5b6675" stroke-width="1.5"/>
  <text x="630" y="277" font-family="Arial,sans-serif" font-size="10" fill="#5b6675" text-anchor="middle">80K</text>
  <line x1="700" y1="260" x2="700" y2="265" stroke="#5b6675" stroke-width="1.5"/>
  <text x="700" y="277" font-family="Arial,sans-serif" font-size="10" fill="#5b6675" text-anchor="middle">90K</text>
  <line x1="770" y1="260" x2="770" y2="265" stroke="#5b6675" stroke-width="1.5"/>
  <text x="770" y="277" font-family="Arial,sans-serif" font-size="10" fill="#5b6675" text-anchor="middle">100K</text>

  <!-- Gridlines (light) -->
  <line x1="70" y1="200" x2="770" y2="200" stroke="#d0d5de" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="70" y1="170" x2="770" y2="170" stroke="#d0d5de" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="70" y1="140" x2="770" y2="140" stroke="#d0d5de" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="70" y1="110" x2="770" y2="110" stroke="#d0d5de" stroke-width="0.5" stroke-dasharray="4,4"/>

  <!--
    Main loss curve: smooth decrease from ~3.8 at step 0 to ~1.3 at step 100K
    y = 260 - (L - 1.0)*60
    Step 0: L=3.8 → y=232... wait let me recalc.
    loss 3.8 → y = 260 - (3.8-1.0)*60 = 260 - 168 = 92
    loss 3.0 → y = 260 - 120 = 140
    loss 2.5 → y = 260 - 90 = 170
    loss 2.2 → y = 260 - 72 = 188
    loss 2.0 → y = 260 - 60 = 200
    loss 1.8 → y = 260 - 48 = 212
    loss 1.6 → y = 260 - 36 = 224
    loss 1.5 → y = 260 - 30 = 230
    loss 1.4 → y = 260 - 24 = 236
    loss 1.3 → y = 260 - 18 = 242

    Spike 1 at 45K (x=385): L goes from ~2.0 to peak ~3.2, partial recovery to ~2.15
    Spike 2 at 72K (x=574): L goes from ~1.65 to peak ~3.5, NO recovery (stays at ~2.5)
  -->

  <!-- Normal curve segments: defined as polyline points -->
  <!-- Segment 1: 0 to ~43K (step before spike 1 onset) -->
  <!-- Steps: 0→70,92  5K→105,110  10K→140,122  15K→175,132  20K→210,140  25K→245,148  30K→280,155  35K→315,162  40K→350,168  43K→371,171 -->
  <!-- Spike 1 onset ~44K (x=378), peak ~45K (x=385), partial recovery by ~48K (x=406) -->
  <!-- Pre-spike: loss~1.87 → y=260-52.2=208... let me use simpler values -->
  <!-- I'll define key waypoints: -->
  <!-- Normal decreasing baseline (no spike): approximately loss = 3.8*exp(-step/30000) + 1.2 -->
  <!-- Let me just hand-craft a clean polyline -->

  <!-- Segment 1: start to pre-spike-1 (step 0 to 43K) -->
  <polyline points="70,92 105,112 140,128 175,141 210,152 245,161 280,168 315,174 350,179 371,181" fill="none" stroke="#1f4fa3" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- Spike 1: step 43K to 50K: x=371 to x=420 -->
  <!-- pre-spike: loss~1.97 y=181; grad norm spike at 44K (x=378); loss peaks at 45K (x=385) loss~3.2 y=128; partial recovery 48K (x=406) loss~2.1 y=194; resumes normal 50K (x=420) loss~2.0 y=200 -->
  <polyline points="371,181 378,175 385,128 392,150 399,170 406,186 413,194 420,197" fill="none" stroke="#c0392b" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- Segment 2: after spike 1 to pre-spike-2 (step 50K to 71K) -->
  <!-- loss recovers somewhat but never fully: 50K loss~2.0→y=200 down to 71K loss~1.72→y=223 -->
  <!-- But wait, the spike was "partial recovery" so the loss is slightly higher than the ideal baseline -->
  <polyline points="420,197 440,200 460,204 480,208 500,212 520,215 540,218 560,220 567,221" fill="none" stroke="#1f4fa3" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- Spike 2: step 71K to end: x=567 onwards -->
  <!-- pre-spike: loss~1.77 y=221; grad norm spike 71.5K; loss peaks 72K (x=574) loss~3.5 y=110; NO recovery: loss stays ~2.5 y=170 and drifts to ~2.4 -->
  <polyline points="567,221 571,215 574,110 581,145 588,158 595,162 609,165 630,168 700,170 770,172" fill="none" stroke="#c0392b" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- Ideal baseline continuation (dashed) after spike 2 to show what recovery would look like -->
  <polyline points="567,221 600,226 630,229 700,235 770,240" fill="none" stroke="#1f4fa3" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- Gradient norm spike annotation for spike 1: small arrow at 44K showing grad norm precedes loss spike -->
  <!-- Vertical marker at x=378 (44K) -->
  <line x1="378" y1="65" x2="378" y2="180" stroke="#c77a12" stroke-width="1.5" stroke-dasharray="3,3"/>
  <text x="378" y="62" font-family="Arial,sans-serif" font-size="9" fill="#c77a12" text-anchor="middle">grad norm</text>
  <text x="378" y="72" font-family="Arial,sans-serif" font-size="9" fill="#c77a12" text-anchor="middle">spike</text>

  <!-- Annotation: gradient norm precedes loss -->
  <text x="308" y="58" font-family="Arial,sans-serif" font-size="9" fill="#c77a12" text-anchor="middle" font-style="italic">gradient norm spike precedes</text>
  <text x="308" y="70" font-family="Arial,sans-serif" font-size="9" fill="#c77a12" text-anchor="middle" font-style="italic">loss spike by 1-2 steps</text>

  <!-- Rollback arrow at spike 2: from step 72K back to 71K checkpoint -->
  <!-- Arrow from x=574 back to x=567 at y=100 -->
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#0e8a6e"/>
    </marker>
  </defs>
  <line x1="574" y1="95" x2="567" y2="95" stroke="#0e8a6e" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="605" y="90" font-family="Arial,sans-serif" font-size="9" fill="#0e8a6e" text-anchor="middle">Rollback to</text>
  <text x="605" y="101" font-family="Arial,sans-serif" font-size="9" fill="#0e8a6e" text-anchor="middle">71K checkpoint</text>

  <!-- Spike 1 label -->
  <text x="385" y="120" font-family="Arial,sans-serif" font-size="9" fill="#c0392b" text-anchor="middle" font-weight="bold">Spike 1</text>
  <text x="385" y="131" font-family="Arial,sans-serif" font-size="9" fill="#c0392b" text-anchor="middle">(partial recovery)</text>

  <!-- Spike 2 label -->
  <text x="574" y="104" font-family="Arial,sans-serif" font-size="9" fill="#c0392b" text-anchor="middle" font-weight="bold">Spike 2</text>
  <text x="574" y="115" font-family="Arial,sans-serif" font-size="9" fill="#c0392b" text-anchor="middle">(unrecoverable)</text>

  <!-- Legend -->
  <rect x="600" y="52" width="160" height="60" fill="white" stroke="#d0d5de" stroke-width="1" rx="4"/>
  <line x1="610" y1="66" x2="635" y2="66" stroke="#1f4fa3" stroke-width="2.5"/>
  <text x="642" y="70" font-family="Arial,sans-serif" font-size="10" fill="#1f4fa3">Normal loss curve</text>
  <line x1="610" y1="82" x2="635" y2="82" stroke="#c0392b" stroke-width="2.5"/>
  <text x="642" y="86" font-family="Arial,sans-serif" font-size="10" fill="#c0392b">Spike / no recovery</text>
  <line x1="610" y1="98" x2="635" y2="98" stroke="#1f4fa3" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="642" y="102" font-family="Arial,sans-serif" font-size="10" fill="#1f4fa3">Ideal baseline</text>
</svg>
