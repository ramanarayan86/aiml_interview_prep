<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 400" width="860" height="400" font-family="sans-serif">
  <!-- Background -->
  <rect width="860" height="400" fill="#0f1117"/>

  <!-- Title -->
  <text x="430" y="30" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="bold">Gradient L2 Norm During LLM Pretraining</text>

  <!-- Axis labels -->
  <text x="430" y="390" text-anchor="middle" fill="#94a3b8" font-size="12">Training Step (thousands)</text>
  <text x="18" y="210" text-anchor="middle" fill="#94a3b8" font-size="12" transform="rotate(-90,18,210)">Gradient Norm</text>

  <!-- Grid lines -->
  <line x1="70" y1="50" x2="820" y2="50"  stroke="#1e293b" stroke-width="1"/>
  <line x1="70" y1="110" x2="820" y2="110" stroke="#1e293b" stroke-width="1"/>
  <line x1="70" y1="170" x2="820" y2="170" stroke="#1e293b" stroke-width="1"/>
  <line x1="70" y1="230" x2="820" y2="230" stroke="#1e293b" stroke-width="1"/>
  <line x1="70" y1="290" x2="820" y2="290" stroke="#1e293b" stroke-width="1"/>
  <line x1="70" y1="340" x2="820" y2="340" stroke="#1e293b" stroke-width="1"/>

  <!-- Y-axis tick labels (norm values) -->
  <text x="62" y="54"  text-anchor="end" fill="#94a3b8" font-size="11">5.0</text>
  <text x="62" y="114" text-anchor="end" fill="#94a3b8" font-size="11">4.0</text>
  <text x="62" y="174" text-anchor="end" fill="#94a3b8" font-size="11">3.0</text>
  <text x="62" y="234" text-anchor="end" fill="#94a3b8" font-size="11">2.0</text>
  <text x="62" y="294" text-anchor="end" fill="#94a3b8" font-size="11">1.0</text>
  <text x="62" y="344" text-anchor="end" fill="#94a3b8" font-size="11">0.0</text>

  <!-- X-axis tick labels -->
  <text x="70"  y="360" text-anchor="middle" fill="#94a3b8" font-size="11">0</text>
  <text x="195" y="360" text-anchor="middle" fill="#94a3b8" font-size="11">20</text>
  <text x="320" y="360" text-anchor="middle" fill="#94a3b8" font-size="11">40</text>
  <text x="445" y="360" text-anchor="middle" fill="#94a3b8" font-size="11">60</text>
  <text x="570" y="360" text-anchor="middle" fill="#94a3b8" font-size="11">80</text>
  <text x="695" y="360" text-anchor="middle" fill="#94a3b8" font-size="11">100</text>
  <text x="820" y="360" text-anchor="middle" fill="#94a3b8" font-size="11">120</text>

  <!-- Clip threshold line at norm = 1.0 -->
  <line x1="70" y1="290" x2="820" y2="290" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="825" y="294" fill="#f59e0b" font-size="11">clip=1.0</text>

