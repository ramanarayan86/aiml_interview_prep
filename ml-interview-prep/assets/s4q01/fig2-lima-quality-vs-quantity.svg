<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 460">
  <!-- Background -->
  <rect width="860" height="460" fill="#f8f9fb" rx="8"/>

  <!-- Title -->
  <text x="430" y="30" font-family="Arial,sans-serif" font-size="15" font-weight="bold" fill="#1f4fa3" text-anchor="middle">LIMA Hypothesis: Quality vs. Quantity in SFT</text>
  <text x="430" y="48" font-family="Arial,sans-serif" font-size="11" fill="#5b6675" text-anchor="middle">Win-rate on human evaluation (y) vs. dataset size — log scale (x)</text>

  <!-- ===== AXES ===== -->
  <!-- Y axis -->
  <line x1="100" y1="60" x2="100" y2="360" stroke="#5b6675" stroke-width="2"/>
  <!-- X axis -->
  <line x1="100" y1="360" x2="760" y2="360" stroke="#5b6675" stroke-width="2"/>

  <!-- Y axis label -->
  <text transform="rotate(-90,28,210)" x="28" y="210" font-family="Arial,sans-serif" font-size="12" fill="#5b6675" text-anchor="middle">Win-rate / benchmark score</text>

  <!-- X axis label -->
  <text x="430" y="400" font-family="Arial,sans-serif" font-size="12" fill="#5b6675" text-anchor="middle">Dataset size (log scale)</text>

  <!-- Y axis ticks and labels -->
  <line x1="96" y1="320" x2="104" y2="320" stroke="#5b6675" stroke-width="1.5"/>
  <text x="90" y="324" font-family="Arial,sans-serif" font-size="10" fill="#5b6675" text-anchor="end">40%</text>

  <line x1="96" y1="270" x2="104" y2="270" stroke="#5b6675" stroke-width="1.5"/>
  <text x="90" y="274" font-family="Arial,sans-serif" font-size="10" fill="#5b6675" text-anchor="end">55%</text>

  <line x1="96" y1="220" x2="104" y2="220" stroke="#5b6675" stroke-width="1.5"/>
  <text x="90" y="224" font-family="Arial,sans-serif" font-size="10" fill="#5b6675" text-anchor="end">65%</text>

  <line x1="96" y1="160" x2="104" y2="160" stroke="#5b6675" stroke-width="1.5"/>
  <text x="90" y="164" font-family="Arial,sans-serif" font-size="10" fill="#5b6675" text-anchor="end">75%</text>

  <line x1="96" y1="100" x2="104" y2="100" stroke="#5b6675" stroke-width="1.5"/>
  <text x="90" y="104" font-family="Arial,sans-serif" font-size="10" fill="#5b6675" text-anchor="end">85%</text>

  <!-- X axis ticks and labels (log scale: 1K, 10K, 100K, 1M) -->
  <!-- 1K at x=140, 10K at x=280, 100K at x=500, 1M at x=720 -->
  <line x1="140" y1="356" x2="140" y2="364" stroke="#5b6675" stroke-width="1.5"/>
  <text x="140" y="378" font-family="Arial,sans-serif" font-size="10" fill="#5b6675" text-anchor="middle">1 K</text>

  <line x1="280" y1="356" x2="280" y2="364" stroke="#5b6675" stroke-width="1.5"/>
  <text x="280" y="378" font-family="Arial,sans-serif" font-size="10" fill="#5b6675" text-anchor="middle">5 K</text>

  <line x1="400" y1="356" x2="400" y2="364" stroke="#5b6675" stroke-width="1.5"/>
  <text x="400" y="378" font-family="Arial,sans-serif" font-size="10" fill="#5b6675" text-anchor="middle">50 K</text>

  <line x1="560" y1="356" x2="560" y2="364" stroke="#5b6675" stroke-width="1.5"/>
  <text x="560" y="378" font-family="Arial,sans-serif" font-size="10" fill="#5b6675" text-anchor="middle">200 K</text>

  <line x1="720" y1="356" x2="720" y2="364" stroke="#5b6675" stroke-width="1.5"/>
  <text x="720" y="378" font-family="Arial,sans-serif" font-size="10" fill="#5b6675" text-anchor="middle">1 M</text>

  <!-- Grid lines (subtle) -->
  <line x1="100" y1="100" x2="760" y2="100" stroke="#dde3ec" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="100" y1="160" x2="760" y2="160" stroke="#dde3ec" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="100" y1="220" x2="760" y2="220" stroke="#dde3ec" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="100" y1="270" x2="760" y2="270" stroke="#dde3ec" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="100" y1="320" x2="760" y2="320" stroke="#dde3ec" stroke-width="1" stroke-dasharray="4 3"/>

  <!-- ===== LOW-QUALITY CURVE (Alpaca-style: more data, diminishing returns) ===== -->
  <!-- Curve rises from ~40% at 1K, climbs to ~62% plateau around 100K+ -->
  <path d="M 140,310 C 200,290 260,265 400,240 C 500,228 580,224 720,220"
        fill="none" stroke="#c0392b" stroke-width="2.5" stroke-dasharray="6 3"/>
  <text x="735" y="216" font-family="Arial,sans-serif" font-size="10" fill="#c0392b" text-anchor="start">Low-quality</text>
  <text x="735" y="228" font-family="Arial,sans-serif" font-size="10" fill="#c0392b" text-anchor="start">curve</text>

  <!-- ===== QUALITY CEILING annotation ===== -->
  <!-- Horizontal dashed line at y=155 (just above LIMA's win-rate) -->
  <line x1="100" y1="150" x2="760" y2="150" stroke="#c77a12" stroke-width="1.8" stroke-dasharray="8 4"/>
  <text x="762" y="154" font-family="Arial,sans-serif" font-size="10" fill="#c77a12" text-anchor="start">Quality</text>
  <text x="762" y="166" font-family="Arial,sans-serif" font-size="10" fill="#c77a12" text-anchor="start">ceiling</text>

  <!-- Arrow pointing to gap between low-quality curve and quality ceiling -->
  <line x1="650" y1="218" x2="650" y2="158" stroke="#c77a12" stroke-width="1.5" marker-end="url(#arrowAmber2)" marker-start="url(#arrowAmberDown)"/>
  <rect x="655" y="180" width="92" height="22" rx="3" fill="#fff8ec" stroke="#c77a12" stroke-width="1"/>
  <text x="700" y="195" font-family="Arial,sans-serif" font-size="9" fill="#c77a12" text-anchor="middle">Low-quality can't</text>
  <!-- second line of that annotation -->
  <text x="700" y="207" font-family="Arial,sans-serif" font-size="9" fill="#c77a12" text-anchor="middle">cross this ceiling</text>

  <!-- ===== DATA POINTS ===== -->

  <!-- LIMA: x=140, y=130 (high quality, strong performance) -->
  <circle cx="140" cy="130" r="14" fill="#0e8a6e" opacity="0.9"/>
  <text x="140" y="134" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="white" text-anchor="middle">LIMA</text>
  <!-- LIMA label box -->
  <rect x="158" y="88" width="148" height="50" rx="4" fill="white" stroke="#0e8a6e" stroke-width="1.5"/>
  <text x="232" y="104" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#0e8a6e" text-anchor="middle">LIMA (Zhou et al. 2023)</text>
  <text x="232" y="117" font-family="Arial,sans-serif" font-size="9" fill="#5b6675" text-anchor="middle">1 K hand-crafted examples</text>
  <text x="232" y="130" font-family="Arial,sans-serif" font-size="9" fill="#5b6675" text-anchor="middle">LLaMA-65B | win-rate ~83 %</text>
  <line x1="158" y1="120" x2="154" y2="128" stroke="#0e8a6e" stroke-width="1"/>

  <!-- Alpaca: x=400, y=248 -->
  <circle cx="400" cy="248" r="12" fill="#c0392b" opacity="0.9"/>
  <text x="400" y="252" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="white" text-anchor="middle">Alp.</text>
  <!-- Alpaca label box -->
  <rect x="415" y="230" width="148" height="44" rx="4" fill="white" stroke="#c0392b" stroke-width="1.5"/>
  <text x="489" y="246" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#c0392b" text-anchor="middle">Alpaca (Taori et al. 2023)</text>
  <text x="489" y="259" font-family="Arial,sans-serif" font-size="9" fill="#5b6675" text-anchor="middle">52 K auto-generated (GPT-4)</text>
  <text x="489" y="271" font-family="Arial,sans-serif" font-size="9" fill="#5b6675" text-anchor="middle">LLaMA-7B | win-rate ~62 %</text>
  <line x1="415" y1="248" x2="412" y2="248" stroke="#c0392b" stroke-width="1"/>

  <!-- FLAN: x=560, y=228 -->
  <circle cx="560" cy="228" r="12" fill="#6c4fe0" opacity="0.9"/>
  <text x="560" y="232" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="white" text-anchor="middle">FLAN</text>
  <!-- FLAN label box -->
  <rect x="414" y="280" width="156" height="44" rx="4" fill="white" stroke="#6c4fe0" stroke-width="1.5"/>
  <text x="492" y="296" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#6c4fe0" text-anchor="middle">FLAN (Wei et al. 2022)</text>
  <text x="492" y="309" font-family="Arial,sans-serif" font-size="9" fill="#5b6675" text-anchor="middle">1.8 K+ tasks, 100 K+ examples</text>
  <text x="492" y="321" font-family="Arial,sans-serif" font-size="9" fill="#5b6675" text-anchor="middle">Diverse NLP tasks | zero-shot</text>
  <line x1="560" y1="240" x2="520" y2="280" stroke="#6c4fe0" stroke-width="1"/>

  <!-- ===== INSIGHT BOX at bottom ===== -->
  <rect x="100" y="410" width="660" height="38" rx="6" fill="#e8eef9" stroke="#1f4fa3" stroke-width="1.5"/>
  <text x="430" y="426" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#1f4fa3" text-anchor="middle">Superficial Alignment Hypothesis (Zhou et al.):</text>
  <text x="430" y="441" font-family="Arial,sans-serif" font-size="10" fill="#5b6675" text-anchor="middle">SFT elicits style and format from pretraining — it does not inject new knowledge. Quality and diversity matter far more than raw count.</text>

  <!-- Arrowhead markers -->
  <defs>
    <marker id="arrowAmber2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#c77a12"/>
    </marker>
    <marker id="arrowAmberDown" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto-start-reverse">
      <path d="M0,0 L0,6 L8,3 z" fill="#c77a12"/>
    </marker>
  </defs>
</svg>
