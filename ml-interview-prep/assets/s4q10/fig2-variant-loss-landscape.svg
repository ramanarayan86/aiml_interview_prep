<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 360" width="700" height="360">
  <!-- Background -->
  <rect width="700" height="360" fill="#f8f9fc" rx="8"/>

  <!-- Title -->
  <text x="350" y="28" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1f2937">Loss Landscape: DPO (sigmoid) vs IPO (quadratic)</text>
  <text x="350" y="44" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5b6675">x-axis: margin = log &#960;&#952;(y&#695;)/&#960;&#8348;&#8347;&#8347;(y&#695;) - log &#960;&#952;(y&#737;)/&#960;&#8348;&#8347;&#8347;(y&#737;)   &#946; = 1</text>

  <!-- Plot area: x [70,630], y [50,300] -->
  <!-- Grid lines (horizontal) -->
  <line x1="70" y1="300" x2="630" y2="300" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="70" y1="244" x2="630" y2="244" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="70" y1="189" x2="630" y2="189" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="70" y1="133" x2="630" y2="133" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="70" y1="78" x2="630" y2="78" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="70" y1="50" x2="630" y2="50" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Grid lines (vertical) -->
  <line x1="70" y1="50" x2="70" y2="300" stroke="#94a3b8" stroke-width="1.2"/>
  <line x1="140" y1="50" x2="140" y2="300" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="210" y1="50" x2="210" y2="300" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="280" y1="50" x2="280" y2="300" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="350" y1="50" x2="350" y2="300" stroke="#94a3b8" stroke-width="1" stroke-dasharray="6,3"/>
  <line x1="420" y1="50" x2="420" y2="300" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="490" y1="50" x2="490" y2="300" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="560" y1="50" x2="560" y2="300" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="630" y1="50" x2="630" y2="300" stroke="#94a3b8" stroke-width="1.2"/>

  <!-- x-axis (bottom) -->
  <line x1="70" y1="300" x2="630" y2="300" stroke="#374151" stroke-width="1.5"/>
  <!-- y-axis -->
  <line x1="70" y1="50" x2="70" y2="300" stroke="#374151" stroke-width="1.5"/>

  <!-- x-axis ticks and labels -->
  <line x1="70" y1="300" x2="70" y2="308" stroke="#374151" stroke-width="1.2"/>
  <text x="70" y="320" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#374151">-4</text>
  <line x1="140" y1="300" x2="140" y2="308" stroke="#374151" stroke-width="1.2"/>
  <text x="140" y="320" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#374151">-3</text>
  <line x1="210" y1="300" x2="210" y2="308" stroke="#374151" stroke-width="1.2"/>
  <text x="210" y="320" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#374151">-2</text>
  <line x1="280" y1="300" x2="280" y2="308" stroke="#374151" stroke-width="1.2"/>
  <text x="280" y="320" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#374151">-1</text>
  <line x1="350" y1="300" x2="350" y2="308" stroke="#374151" stroke-width="1.2"/>
  <text x="350" y="320" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#374151">0</text>
  <line x1="420" y1="300" x2="420" y2="308" stroke="#374151" stroke-width="1.2"/>
  <text x="420" y="320" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#374151">1</text>
  <line x1="490" y1="300" x2="490" y2="308" stroke="#374151" stroke-width="1.2"/>
  <text x="490" y="320" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#374151">2</text>
  <line x1="560" y1="300" x2="560" y2="308" stroke="#374151" stroke-width="1.2"/>
  <text x="560" y="320" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#374151">3</text>
  <line x1="630" y1="300" x2="630" y2="308" stroke="#374151" stroke-width="1.2"/>
  <text x="630" y="320" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#374151">4</text>

  <!-- x-axis label -->
  <text x="350" y="338" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5b6675">Margin (preference gap)</text>

  <!-- y-axis ticks and labels -->
  <line x1="62" y1="300" x2="70" y2="300" stroke="#374151" stroke-width="1.2"/>
  <text x="58" y="304" text-anchor="end" font-family="sans-serif" font-size="11" fill="#374151">0</text>
  <line x1="62" y1="244" x2="70" y2="244" stroke="#374151" stroke-width="1.2"/>
  <text x="58" y="248" text-anchor="end" font-family="sans-serif" font-size="11" fill="#374151">1</text>
  <line x1="62" y1="189" x2="70" y2="189" stroke="#374151" stroke-width="1.2"/>
  <text x="58" y="193" text-anchor="end" font-family="sans-serif" font-size="11" fill="#374151">2</text>
  <line x1="62" y1="133" x2="70" y2="133" stroke="#374151" stroke-width="1.2"/>
  <text x="58" y="137" text-anchor="end" font-family="sans-serif" font-size="11" fill="#374151">3</text>
  <line x1="62" y1="78" x2="70" y2="78" stroke="#374151" stroke-width="1.2"/>
  <text x="58" y="82" text-anchor="end" font-family="sans-serif" font-size="11" fill="#374151">4</text>

  <!-- y-axis label -->
  <text x="16" y="185" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5b6675" transform="rotate(-90, 16, 185)">Loss value</text>

