  <path d="M 70.0,76.8 L 77.0,82.2 L 84.0,87.7 L 91.0,93.1 L 98.0,98.5 L 105.0,103.9 L 112.0,109.3 L 119.0,114.7 L 126.0,120.0 L 133.0,125.3 L 140.0,130.6 L 147.0,135.9 L 154.0,141.2 L 161.0,146.4 L 168.0,151.6 L 175.0,156.7 L 182.0,161.8 L 189.0,166.9 L 196.0,171.9 L 203.0,176.9 L 210.0,181.8 L 217.0,186.7 L 224.0,191.5 L 231.0,196.2 L 238.0,200.9 L 245.0,205.5 L 252.0,210.0 L 259.0,214.4 L 266.0,218.7 L 273.0,222.9 L 280.0,227.0 L 287.0,231.0 L 294.0,234.9 L 301.0,238.7 L 308.0,242.4 L 315.0,245.9 L 322.0,249.3 L 329.0,252.5 L 336.0,255.7 L 343.0,258.6 L 350.0,261.5 L 357.0,264.2 L 364.0,266.8 L 371.0,269.2 L 378.0,271.5 L 385.0,273.7 L 392.0,275.7 L 399.0,277.6 L 406.0,279.4 L 413.0,281.0 L 420.0,282.6 L 427.0,284.0 L 434.0,285.4 L 441.0,286.6 L 448.0,287.8 L 455.0,288.8 L 462.0,289.8 L 469.0,290.7 L 476.0,291.5 L 483.0,292.3 L 490.0,292.9 L 497.0,293.6 L 504.0,294.2 L 511.0,294.7 L 518.0,295.2 L 525.0,295.6 L 532.0,296.0 L 539.0,296.4 L 546.0,296.7 L 553.0,297.0 L 560.0,297.3 L 567.0,297.6 L 574.0,297.8 L 581.0,298.0 L 588.0,298.2 L 595.0,298.3 L 602.0,298.5 L 609.0,298.6 L 616.0,298.8 L 623.0,298.9 L 630.0,299.0"
    stroke="#1f4fa3" stroke-width="2.5" fill="none" stroke-linejoin="round"/>

  <!-- IPO curve (purple) — quadratic parabola with minimum at x=0.5 -->
  <path d="M 238.0,55.0 L 245.0,77.8 L 252.0,99.4 L 259.0,120.0 L 266.0,139.4 L 273.0,157.8 L 280.0,175.0 L 287.0,191.1 L 294.0,206.1 L 301.0,220.0 L 308.0,232.8 L 315.0,244.4 L 322.0,255.0 L 329.0,264.4 L 336.0,272.8 L 343.0,280.0 L 350.0,286.1 L 357.0,291.1 L 364.0,295.0 L 371.0,297.8 L 378.0,299.4 L 385.0,300.0 L 392.0,299.4 L 399.0,297.8 L 406.0,295.0 L 413.0,291.1 L 420.0,286.1 L 427.0,280.0 L 434.0,272.8 L 441.0,264.4 L 448.0,255.0 L 455.0,244.4 L 462.0,232.8 L 469.0,220.0 L 476.0,206.1 L 483.0,191.1 L 490.0,175.0 L 497.0,157.8 L 504.0,139.4 L 511.0,120.0 L 518.0,99.4 L 525.0,77.8 L 532.0,55.0"
    stroke="#6c4fe0" stroke-width="2.5" fill="none" stroke-linejoin="round" stroke-dasharray="8,4"/>

  <!-- Saturation annotation for DPO: arrow pointing to flat region -->
  <line x1="560" y1="250" x2="530" y2="297" stroke="#1f4fa3" stroke-width="1.2" stroke-dasharray="4,3"/>
  <circle cx="530" cy="297" r="3" fill="#1f4fa3"/>
  <rect x="545" y="236" width="80" height="28" fill="white" fill-opacity="0.85" rx="4" stroke="#1f4fa3" stroke-width="0.8"/>
  <text x="585" y="249" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#1f4fa3">DPO saturates</text>
  <text x="585" y="260" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#1f4fa3">no gradient!</text>

  <!-- IPO minimum annotation -->
  <circle cx="385" cy="300" r="5" fill="#6c4fe0"/>
  <line x1="385" y1="295" x2="385" y2="268" stroke="#6c4fe0" stroke-width="1.2" stroke-dasharray="3,3"/>
  <rect x="330" y="252" width="110" height="28" fill="white" fill-opacity="0.85" rx="4" stroke="#6c4fe0" stroke-width="0.8"/>
  <text x="385" y="265" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#6c4fe0">IPO minimum at</text>
  <text x="385" y="276" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#6c4fe0">margin = 1/(2&#946;) = 0.5</text>

  <!-- DPO at x=0 label -->
  <circle cx="350" cy="261" r="4" fill="#1f4fa3"/>
  <line x1="350" y1="257" x2="295" y2="220" stroke="#1f4fa3" stroke-width="1" stroke-dasharray="3,3"/>
  <rect x="220" y="208" width="74" height="24" fill="white" fill-opacity="0.85" rx="4" stroke="#1f4fa3" stroke-width="0.8"/>
  <text x="257" y="220" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#1f4fa3">DPO: 0.693</text>
  <text x="257" y="229" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#1f4fa3">at margin=0</text>

  <!-- Legend -->
  <rect x="76" y="58" width="170" height="52" fill="white" fill-opacity="0.9" rx="5" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="86" y1="76" x2="116" y2="76" stroke="#1f4fa3" stroke-width="2.5"/>
  <text x="122" y="80" font-family="sans-serif" font-size="11" fill="#1f4fa3" font-weight="bold">DPO</text>
  <text x="148" y="80" font-family="sans-serif" font-size="11" fill="#5b6675">-log&#963;(margin)</text>
  <line x1="86" y1="96" x2="116" y2="96" stroke="#6c4fe0" stroke-width="2.5" stroke-dasharray="8,4"/>
  <text x="122" y="100" font-family="sans-serif" font-size="11" fill="#6c4fe0" font-weight="bold">IPO</text>
  <text x="148" y="100" font-family="sans-serif" font-size="11" fill="#5b6675">(margin-0.5)&#178;</text>
</svg>
