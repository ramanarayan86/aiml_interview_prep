<svg xmlns="http://www.w3.org/2000/svg" width="820" height="200" font-family="Arial, sans-serif">
  <rect width="820" height="200" fill="#f8f9fa" rx="8"/>
  <text x="410" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#1f4fa3">WordPiece Encoding: Longest-Match Greedy (left to right)</text>

  <defs>
    <marker id="a5" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#5b6675"/>
    </marker>
  </defs>

  <text x="20" y="60" font-size="12" fill="#333">Input: <tspan font-weight="bold">"unaffable"</tspan></text>
  <text x="20" y="82" font-size="12" fill="#555">Vocabulary contains: "un", "##aff", "##able"</text>

  <rect x="20" y="95" width="42" height="32" rx="4" fill="#e6f4f1" stroke="#0e8a6e" stroke-width="2"/>
  <text x="41" y="117" text-anchor="middle" font-size="12" font-weight="bold" fill="#0e8a6e">un</text>

  <rect x="68" y="95" width="60" height="32" rx="4" fill="#fef3e2" stroke="#c77a12" stroke-width="2"/>
  <text x="98" y="117" text-anchor="middle" font-size="12" font-weight="bold" fill="#c77a12">##aff</text>

  <rect x="134" y="95" width="65" height="32" rx="4" fill="#fef3e2" stroke="#c77a12" stroke-width="2"/>
  <text x="166" y="117" text-anchor="middle" font-size="12" font-weight="bold" fill="#c77a12">##able</text>

  <text x="215" y="117" font-size="12" fill="#888">  → IDs [2854, 14953, 3468]</text>

  <text x="20" y="160" font-size="12" fill="#555">The "##" prefix signals continuation (not a word start). BERT uses this to reconstruct word boundaries for NER/POS tasks.</text>
  <text x="20" y="180" font-size="12" fill="#c77a12">If no vocab entry covers a suffix → output [UNK]. BPE always avoids UNK via byte-level fallback.</text>
</svg>
