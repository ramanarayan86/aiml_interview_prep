<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 310" width="820" height="310" font-family="Arial, sans-serif">
  <rect width="820" height="310" fill="#f8f9fa" rx="8"/>
  <text x="410" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#1f4fa3">BPE vs WordPiece: Selection Criterion</text>

  <!-- BPE column -->
  <rect x="20" y="44" width="380" height="240" rx="8" fill="#e6f4f1" stroke="#0e8a6e" stroke-width="2"/>
  <text x="210" y="68" text-anchor="middle" font-size="13" font-weight="bold" fill="#0e8a6e">BPE</text>
  <text x="210" y="88" text-anchor="middle" font-size="12" fill="#333">Select pair with highest raw count</text>
  <text x="210" y="110" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">score(A,B) = count(AB)</text>
  <text x="35" y="140" font-size="12" fill="#555">• Simple, fast</text>
  <text x="35" y="160" font-size="12" fill="#555">• May merge frequent but</text>
  <text x="35" y="178" font-size="12" fill="#555">  uninformative pairs</text>
  <text x="35" y="200" font-size="12" fill="#555">• Used by: GPT-2, RoBERTa,</text>
  <text x="35" y="218" font-size="12" fill="#555">  Llama, Mistral, GPT-4</text>
  <text x="35" y="250" font-size="12" fill="#c77a12">Example: "th" merged early because</text>
  <text x="35" y="268" font-size="12" fill="#c77a12">  "the" is ubiquitous</text>

  <!-- WordPiece column -->
  <rect x="420" y="44" width="380" height="240" rx="8" fill="#fef3e2" stroke="#c77a12" stroke-width="2"/>
  <text x="610" y="68" text-anchor="middle" font-size="13" font-weight="bold" fill="#c77a12">WordPiece</text>
  <text x="610" y="88" text-anchor="middle" font-size="12" fill="#333">Select pair that maximises likelihood gain</text>
  <text x="610" y="110" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">score(A,B) = count(AB) / (count(A)·count(B))</text>
  <text x="435" y="140" font-size="12" fill="#555">• Prefers pairs rare as individuals</text>
  <text x="435" y="160" font-size="12" fill="#555">  but common together</text>
  <text x="435" y="178" font-size="12" fill="#555">• Uses "##" prefix for continuation</text>
  <text x="435" y="200" font-size="12" fill="#555">• Used by: BERT, DistilBERT,</text>
  <text x="435" y="218" font-size="12" fill="#555">  MobileBERT, ALBERT</text>
  <text x="435" y="250" font-size="12" fill="#0e8a6e">Example: "un" + "##happy" merges if</text>
  <text x="435" y="268" font-size="12" fill="#0e8a6e">  likelihood ratio is highest</text>
</svg>
