<svg xmlns="http://www.w3.org/2000/svg" width="820" height="300" font-family="Arial, sans-serif">
  <rect width="820" height="300" fill="#f8f9fa" rx="8"/>
  <text x="410" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#1f4fa3">Embedding Table: Lookup as Matrix Row Selection</text>

  <defs>
    <marker id="a7" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#5b6675"/>
    </marker>
  </defs>

  <!-- Token ID -->
  <rect x="20" y="80" width="90" height="40" rx="6" fill="#c77a12"/>
  <text x="65" y="106" text-anchor="middle" font-size="13" font-weight="bold" fill="white">token_id</text>
  <text x="65" y="140" text-anchor="middle" font-size="12" fill="#555">e.g. 9906</text>

  <line x1="110" y1="100" x2="150" y2="100" stroke="#5b6675" stroke-width="2" marker-end="url(#a7)"/>
  <text x="130" y="93" text-anchor="middle" font-size="10" fill="#5b6675">index</text>

  <!-- Embedding matrix -->
  <rect x="155" y="50" width="200" height="200" rx="6" fill="#e8edf5" stroke="#1f4fa3" stroke-width="2"/>
  <text x="255" y="72" text-anchor="middle" font-size="12" font-weight="bold" fill="#1f4fa3">E  ∈  ℝ^(V × d)</text>

  <!-- Rows -->
  <rect x="165" y="82" width="180" height="22" rx="3" fill="#cdd8ef"/>  <text x="255" y="98" text-anchor="middle" font-size="11" fill="#555">row 0: [0.12, -0.03, ...]</text>
  <rect x="165" y="108" width="180" height="22" rx="3" fill="#cdd8ef"/> <text x="255" y="124" text-anchor="middle" font-size="11" fill="#555">row 1: [-0.44, 0.91, ...]</text>
  <text x="255" y="150" text-anchor="middle" font-size="18" fill="#888">⋮</text>
  <rect x="165" y="158" width="180" height="22" rx="3" fill="#1f4fa3"/>  <text x="255" y="174" text-anchor="middle" font-size="11" font-weight="bold" fill="white">row 9906: [0.55, -0.21, ...]  ← selected</text>
  <text x="255" y="210" text-anchor="middle" font-size="18" fill="#888">⋮</text>
  <rect x="165" y="220" width="180" height="22" rx="3" fill="#cdd8ef"/> <text x="255" y="236" text-anchor="middle" font-size="11" fill="#555">row V-1: [0.08, 0.34, ...]</text>

  <!-- Output vector -->
  <line x1="355" y1="170" x2="395" y2="170" stroke="#5b6675" stroke-width="2" marker-end="url(#a7)"/>
  <text x="375" y="163" text-anchor="middle" font-size="10" fill="#5b6675">row select</text>

  <rect x="400" y="140" width="170" height="60" rx="6" fill="#0e8a6e"/>
  <text x="485" y="167" text-anchor="middle" font-size="12" font-weight="bold" fill="white">e_9906  ∈  ℝ^d</text>
  <text x="485" y="187" text-anchor="middle" font-size="11" fill="#cef">dense float vector</text>

  <!-- Dimensions labels -->
  <text x="630" y="100" font-size="12" fill="#555">V = vocabulary size</text>
  <text x="630" y="120" font-size="12" fill="#555">  (e.g. 32K – 256K)</text>
  <text x="630" y="150" font-size="12" fill="#555">d = embedding dim</text>
  <text x="630" y="170" font-size="12" fill="#555">  (e.g. 512 – 8192)</text>
  <text x="630" y="200" font-size="12" fill="#c77a12">Lookup is O(d) — just</text>
  <text x="630" y="218" font-size="12" fill="#c77a12">  copying one row.</text>
</svg>
