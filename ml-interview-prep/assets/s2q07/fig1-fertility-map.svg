<svg xmlns="http://www.w3.org/2000/svg" width="820" height="300" font-family="Arial, sans-serif">
  <rect width="820" height="300" fill="#f8f9fa" rx="8"/>
  <text x="410" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#1f4fa3">Token Fertility: Tokens per Word Across Languages (GPT-2 tokenizer)</text>

  <!-- Axes -->
  <line x1="60" y1="250" x2="800" y2="250" stroke="#5b6675" stroke-width="2"/>
  <line x1="60" y1="60" x2="60" y2="250" stroke="#5b6675" stroke-width="2"/>
  <text x="430" y="280" text-anchor="middle" font-size="12" fill="#5b6675">Language</text>
  <text x="22" y="155" text-anchor="middle" font-size="12" fill="#5b6675" transform="rotate(-90 22 155)">Fertility (tokens/word)</text>

  <!-- Bars -->
  <!-- English ~1.3 -->
  <rect x="85"  y="215" width="55" height="35" fill="#0e8a6e" rx="3"/>
  <text x="112" y="208" text-anchor="middle" font-size="11" fill="#0e8a6e">1.3</text>
  <text x="112" y="268" text-anchor="middle" font-size="11" fill="#333">English</text>

  <!-- French ~1.5 -->
  <rect x="165" y="205" width="55" height="45" fill="#0e8a6e" rx="3"/>
  <text x="192" y="198" text-anchor="middle" font-size="11" fill="#0e8a6e">1.5</text>
  <text x="192" y="268" text-anchor="middle" font-size="11" fill="#333">French</text>

  <!-- German ~1.7 -->
  <rect x="245" y="193" width="55" height="57" fill="#c77a12" rx="3"/>
  <text x="272" y="186" text-anchor="middle" font-size="11" fill="#c77a12">1.7</text>
  <text x="272" y="268" text-anchor="middle" font-size="11" fill="#333">German</text>

  <!-- Mandarin ~1.5 -->
  <rect x="325" y="205" width="55" height="45" fill="#0e8a6e" rx="3"/>
  <text x="352" y="198" text-anchor="middle" font-size="11" fill="#0e8a6e">1.5</text>
  <text x="352" y="268" text-anchor="middle" font-size="11" fill="#333">Chinese</text>

  <!-- Japanese ~2.3 -->
  <rect x="405" y="157" width="55" height="93" fill="#c77a12" rx="3"/>
  <text x="432" y="150" text-anchor="middle" font-size="11" fill="#c77a12">2.3</text>
  <text x="432" y="268" text-anchor="middle" font-size="11" fill="#333">Japanese</text>

  <!-- Arabic ~4.1 -->
  <rect x="485" y="90" width="55" height="160" fill="#c0392b" rx="3"/>
  <text x="512" y="83" text-anchor="middle" font-size="11" fill="#c0392b">4.1</text>
  <text x="512" y="268" text-anchor="middle" font-size="11" fill="#333">Arabic</text>

  <!-- Tamil ~5.7 -->
  <rect x="565" y="65" width="55" height="185" fill="#c0392b" rx="3"/>
  <text x="592" y="58" text-anchor="middle" font-size="11" fill="#c0392b">5.7</text>
  <text x="592" y="268" text-anchor="middle" font-size="11" fill="#333">Tamil</text>

  <!-- Yoruba ~6.1 -->
  <rect x="645" y="55" width="55" height="195" fill="#c0392b" rx="3"/>
  <text x="672" y="48" text-anchor="middle" font-size="11" fill="#c0392b">6.1</text>
  <text x="672" y="268" text-anchor="middle" font-size="11" fill="#333">Yoruba</text>

  <!-- Legend -->
  <rect x="720" y="100" width="16" height="16" rx="3" fill="#0e8a6e"/>
  <text x="742" y="113" font-size="11" fill="#333">≤1.8 (efficient)</text>
  <rect x="720" y="125" width="16" height="16" rx="3" fill="#c77a12"/>
  <text x="742" y="138" font-size="11" fill="#333">1.8–3 (moderate)</text>
  <rect x="720" y="150" width="16" height="16" rx="3" fill="#c0392b"/>
  <text x="742" y="163" font-size="11" fill="#333">&gt;3 (penalised)</text>

  <text x="410" y="295" text-anchor="middle" font-size="11" fill="#888">High fertility = more tokens for same text = higher API cost, shorter effective context window, slower generation</text>
</svg>
