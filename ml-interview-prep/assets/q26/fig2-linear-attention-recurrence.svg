<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380" width="900" height="380">

  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#5b6675"/>
    </marker>
    <marker id="arr-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e05252"/>
    </marker>
    <marker id="arr-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0e8a6e"/>
    </marker>
    <marker id="arr-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1f4fa3"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="380" fill="#f8f9fa" rx="8"/>

  <!-- Title -->
  <text x="450" y="26" font-family="Arial, sans-serif" font-size="15" font-weight="bold"
        fill="#1f4fa3" text-anchor="middle">Linear Attention: Associativity Trick</text>

  <!-- Divider between panels -->
  <line x1="450" y1="44" x2="450" y2="330" stroke="#d0d5dd" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- ===================================================
       LEFT PANEL: Parallel (naive)  x: 20..440
       =================================================== -->
  <text x="230" y="56" font-family="Arial, sans-serif" font-size="12" font-weight="bold"
        fill="#e05252" text-anchor="middle">Parallel (naive)</text>

  <!-- Step labels -->
  <text x="60" y="84" font-family="Arial, sans-serif" font-size="9.5" fill="#5b6675" text-anchor="middle">Q</text>
  <text x="140" y="84" font-family="Arial, sans-serif" font-size="9.5" fill="#5b6675" text-anchor="middle">K</text>

  <!-- Q and K boxes -->
  <rect x="30" y="90" width="58" height="34" rx="5" fill="#eef2fb" stroke="#1f4fa3" stroke-width="1.5"/>
  <text x="59" y="112" font-family="Arial, sans-serif" font-size="13" font-weight="bold"
        fill="#1f4fa3" text-anchor="middle" dominant-baseline="middle">φ(Q)</text>

  <rect x="112" y="90" width="58" height="34" rx="5" fill="#eef2fb" stroke="#1f4fa3" stroke-width="1.5"/>
  <text x="141" y="112" font-family="Arial, sans-serif" font-size="13" font-weight="bold"
        fill="#1f4fa3" text-anchor="middle" dominant-baseline="middle">φ(K)ᵀ</text>

  <!-- Multiply arrow to N×N block -->
  <line x1="88" y1="107" x2="110" y2="107" stroke="#5b6675" stroke-width="1.4" marker-end="url(#arr)"/>

  <!-- N×N matrix block — RED warning -->
  <rect x="194" y="72" width="110" height="104" rx="6" fill="#fff0f0" stroke="#e05252" stroke-width="2.2"/>
  <!-- Grid lines inside N×N block -->
  <line x1="228" y1="72" x2="228" y2="176" stroke="#f9c6c6" stroke-width="0.8"/>
  <line x1="262" y1="72" x2="262" y2="176" stroke="#f9c6c6" stroke-width="0.8"/>
  <line x1="296" y1="72" x2="296" y2="176" stroke="#f9c6c6" stroke-width="0.8"/>
  <line x1="194" y1="106" x2="304" y2="106" stroke="#f9c6c6" stroke-width="0.8"/>
  <line x1="194" y1="140" x2="304" y2="140" stroke="#f9c6c6" stroke-width="0.8"/>
  <text x="249" y="122" font-family="Arial, sans-serif" font-size="14" font-weight="bold"
        fill="#e05252" text-anchor="middle" dominant-baseline="middle">N×N</text>
  <text x="249" y="158" font-family="Arial, sans-serif" font-size="9.5" fill="#c0392b"
        text-anchor="middle">attention matrix</text>

  <!-- Red warning border glow -->
  <rect x="189" y="67" width="120" height="114" rx="8" fill="none" stroke="#e05252"
        stroke-width="1" stroke-dasharray="4,3" opacity="0.6"/>

  <!-- Arrow from φ(Q)·φ(K)ᵀ to N×N -->
  <line x1="170" y1="107" x2="192" y2="107" stroke="#e05252" stroke-width="1.6" marker-end="url(#arr-red)"/>

  <!-- ×V label and V box -->
  <text x="316" y="116" font-family="Arial, sans-serif" font-size="13" fill="#5b6675"
        font-weight="bold">×</text>

  <rect x="330" y="90" width="46" height="34" rx="5" fill="#e8f5e9" stroke="#4caf50" stroke-width="1.5"/>
  <text x="353" y="112" font-family="Arial, sans-serif" font-size="13" font-weight="bold"
        fill="#2e7d32" text-anchor="middle" dominant-baseline="middle">V</text>

  <!-- Arrow N×N → × -->
  <line x1="304" y1="124" x2="314" y2="124" stroke="#e05252" stroke-width="1.6" marker-end="url(#arr-red)"/>

  <!-- Result arrow → output box -->
  <line x1="376" y1="107" x2="398" y2="107" stroke="#5b6675" stroke-width="1.6" marker-end="url(#arr)"/>

  <rect x="400" y="90" width="32" height="34" rx="5" fill="#1f4fa3"/>
  <text x="416" y="112" font-family="Arial, sans-serif" font-size="10" font-weight="bold"
        fill="white" text-anchor="middle" dominant-baseline="middle">Out</text>

  <!-- Memory label for left panel -->
  <rect x="150" y="185" width="180" height="28" rx="5" fill="#fde8e8" stroke="#e05252" stroke-width="1.4"/>
  <text x="240" y="199" font-family="Arial, sans-serif" font-size="10" font-weight="bold"
        fill="#c0392b" text-anchor="middle" dominant-baseline="middle">O(N²) memory — bottleneck!</text>

  <!-- Formula left -->
  <rect x="32" y="222" width="388" height="44" rx="5" fill="white" stroke="#e05252" stroke-width="1.2" stroke-dasharray="5,3"/>
  <text x="226" y="239" font-family="Arial, sans-serif" font-size="10.5" fill="#1e2533" text-anchor="middle">
    Output = (φ(Q) φ(K)ᵀ) V
  </text>
  <text x="226" y="257" font-family="Arial, sans-serif" font-size="9.5" fill="#e05252" text-anchor="middle" font-style="italic">
    Must materialise full N×N matrix → O(N²) space
  </text>

  <!-- Problem label -->
  <text x="226" y="285" font-family="Arial, sans-serif" font-size="9" fill="#c0392b"
        text-anchor="middle" font-style="italic">Fails at N ≳ 16K on typical GPUs</text>

  <!-- ===================================================
       RIGHT PANEL: Recurrent (efficient)  x: 460..880
       =================================================== -->
  <text x="670" y="56" font-family="Arial, sans-serif" font-size="12" font-weight="bold"
        fill="#0e8a6e" text-anchor="middle">Recurrent (efficient)</text>

  <!-- φ(K)ᵀ V step — showing accumulation -->
  <!-- Column of tokens k_1..k_T feeding into S -->
  <rect x="468" y="78" width="64" height="26" rx="4" fill="#eef2fb" stroke="#1f4fa3" stroke-width="1.3"/>
  <text x="500" y="96" font-family="Arial, sans-serif" font-size="11" font-weight="bold"
        fill="#1f4fa3" text-anchor="middle" dominant-baseline="middle">φ(k_t)</text>

  <rect x="468" y="112" width="64" height="26" rx="4" fill="#e8f5e9" stroke="#4caf50" stroke-width="1.3"/>
  <text x="500" y="125" font-family="Arial, sans-serif" font-size="11" font-weight="bold"
        fill="#2e7d32" text-anchor="middle" dominant-baseline="middle">v_t</text>

  <!-- outer-product arrow -->
  <line x1="532" y1="91" x2="560" y2="107" stroke="#1f4fa3" stroke-width="1.4" marker-end="url(#arr-blue)"/>
  <line x1="532" y1="125" x2="560" y2="112" stroke="#4caf50" stroke-width="1.4" marker-end="url(#arr-green)"/>

  <text x="545" y="106" font-family="Arial, sans-serif" font-size="9" fill="#5b6675" text-anchor="middle">⊗</text>

  <!-- S_t box (d×d state matrix) -->
  <rect x="562" y="72" width="90" height="66" rx="6" fill="#e8f5e9" stroke="#0e8a6e" stroke-width="2"/>
  <!-- Grid lines inside d×d -->
  <line x1="592" y1="72" x2="592" y2="138" stroke="#c8e6c9" stroke-width="0.8"/>
  <line x1="622" y1="72" x2="622" y2="138" stroke="#c8e6c9" stroke-width="0.8"/>
  <line x1="562" y1="94" x2="652" y2="94" stroke="#c8e6c9" stroke-width="0.8"/>
  <line x1="562" y1="116" x2="652" y2="116" stroke="#c8e6c9" stroke-width="0.8"/>
  <text x="607" y="109" font-family="Arial, sans-serif" font-size="14" font-weight="bold"
        fill="#0e8a6e" text-anchor="middle" dominant-baseline="middle">S_t</text>

  <!-- Memory label for S_t -->
  <text x="607" y="150" font-family="Arial, sans-serif" font-size="9" fill="#0e8a6e"
        text-anchor="middle" font-style="italic">d×d state</text>

  <!-- Self-loop / recurrence arrow on S -->
  <path d="M 607,72 C 607,48 650,48 652,72" fill="none" stroke="#0e8a6e" stroke-width="1.8"
        stroke-dasharray="4,2" marker-end="url(#arr-green)"/>
  <text x="660" y="55" font-family="Arial, sans-serif" font-size="9" fill="#0e8a6e" font-style="italic">recur</text>

  <!-- Recurrence formula box -->
  <rect x="462" y="162" width="244" height="42" rx="5" fill="white" stroke="#0e8a6e" stroke-width="1.4"/>
  <text x="584" y="179" font-family="Arial, sans-serif" font-size="10.5" font-weight="bold"
        fill="#1e2533" text-anchor="middle">S_t = S_{t-1} + φ(k_t) φ(k_t)ᵀ v_t</text>
  <text x="584" y="196" font-family="Arial, sans-serif" font-size="9.5" fill="#0e8a6e"
        text-anchor="middle" font-style="italic">accumulate outer-product rank-1 updates</text>

  <!-- Query step -->
  <rect x="468" y="218" width="64" height="26" rx="4" fill="#fff8e1" stroke="#f5a623" stroke-width="1.3"/>
  <text x="500" y="236" font-family="Arial, sans-serif" font-size="11" font-weight="bold"
        fill="#e65100" text-anchor="middle" dominant-baseline="middle">φ(q_i)</text>

  <!-- Arrow from q_i to dot with S -->
  <line x1="532" y1="231" x2="558" y2="231" stroke="#f5a623" stroke-width="1.6" marker-end="url(#arr)"/>

  <text x="548" y="229" font-family="Arial, sans-serif" font-size="11" fill="#5b6675">·</text>

  <!-- S box (smaller, for query step) -->
  <rect x="560" y="218" width="50" height="26" rx="4" fill="#e8f5e9" stroke="#0e8a6e" stroke-width="1.3"/>
  <text x="585" y="236" font-family="Arial, sans-serif" font-size="11" font-weight="bold"
        fill="#0e8a6e" text-anchor="middle" dominant-baseline="middle">S_t</text>

  <!-- Arrow from query·S to output -->
  <line x1="610" y1="231" x2="636" y2="231" stroke="#5b6675" stroke-width="1.6" marker-end="url(#arr)"/>

  <rect x="638" y="218" width="38" height="26" rx="5" fill="#0e8a6e"/>
  <text x="657" y="236" font-family="Arial, sans-serif" font-size="10" font-weight="bold"
        fill="white" text-anchor="middle" dominant-baseline="middle">o_i</text>

  <text x="500" y="256" font-family="Arial, sans-serif" font-size="9.5" fill="#5b6675"
        font-style="italic">o_i = φ(q_i) · S_t</text>

  <!-- Memory label for right panel -->
  <rect x="462" y="267" width="244" height="28" rx="5" fill="#e8f5e9" stroke="#0e8a6e" stroke-width="1.4"/>
  <text x="584" y="281" font-family="Arial, sans-serif" font-size="10" font-weight="bold"
        fill="#0e8a6e" text-anchor="middle" dominant-baseline="middle">O(d²) memory per step — efficient!</text>

  <!-- ===================================================
       SHARED BOTTOM CAPTION
       =================================================== -->
  <rect x="20" y="305" width="860" height="52" rx="6" fill="white" stroke="#1f4fa3" stroke-width="1.5"/>

  <text x="450" y="323" font-family="Arial, sans-serif" font-size="10" font-weight="bold"
        fill="#1f4fa3" text-anchor="middle">Key Identity (Associativity of Matrix Multiplication):</text>

  <text x="450" y="342" font-family="Arial, sans-serif" font-size="11" fill="#1e2533"
        text-anchor="middle" font-style="italic">
    ( φ(Q) φ(K)ᵀ ) V  =  φ(Q) ( φ(K)ᵀ V )
  </text>

  <text x="450" y="358" font-family="Arial, sans-serif" font-size="9.5" fill="#5b6675"
        text-anchor="middle">Rewriting (φ(Q)φ(K)ᵀ)V = φ(Q)(φ(K)ᵀV) eliminates the N×N bottleneck — compute φ(K)ᵀV first (O(N·d²)), then multiply by φ(Q)</text>

  <!-- Panel border boxes -->
  <rect x="20" y="44" width="420" height="252" rx="6" fill="none" stroke="#e05252"
        stroke-width="1.2" stroke-dasharray="5,4" opacity="0.5"/>
  <rect x="452" y="44" width="428" height="252" rx="6" fill="none" stroke="#0e8a6e"
        stroke-width="1.2" stroke-dasharray="5,4" opacity="0.5"/>

</svg>
