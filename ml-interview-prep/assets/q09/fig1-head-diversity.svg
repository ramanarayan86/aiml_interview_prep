<svg xmlns="http://www.w3.org/2000/svg" width="820" height="320" font-family="Arial, sans-serif">
  <rect width="820" height="320" fill="#f8f9fa" rx="8"/>
  <text x="410" y="26" text-anchor="middle" font-size="15" font-weight="bold" fill="#1f4fa3">Multiple Attention Heads Capture Different Linguistic Relationships</text>
  <text x="410" y="44" text-anchor="middle" font-size="12" fill="#5b6675">Sentence: "The cat chased mice" — each head specializes in different relationships</text>

  <defs>
    <!-- Blue arrow marker for Head 1 -->
    <marker id="h1" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#1f4fa3"/>
    </marker>
    <!-- Green arrow marker for Head 2 -->
    <marker id="h2" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#0e8a6e"/>
    </marker>
    <!-- Orange arrow marker for Head 3 -->
    <marker id="h3" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#c77a12"/>
    </marker>
  </defs>

  <!-- Token boxes: horizontal row at y=145 -->
  <!-- x positions: The=130, cat=280, chased=430, mice=580 -->
  <rect x="100" y="130" width="80" height="36" rx="6" fill="#f0f4ff" stroke="#1f4fa3" stroke-width="2"/>
  <text x="140" y="153" text-anchor="middle" font-size="14" fill="#1f4fa3" font-weight="bold">The</text>

  <rect x="250" y="130" width="80" height="36" rx="6" fill="#f0f4ff" stroke="#1f4fa3" stroke-width="2"/>
  <text x="290" y="153" text-anchor="middle" font-size="14" fill="#1f4fa3" font-weight="bold">cat</text>

  <rect x="400" y="130" width="90" height="36" rx="6" fill="#f0f4ff" stroke="#1f4fa3" stroke-width="2"/>
  <text x="445" y="153" text-anchor="middle" font-size="14" fill="#1f4fa3" font-weight="bold">chased</text>

  <rect x="550" y="130" width="80" height="36" rx="6" fill="#f0f4ff" stroke="#1f4fa3" stroke-width="2"/>
  <text x="590" y="153" text-anchor="middle" font-size="14" fill="#1f4fa3" font-weight="bold">mice</text>

  <!-- ===== HEAD 1 (blue): subject→verb (The→chased, cat→chased) ===== -->
  <!-- The → chased: arc above -->
  <path d="M 170 138 C 200 85, 390 85, 400 138" stroke="#1f4fa3" stroke-width="2.8" fill="none" marker-end="url(#h1)" opacity="0.85"/>
  <!-- cat → chased -->
  <path d="M 320 138 C 350 100, 390 100, 400 138" stroke="#1f4fa3" stroke-width="2.5" fill="none" marker-end="url(#h1)" opacity="0.85"/>

  <!-- Head 1 legend -->
  <rect x="690" y="80" width="120" height="48" rx="4" fill="#f0f4ff" stroke="#1f4fa3" stroke-width="1.5"/>
  <line x1="700" y1="100" x2="725" y2="100" stroke="#1f4fa3" stroke-width="2.5"/>
  <polygon points="720,97 728,100 720,103" fill="#1f4fa3"/>
  <text x="732" y="104" font-size="11" fill="#1f4fa3" font-weight="bold">Head 1</text>
  <text x="698" y="120" font-size="10" fill="#1f4fa3">Subject→Verb</text>

  <!-- ===== HEAD 2 (green): local/adjacent connections ===== -->
  <!-- The→cat, cat→chased, chased→mice (adjacent) -->
  <path d="M 180 163 C 205 195, 245 195, 250 163" stroke="#0e8a6e" stroke-width="2.5" fill="none" marker-end="url(#h2)" opacity="0.8"/>
  <path d="M 330 163 C 355 200, 395 200, 400 163" stroke="#0e8a6e" stroke-width="2.5" fill="none" marker-end="url(#h2)" opacity="0.8"/>
  <path d="M 490 163 C 510 200, 545 200, 550 163" stroke="#0e8a6e" stroke-width="2.5" fill="none" marker-end="url(#h2)" opacity="0.8"/>

  <!-- Head 2 legend -->
  <rect x="690" y="138" width="120" height="48" rx="4" fill="#f0fff4" stroke="#0e8a6e" stroke-width="1.5"/>
  <line x1="700" y1="158" x2="725" y2="158" stroke="#0e8a6e" stroke-width="2.5"/>
  <polygon points="720,155 728,158 720,161" fill="#0e8a6e"/>
  <text x="732" y="162" font-size="11" fill="#0e8a6e" font-weight="bold">Head 2</text>
  <text x="698" y="178" font-size="10" fill="#0e8a6e">Local/Adjacent</text>

  <!-- ===== HEAD 3 (orange): semantic object (chased→mice, cat→mice) ===== -->
  <path d="M 490 138 C 520 70, 560 70, 550 130" stroke="#c77a12" stroke-width="2.8" fill="none" marker-end="url(#h3)" opacity="0.85"/>
  <!-- cat → mice (semantic patient) -->
  <path d="M 330 130 C 400 55, 560 55, 550 130" stroke="#c77a12" stroke-width="2" fill="none" marker-end="url(#h3)" opacity="0.65" stroke-dasharray="6,3"/>

  <!-- Head 3 legend -->
  <rect x="690" y="196" width="120" height="48" rx="4" fill="#fff8f0" stroke="#c77a12" stroke-width="1.5"/>
  <line x1="700" y1="216" x2="725" y2="216" stroke="#c77a12" stroke-width="2.5"/>
  <polygon points="720,213 728,216 720,219" fill="#c77a12"/>
  <text x="732" y="220" font-size="11" fill="#c77a12" font-weight="bold">Head 3</text>
  <text x="698" y="236" font-size="10" fill="#c77a12">Verb→Object</text>

  <!-- ===== Summary panel ===== -->
  <rect x="30" y="210" width="640" height="80" rx="6" fill="white" stroke="#ccc"/>
  <text x="350" y="228" text-anchor="middle" font-size="12" font-weight="bold" fill="#1f4fa3">Why multi-head attention captures richer representations</text>
  <text x="50" y="248" font-size="11" fill="#5b6675">• Each head projects Q,K,V into different subspaces (learned projections W_Q^h, W_K^h, W_V^h)</text>
  <text x="50" y="264" font-size="11" fill="#5b6675">• Heads specialize: syntax (subject-verb), positional (adjacent), semantics (co-reference), long-range</text>
  <text x="50" y="280" font-size="11" fill="#5b6675">• Outputs concatenated and projected: MultiHead(Q,K,V) = Concat(head₁,...,headₕ) · W_O</text>
</svg>
