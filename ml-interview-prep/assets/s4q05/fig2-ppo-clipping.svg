<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 360" width="820" height="360">
  <!-- Background -->
  <rect width="820" height="360" fill="#f8f9fa" rx="6"/>

  <!-- Title -->
  <text x="410" y="24" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#1f4fa3">PPO Clipped Surrogate Objective: L&#x1d436;&#x1d43f;&#x1d435;&#x1d43f;(&#952;) = E[min(r&#x1d461;&#x22c5;&#394;&#x1d461;, clip(r&#x1d461;,1&#8722;&#949;,1+&#949;)&#x22c5;&#394;&#x1d461;)]</text>
  <text x="410" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5b6675">&#949; = 0.2 (typical). Left panel: positive advantage. Right panel: negative advantage.</text>

  <!-- ===== LEFT PANEL: Positive Advantage A > 0 ===== -->
  <!-- Plot area: x 60..380, y 55..290 -->
  <text x="220" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#0e8a6e">Positive Advantage (&#394; = +1.5)</text>

  <!-- Axes -->
  <line x1="60" y1="55" x2="60" y2="295" stroke="#5b6675" stroke-width="1.5"/>
  <line x1="60" y1="295" x2="385" y2="295" stroke="#5b6675" stroke-width="1.5"/>

  <!-- Y axis label -->
  <text x="18" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5b6675" transform="rotate(-90 18 175)">L&#x1d436;&#x1d43f;&#x1d435;&#x1d43f; value</text>

  <!-- X axis label -->
  <text x="222" y="314" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5b6675">Probability ratio r&#x1d461;(&#952;) = &#960;&#952;(a|s) / &#960;&#952;_old(a|s)</text>

  <!-- X axis ticks: r from 0.4 to 1.8 -->
  <!-- Plot area width = 325px for r range 0.4..1.8 (span=1.4) -->
  <!-- px_per_unit = 325/1.4 = 232.1 -->
  <!-- r=0.4: x=60, r=0.8: x=60+232.1*0.4=153, r=1.0: x=60+232.1*0.6=199, r=1.2: x=60+232.1*0.8=246, r=1.4: x=60+232.1*1.0=292, r=1.6: x=60+232.1*1.2=338, r=1.8: x=60+232.1*1.4=385 -->

  <!-- r=0.8 (1-eps) vertical line: x=153 -->
  <line x1="153" y1="55" x2="153" y2="295" stroke="#c0392b" stroke-width="1" stroke-dasharray="4,3"/>
  <!-- r=1.0: x=199 -->
  <line x1="199" y1="55" x2="199" y2="295" stroke="#5b6675" stroke-width="1" stroke-dasharray="2,3"/>
  <!-- r=1.2 (1+eps): x=246 -->
  <line x1="246" y1="55" x2="246" y2="295" stroke="#c0392b" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- X tick marks and labels -->
  <line x1="60" y1="295" x2="60" y2="300" stroke="#5b6675" stroke-width="1"/>
  <text x="60" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#5b6675">0.4</text>

  <line x1="153" y1="295" x2="153" y2="300" stroke="#5b6675" stroke-width="1"/>
  <text x="153" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#c0392b">0.8</text>
  <text x="153" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#c0392b">(1&#8722;&#949;)</text>

  <line x1="199" y1="295" x2="199" y2="300" stroke="#5b6675" stroke-width="1"/>
  <text x="199" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#5b6675">1.0</text>

  <line x1="246" y1="295" x2="246" y2="300" stroke="#5b6675" stroke-width="1"/>
  <text x="246" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#c0392b">1.2</text>
  <text x="246" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#c0392b">(1+&#949;)</text>

  <line x1="385" y1="295" x2="385" y2="300" stroke="#5b6675" stroke-width="1"/>
  <text x="385" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#5b6675">1.8</text>

  <!-- Y axis ticks -->
  <!-- L values: r_t * A for positive A (A=1.5) -->
  <!-- At r=0.4: L=0.4*1.5=0.6, r=0.8: 1.2 (clipped), r=1.2: 1.8 (=1.2*1.5, plateau), r=1.8: 1.8 (clipped) -->
  <!-- Y range: 0 to 2.5; y_px = 295 - (L/2.5)*240 -->
  <!-- L=0: y=295; L=1.0: y=199; L=1.5: y=151; L=1.8: y=122; L=2.5: y=55 -->

  <!-- Y tick at L=0 -->
  <line x1="55" y1="295" x2="60" y2="295" stroke="#5b6675" stroke-width="1"/>
  <text x="52" y="299" text-anchor="end" font-family="Arial, sans-serif" font-size="9" fill="#5b6675">0</text>

  <!-- Y tick at L=1.2 (clipped value at r=0.8*1.5) -->
  <!-- y = 295 - (1.2/2.5)*240 = 295 - 115 = 180 -->
  <line x1="55" y1="180" x2="60" y2="180" stroke="#5b6675" stroke-width="1"/>
  <text x="52" y="184" text-anchor="end" font-family="Arial, sans-serif" font-size="9" fill="#5b6675">1.2</text>

  <!-- Y tick at L=1.8 (plateau ceiling) -->
  <!-- y = 295 - (1.8/2.5)*240 = 295 - 173 = 122 -->
  <line x1="55" y1="122" x2="60" y2="122" stroke="#5b6675" stroke-width="1"/>
  <text x="52" y="126" text-anchor="end" font-family="Arial, sans-serif" font-size="9" fill="#5b6675">1.8</text>

  <!-- The clipped objective curve for A>0 -->
  <!-- Region 1: r < 0.8 (clipped): clip(r,0.8,1.2)*1.5 = 0.8*1.5 = 1.2 (flat) -->
  <!-- y = 295 - (1.2/2.5)*240 = 180 -->
  <!-- Region 2: 0.8 <= r <= 1.2 (unclipped): r*1.5 (slope=1.5) -->
  <!-- At r=0.8: y=180, at r=1.2: y=122 -->
  <!-- Region 3: r > 1.2 (clipped): 1.2*1.5=1.8 (flat) -->
  <!-- y=122 -->

  <!-- r < 0.8: flat at y=180, from x=60 to x=153 -->
  <line x1="60" y1="180" x2="153" y2="180" stroke="#1f4fa3" stroke-width="3"/>
  <!-- 0.8 to 1.2: rising from y=180 to y=122 -->
  <line x1="153" y1="180" x2="246" y2="122" stroke="#1f4fa3" stroke-width="3"/>
  <!-- r > 1.2: flat at y=122 -->
  <line x1="246" y1="122" x2="385" y2="122" stroke="#1f4fa3" stroke-width="3"/>

  <!-- Unclipped r*A reference line (amber dashed) -->
  <!-- At r=0.4: y=295-(0.6/2.5)*240=295-57.6=237 -->
  <!-- At r=1.8: y=295-(2.7/2.5)*240=295-259=36 (above plot, clip to 55) -->
  <!-- Actually at r=1.73: L=2.5, y=55. r=0.4: y=237 -->
  <line x1="60" y1="237" x2="358" y2="55" stroke="#c77a12" stroke-width="1.5" stroke-dasharray="6,3"/>

  <!-- Region labels for positive advantage -->
  <text x="105" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#c0392b">Clipped</text>
  <text x="105" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#c0392b">(r &lt; 1&#8722;&#949;)</text>

  <text x="199" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#0e8a6e">Unclipped</text>
  <text x="199" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#0e8a6e">(1&#8722;&#949; &#8804; r &#8804; 1+&#949;)</text>

  <text x="315" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#c0392b">Clipped</text>
  <text x="315" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#c0392b">(r &gt; 1+&#949;)</text>

  <!-- r=1.3 example point for numerical example -->
  <!-- r=1.3: x=60+232.1*(1.3-0.4)=60+232.1*0.9=60+209=269; L=1.8; y=122 -->
  <circle cx="269" cy="122" r="5" fill="#6c4fe0" stroke="white" stroke-width="1.5"/>
  <text x="269" y="113" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#6c4fe0">r=1.3</text>
  <text x="269" y="104" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#6c4fe0">L=1.8</text>

  <!-- Legend for left panel -->
  <rect x="62" y="57" width="185" height="46" fill="white" fill-opacity="0.9" rx="4" stroke="#d0d4da" stroke-width="0.8"/>
  <line x1="70" y1="71" x2="95" y2="71" stroke="#1f4fa3" stroke-width="3"/>
  <text x="100" y="75" font-family="Arial, sans-serif" font-size="9" fill="#1f4fa3">L&#x1d436;&#x1d43f;&#x1d435;&#x1d43f; = min(r&#x22c5;A, clip(r)&#x22c5;A)</text>
  <line x1="70" y1="88" x2="95" y2="88" stroke="#c77a12" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="100" y="92" font-family="Arial, sans-serif" font-size="9" fill="#c77a12">Unclipped r&#x22c5;A (reference)</text>
  <circle cx="82" cy="97" r="4" fill="#6c4fe0"/>
  <text x="100" y="101" font-family="Arial, sans-serif" font-size="9" fill="#6c4fe0">Worked example (r=1.3)</text>

  <!-- ===== RIGHT PANEL: Negative Advantage A < 0 ===== -->
  <!-- Plot area: x 440..760, y 55..290 -->
  <text x="600" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#c0392b">Negative Advantage (&#394; = &#8722;1.5)</text>

  <!-- Axes -->
  <line x1="440" y1="55" x2="440" y2="295" stroke="#5b6675" stroke-width="1.5"/>
  <line x1="440" y1="295" x2="765" y2="295" stroke="#5b6675" stroke-width="1.5"/>

  <!-- Y axis label -->
  <text x="408" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5b6675" transform="rotate(-90 408 175)">L&#x1d436;&#x1d43f;&#x1d435;&#x1d43f; value</text>

  <!-- X axis label -->
  <text x="602" y="314" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5b6675">Probability ratio r&#x1d461;(&#952;) = &#960;&#952;(a|s) / &#960;&#952;_old(a|s)</text>

  <!-- Vertical reference lines -->
  <!-- r=0.8: x=440+232.1*0.4=533 -->
  <line x1="533" y1="55" x2="533" y2="295" stroke="#c0392b" stroke-width="1" stroke-dasharray="4,3"/>
  <!-- r=1.0: x=440+232.1*0.6=579 -->
  <line x1="579" y1="55" x2="579" y2="295" stroke="#5b6675" stroke-width="1" stroke-dasharray="2,3"/>
  <!-- r=1.2: x=440+232.1*0.8=626 -->
  <line x1="626" y1="55" x2="626" y2="295" stroke="#c0392b" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- X ticks -->
  <line x1="440" y1="295" x2="440" y2="300" stroke="#5b6675" stroke-width="1"/>
  <text x="440" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#5b6675">0.4</text>
  <line x1="533" y1="295" x2="533" y2="300" stroke="#5b6675" stroke-width="1"/>
  <text x="533" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#c0392b">0.8</text>
  <text x="533" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#c0392b">(1&#8722;&#949;)</text>
  <line x1="579" y1="295" x2="579" y2="300" stroke="#5b6675" stroke-width="1"/>
  <text x="579" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#5b6675">1.0</text>
  <line x1="626" y1="295" x2="626" y2="300" stroke="#5b6675" stroke-width="1"/>
  <text x="626" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#c0392b">1.2</text>
  <text x="626" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#c0392b">(1+&#949;)</text>
  <line x1="765" y1="295" x2="765" y2="300" stroke="#5b6675" stroke-width="1"/>
  <text x="765" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#5b6675">1.8</text>

  <!-- Y axis for negative advantage -->
  <!-- L values: negative; range -2.5 to 0 -->
  <!-- y_px = 295 - (L - (-2.5)) / 2.5 * 240 = 295 - (L+2.5)*96 -->
  <!-- L=0: y=295-(2.5)*96=295-240=55; L=-1.2: y=295-(1.3)*96=295-125=170; L=-1.8: y=295-(0.7)*96=295-67=228; L=-2.5: y=295 -->
  <!-- Actually: y_px = 55 + (0 - L)/2.5 * 240 = 55 + (-L/2.5)*240 -->
  <!-- L=0: y=55; L=-1.2: y=55+115=170; L=-1.8: y=55+173=228; L=-2.5: y=55+240=295 -->

  <!-- Y ticks -->
  <line x1="435" y1="55" x2="440" y2="55" stroke="#5b6675" stroke-width="1"/>
  <text x="432" y="59" text-anchor="end" font-family="Arial, sans-serif" font-size="9" fill="#5b6675">0</text>

  <!-- L=-1.2: y=170 -->
  <line x1="435" y1="170" x2="440" y2="170" stroke="#5b6675" stroke-width="1"/>
  <text x="432" y="174" text-anchor="end" font-family="Arial, sans-serif" font-size="9" fill="#5b6675">&#8722;1.2</text>

  <!-- L=-1.8: y=228 -->
  <line x1="435" y1="228" x2="440" y2="228" stroke="#5b6675" stroke-width="1"/>
  <text x="432" y="232" text-anchor="end" font-family="Arial, sans-serif" font-size="9" fill="#5b6675">&#8722;1.8</text>

  <!-- L=-2.5: y=295 -->
  <line x1="435" y1="295" x2="440" y2="295" stroke="#5b6675" stroke-width="1"/>
  <text x="432" y="299" text-anchor="end" font-family="Arial, sans-serif" font-size="9" fill="#5b6675">&#8722;2.5</text>

  <!-- Clipped curve for A<0 -->
  <!-- For A=-1.5: min(r*A, clip(r)*A) -->
  <!-- Note: for A<0, min picks the MORE negative value -->
  <!-- r < 0.8: r*A is less negative than clip(r)*A=0.8*(-1.5)=-1.2. min picks r*A which is more negative -->
  <!--   e.g. r=0.4: r*A=-0.6, clip(r)*A=-1.2 -> min=-1.2 (clipped) -->
  <!-- r 0.8..1.2: r*A = clip(r)*A (unclipped) -->
  <!-- r > 1.2: r*A more negative, clip(r)*A=-1.2*1.5=-1.8. min picks clip(r)*A=-1.8 (clipped) -->
  <!-- So: -->
  <!-- r<0.8: L = -1.2 (flat), y=170 -->
  <!-- 0.8..1.2: L = r*(-1.5), slope goes from -1.2 to -1.8, y from 170 to 228 -->
  <!-- r>1.2: L = -1.8 (flat), y=228 -->

  <!-- Region 1: r < 0.8: flat at y=170, x=440..533 -->
  <line x1="440" y1="170" x2="533" y2="170" stroke="#1f4fa3" stroke-width="3"/>
  <!-- Region 2: 0.8 to 1.2: y from 170 to 228, x=533..626 -->
  <line x1="533" y1="170" x2="626" y2="228" stroke="#1f4fa3" stroke-width="3"/>
  <!-- Region 3: r > 1.2: flat at y=228, x=626..765 -->
  <line x1="626" y1="228" x2="765" y2="228" stroke="#1f4fa3" stroke-width="3"/>

  <!-- Unclipped r*A reference (amber dashed) for negative A -->
  <!-- At r=0.4: L=-0.6, y=55+0.6/2.5*240=55+57.6=113 -->
  <!-- At r=1.8: L=-2.7, y=55+2.7/2.5*240=55+259=314 (clip to 295) -->
  <!-- Compute at y=295: L=-2.5, r=2.5/1.5=1.667; x=440+232.1*(1.667-0.4)=440+232.1*1.267=440+294=734 -->
  <line x1="440" y1="113" x2="734" y2="295" stroke="#c77a12" stroke-width="1.5" stroke-dasharray="6,3"/>

  <!-- Region labels for negative advantage -->
  <text x="485" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#c0392b">Clipped</text>
  <text x="485" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#c0392b">(r &lt; 1&#8722;&#949;)</text>

  <text x="579" y="253" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#0e8a6e">Unclipped</text>
  <text x="579" y="263" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#0e8a6e">(1&#8722;&#949; &#8804; r &#8804; 1+&#949;)</text>

  <text x="695" y="243" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#c0392b">Clipped</text>
  <text x="695" y="253" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#c0392b">(r &gt; 1+&#949;)</text>

  <!-- Key insight annotation -->
  <rect x="445" y="62" width="310" height="42" fill="#fff3cd" rx="4" stroke="#c77a12" stroke-width="1"/>
  <text x="600" y="78" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#c77a12" font-weight="bold">Key insight: clipping is pessimistic</text>
  <text x="600" y="91" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#5b6675">Good actions (A&gt;0): caps upside at r=1+&#949;</text>
  <text x="600" y="102" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#5b6675">Bad actions (A&lt;0): caps downside at r=1&#8722;&#949;</text>

  <!-- Epsilon annotation -->
  <text x="579" y="52" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#5b6675">&#8592; &#949;=0.2 &#8594;</text>
  <line x1="533" y1="46" x2="626" y2="46" stroke="#5b6675" stroke-width="1"/>
  <line x1="533" y1="43" x2="533" y2="49" stroke="#5b6675" stroke-width="1"/>
  <line x1="626" y1="43" x2="626" y2="49" stroke="#5b6675" stroke-width="1"/>
</svg>
