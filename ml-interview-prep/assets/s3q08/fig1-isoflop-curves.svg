<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 320" width="820" height="320" font-family="Arial, sans-serif">
  <defs>
    <marker id="arrowx" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#5b6675"/>
    </marker>
    <marker id="arrowy" markerWidth="8" markerHeight="6" refX="3" refY="8" orient="auto">
      <polygon points="0 8, 3 0, 6 8" fill="#5b6675"/>
    </marker>
  </defs>

  <rect width="820" height="320" fill="#f8f9fa" rx="8"/>

  <!-- Title -->
  <text x="410" y="26" text-anchor="middle" font-size="15" font-weight="bold" fill="#1f4fa3">IsoFLOP Curves: Optimal Model Size vs Compute Budget</text>

  <!-- Plot area: x=80..760, y=50..270 -->
  <rect x="80" y="50" width="680" height="220" fill="#ffffff" stroke="#d0d5dd" stroke-width="1" rx="4"/>

  <!-- Grid lines vertical -->
  <line x1="250" y1="50" x2="250" y2="270" stroke="#e8ecf0" stroke-width="1"/>
  <line x1="420" y1="50" x2="420" y2="270" stroke="#e8ecf0" stroke-width="1"/>
  <line x1="590" y1="50" x2="590" y2="270" stroke="#e8ecf0" stroke-width="1"/>

  <!-- Grid lines horizontal -->
  <line x1="80" y1="105" x2="760" y2="105" stroke="#e8ecf0" stroke-width="1"/>
  <line x1="80" y1="160" x2="760" y2="160" stroke="#e8ecf0" stroke-width="1"/>
  <line x1="80" y1="215" x2="760" y2="215" stroke="#e8ecf0" stroke-width="1"/>

  <!-- X-axis label -->
  <text x="420" y="298" text-anchor="middle" font-size="12" fill="#5b6675" font-weight="bold">Model Size N (parameters)</text>
  <text x="80" y="284" text-anchor="middle" font-size="10" fill="#5b6675">1B</text>
  <text x="250" y="284" text-anchor="middle" font-size="10" fill="#5b6675">10B</text>
  <text x="420" y="284" text-anchor="middle" font-size="10" fill="#5b6675">50B</text>
  <text x="590" y="284" text-anchor="middle" font-size="10" fill="#5b6675">200B</text>
  <text x="760" y="284" text-anchor="middle" font-size="10" fill="#5b6675">500B</text>

  <!-- Y-axis label -->
  <text x="22" y="165" text-anchor="middle" font-size="12" fill="#5b6675" font-weight="bold" transform="rotate(-90 22 165)">Validation Loss</text>
  <text x="70" y="55" text-anchor="end" font-size="10" fill="#5b6675">1.50</text>
  <text x="70" y="110" text-anchor="end" font-size="10" fill="#5b6675">1.90</text>
  <text x="70" y="165" text-anchor="end" font-size="10" fill="#5b6675">2.30</text>
  <text x="70" y="220" text-anchor="end" font-size="10" fill="#5b6675">2.70</text>
  <text x="70" y="270" text-anchor="end" font-size="10" fill="#5b6675">3.10</text>

  <!-- IsoFLOP curve 1: C = 10^21 (highest loss, smallest compute) -->
  <!-- U-shaped, minimum around N=5B (x~200), loss_min~2.55 (y~242) -->
  <path d="M 92 190 C 130 215, 160 235, 200 242 C 240 249, 280 255, 340 262 C 420 268, 560 270, 680 270" stroke="#c0392b" stroke-width="2.5" fill="none" stroke-dasharray="none"/>
  <!-- Optimal dot C=10^21 at N~5B -->
  <circle cx="200" cy="242" r="6" fill="#c0392b"/>

  <!-- IsoFLOP curve 2: C = 10^22 -->
  <!-- U-shaped, minimum around N=15B (x~300), loss_min~2.20 (y~214) -->
  <path d="M 92 162 C 130 182, 180 200, 300 214 C 380 220, 460 228, 580 240 C 650 246, 710 250, 755 252" stroke="#c77a12" stroke-width="2.5" fill="none"/>
  <!-- Optimal dot C=10^22 at N~15B -->
  <circle cx="300" cy="214" r="6" fill="#c77a12"/>

  <!-- IsoFLOP curve 3: C = 10^23 -->
  <!-- U-shaped, minimum around N=67B (x~470), loss_min~1.85 (y~180) -->
  <path d="M 150 125 C 200 142, 300 160, 470 180 C 570 188, 650 196, 755 206" stroke="#0e8a6e" stroke-width="2.5" fill="none"/>
  <!-- Optimal dot C=10^23 at N~67B -->
  <circle cx="470" cy="180" r="6" fill="#0e8a6e"/>

  <!-- IsoFLOP curve 4: C = 10^24 -->
  <!-- U-shaped, minimum around N=200B (x~590), loss_min~1.65 (y~158) -->
  <path d="M 250 90 C 330 104, 420 122, 590 158 C 660 170, 720 182, 755 188" stroke="#1f4fa3" stroke-width="2.5" fill="none"/>
  <!-- Optimal dot C=10^24 at N~200B -->
  <circle cx="590" cy="158" r="6" fill="#1f4fa3"/>

  <!-- Chinchilla optimal frontier dashed line through dots -->
  <path d="M 200 242 C 250 228, 280 214, 300 214 C 370 214, 420 196, 470 180 C 530 168, 560 163, 590 158" stroke="#6c4fe0" stroke-width="2" fill="none" stroke-dasharray="6 4"/>

  <!-- Legend -->
  <rect x="88" y="56" width="280" height="82" fill="#f8f9fa" stroke="#d0d5dd" stroke-width="1" rx="4"/>
  <line x1="96" y1="71" x2="124" y2="71" stroke="#c0392b" stroke-width="2.5"/>
  <circle cx="110" cy="71" r="4" fill="#c0392b"/>
  <text x="130" y="75" font-size="10" fill="#333">C = 10^21 FLOPs</text>
  <line x1="96" y1="89" x2="124" y2="89" stroke="#c77a12" stroke-width="2.5"/>
  <circle cx="110" cy="89" r="4" fill="#c77a12"/>
  <text x="130" y="93" font-size="10" fill="#333">C = 10^22 FLOPs</text>
  <line x1="96" y1="107" x2="124" y2="107" stroke="#0e8a6e" stroke-width="2.5"/>
  <circle cx="110" cy="107" r="4" fill="#0e8a6e"/>
  <text x="130" y="111" font-size="10" fill="#333">C = 10^23 FLOPs (Chinchilla)</text>
  <line x1="96" y1="125" x2="124" y2="125" stroke="#1f4fa3" stroke-width="2.5"/>
  <circle cx="110" cy="125" r="4" fill="#1f4fa3"/>
  <text x="130" y="129" font-size="10" fill="#333">C = 10^24 FLOPs</text>

  <!-- Frontier legend -->
  <rect x="478" y="56" width="272" height="36" fill="#f8f9fa" stroke="#d0d5dd" stroke-width="1" rx="4"/>
  <line x1="486" y1="71" x2="514" y2="71" stroke="#6c4fe0" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="520" y="75" font-size="10" fill="#6c4fe0" font-weight="bold">Chinchilla optimal frontier</text>
  <text x="520" y="85" font-size="9" fill="#5b6675">(connects loss-minimizing N at each C)</text>

  <!-- Annotation: C=10^23 optimal point label -->
  <line x1="470" y1="174" x2="490" y2="156" stroke="#0e8a6e" stroke-width="1" stroke-dasharray="3 2"/>
  <text x="492" y="153" font-size="9" fill="#0e8a6e" font-weight="bold">N*~67B, D*~1.34T</text>
  <text x="492" y="163" font-size="9" fill="#0e8a6e">(C=10^23 optimal)</text>
</svg>
