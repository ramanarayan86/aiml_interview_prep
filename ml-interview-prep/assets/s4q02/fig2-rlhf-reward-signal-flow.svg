<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 380" width="820" height="380" font-family="Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#5b6675"/>
    </marker>
    <marker id="arr-red" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#c0392b"/>
    </marker>
    <marker id="arr-amber" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#c77a12"/>
    </marker>
    <marker id="arr-purple" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6c4fe0"/>
    </marker>
    <marker id="arr-teal" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0e8a6e"/>
    </marker>
    <marker id="arr-navy" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1f4fa3"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="820" height="380" fill="#f8f9fa" rx="10"/>

  <!-- Title -->
  <text x="410" y="26" text-anchor="middle" font-size="15" font-weight="bold" fill="#1f4fa3">PPO Loop: Reward Signal Flow in RLHF</text>

  <!-- ===== MAIN HORIZONTAL PIPELINE (y=120) ===== -->

  <!-- Step 1: Prompt -->
  <rect x="20" y="95" width="90" height="50" fill="#d6e4fa" stroke="#1f4fa3" stroke-width="1.8" rx="6"/>
  <text x="65" y="116" text-anchor="middle" font-size="11" fill="#1f4fa3" font-weight="bold">Prompt x</text>
  <text x="65" y="132" text-anchor="middle" font-size="10" fill="#1f4fa3">from dataset</text>

  <!-- Arrow 1 -->
  <line x1="110" y1="120" x2="140" y2="120" stroke="#5b6675" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 2: Policy generates response -->
  <rect x="142" y="88" width="120" height="64" fill="#1f4fa3" rx="6"/>
  <text x="202" y="108" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffffff">Policy &#960;&#952;</text>
  <text x="202" y="122" text-anchor="middle" font-size="10" fill="#d0dcf8">generates y~&#960;&#952;(&#183;|x)</text>
  <text x="202" y="136" text-anchor="middle" font-size="10" fill="#d0dcf8">(autoregressive)</text>

  <!-- Arrow 2 -->
  <line x1="262" y1="120" x2="292" y2="120" stroke="#5b6675" stroke-width="2" marker-end="url(#arr)"/>
  <text x="277" y="112" text-anchor="middle" font-size="9" fill="#5b6675">y</text>

  <!-- Step 3: Reward Model -->
  <rect x="294" y="88" width="120" height="64" fill="#0e8a6e" rx="6"/>
  <text x="354" y="108" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffffff">Reward Model</text>
  <text x="354" y="122" text-anchor="middle" font-size="10" fill="#d0f0e8">r&#966;(x, y) &#8712; &#8477;</text>
  <text x="354" y="136" text-anchor="middle" font-size="10" fill="#d0f0e8">(scalar score)</text>

  <!-- Arrow 3 -->
  <line x1="414" y1="120" x2="444" y2="120" stroke="#0e8a6e" stroke-width="2" marker-end="url(#arr-teal)"/>
  <text x="429" y="112" text-anchor="middle" font-size="9" fill="#0e8a6e">r(x,y)</text>

  <!-- Step 4: Subtract KL -->
  <rect x="446" y="88" width="130" height="64" fill="#c0392b" rx="6"/>
  <text x="511" y="106" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffffff">KL Penalty</text>
  <text x="511" y="120" text-anchor="middle" font-size="10" fill="#fad0cc">&#8722; &#946; log &#960;&#952;(y|x)</text>
  <text x="511" y="134" text-anchor="middle" font-size="10" fill="#fad0cc">         &#960;&#8320;(y|x)</text>
  <text x="511" y="148" text-anchor="middle" font-size="9" fill="#fad0cc">(subtracted)</text>

  <!-- ===== KL BRANCH from Reference Policy ===== -->
  <!-- Reference policy box -->
  <rect x="446" y="215" width="130" height="50" fill="#fdebd4" stroke="#c0392b" stroke-width="1.8" rx="6"/>
  <text x="511" y="234" text-anchor="middle" font-size="11" fill="#c0392b" font-weight="bold">Ref Policy &#960;&#8320;</text>
  <text x="511" y="249" text-anchor="middle" font-size="10" fill="#c0392b">(frozen SFT init)</text>

  <!-- Vertical arrow from Ref Policy up to KL Penalty -->
  <line x1="511" y1="215" x2="511" y2="153" stroke="#c0392b" stroke-width="1.8" marker-end="url(#arr-red)"/>
  <text x="525" y="186" text-anchor="start" font-size="10" fill="#c0392b" font-weight="bold">&#946; KL(&#960;&#952;||&#960;&#8320;)</text>
  <text x="525" y="199" text-anchor="start" font-size="9" fill="#c0392b">penalises drift</text>

  <!-- ===== Also connect policy to KL Penalty box ===== -->
  <!-- Arrow from Policy box down to show log pi_theta also computed -->
  <line x1="202" y1="152" x2="202" y2="240" stroke="#1f4fa3" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="202" y1="240" x2="448" y2="240" stroke="#1f4fa3" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr-navy)"/>
  <text x="320" y="258" text-anchor="middle" font-size="9" fill="#1f4fa3">log &#960;&#952;(y|x)</text>

  <!-- Arrow 4 -->
  <line x1="576" y1="120" x2="606" y2="120" stroke="#c0392b" stroke-width="2" marker-end="url(#arr-red)"/>
  <text x="591" y="112" text-anchor="middle" font-size="9" fill="#c0392b">&#774;r</text>

  <!-- Step 5: Advantage Estimate -->
  <rect x="608" y="88" width="110" height="64" fill="#6c4fe0" rx="6"/>
  <text x="663" y="106" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffffff">Advantage</text>
  <text x="663" y="120" text-anchor="middle" font-size="10" fill="#e0d8fa">A&#770;(x,y) =</text>
  <text x="663" y="134" text-anchor="middle" font-size="10" fill="#e0d8fa">&#774;r &#8722; V(x)</text>
  <text x="663" y="148" text-anchor="middle" font-size="9" fill="#e0d8fa">(baseline subtracted)</text>

  <!-- Arrow 5 -->
  <line x1="718" y1="120" x2="748" y2="120" stroke="#6c4fe0" stroke-width="2" marker-end="url(#arr-purple)"/>

  <!-- Step 6: Policy Gradient Update -->
  <rect x="750" y="88" width="55" height="64" fill="#c77a12" rx="6"/>
  <text x="777" y="108" text-anchor="middle" font-size="10" font-weight="bold" fill="#ffffff">Policy</text>
  <text x="777" y="122" text-anchor="middle" font-size="10" fill="#fdebd4">Gradient</text>
  <text x="777" y="136" text-anchor="middle" font-size="10" fill="#fdebd4">Update</text>
  <text x="777" y="150" text-anchor="middle" font-size="9" fill="#ffe4b5">&#952; &#8592; &#952; + &#945;&#8711;</text>

  <!-- ===== FEEDBACK LOOP (policy update back to policy box) ===== -->
  <path d="M 777 152 Q 777 310 202 310 Q 142 310 142 152" stroke="#c77a12" stroke-width="2" fill="none" stroke-dasharray="6,3" marker-end="url(#arr-amber)"/>
  <text x="490" y="328" text-anchor="middle" font-size="11" fill="#c77a12" font-weight="bold">updated &#952; fed back &#8594; new rollouts</text>

  <!-- ===== PPO Objective annotation box ===== -->
  <rect x="20" y="195" width="260" height="80" fill="#ffffff" stroke="#6c4fe0" stroke-width="1.5" rx="7"/>
  <text x="150" y="213" text-anchor="middle" font-size="11" font-weight="bold" fill="#6c4fe0">PPO Clipped Objective</text>
  <text x="30" y="231" font-size="10" fill="#333333">L = E[ min(</text>
  <text x="30" y="247" font-size="10" fill="#333333">  r&#964;(&#952;) A&#770;,</text>
  <text x="30" y="263" font-size="10" fill="#333333">  clip(r&#964;(&#952;), 1&#8722;&#603;, 1+&#603;) A&#770; ) ]</text>
  <text x="30" y="270" font-size="10" fill="#c0392b">  &#8722; &#946; KL(&#960;&#952;(y|x) || &#960;&#8320;(y|x))</text>

  <!-- Where r_t(theta) = pi_theta / pi_old -->
  <text x="150" y="288" text-anchor="middle" font-size="9" fill="#5b6675">r&#964;(&#952;) = &#960;&#952;(y|x) / &#960;&#952;&#8320;&#8343;&#8343;(y|x)</text>

  <!-- ===== STEP LABELS ===== -->
  <text x="65" y="78" text-anchor="middle" font-size="9" fill="#5b6675" font-weight="bold">1</text>
  <text x="202" y="78" text-anchor="middle" font-size="9" fill="#5b6675" font-weight="bold">2</text>
  <text x="354" y="78" text-anchor="middle" font-size="9" fill="#5b6675" font-weight="bold">3</text>
  <text x="511" y="78" text-anchor="middle" font-size="9" fill="#5b6675" font-weight="bold">4</text>
  <text x="663" y="78" text-anchor="middle" font-size="9" fill="#5b6675" font-weight="bold">5</text>
  <text x="777" y="78" text-anchor="middle" font-size="9" fill="#5b6675" font-weight="bold">6</text>

  <!-- Step label descriptions -->
  <text x="65" y="170" text-anchor="middle" font-size="9" fill="#5b6675">sample</text>
  <text x="65" y="181" text-anchor="middle" font-size="9" fill="#5b6675">prompt</text>
  <text x="202" y="162" text-anchor="middle" font-size="9" fill="#1f4fa3">generate</text>
  <text x="202" y="173" text-anchor="middle" font-size="9" fill="#1f4fa3">response</text>
  <text x="354" y="162" text-anchor="middle" font-size="9" fill="#0e8a6e">score</text>
  <text x="354" y="173" text-anchor="middle" font-size="9" fill="#0e8a6e">reward</text>
  <text x="663" y="162" text-anchor="middle" font-size="9" fill="#6c4fe0">estimate</text>
  <text x="663" y="173" text-anchor="middle" font-size="9" fill="#6c4fe0">advantage</text>
  <text x="777" y="162" text-anchor="middle" font-size="9" fill="#c77a12">update</text>
  <text x="777" y="173" text-anchor="middle" font-size="9" fill="#c77a12">weights</text>
</svg>
