<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" width="900" height="420">

  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#5b6675"/>
    </marker>
    <marker id="arr-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1a5fa8"/>
    </marker>
    <marker id="arr-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#b5321a"/>
    </marker>
    <marker id="arr-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1a7a44"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="420" fill="#f8f9fa" rx="8"/>

  <!-- Title -->
  <text x="450" y="28" font-family="Arial, sans-serif" font-size="15" font-weight="bold"
        fill="#1f4fa3" text-anchor="middle">Differential Attention: Two-Softmax Subtraction</text>

  <!-- ── Left panel: Standard MHA ── -->
  <rect x="30" y="45" width="260" height="340" rx="8" fill="#eef3fb" stroke="#93bde8" stroke-width="1.5"/>
  <text x="160" y="68" font-family="Arial, sans-serif" font-size="13" font-weight="bold"
        fill="#1a5fa8" text-anchor="middle">Standard MHA</text>

  <!-- Input box -->
  <rect x="95" y="82" width="130" height="28" rx="5" fill="#1a5fa8"/>
  <text x="160" y="101" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle">Input X</text>

  <!-- Q K V projections -->
  <line x1="160" y1="110" x2="160" y2="130" stroke="#5b6675" stroke-width="1.4" marker-end="url(#arr)"/>
  <rect x="60" y="130" width="60" height="24" rx="4" fill="#dce8fa" stroke="#93bde8" stroke-width="1"/>
  <text x="90" y="146" font-family="Arial, sans-serif" font-size="11" fill="#1a5fa8" text-anchor="middle">Q</text>
  <rect x="130" y="130" width="60" height="24" rx="4" fill="#dce8fa" stroke="#93bde8" stroke-width="1"/>
  <text x="160" y="146" font-family="Arial, sans-serif" font-size="11" fill="#1a5fa8" text-anchor="middle">K</text>
  <rect x="200" y="130" width="60" height="24" rx="4" fill="#dce8fa" stroke="#93bde8" stroke-width="1"/>
  <text x="230" y="146" font-family="Arial, sans-serif" font-size="11" fill="#1a5fa8" text-anchor="middle">V</text>

  <!-- Softmax box -->
  <line x1="90" y1="154" x2="90" y2="190" stroke="#5b6675" stroke-width="1.2"/>
  <line x1="160" y1="154" x2="160" y2="190" stroke="#5b6675" stroke-width="1.2"/>
  <line x1="90" y1="172" x2="160" y2="172" stroke="#5b6675" stroke-width="1.2"/>
  <rect x="65" y="190" width="110" height="26" rx="4" fill="#1a5fa8"/>
  <text x="120" y="207" font-family="Arial, sans-serif" font-size="10.5" fill="white" text-anchor="middle">softmax(QKᵀ/√d)</text>

  <!-- Arrow to V multiply -->
  <line x1="120" y1="216" x2="160" y2="240" stroke="#5b6675" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="230" y1="154" x2="230" y2="240" stroke="#5b6675" stroke-width="1.2"/>
  <line x1="230" y1="240" x2="165" y2="240" stroke="#5b6675" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- Output -->
  <rect x="110" y="248" width="100" height="26" rx="4" fill="#1a7a44"/>
  <text x="160" y="265" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle">A · V  (output)</text>

  <!-- Noise annotation -->
  <rect x="50" y="295" width="220" height="65" rx="6" fill="#fff8d4" stroke="#e8c84a" stroke-width="1.2"/>
  <text x="160" y="314" font-family="Arial, sans-serif" font-size="10.5" font-weight="bold"
        fill="#7a6010" text-anchor="middle">⚠ Attention noise</text>
  <text x="160" y="330" font-family="Arial, sans-serif" font-size="10" fill="#7a6010" text-anchor="middle">Softmax spreads weight</text>
  <text x="160" y="345" font-family="Arial, sans-serif" font-size="10" fill="#7a6010" text-anchor="middle">to irrelevant tokens (1/N floor)</text>
  <text x="160" y="360" font-family="Arial, sans-serif" font-size="10" fill="#7a6010" text-anchor="middle">→ blurry retrieval</text>

  <!-- ── Right panel: Differential MHA ── -->
  <rect x="330" y="45" width="540" height="340" rx="8" fill="#eefbf3" stroke="#7abf9a" stroke-width="1.5"/>
  <text x="600" y="68" font-family="Arial, sans-serif" font-size="13" font-weight="bold"
        fill="#1a7a44" text-anchor="middle">Differential MHA (Ye et al., 2024)</text>

  <!-- Input -->
  <rect x="495" y="82" width="110" height="28" rx="5" fill="#1a7a44"/>
  <text x="550" y="101" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle">Input X</text>

  <!-- Two Q/K branches + shared V -->
  <line x1="520" y1="110" x2="440" y2="130" stroke="#5b6675" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="550" y1="110" x2="550" y2="130" stroke="#5b6675" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="580" y1="110" x2="660" y2="130" stroke="#5b6675" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- Q1 K1 -->
  <rect x="365" y="130" width="50" height="22" rx="4" fill="#cce8fa" stroke="#93bde8" stroke-width="1"/>
  <text x="390" y="145" font-family="Arial, sans-serif" font-size="10.5" fill="#1a5fa8" text-anchor="middle">Q₁</text>
  <rect x="420" y="130" width="50" height="22" rx="4" fill="#cce8fa" stroke="#93bde8" stroke-width="1"/>
  <text x="445" y="145" font-family="Arial, sans-serif" font-size="10.5" fill="#1a5fa8" text-anchor="middle">K₁</text>

  <!-- Q2 K2 -->
  <rect x="530" y="130" width="50" height="22" rx="4" fill="#faddcc" stroke="#e8b49a" stroke-width="1"/>
  <text x="555" y="145" font-family="Arial, sans-serif" font-size="10.5" fill="#b5321a" text-anchor="middle">Q₂</text>
  <rect x="585" y="130" width="50" height="22" rx="4" fill="#faddcc" stroke="#e8b49a" stroke-width="1"/>
  <text x="610" y="145" font-family="Arial, sans-serif" font-size="10.5" fill="#b5321a" text-anchor="middle">K₂</text>

  <!-- V shared -->
  <rect x="650" y="130" width="50" height="22" rx="4" fill="#d4f5e4" stroke="#7abf9a" stroke-width="1"/>
  <text x="675" y="145" font-family="Arial, sans-serif" font-size="10.5" fill="#1a7a44" text-anchor="middle">V</text>

  <!-- Softmax A1 -->
  <line x1="390" y1="152" x2="390" y2="175" stroke="#5b6675" stroke-width="1.2"/>
  <line x1="445" y1="152" x2="445" y2="175" stroke="#5b6675" stroke-width="1.2"/>
  <line x1="390" y1="164" x2="445" y2="164" stroke="#5b6675" stroke-width="1.2"/>
  <rect x="355" y="175" width="115" height="24" rx="4" fill="#1a5fa8"/>
  <text x="412" y="191" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">A₁ = softmax(Q₁K₁ᵀ/√d)</text>

  <!-- Softmax A2 -->
  <line x1="555" y1="152" x2="555" y2="175" stroke="#5b6675" stroke-width="1.2"/>
  <line x1="610" y1="152" x2="610" y2="175" stroke="#5b6675" stroke-width="1.2"/>
  <line x1="555" y1="164" x2="610" y2="164" stroke="#5b6675" stroke-width="1.2"/>
  <rect x="520" y="175" width="115" height="24" rx="4" fill="#b5321a"/>
  <text x="577" y="191" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">A₂ = softmax(Q₂K₂ᵀ/√d)</text>

  <!-- Lambda scalar -->
  <rect x="470" y="210" width="60" height="22" rx="4" fill="#f0e6fa" stroke="#9a6abf" stroke-width="1.2"/>
  <text x="500" y="225" font-family="Arial, sans-serif" font-size="11" fill="#6a3abf" text-anchor="middle">× λ</text>

  <!-- Subtraction -->
  <line x1="412" y1="199" x2="412" y2="245" stroke="#1a5fa8" stroke-width="1.4"/>
  <line x1="577" y1="199" x2="577" y2="232" stroke="#b5321a" stroke-width="1.4"/>
  <line x1="500" y1="232" x2="577" y2="232" stroke="#b5321a" stroke-width="1.2"/>
  <line x1="500" y1="232" x2="500" y2="245" stroke="#b5321a" stroke-width="1.2"/>

  <rect x="390" y="245" width="190" height="28" rx="6" fill="#1a7a44"/>
  <text x="485" y="263" font-family="Arial, sans-serif" font-size="11" font-weight="bold"
        fill="white" text-anchor="middle">(A₁ − λ·A₂) · V</text>

  <!-- RMSNorm + scale -->
  <line x1="485" y1="273" x2="485" y2="295" stroke="#5b6675" stroke-width="1.4" marker-end="url(#arr)"/>
  <rect x="390" y="295" width="190" height="24" rx="4" fill="#7abf9a"/>
  <text x="485" y="311" font-family="Arial, sans-serif" font-size="10.5" fill="white" text-anchor="middle">(1−λ_init) · RMSNorm(head)</text>

  <!-- Benefit annotation -->
  <rect x="345" y="335" width="250" height="40" rx="6" fill="#d4f5e4" stroke="#7abf9a" stroke-width="1.2"/>
  <text x="470" y="353" font-family="Arial, sans-serif" font-size="10.5" font-weight="bold"
        fill="#1a7a44" text-anchor="middle">✓ Shared noise cancels</text>
  <text x="470" y="368" font-family="Arial, sans-serif" font-size="10" fill="#1a7a44" text-anchor="middle">Signal (differential) is amplified → sparse attention</text>

  <!-- VS divider -->
  <line x1="295" y1="120" x2="325" y2="120" stroke="#9aa5b0" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="310" y="230" font-family="Arial, sans-serif" font-size="14" font-weight="bold"
        fill="#9aa5b0" text-anchor="middle">vs</text>
  <line x1="295" y1="340" x2="325" y2="340" stroke="#9aa5b0" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Bottom source note -->
  <text x="450" y="408" font-family="Arial, sans-serif" font-size="10" fill="#9aa5b0" text-anchor="middle">
    Ye et al., "Differential Transformer," arXiv:2410.05258, ICLR 2025 Oral
  </text>
</svg>
