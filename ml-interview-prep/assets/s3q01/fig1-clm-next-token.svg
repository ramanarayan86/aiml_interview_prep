<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 400" width="860" height="400" font-family="Arial, sans-serif">
  <rect width="860" height="400" fill="#f8f9fa" rx="8"/>
  <text x="430" y="30" text-anchor="middle" font-size="15" font-weight="bold" fill="#1f4fa3">Causal Language Modelling: Next-Token Prediction</text>

  <!-- Token sequence row -->
  <text x="20" y="68" font-size="12" font-weight="bold" fill="#5b6675">Input sequence (T = 5 tokens)</text>

  <!-- Token boxes -->
  <rect x="20"  y="78" width="90" height="38" rx="5" fill="#e8edf5" stroke="#1f4fa3" stroke-width="1.5"/>
  <text x="65"  y="103" text-anchor="middle" font-size="13" font-weight="bold" fill="#1f4fa3">The</text>

  <rect x="120" y="78" width="90" height="38" rx="5" fill="#e8edf5" stroke="#1f4fa3" stroke-width="1.5"/>
  <text x="165" y="103" text-anchor="middle" font-size="13" font-weight="bold" fill="#1f4fa3">cat</text>

  <rect x="220" y="78" width="90" height="38" rx="5" fill="#e8edf5" stroke="#1f4fa3" stroke-width="1.5"/>
  <text x="265" y="103" text-anchor="middle" font-size="13" font-weight="bold" fill="#1f4fa3">sat</text>

  <rect x="320" y="78" width="90" height="38" rx="5" fill="#e8edf5" stroke="#1f4fa3" stroke-width="1.5"/>
  <text x="365" y="103" text-anchor="middle" font-size="13" font-weight="bold" fill="#1f4fa3">on</text>

  <rect x="420" y="78" width="90" height="38" rx="5" fill="#e8edf5" stroke="#1f4fa3" stroke-width="1.5"/>
  <text x="465" y="103" text-anchor="middle" font-size="13" font-weight="bold" fill="#1f4fa3">the</text>

  <!-- Target tokens (shifted right) -->
  <text x="20" y="155" font-size="12" font-weight="bold" fill="#5b6675">Target (shifted by 1): each token predicts the next</text>

  <rect x="20"  y="165" width="90" height="38" rx="5" fill="#fff7e6" stroke="#c77a12" stroke-width="1.5"/>
  <text x="65"  y="190" text-anchor="middle" font-size="13" font-weight="bold" fill="#c77a12">cat</text>

  <rect x="120" y="165" width="90" height="38" rx="5" fill="#fff7e6" stroke="#c77a12" stroke-width="1.5"/>
  <text x="165" y="190" text-anchor="middle" font-size="13" font-weight="bold" fill="#c77a12">sat</text>

  <rect x="220" y="165" width="90" height="38" rx="5" fill="#fff7e6" stroke="#c77a12" stroke-width="1.5"/>
  <text x="265" y="190" text-anchor="middle" font-size="13" font-weight="bold" fill="#c77a12">on</text>

  <rect x="320" y="165" width="90" height="38" rx="5" fill="#fff7e6" stroke="#c77a12" stroke-width="1.5"/>
  <text x="365" y="190" text-anchor="middle" font-size="13" font-weight="bold" fill="#c77a12">the</text>

  <rect x="420" y="165" width="90" height="38" rx="5" fill="#fff7e6" stroke="#c77a12" stroke-width="1.5"/>
  <text x="465" y="190" text-anchor="middle" font-size="13" font-weight="bold" fill="#c77a12">mat</text>

  <!-- Arrows input to target -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#0e8a6e"/>
    </marker>
  </defs>
  <line x1="65"  y1="116" x2="65"  y2="163" stroke="#0e8a6e" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="165" y1="116" x2="165" y2="163" stroke="#0e8a6e" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="265" y1="116" x2="265" y2="163" stroke="#0e8a6e" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="365" y1="116" x2="365" y2="163" stroke="#0e8a6e" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="465" y1="116" x2="465" y2="163" stroke="#0e8a6e" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Loss contributions row -->
  <text x="20" y="235" font-size="12" font-weight="bold" fill="#5b6675">Cross-entropy loss at each position (lower = model more confident)</text>

  <!-- Loss bars (illustrative heights) -->
  <rect x="20"  y="245" width="90" height="32" rx="4" fill="#ffe5e5" stroke="#c0392b" stroke-width="1"/>
  <text x="65"  y="266" text-anchor="middle" font-size="11" fill="#c0392b">-log P = 1.8</text>

  <rect x="120" y="245" width="90" height="32" rx="4" fill="#ffe5e5" stroke="#c0392b" stroke-width="1"/>
  <text x="165" y="266" text-anchor="middle" font-size="11" fill="#c0392b">-log P = 2.1</text>

  <rect x="220" y="245" width="90" height="32" rx="4" fill="#ffe5e5" stroke="#c0392b" stroke-width="1"/>
  <text x="265" y="266" text-anchor="middle" font-size="11" fill="#c0392b">-log P = 1.5</text>

  <rect x="320" y="245" width="90" height="32" rx="4" fill="#ffe5e5" stroke="#c0392b" stroke-width="1"/>
  <text x="365" y="266" text-anchor="middle" font-size="11" fill="#c0392b">-log P = 1.2</text>

  <rect x="420" y="245" width="90" height="32" rx="4" fill="#ffe5e5" stroke="#c0392b" stroke-width="1"/>
  <text x="465" y="266" text-anchor="middle" font-size="11" fill="#c0392b">-log P = 2.4</text>

  <!-- Average loss box -->
  <rect x="550" y="245" width="280" height="32" rx="5" fill="#e6f4f1" stroke="#0e8a6e" stroke-width="2"/>
  <text x="690" y="266" text-anchor="middle" font-size="12" font-weight="bold" fill="#0e8a6e">L = (1.8+2.1+1.5+1.2+2.4)/5 = 1.8</text>

  <line x1="520" y1="261" x2="548" y2="261" stroke="#0e8a6e" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="530" y="257" font-size="10" fill="#5b6675">avg</text>

  <!-- Causal mask annotation -->
  <text x="20" y="320" font-size="12" font-weight="bold" fill="#5b6675">Causal mask: each position attends ONLY to itself and prior positions</text>
  <!-- Triangular mask visual -->
  <rect x="20"  y="330" width="20" height="20" rx="2" fill="#1f4fa3" opacity="0.8"/>
  <rect x="50"  y="330" width="20" height="20" rx="2" fill="#1f4fa3" opacity="0.8"/>
  <rect x="80"  y="330" width="20" height="20" rx="2" fill="#d0d8e8"/>
  <rect x="110" y="330" width="20" height="20" rx="2" fill="#d0d8e8"/>
  <rect x="140" y="330" width="20" height="20" rx="2" fill="#d0d8e8"/>

  <rect x="20"  y="355" width="20" height="20" rx="2" fill="#1f4fa3" opacity="0.8"/>
  <rect x="50"  y="355" width="20" height="20" rx="2" fill="#1f4fa3" opacity="0.8"/>
  <rect x="80"  y="355" width="20" height="20" rx="2" fill="#1f4fa3" opacity="0.8"/>
  <rect x="110" y="355" width="20" height="20" rx="2" fill="#d0d8e8"/>
  <rect x="140" y="355" width="20" height="20" rx="2" fill="#d0d8e8"/>

  <text x="175" y="345" font-size="11" fill="#5b6675">Blue = visible; grey = masked (future)</text>
  <text x="175" y="370" font-size="11" fill="#5b6675">Gives T-1 independent training signals per sequence</text>

  <!-- Perplexity note -->
  <rect x="550" y="310" width="280" height="68" rx="5" fill="#f0e8ff" stroke="#6c4fe0" stroke-width="1.5"/>
  <text x="690" y="332" text-anchor="middle" font-size="12" font-weight="bold" fill="#6c4fe0">Perplexity = exp(L)</text>
  <text x="690" y="350" text-anchor="middle" font-size="11" fill="#5b6675">exp(1.8) = 6.05</text>
  <text x="690" y="368" text-anchor="middle" font-size="11" fill="#5b6675">Lower PPL = better model</text>
</svg>
