<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 420" width="860" height="420" font-family="Arial, sans-serif">
  <rect width="860" height="420" fill="#f8f9fa" rx="8"/>
  <text x="430" y="30" text-anchor="middle" font-size="15" font-weight="bold" fill="#1f4fa3">Pretraining Objective Variants: CLM vs MLM vs Span Corruption</text>

  <!-- Column headers -->
  <text x="130" y="60" text-anchor="middle" font-size="13" font-weight="bold" fill="#1f4fa3">CLM (Causal LM)</text>
  <text x="430" y="60" text-anchor="middle" font-size="13" font-weight="bold" fill="#0e8a6e">MLM (Masked LM)</text>
  <text x="720" y="60" text-anchor="middle" font-size="13" font-weight="bold" fill="#6c4fe0">Span Corruption (T5)</text>

  <!-- Dividing lines -->
  <line x1="280" y1="40" x2="280" y2="410" stroke="#ccc" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="570" y1="40" x2="570" y2="410" stroke="#ccc" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- === CLM === -->
  <!-- Input row -->
  <text x="20" y="88" font-size="11" fill="#5b6675">Input:</text>
  <rect x="55"  y="72" width="44" height="24" rx="3" fill="#e8edf5" stroke="#1f4fa3" stroke-width="1"/>
  <text x="77"  y="89" text-anchor="middle" font-size="11" fill="#1f4fa3">The</text>
  <rect x="103" y="72" width="44" height="24" rx="3" fill="#e8edf5" stroke="#1f4fa3" stroke-width="1"/>
  <text x="125" y="89" text-anchor="middle" font-size="11" fill="#1f4fa3">cat</text>
  <rect x="151" y="72" width="44" height="24" rx="3" fill="#e8edf5" stroke="#1f4fa3" stroke-width="1"/>
  <text x="173" y="89" text-anchor="middle" font-size="11" fill="#1f4fa3">sat</text>
  <rect x="199" y="72" width="44" height="24" rx="3" fill="#e8edf5" stroke="#1f4fa3" stroke-width="1"/>
  <text x="221" y="89" text-anchor="middle" font-size="11" fill="#1f4fa3">on</text>

  <!-- Predict row -->
  <text x="20" y="124" font-size="11" fill="#5b6675">Predict:</text>
  <rect x="55"  y="108" width="44" height="24" rx="3" fill="#fff7e6" stroke="#c77a12" stroke-width="1.5"/>
  <text x="77"  y="125" text-anchor="middle" font-size="11" fill="#c77a12">cat</text>
  <rect x="103" y="108" width="44" height="24" rx="3" fill="#fff7e6" stroke="#c77a12" stroke-width="1.5"/>
  <text x="125" y="125" text-anchor="middle" font-size="11" fill="#c77a12">sat</text>
  <rect x="151" y="108" width="44" height="24" rx="3" fill="#fff7e6" stroke="#c77a12" stroke-width="1.5"/>
  <text x="173" y="125" text-anchor="middle" font-size="11" fill="#c77a12">on</text>
  <rect x="199" y="108" width="44" height="24" rx="3" fill="#fff7e6" stroke="#c77a12" stroke-width="1.5"/>
  <text x="221" y="125" text-anchor="middle" font-size="11" fill="#c77a12">the</text>

  <!-- CLM properties -->
  <rect x="20" y="150" width="240" height="100" rx="5" fill="#eef2fb" stroke="#1f4fa3" stroke-width="1"/>
  <text x="30" y="168" font-size="11" fill="#333">Direction: left-to-right only</text>
  <text x="30" y="184" font-size="11" fill="#333">Mask: causal (lower-triangular)</text>
  <text x="30" y="200" font-size="11" fill="#333">Signal: T-1 predictions/sequence</text>
  <text x="30" y="216" font-size="11" fill="#333">Labels: all positions supervised</text>
  <text x="30" y="232" font-size="11" fill="#333">Used by: GPT-2, GPT-3, LLaMA</text>
  <text x="30" y="248" font-size="11" fill="#5b6675">Suits: generation tasks</text>

  <!-- CLM attention mask diagram -->
  <text x="30" y="278" font-size="11" font-weight="bold" fill="#1f4fa3">Attention mask (4x4):</text>
  <!-- Row 1 -->
  <rect x="30"  y="282" width="18" height="18" rx="2" fill="#1f4fa3" opacity="0.8"/>
  <rect x="52"  y="282" width="18" height="18" rx="2" fill="#d0d8e8"/>
  <rect x="74"  y="282" width="18" height="18" rx="2" fill="#d0d8e8"/>
  <rect x="96"  y="282" width="18" height="18" rx="2" fill="#d0d8e8"/>
  <!-- Row 2 -->
  <rect x="30"  y="304" width="18" height="18" rx="2" fill="#1f4fa3" opacity="0.8"/>
  <rect x="52"  y="304" width="18" height="18" rx="2" fill="#1f4fa3" opacity="0.8"/>
  <rect x="74"  y="304" width="18" height="18" rx="2" fill="#d0d8e8"/>
  <rect x="96"  y="304" width="18" height="18" rx="2" fill="#d0d8e8"/>
  <!-- Row 3 -->
  <rect x="30"  y="326" width="18" height="18" rx="2" fill="#1f4fa3" opacity="0.8"/>
  <rect x="52"  y="326" width="18" height="18" rx="2" fill="#1f4fa3" opacity="0.8"/>
  <rect x="74"  y="326" width="18" height="18" rx="2" fill="#1f4fa3" opacity="0.8"/>
  <rect x="96"  y="326" width="18" height="18" rx="2" fill="#d0d8e8"/>
  <!-- Row 4 -->
  <rect x="30"  y="348" width="18" height="18" rx="2" fill="#1f4fa3" opacity="0.8"/>
  <rect x="52"  y="348" width="18" height="18" rx="2" fill="#1f4fa3" opacity="0.8"/>
  <rect x="74"  y="348" width="18" height="18" rx="2" fill="#1f4fa3" opacity="0.8"/>
  <rect x="96"  y="348" width="18" height="18" rx="2" fill="#1f4fa3" opacity="0.8"/>
  <text x="125" y="295" font-size="10" fill="#5b6675">= can attend</text>
  <text x="125" y="313" font-size="10" fill="#5b6675">= masked out</text>

  <!-- === MLM === -->
  <text x="300" y="88" font-size="11" fill="#5b6675">Input:</text>
  <rect x="335"  y="72" width="44" height="24" rx="3" fill="#e8edf5" stroke="#0e8a6e" stroke-width="1"/>
  <text x="357"  y="89" text-anchor="middle" font-size="11" fill="#0e8a6e">The</text>
  <!-- Masked token -->
  <rect x="383"  y="72" width="44" height="24" rx="3" fill="#0e8a6e" stroke="#0e8a6e" stroke-width="1"/>
  <text x="405"  y="89" text-anchor="middle" font-size="11" fill="white">[MASK]</text>
  <rect x="431"  y="72" width="44" height="24" rx="3" fill="#e8edf5" stroke="#0e8a6e" stroke-width="1"/>
  <text x="453"  y="89" text-anchor="middle" font-size="11" fill="#0e8a6e">sat</text>
  <rect x="479"  y="72" width="44" height="24" rx="3" fill="#e8edf5" stroke="#0e8a6e" stroke-width="1"/>
  <text x="501"  y="89" text-anchor="middle" font-size="11" fill="#0e8a6e">on</text>

  <text x="300" y="124" font-size="11" fill="#5b6675">Predict:</text>
  <text x="405"  y="125" text-anchor="middle" font-size="12" font-weight="bold" fill="#c77a12">cat</text>
  <text x="325"  y="125" font-size="11" fill="#888">(only masked)</text>

  <rect x="300" y="150" width="240" height="100" rx="5" fill="#e6f4f1" stroke="#0e8a6e" stroke-width="1"/>
  <text x="310" y="168" font-size="11" fill="#333">Direction: bidirectional (full attn)</text>
  <text x="310" y="184" font-size="11" fill="#333">Mask: random 15% of tokens</text>
  <text x="310" y="200" font-size="11" fill="#333">Signal: ~0.15T predictions/seq</text>
  <text x="310" y="216" font-size="11" fill="#333">Labels: only masked positions</text>
  <text x="310" y="232" font-size="11" fill="#333">Used by: BERT, RoBERTa</text>
  <text x="310" y="248" font-size="11" fill="#5b6675">Suits: understanding/classification</text>

  <!-- MLM full attention diagram -->
  <text x="310" y="278" font-size="11" font-weight="bold" fill="#0e8a6e">Attention mask (4x4): all visible</text>
  <!-- All filled -->
  <rect x="310" y="282" width="18" height="18" rx="2" fill="#0e8a6e" opacity="0.7"/>
  <rect x="332" y="282" width="18" height="18" rx="2" fill="#0e8a6e" opacity="0.7"/>
  <rect x="354" y="282" width="18" height="18" rx="2" fill="#0e8a6e" opacity="0.7"/>
  <rect x="376" y="282" width="18" height="18" rx="2" fill="#0e8a6e" opacity="0.7"/>
  <rect x="310" y="304" width="18" height="18" rx="2" fill="#0e8a6e" opacity="0.7"/>
  <rect x="332" y="304" width="18" height="18" rx="2" fill="#0e8a6e" opacity="0.7"/>
  <rect x="354" y="304" width="18" height="18" rx="2" fill="#0e8a6e" opacity="0.7"/>
  <rect x="376" y="304" width="18" height="18" rx="2" fill="#0e8a6e" opacity="0.7"/>
  <rect x="310" y="326" width="18" height="18" rx="2" fill="#0e8a6e" opacity="0.7"/>
  <rect x="332" y="326" width="18" height="18" rx="2" fill="#0e8a6e" opacity="0.7"/>
  <rect x="354" y="326" width="18" height="18" rx="2" fill="#0e8a6e" opacity="0.7"/>
  <rect x="376" y="326" width="18" height="18" rx="2" fill="#0e8a6e" opacity="0.7"/>
  <rect x="310" y="348" width="18" height="18" rx="2" fill="#0e8a6e" opacity="0.7"/>
  <rect x="332" y="348" width="18" height="18" rx="2" fill="#0e8a6e" opacity="0.7"/>
  <rect x="354" y="348" width="18" height="18" rx="2" fill="#0e8a6e" opacity="0.7"/>
  <rect x="376" y="348" width="18" height="18" rx="2" fill="#0e8a6e" opacity="0.7"/>
  <text x="405" y="295" font-size="10" fill="#5b6675">Bidirectional:</text>
  <text x="405" y="313" font-size="10" fill="#5b6675">all positions</text>
  <text x="405" y="331" font-size="10" fill="#5b6675">attend each</text>
  <text x="405" y="349" font-size="10" fill="#5b6675">other</text>

  <!-- === Span Corruption === -->
  <text x="590" y="88" font-size="11" fill="#5b6675">Input:</text>
  <rect x="625"  y="72" width="44" height="24" rx="3" fill="#f0e8ff" stroke="#6c4fe0" stroke-width="1"/>
  <text x="647"  y="89" text-anchor="middle" font-size="11" fill="#6c4fe0">The</text>
  <!-- Sentinel token replaces "cat sat" -->
  <rect x="673"  y="72" width="54" height="24" rx="3" fill="#6c4fe0" stroke="#6c4fe0" stroke-width="1"/>
  <text x="700"  y="89" text-anchor="middle" font-size="10" fill="white">&lt;extra_0&gt;</text>
  <rect x="731"  y="72" width="44" height="24" rx="3" fill="#f0e8ff" stroke="#6c4fe0" stroke-width="1"/>
  <text x="753"  y="89" text-anchor="middle" font-size="11" fill="#6c4fe0">on</text>

  <text x="590" y="124" font-size="11" fill="#5b6675">Target:</text>
  <rect x="673"  y="108" width="54" height="24" rx="3" fill="#6c4fe0" stroke="#6c4fe0" stroke-width="1"/>
  <text x="700"  y="125" text-anchor="middle" font-size="10" fill="white">&lt;extra_0&gt;</text>
  <rect x="731"  y="108" width="44" height="24" rx="3" fill="#fff7e6" stroke="#c77a12" stroke-width="1.5"/>
  <text x="753"  y="125" text-anchor="middle" font-size="11" fill="#c77a12">cat sat</text>

  <rect x="590" y="150" width="240" height="100" rx="5" fill="#f0e8ff" stroke="#6c4fe0" stroke-width="1"/>
  <text x="600" y="168" font-size="11" fill="#333">Direction: encoder-decoder</text>
  <text x="600" y="184" font-size="11" fill="#333">Mask: contiguous spans replaced</text>
  <text x="600" y="200" font-size="11" fill="#333">Signal: predict all masked spans</text>
  <text x="600" y="216" font-size="11" fill="#333">Sentinel tokens replace spans</text>
  <text x="600" y="232" font-size="11" fill="#333">Used by: T5, BART (partial)</text>
  <text x="600" y="248" font-size="11" fill="#5b6675">Suits: seq2seq, summarisation</text>

  <!-- Bottom comparison table header -->
  <rect x="20" y="375" width="820" height="34" rx="5" fill="#e8edf5" stroke="#1f4fa3" stroke-width="1"/>
  <text x="130" y="397" text-anchor="middle" font-size="11" font-weight="bold" fill="#1f4fa3">GPT-2, GPT-3, LLaMA, Mistral</text>
  <text x="430" y="397" text-anchor="middle" font-size="11" font-weight="bold" fill="#0e8a6e">BERT, RoBERTa, DeBERTa</text>
  <text x="720" y="397" text-anchor="middle" font-size="11" font-weight="bold" fill="#6c4fe0">T5, mT5, FLAN-T5</text>
</svg>
