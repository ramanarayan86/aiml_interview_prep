<svg xmlns="http://www.w3.org/2000/svg" width="820" height="320" font-family="Arial, sans-serif">
  <rect width="820" height="320" fill="#f8f9fa" rx="8"/>
  <text x="410" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#1f4fa3">Transformer Block: Pre-LN Forward Pass with Residual Connections</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#5b6675"/>
    </marker>
    <marker id="arrowhead-orange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#c77a12"/>
    </marker>
  </defs>

  <!-- Input x -->
  <rect x="30" y="135" width="80" height="40" rx="6" fill="#1f4fa3" stroke="#1f4fa3"/>
  <text x="70" y="159" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Input x</text>

  <!-- Arrow: Input → LN1 -->
  <line x1="110" y1="155" x2="148" y2="155" stroke="#5b6675" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- LN1 -->
  <rect x="150" y="135" width="80" height="40" rx="6" fill="#0e8a6e" stroke="#0e8a6e"/>
  <text x="190" y="159" text-anchor="middle" font-size="13" font-weight="bold" fill="white">LN₁</text>

  <!-- Arrow: LN1 → MHA -->
  <line x1="230" y1="155" x2="268" y2="155" stroke="#5b6675" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- MHA -->
  <rect x="270" y="135" width="80" height="40" rx="6" fill="#1f4fa3" stroke="#1f4fa3"/>
  <text x="310" y="159" text-anchor="middle" font-size="13" font-weight="bold" fill="white">MHA</text>

  <!-- Arrow: MHA → Add1 -->
  <line x1="350" y1="155" x2="388" y2="155" stroke="#5b6675" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Add circle 1 -->
  <circle cx="405" cy="155" r="18" fill="white" stroke="#c77a12" stroke-width="2.5"/>
  <text x="405" y="161" text-anchor="middle" font-size="18" font-weight="bold" fill="#c77a12">+</text>

  <!-- Residual skip 1 (orange, from Input x over MHA to Add1) -->
  <path d="M 70 135 L 70 105 L 405 105 L 405 137" stroke="#c77a12" stroke-width="2.5" fill="none" stroke-dasharray="6,3" marker-end="url(#arrowhead-orange)"/>
  <text x="237" y="98" text-anchor="middle" font-size="11" fill="#c77a12" font-weight="bold">skip connection 1 (residual)</text>

  <!-- Arrow: Add1 → LN2 -->
  <line x1="423" y1="155" x2="461" y2="155" stroke="#5b6675" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- LN2 -->
  <rect x="463" y="135" width="80" height="40" rx="6" fill="#0e8a6e" stroke="#0e8a6e"/>
  <text x="503" y="159" text-anchor="middle" font-size="13" font-weight="bold" fill="white">LN₂</text>

  <!-- Arrow: LN2 → FFN -->
  <line x1="543" y1="155" x2="581" y2="155" stroke="#5b6675" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- FFN -->
  <rect x="583" y="135" width="80" height="40" rx="6" fill="#1f4fa3" stroke="#1f4fa3"/>
  <text x="623" y="159" text-anchor="middle" font-size="13" font-weight="bold" fill="white">FFN</text>

  <!-- Arrow: FFN → Add2 -->
  <line x1="663" y1="155" x2="701" y2="155" stroke="#5b6675" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Add circle 2 -->
  <circle cx="718" cy="155" r="18" fill="white" stroke="#c77a12" stroke-width="2.5"/>
  <text x="718" y="161" text-anchor="middle" font-size="18" font-weight="bold" fill="#c77a12">+</text>

  <!-- Residual skip 2 (orange, from after Add1 over FFN to Add2) -->
  <path d="M 405 173 L 405 215 L 718 215 L 718 173" stroke="#c77a12" stroke-width="2.5" fill="none" stroke-dasharray="6,3" marker-end="url(#arrowhead-orange)"/>
  <text x="561" y="232" text-anchor="middle" font-size="11" fill="#c77a12" font-weight="bold">skip connection 2 (residual)</text>

  <!-- Arrow: Add2 → Output -->
  <line x1="736" y1="155" x2="774" y2="155" stroke="#5b6675" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Output -->
  <rect x="716" y="135" width="0" height="0"/>
  <rect x="776" y="135" width="80" height="40" rx="6" fill="#1f4fa3" stroke="#1f4fa3"/>
  <text x="776" y="135" text-anchor="start" font-size="13" font-weight="bold" fill="white"/>
  <!-- re-draw output -->
  <rect x="756" y="135" width="90" height="40" rx="6" fill="#1f4fa3" stroke="#1f4fa3"/>
  <text x="801" y="159" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Output</text>

  <!-- Legend -->
  <rect x="30" y="265" width="16" height="16" rx="3" fill="#1f4fa3"/>
  <text x="52" y="277" font-size="12" fill="#333">Linear/Attention/FFN block</text>
  <rect x="230" y="265" width="16" height="16" rx="3" fill="#0e8a6e"/>
  <text x="252" y="277" font-size="12" fill="#333">Layer Norm (LN)</text>
  <line x1="430" y1="273" x2="455" y2="273" stroke="#c77a12" stroke-width="2.5" stroke-dasharray="5,3"/>
  <text x="460" y="277" font-size="12" fill="#c77a12" font-weight="bold">Residual skip connection</text>
  <circle cx="665" cy="273" r="10" fill="white" stroke="#c77a12" stroke-width="2"/>
  <text x="665" y="278" text-anchor="middle" font-size="14" font-weight="bold" fill="#c77a12">+</text>
  <text x="680" y="277" font-size="12" fill="#333">Add (element-wise)</text>
</svg>
