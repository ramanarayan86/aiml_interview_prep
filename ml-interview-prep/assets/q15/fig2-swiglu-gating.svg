<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 320" width="820" height="320" font-family="Arial, sans-serif">
  <rect width="820" height="320" fill="#f8f9fa" rx="8"/>
  <text x="410" y="26" text-anchor="middle" font-size="14" font-weight="bold" fill="#1f4fa3">SwiGLU FFN: Gated Computation Flow vs Standard FFN</text>

  <!-- LEFT: Standard FFN -->
  <text x="165" y="54" text-anchor="middle" font-size="12" font-weight="bold" fill="#555">Standard GELU FFN</text>
  <text x="165" y="68" text-anchor="middle" font-size="10" fill="#777">y = W₂ · GELU(W₁x)  — 2 matrices, d_ff = 4d</text>

  <rect x="110" y="80" width="110" height="28" rx="5" fill="#e8edf7" stroke="#1f4fa3" stroke-width="1.5"/>
  <text x="165" y="99" text-anchor="middle" font-size="11" fill="#1f4fa3">x ∈ ℝ^d</text>

  <line x1="165" y1="108" x2="165" y2="128" stroke="#555" stroke-width="1.5" marker-end="url(#as)"/>
  <text x="185" y="121" font-size="9" fill="#555">W₁: d→4d</text>

  <rect x="100" y="128" width="130" height="28" rx="5" fill="#fff3e0" stroke="#c77a12" stroke-width="1.5"/>
  <text x="165" y="147" text-anchor="middle" font-size="11" fill="#c77a12">hidden ∈ ℝ^(4d)</text>

  <line x1="165" y1="156" x2="165" y2="176" stroke="#555" stroke-width="1.5" marker-end="url(#as)"/>
  <text x="190" y="170" font-size="9" fill="#0e8a6e">GELU( )</text>

  <rect x="100" y="176" width="130" height="28" rx="5" fill="#e8f5e9" stroke="#0e8a6e" stroke-width="1.5"/>
  <text x="165" y="195" text-anchor="middle" font-size="11" fill="#0e8a6e">activated ∈ ℝ^(4d)</text>

  <line x1="165" y1="204" x2="165" y2="224" stroke="#555" stroke-width="1.5" marker-end="url(#as)"/>
  <text x="185" y="218" font-size="9" fill="#555">W₂: 4d→d</text>

  <rect x="110" y="224" width="110" height="28" rx="5" fill="#e8edf7" stroke="#1f4fa3" stroke-width="1.5"/>
  <text x="165" y="243" text-anchor="middle" font-size="11" fill="#1f4fa3">out ∈ ℝ^d</text>

  <text x="165" y="278" text-anchor="middle" font-size="10" fill="#555">2 weight matrices</text>
  <text x="165" y="292" text-anchor="middle" font-size="10" fill="#555">8d² params total</text>

  <!-- Divider -->
  <line x1="320" y1="50" x2="320" y2="310" stroke="#ddd" stroke-width="1.5"/>

  <!-- RIGHT: SwiGLU FFN -->
  <text x="575" y="54" text-anchor="middle" font-size="12" font-weight="bold" fill="#0e8a6e">SwiGLU FFN (LLaMA-style)</text>
  <text x="575" y="68" text-anchor="middle" font-size="10" fill="#777">y = W_out · [SiLU(W_gate·x) ⊙ W_val·x]  — 3 matrices, d_ff ≈ 2.67d</text>

  <!-- Input -->
  <rect x="520" y="80" width="110" height="28" rx="5" fill="#e8edf7" stroke="#1f4fa3" stroke-width="1.5"/>
  <text x="575" y="99" text-anchor="middle" font-size="11" fill="#1f4fa3">x ∈ ℝ^d</text>

  <!-- Split to two branches -->
  <line x1="545" y1="108" x2="490" y2="140" stroke="#555" stroke-width="1.5" marker-end="url(#as)"/>
  <text x="480" y="127" font-size="9" fill="#555">W_gate</text>

  <line x1="605" y1="108" x2="660" y2="140" stroke="#555" stroke-width="1.5" marker-end="url(#as)"/>
  <text x="618" y="127" font-size="9" fill="#555">W_val</text>

  <!-- Gate branch (left) -->
  <rect x="420" y="140" width="130" height="28" rx="5" fill="#fff3e0" stroke="#c77a12" stroke-width="1.5"/>
  <text x="485" y="159" text-anchor="middle" font-size="10" fill="#c77a12">gate_pre ∈ ℝ^(2.67d)</text>

  <line x1="485" y1="168" x2="485" y2="190" stroke="#555" stroke-width="1.5" marker-end="url(#as)"/>
  <text x="510" y="184" font-size="9" fill="#0e8a6e">SiLU( )</text>

  <rect x="420" y="190" width="130" height="28" rx="5" fill="#e8f5e9" stroke="#0e8a6e" stroke-width="1.5"/>
  <text x="485" y="209" text-anchor="middle" font-size="10" fill="#0e8a6e">gate ∈ ℝ^(2.67d)</text>
  <text x="485" y="221" text-anchor="middle" font-size="8" fill="#777">(data-dependent gate)</text>

  <!-- Value branch (right) -->
  <rect x="600" y="140" width="130" height="28" rx="5" fill="#e8edf7" stroke="#1f4fa3" stroke-width="1.5"/>
  <text x="665" y="159" text-anchor="middle" font-size="10" fill="#1f4fa3">value ∈ ℝ^(2.67d)</text>

  <!-- No activation arrow -->
  <line x1="665" y1="168" x2="665" y2="225" stroke="#555" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="692" y="184" font-size="9" fill="#777">(linear)</text>

  <!-- Element-wise multiply -->
  <line x1="485" y1="225" x2="560" y2="255" stroke="#e05252" stroke-width="2" marker-end="url(#ar)"/>
  <line x1="665" y1="225" x2="590" y2="255" stroke="#e05252" stroke-width="2" marker-end="url(#ar)"/>

  <circle cx="575" cy="255" r="18" fill="#e05252" opacity="0.9"/>
  <text x="575" y="260" text-anchor="middle" font-size="14" fill="#fff" font-weight="bold">⊙</text>
  <text x="575" y="282" text-anchor="middle" font-size="9" fill="#e05252">element-wise product</text>

  <line x1="575" y1="273" x2="575" y2="293" stroke="#555" stroke-width="1.5" marker-end="url(#as)"/>
  <text x="602" y="287" font-size="9" fill="#555">W_out: 2.67d→d</text>

  <rect x="520" y="293" width="110" height="28" rx="5" fill="#e8edf7" stroke="#1f4fa3" stroke-width="1.5"/>
  <text x="575" y="312" text-anchor="middle" font-size="11" fill="#1f4fa3">out ∈ ℝ^d</text>

  <text x="575" y="338" text-anchor="middle" font-size="10" fill="#0e8a6e">3 weight matrices · 3dm ≈ 8d² params</text>

  <defs>
    <marker id="as" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#555"/>
    </marker>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#e05252"/>
    </marker>
  </defs>
</svg>
