<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 200" width="820" height="200" font-family="Arial, sans-serif">
  <rect width="820" height="200" fill="#f8f9fa" rx="8"/>
  <text x="410" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#1f4fa3">Text → Token IDs → Embeddings → Transformer Layers</text>

  <defs>
    <marker id="a2" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#5b6675"/>
    </marker>
  </defs>

  <!-- Raw text -->
  <rect x="20" y="70" width="120" height="50" rx="6" fill="#1f4fa3"/>
  <text x="80" y="92" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Raw text</text>
  <text x="80" y="110" text-anchor="middle" font-size="11" fill="#cde">"Hello world"</text>

  <line x1="140" y1="95" x2="178" y2="95" stroke="#5b6675" stroke-width="2" marker-end="url(#a2)"/>
  <text x="159" y="88" text-anchor="middle" font-size="10" fill="#5b6675">tokenize</text>

  <!-- Token IDs -->
  <rect x="180" y="70" width="130" height="50" rx="6" fill="#0e8a6e"/>
  <text x="245" y="92" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Token IDs</text>
  <text x="245" y="110" text-anchor="middle" font-size="11" fill="#cef">[9906, 1917]</text>

  <line x1="310" y1="95" x2="348" y2="95" stroke="#5b6675" stroke-width="2" marker-end="url(#a2)"/>
  <text x="329" y="88" text-anchor="middle" font-size="10" fill="#5b6675">lookup E</text>

  <!-- Embeddings -->
  <rect x="350" y="60" width="150" height="70" rx="6" fill="#c77a12"/>
  <text x="425" y="85" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Embeddings</text>
  <text x="425" y="103" text-anchor="middle" font-size="11" fill="#fef">E[9906] ∈ ℝ⁴⁰⁹⁶</text>
  <text x="425" y="120" text-anchor="middle" font-size="11" fill="#fef">E[1917] ∈ ℝ⁴⁰⁹⁶</text>

  <line x1="500" y1="95" x2="538" y2="95" stroke="#5b6675" stroke-width="2" marker-end="url(#a2)"/>
  <text x="519" y="88" text-anchor="middle" font-size="10" fill="#5b6675">+ pos enc</text>

  <!-- Transformer -->
  <rect x="540" y="60" width="140" height="70" rx="6" fill="#6c4fe0"/>
  <text x="610" y="85" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Transformer</text>
  <text x="610" y="103" text-anchor="middle" font-size="11" fill="#edf">N × (Attn+FFN)</text>
  <text x="610" y="120" text-anchor="middle" font-size="11" fill="#edf">layers</text>

  <line x1="680" y1="95" x2="718" y2="95" stroke="#5b6675" stroke-width="2" marker-end="url(#a2)"/>

  <!-- Logits -->
  <rect x="720" y="70" width="80" height="50" rx="6" fill="#1f4fa3"/>
  <text x="760" y="92" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Logits</text>
  <text x="760" y="110" text-anchor="middle" font-size="11" fill="#cde">∈ ℝᵛᵒᶜᵃᵇ</text>

  <!-- Labels -->
  <text x="410" y="165" text-anchor="middle" font-size="12" fill="#444">Vocab size V determines the table height. Embedding dim d sets vector width. Only token IDs enter — not raw bytes.</text>
</svg>
