<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 356" width="820" height="356" font-family="Arial, sans-serif">
  <rect width="820" height="356" fill="#f8f9fa" rx="8"/>

  <!-- Arrow marker definition -->
  <defs>
    <marker id="arr2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#5b6675"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="410" y="26" text-anchor="middle" font-size="14" font-weight="bold" fill="#1f4fa3">Vocabulary Size Comparison: 32K vs. 128K vs. 256K</text>

  <!-- ===== Column headers ===== -->
  <!-- Dimension label column header -->
  <rect x="18" y="38" width="190" height="32" fill="#2d3748" rx="4"/>
  <text x="113" y="59" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Dimension</text>

  <!-- 32K header -->
  <rect x="214" y="38" width="182" height="32" fill="#0e8a6e" rx="4"/>
  <text x="305" y="54" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Small: 32K</text>
  <text x="305" y="67" text-anchor="middle" font-size="10" fill="#d6f5ec">(e.g. Llama-2, GPT-2)</text>

  <!-- 128K header -->
  <rect x="402" y="38" width="182" height="32" fill="#c77a12" rx="4"/>
  <text x="493" y="54" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Medium: 128K</text>
  <text x="493" y="67" text-anchor="middle" font-size="10" fill="#fef0da">(e.g. Llama-3, GPT-4)</text>

  <!-- 256K header -->
  <rect x="590" y="38" width="212" height="32" fill="#6c4fe0" rx="4"/>
  <text x="696" y="54" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Large: 256K</text>
  <text x="696" y="67" text-anchor="middle" font-size="10" fill="#f0edfb">(e.g. Gemma, T5)</text>

  <!-- ===== Row 1: Sequence Length ===== -->
  <rect x="18" y="76" width="190" height="44" fill="#e8edf5" rx="3"/>
  <text x="113" y="94" text-anchor="middle" font-size="11" font-weight="bold" fill="#1f4fa3">Sequence Length</text>
  <text x="113" y="111" text-anchor="middle" font-size="10" fill="#5b6675">(tokens per sentence)</text>

  <rect x="214" y="76" width="182" height="44" fill="#d6f5ec" rx="3"/>
  <text x="305" y="94" text-anchor="middle" font-size="13" font-weight="bold" fill="#c0392b">LONG</text>
  <text x="305" y="112" text-anchor="middle" font-size="10" fill="#5b6675">rare chars split into many tokens</text>

  <rect x="402" y="76" width="182" height="44" fill="#fef3e2" rx="3"/>
  <text x="493" y="94" text-anchor="middle" font-size="13" font-weight="bold" fill="#c77a12">MEDIUM</text>
  <text x="493" y="112" text-anchor="middle" font-size="10" fill="#5b6675">balanced token fertility</text>

  <rect x="590" y="76" width="212" height="44" fill="#f0edfb" rx="3"/>
  <text x="696" y="94" text-anchor="middle" font-size="13" font-weight="bold" fill="#0e8a6e">SHORT</text>
  <text x="696" y="112" text-anchor="middle" font-size="10" fill="#5b6675">common words = single token</text>

  <!-- ===== Row 2: Embedding Memory ===== -->
  <rect x="18" y="126" width="190" height="44" fill="#e8edf5" rx="3"/>
  <text x="113" y="144" text-anchor="middle" font-size="11" font-weight="bold" fill="#1f4fa3">Embedding Memory</text>
  <text x="113" y="161" text-anchor="middle" font-size="10" fill="#5b6675">V &#215; d &#215; dtype bytes</text>

  <rect x="214" y="126" width="182" height="44" fill="#d6f5ec" rx="3"/>
  <text x="305" y="144" text-anchor="middle" font-size="13" font-weight="bold" fill="#0e8a6e">SMALL</text>
  <text x="305" y="162" text-anchor="middle" font-size="10" fill="#5b6675">~256 MB (fp16, d=4096)</text>

  <rect x="402" y="126" width="182" height="44" fill="#fef3e2" rx="3"/>
  <text x="493" y="144" text-anchor="middle" font-size="13" font-weight="bold" fill="#c77a12">MEDIUM</text>
  <text x="493" y="162" text-anchor="middle" font-size="10" fill="#5b6675">~1.0 GB (fp16, d=4096)</text>

  <rect x="590" y="126" width="212" height="44" fill="#fde8e8" rx="3"/>
  <text x="696" y="144" text-anchor="middle" font-size="13" font-weight="bold" fill="#c0392b">LARGE</text>
  <text x="696" y="162" text-anchor="middle" font-size="10" fill="#5b6675">~2.0 GB (fp16, d=4096)</text>

  <!-- ===== Row 3: Softmax Cost ===== -->
  <rect x="18" y="176" width="190" height="44" fill="#e8edf5" rx="3"/>
  <text x="113" y="194" text-anchor="middle" font-size="11" font-weight="bold" fill="#1f4fa3">Softmax Cost</text>
  <text x="113" y="211" text-anchor="middle" font-size="10" fill="#5b6675">O(batch &#215; d &#215; V)</text>

  <rect x="214" y="176" width="182" height="44" fill="#d6f5ec" rx="3"/>
  <text x="305" y="194" text-anchor="middle" font-size="13" font-weight="bold" fill="#0e8a6e">LOW</text>
  <text x="305" y="212" text-anchor="middle" font-size="10" fill="#5b6675">~0.27 B FLOPs / token</text>

  <rect x="402" y="176" width="182" height="44" fill="#fef3e2" rx="3"/>
  <text x="493" y="194" text-anchor="middle" font-size="13" font-weight="bold" fill="#c77a12">MODERATE</text>
  <text x="493" y="212" text-anchor="middle" font-size="10" fill="#5b6675">~1.07 B FLOPs / token</text>

  <rect x="590" y="176" width="212" height="44" fill="#fde8e8" rx="3"/>
  <text x="696" y="194" text-anchor="middle" font-size="13" font-weight="bold" fill="#c0392b">HIGH</text>
  <text x="696" y="212" text-anchor="middle" font-size="10" fill="#5b6675">~2.15 B FLOPs / token</text>

  <!-- ===== Row 4: Multilingual Quality ===== -->
  <rect x="18" y="226" width="190" height="44" fill="#e8edf5" rx="3"/>
  <text x="113" y="244" text-anchor="middle" font-size="11" font-weight="bold" fill="#1f4fa3">Multilingual Quality</text>
  <text x="113" y="261" text-anchor="middle" font-size="10" fill="#5b6675">non-English coverage</text>

  <rect x="214" y="226" width="182" height="44" fill="#fde8e8" rx="3"/>
  <text x="305" y="244" text-anchor="middle" font-size="13" font-weight="bold" fill="#c0392b">POOR</text>
  <text x="305" y="262" text-anchor="middle" font-size="10" fill="#5b6675">rare chars split to many bytes</text>

  <rect x="402" y="226" width="182" height="44" fill="#fef3e2" rx="3"/>
  <text x="493" y="244" text-anchor="middle" font-size="13" font-weight="bold" fill="#c77a12">MODERATE</text>
  <text x="493" y="262" text-anchor="middle" font-size="10" fill="#5b6675">decent cross-lingual coverage</text>

  <rect x="590" y="226" width="212" height="44" fill="#d6f5ec" rx="3"/>
  <text x="696" y="244" text-anchor="middle" font-size="13" font-weight="bold" fill="#0e8a6e">GOOD</text>
  <text x="696" y="262" text-anchor="middle" font-size="10" fill="#5b6675">whole words in many scripts</text>

  <!-- ===== Row 5: Summary / Verdict ===== -->
  <rect x="18" y="276" width="190" height="62" fill="#2d3748" rx="3"/>
  <text x="113" y="298" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Overall Verdict</text>
  <text x="113" y="316" text-anchor="middle" font-size="9" fill="#aab" font-style="italic">(typical use-case)</text>

  <rect x="214" y="276" width="182" height="62" fill="#e6f4f1" stroke="#0e8a6e" stroke-width="1.5" rx="3"/>
  <text x="305" y="295" text-anchor="middle" font-size="10" font-weight="bold" fill="#0e8a6e">Fast throughput, low memory</text>
  <text x="305" y="310" text-anchor="middle" font-size="9" fill="#5b6675">Best for English-only tasks,</text>
  <text x="305" y="323" text-anchor="middle" font-size="9" fill="#5b6675">resource-constrained deployment</text>

  <rect x="402" y="276" width="182" height="62" fill="#fef3e2" stroke="#c77a12" stroke-width="1.5" rx="3"/>
  <text x="493" y="295" text-anchor="middle" font-size="10" font-weight="bold" fill="#c77a12">Balanced tradeoff</text>
  <text x="493" y="310" text-anchor="middle" font-size="9" fill="#5b6675">Sweet spot for multilingual</text>
  <text x="493" y="323" text-anchor="middle" font-size="9" fill="#5b6675">general-purpose LLMs</text>

  <rect x="590" y="276" width="212" height="62" fill="#f0edfb" stroke="#6c4fe0" stroke-width="1.5" rx="3"/>
  <text x="696" y="295" text-anchor="middle" font-size="10" font-weight="bold" fill="#6c4fe0">Better coverage, higher cost</text>
  <text x="696" y="310" text-anchor="middle" font-size="9" fill="#5b6675">Best for multilingual or code</text>
  <text x="696" y="323" text-anchor="middle" font-size="9" fill="#5b6675">models with ample GPU budget</text>
</svg>
