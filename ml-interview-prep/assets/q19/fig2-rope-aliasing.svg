<?xml version="1.0" encoding="UTF-8"?>
<svg width="820" height="300" viewBox="0 0 820 300" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <defs>
    <marker id="ax" markerWidth="7" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 7 3, 0 6" fill="#5b6675"/>
    </marker>
    <clipPath id="leftClip">
      <rect x="55" y="40" width="300" height="180"/>
    </clipPath>
    <clipPath id="rightClip">
      <rect x="465" y="40" width="300" height="180"/>
    </clipPath>
  </defs>

  <rect width="820" height="300" fill="#f8f9fa" rx="8"/>

  <!-- Overall title -->
  <text x="410" y="20" text-anchor="middle" font-size="13" font-weight="bold" fill="#1f4fa3">RoPE Frequency Aliasing: High-Frequency Dims Wrap at Long Context</text>

  <!-- ==============================
       LEFT PANEL: High-freq dim i=0
  ============================== -->
  <rect x="20" y="30" width="385" height="230" fill="#ffffff" rx="6" stroke="#d0d5dd" stroke-width="1"/>
  <text x="212" y="50" text-anchor="middle" font-size="12" font-weight="bold" fill="#1f4fa3">High-frequency dim (i=0)</text>

  <!-- Chart background -->
  <rect x="55" y="55" width="300" height="165" fill="#f8f9fa" rx="3" stroke="#e0e0e0" stroke-width="1"/>

  <!-- Shading: positions 0-512 (blue training), 513-600 (red unseen) -->
  <!-- X: pos 0→55, pos 600→355. scale=300/600=0.5 px/pos -->
  <!-- pos 512 → 55+512*0.5=55+256=311 -->
  <rect x="55" y="55" width="256" height="165" fill="#1f4fa3" opacity="0.07" clip-path="url(#leftClip)"/>
  <rect x="311" y="55" width="44" height="165" fill="#e05252" opacity="0.12" clip-path="url(#leftClip)"/>

  <!-- Training boundary line -->
  <line x1="311" y1="55" x2="311" y2="220" stroke="#1f4fa3" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>

  <!-- Y gridlines: angle 0 to 6.28, chart height 165 -->
  <!-- y=π ≈3.14: 55+(6.28-3.14)/6.28*165=55+82.4=137 -->
  <line x1="55" y1="137" x2="355" y2="137" stroke="#e0e0e0" stroke-width="0.7"/>
  <!-- Y labels -->
  <text x="50" y="59" text-anchor="end" font-size="9" fill="#5b6675">2π</text>
  <text x="50" y="141" text-anchor="end" font-size="9" fill="#5b6675">π</text>
  <text x="50" y="222" text-anchor="end" font-size="9" fill="#5b6675">0</text>

  <!-- Y axis label -->
  <text x="14" y="140" text-anchor="middle" font-size="10" fill="#5b6675" transform="rotate(-90,14,140)">Angle (mod 2π)</text>

  <!-- X axis labels -->
  <text x="55" y="233" text-anchor="middle" font-size="9" fill="#5b6675">0</text>
  <text x="155" y="233" text-anchor="middle" font-size="9" fill="#5b6675">200</text>
  <text x="255" y="233" text-anchor="middle" font-size="9" fill="#5b6675">400</text>
  <text x="311" y="233" text-anchor="middle" font-size="9" fill="#1f4fa3">512</text>
  <text x="355" y="233" text-anchor="middle" font-size="9" fill="#e05252">600</text>
  <text x="205" y="248" text-anchor="middle" font-size="10" fill="#5b6675">Token position</text>

  <!-- Axes -->
  <line x1="55" y1="220" x2="358" y2="220" stroke="#5b6675" stroke-width="1.5" marker-end="url(#ax)"/>
  <line x1="55" y1="220" x2="55" y2="52" stroke="#5b6675" stroke-width="1.5" marker-end="url(#ax)"/>

  <!-- HIGH-FREQ: RoPE base=10000. θ_0 = 10000^(−0/d) = 1 rad/token
       Sawtooth: resets every 2π ≈ 6.28 tokens.
       Positions: 0,6.28,12.56,...  each segment goes from 0 to 2π
       Y: angle=0 → y=220, angle=2π → y=55. scale= -165/6.28=-26.27 px/rad
       For each sawtooth segment from pos p0 to p0+6.28:
         x0=55+p0*0.5, x1=55+(p0+6.28)*0.5
         y at start=220, y at end=55
  -->
  <!-- Generate ~95 sawtooth teeth from 0 to 600 -->
  <!-- One tooth: width = 6.28 * 0.5 = 3.14 px. Too small to see clearly. Let's visualize as continuous line wrapping. -->
  <!-- Actually 1 rad/token → wraps every 6.28 tokens → 600/6.28 ≈ 95 wraps. Too dense.
       Let's use a larger effective slope for visualization clarity: show ~8 sawtooth cycles across 600 positions.
       This still illustrates the aliasing concept. -->
  <!-- 8 cycles across 600 positions → period = 75 tokens → each tooth width=75*0.5=37.5px -->
  <polyline clip-path="url(#leftClip)" fill="none" stroke="#e05252" stroke-width="2"
    points="55,220 92.5,55 92.5,220 130,55 130,220 167.5,55 167.5,220 205,55 205,220 242.5,55 242.5,220 280,55 280,220 317.5,55 317.5,220 355,55"/>

  <!-- HIGH-FREQ: RoPE NTK base=500000. θ_0 = 500000^(-0/d).
       Effective: ~0.002 rad/token → total angle at pos 600 ≈ 1.2 rad.
       Nearly flat. y at angle=1.2 = 220 - (1.2/6.28)*165 = 220-31.5=188.5 -->
  <line x1="55" y1="220" x2="355" y2="188" stroke="#0e8a6e" stroke-width="2" clip-path="url(#leftClip)"/>

  <!-- Training region label -->
  <text x="183" y="70" text-anchor="middle" font-size="9" fill="#1f4fa3" opacity="0.7">training (0-512)</text>
  <text x="333" y="70" text-anchor="middle" font-size="8" fill="#e05252" opacity="0.8">unseen</text>

  <!-- Annotation -->
  <text x="212" y="262" text-anchor="middle" font-size="9" fill="#e05252" font-weight="bold">High-freq dims alias — same angle at unseen positions</text>

  <!-- Legend left panel -->
  <line x1="62" y1="98" x2="82" y2="98" stroke="#e05252" stroke-width="2"/>
  <text x="86" y="102" font-size="9" fill="#e05252">RoPE base=10000</text>
  <line x1="62" y1="113" x2="82" y2="113" stroke="#0e8a6e" stroke-width="2"/>
  <text x="86" y="117" font-size="9" fill="#0e8a6e">RoPE NTK base=500k</text>

  <!-- ==============================
       RIGHT PANEL: Low-freq dim i=d/2-1
  ============================== -->
  <rect x="415" y="30" width="385" height="230" fill="#ffffff" rx="6" stroke="#d0d5dd" stroke-width="1"/>
  <text x="607" y="50" text-anchor="middle" font-size="12" font-weight="bold" fill="#0e8a6e">Low-frequency dim (i=d/2−1)</text>

  <!-- Chart background -->
  <rect x="465" y="55" width="300" height="165" fill="#f8f9fa" rx="3" stroke="#e0e0e0" stroke-width="1"/>

  <!-- Shading same positions -->
  <rect x="465" y="55" width="256" height="165" fill="#1f4fa3" opacity="0.07" clip-path="url(#rightClip)"/>
  <rect x="721" y="55" width="44" height="165" fill="#e05252" opacity="0.12" clip-path="url(#rightClip)"/>
  <line x1="721" y1="55" x2="721" y2="220" stroke="#1f4fa3" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>

  <!-- Y axis: same scale 0 to 2π but values are tiny -->
  <!-- Low-freq dim: θ_{d/2-1} = 10000^(-(d-2)/d) ≈ 10000^(-1) = 0.0001 rad/token (approx) -->
  <!-- More precisely for visualization: ~0.0001 rad/token → at pos 600: 0.06 rad -->
  <!-- Show Y axis 0 to 0.3 rad for visibility -->
  <!-- ppl scale: 0→220, 0.3→55. scale=-165/0.3=-550 px/rad -->
  <!-- y(0.1)=220-55=165, y(0.2)=220-110=110, y(0.3)=55 -->
  <line x1="465" y1="165" x2="765" y2="165" stroke="#e0e0e0" stroke-width="0.7"/>
  <line x1="465" y1="110" x2="765" y2="110" stroke="#e0e0e0" stroke-width="0.7"/>

  <!-- Y labels (custom scale 0 to 0.3) -->
  <text x="460" y="59" text-anchor="end" font-size="9" fill="#5b6675">0.3</text>
  <text x="460" y="114" text-anchor="end" font-size="9" fill="#5b6675">0.2</text>
  <text x="460" y="169" text-anchor="end" font-size="9" fill="#5b6675">0.1</text>
  <text x="460" y="222" text-anchor="end" font-size="9" fill="#5b6675">0.0</text>
  <text x="420" y="140" text-anchor="middle" font-size="9" fill="#5b6675" transform="rotate(-90,420,140)">Angle (rad)</text>

  <!-- X axis labels -->
  <text x="465" y="233" text-anchor="middle" font-size="9" fill="#5b6675">0</text>
  <text x="565" y="233" text-anchor="middle" font-size="9" fill="#5b6675">200</text>
  <text x="665" y="233" text-anchor="middle" font-size="9" fill="#5b6675">400</text>
  <text x="721" y="233" text-anchor="middle" font-size="9" fill="#1f4fa3">512</text>
  <text x="765" y="233" text-anchor="middle" font-size="9" fill="#e05252">600</text>
  <text x="615" y="248" text-anchor="middle" font-size="10" fill="#5b6675">Token position</text>

  <!-- Axes -->
  <line x1="465" y1="220" x2="768" y2="220" stroke="#5b6675" stroke-width="1.5" marker-end="url(#ax)"/>
  <line x1="465" y1="220" x2="465" y2="52" stroke="#5b6675" stroke-width="1.5" marker-end="url(#ax)"/>

  <!-- Low-freq RoPE base=10000: ~0.0001 rad/token → at 600 pos: 0.06 rad
       y = 220 - (0.06/0.3)*165 = 220-33=187 at x=765 -->
  <line x1="465" y1="220" x2="765" y2="187" stroke="#e05252" stroke-width="2" clip-path="url(#rightClip)"/>

  <!-- Low-freq RoPE NTK: even slower, ~0.00002 rad/token → 0.012 rad at 600
       y = 220 - (0.012/0.3)*165 = 220-6.6=213.4 at x=765 -->
  <line x1="465" y1="220" x2="765" y2="213" stroke="#0e8a6e" stroke-width="2" clip-path="url(#rightClip)"/>

  <!-- Labels on lines -->
  <text x="770" y="189" font-size="9" fill="#e05252">base=10k</text>
  <text x="770" y="215" font-size="9" fill="#0e8a6e">NTK</text>

  <!-- Annotation -->
  <text x="607" y="262" text-anchor="middle" font-size="9" fill="#0e8a6e" font-weight="bold">Low-freq dims don't alias — safe for extrapolation</text>

  <!-- Legend right panel -->
  <line x1="472" y1="98" x2="492" y2="98" stroke="#e05252" stroke-width="2"/>
  <text x="496" y="102" font-size="9" fill="#e05252">RoPE base=10000</text>
  <line x1="472" y1="113" x2="492" y2="113" stroke="#0e8a6e" stroke-width="2"/>
  <text x="496" y="117" font-size="9" fill="#0e8a6e">RoPE NTK base=500k</text>
</svg>
