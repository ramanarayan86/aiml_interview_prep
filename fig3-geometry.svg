<svg viewBox="0 0 860 380" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <rect x="1" y="1" width="858" height="378" rx="16" fill="#FFFFFF" stroke="#E3E6EC"/>
  <text x="32" y="40" font-size="21" font-weight="700" fill="#16202E">The geometric reason it works</text>
  <text x="32" y="63" font-size="13.5" fill="#5B6675">A dot product is <tspan font-style="italic">magnitude &#215; magnitude &#215; cos&#952;</tspan>. Remove the magnitudes and only the angle survives &#8212; and cos&#952; &#8712; [&#8722;1,&#160;1].</text>

  <!-- LEFT: unnormalized -->
  <g transform="translate(70,98)">
    <text x="150" y="-8" text-anchor="middle" font-size="13" font-weight="700" fill="#9B2420">Unnormalized: unbounded</text>
    <rect x="-20" y="6" width="340" height="244" rx="12" fill="#FCF6F5" stroke="#F0D6D3"/>
    <!-- axes -->
    <line x1="40" y1="220" x2="280" y2="220" stroke="#E0C7C4" stroke-width="1.4"/>
    <line x1="40" y1="220" x2="40" y2="40" stroke="#E0C7C4" stroke-width="1.4"/>
    <!-- long vectors -->
    <line x1="40" y1="220" x2="250" y2="70" stroke="#E0322E" stroke-width="3"/>
    <line x1="40" y1="220" x2="200" y2="120" stroke="#C77A12" stroke-width="3"/>
    <text x="256" y="66" font-size="12" fill="#E0322E" font-weight="600">q</text>
    <text x="206" y="116" font-size="12" fill="#C77A12" font-weight="600">k</text>
    <text x="86" y="178" font-size="11" fill="#8a4b46">&#952;</text>
    <text x="60" y="252" font-size="12" fill="#9B2420">q&#183;k = &#8741;q&#8741;&#8741;k&#8741;cos&#952; &#8594; can be &#177;&#8734;</text>
  </g>

  <!-- arrow -->
  <text x="438" y="225" font-size="30" fill="#0E8A6E">&#8594;</text>
  <text x="438" y="248" font-size="11" fill="#0E8A6E" text-anchor="middle">normalize</text>

  <!-- RIGHT: normalized unit circle -->
  <g transform="translate(500,98)">
    <text x="160" y="-8" text-anchor="middle" font-size="13" font-weight="700" fill="#0c6e58">Normalized: bounded in [&#8722;1, 1]</text>
    <rect x="-20" y="6" width="340" height="244" rx="12" fill="#F4FBF8" stroke="#C9ECE0"/>
    <!-- unit circle -->
    <circle cx="150" cy="135" r="92" fill="none" stroke="#9AD9C6" stroke-width="1.6" stroke-dasharray="4 4"/>
    <line x1="58" y1="135" x2="242" y2="135" stroke="#CDE9E1" stroke-width="1.2"/>
    <line x1="150" y1="43" x2="150" y2="227" stroke="#CDE9E1" stroke-width="1.2"/>
    <!-- unit vectors -->
    <line x1="150" y1="135" x2="231" y2="92" stroke="#0E8A6E" stroke-width="3"/>
    <line x1="150" y1="135" x2="221" y2="76" stroke="#2D6CDF" stroke-width="3"/>
    <circle cx="231" cy="92" r="3.4" fill="#0E8A6E"/>
    <circle cx="221" cy="76" r="3.4" fill="#2D6CDF"/>
    <text x="238" y="90" font-size="12" fill="#0E8A6E" font-weight="600">q&#770;</text>
    <text x="226" y="72" font-size="12" fill="#2D6CDF" font-weight="600">k&#770;</text>
    <text x="168" y="112" font-size="11" fill="#0c6e58">&#952;</text>
    <text x="6" y="252" font-size="12" fill="#0c6e58">q&#770;&#183;k&#770; = cos&#952; &#8712; [&#8722;1, 1], then &#215; learnable g</text>
  </g>
</svg>
